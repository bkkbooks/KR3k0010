body:
  text: 蒙求集註卷上唐李瀚撰宋徐子光註王戎簡要裴楷清通晋書王戎字濬冲琅琊臨沂人㓜而頴悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電阮籍素與戎父渾為友戎年十五隨渾在郎舎少籍二十歳籍與之交籍適渾俄頃輒去過視戎良久然後出謂渾曰濬冲清賞非卿倫也共卿言不如共阿戎談歴官至司徒晉裴楷字叔則河東聞喜人明悟有識量少與戎齊名鍾㑹薦於文帝辟相國掾及吏部郎缺帝問㑹㑹曰裴楷清通王戎簡要皆其選也於是用楷楷風神高邁容儀俊爽博渉羣書特精理義時謂之玉人又稱見叔則如近玉山映照人也轉中書郎出入官省見者肅然改容武帝登阼探䇿以卜世數多少既而得一不悦羣臣失色楷曰臣聞天得一以清地得一以寧王侯得一以為天下貞帝大悦累遷中書令侍中孔明卧龍吕望非熊蜀志諸葛亮琅邪陽都人躬耕隴畆好為梁父吟毎自比管仲樂毅時人莫之許惟崔州平徐庶與亮友善謂為信然時先主屯新野徐庶見之謂曰諸葛孔明卧龍也將軍豈願見之乎此人可就見不可屈致宜枉駕顧之先主遂詣亮凡三往反乃見因屛人與語大悦於是情好日宻闗公張公等不悦先主曰孤之有孔明猶魚之有水也願勿復言及稱尊位以亮為丞相漢晋春秋曰亮家南陽鄧縣襄陽城西號曰隆中六韜曰文王将田史編布卜曰田于渭陽將有得焉非龍非彲非虎非羆兆得公侯天遺汝師以之佐襄施及三王文王乃齋三日田于渭陽卒見太公坐茅以漁文王勞而問之乃載與歸立為師舊本作非熊非羆疑流俗承誤後世莫知是正耳按後漢崔駰逹㫖辭曰或以漁父見兆于元龜注云西伯出獵卜之曰所獲非龍非驪非熊非羆所獲覇王之輔所謂非熊葢本于此楊震闗西丁寛易東後漢楊震字伯起𢎞農華陰人少好學明經博覧無不窮究諸儒為之語曰闗西孔子楊伯起常客居於湖不答州郡禮命數十年衆謂之晚暮而志愈篤後有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣年五十乃始仕州郡安帝時為太尉前漢丁寛字子襄梁人初梁項生從田何受易時寛為項生從者讀易精敏材過項生遂事何學成東歸何謂門人曰易以東矣寛復從周王孫受古義號周氏傳景帝時為梁孝王将軍作易説二萬言訓詁舉大義而已謝安高潔王導公忠晉書謝安字安石陳國陽夏人年四歳桓彛見而嘆曰此兒風神秀徹後當不减王東海王導亦深噐之由是少有重名初辟除並以疾辭有司奏安被召歴年不至禁錮終身遂栖遲東土常往臨安山中放情丘壑然每逰賞必以妓女從時弟萬為西中郎將搃藩任之重安雖處衡門名出其右有公輔望年四十餘始有仕志征西大將軍桓温請為司馬朝士咸送中丞髙崧戲之曰卿屢違朝㫖高卧東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安有愧色後拜吏部尚書時孝武立政不自已桓温威振内外安盡忠匡翼終能輯穆進中書監録尚書事苻堅率衆次淮肥加安征討大都督既破堅以摠統功進太保薨贈太傅諡文靖晉王導字茂宏光禄大夫覧之孫少有風鍳識量清逺陳留高士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潜有興復之志帝亦雅相器重㑹帝出鎮下邳請導為安東司馬軍謀宻䇿知無不為帝常謂曰卿吾之蕭何也累遷中書監録尚書事及帝登尊號百官陪列命導升御床共坐導固辭曰若太陽下同萬物蒼生何由仰照帝乃止進位司空匡衡鑿壁孫敬閉戸前漢匡衡字稚圭東海承人父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩觧人頤射䇿甲科元帝時為丞相西京雜記曰衡勤學無燭鄰舎有燭而不逮衡乃穿壁引其光而讀之邑大姓文不識名家富多書衡乃與其客作而不求償願得書遍讀之主人感歎資給以書遂成大儒楚國先賢傳孫敬字文寳常閉户讀書睡則繩繫頭懸之梁上嘗入市市人見之皆曰閉户先生來也辟命不至郅都蒼鷹寗成乳虎前漢郅都河東大陽人景帝時為中郎將敢直諌面折大臣于朝為中尉是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見皆側目而視號曰蒼鷹拜鴈門太守匈奴素聞都節舉兵引去竟都死不近雁門匈奴至為偶人象都令騎馳射之莫能中其見憚如此匈奴患之乃中都以漢法卒斬之前漢寗成南陽穰人以郎遷謁者事景帝好氣為小吏必陵其長吏為人上操下急如束濕為中尉其治效郅都其㢘弗如武帝即位徙為内史外戚多毁其短抵罪後上欲以為郡守公孫𢎞曰臣為小吏時成為濟南都尉其治如狼牧羊不可使治民上乃拜為闗都尉歳餘闗都吏𨽻郡國出入闗者號曰寧見乳虎無值寗成之怒其暴如此周嵩狠抗梁冀䟦扈晉書周嵩字仲智兄顗字伯仁汝南安成人中興時顗等並立貴位嘗冬至置酒其母舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊㫖伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容于世惟阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也後顗嵩並為王敦所害謨歴侍中䕶軍世説抗直作狼抗晉書周顗傳處仲剛愎強忍狼抗無上處仲王敦字也後漢梁冀字伯卓襃親愍侯竦之元孫為人鳶肩豺目洞精瞠眄口吟舌言拜大將軍侈暴滋甚冲帝崩冀立質帝少聪惠知冀驕横嘗朝羣臣目冀曰此䟦扈將軍也冀聞深怨之遂鴆殺復立桓帝而枉害太尉李固杜喬海内嗟懼其四方調發歳時貢獻皆先輸上第于冀乗輿乃其次焉一門前後七封侯三皇后六貴人二大將軍在位二十餘年窮極滿盛威行内外百僚側目莫敢違命天子恭已不得有所親預帝既不平之後發怒誅冀中外宗親無長少皆棄市他連及公卿列校刺史二千石死者數千人故吏賔客免黜者三百餘人朝廷為空收冀財貨三十餘萬萬以充王府减天下税租之半郗超髯參王珣短簿晉書郗超字景興太尉鍳之孫少卓犖不覊有曠世之度善談論義理精微大司馬桓温辟為参軍温英氣髙邁罕有所推與超言常謂不能測遂傾意禮待超亦深自結納時王珣為温主簿亦為温所重府中語曰髯参軍短主簿能令公喜能令公怒超髯珣短故也晉王珣字元琳丞相導之孫弱冠與謝𤣥為温掾温嘗謂之曰謝掾年四十必擁旄仗節王掾當作黒頭公皆未易才也孝武時為僕射領吏部帝雅好典籍以才學文章見昵夢人以大筆如椽與之既覺語人曰此當有大手筆事俄而帝崩哀冊謚議皆珣所草𤣥字㓜度少頴悟為叔父安所噐重安嘗戒約子弟因曰子弟亦何豫人事而正欲使其佳諸人莫有言者𤣥答曰譬如芝蘭玉樹欲使其生于庭階耳安悦時苻堅入冦朝廷求文武良將可以鎮禦北方安乃以𤣥應舉累進冠軍將軍為前鋒都督與從弟輔國將軍琰决戰淝水南堅衆潰棄甲宵遯聞風聲鶴唳皆以為王師已至進號前将軍伏波標柱博望尋河後漢馬援字文淵扶風茂陵人少有大志嘗謂賔客曰丈夫為志窮當益堅老當益壮建武中歴虎賁中郎将數被進見為人美鬚髪眉目如畫閑于進對又善兵䇿帝常言伏波論兵與我意合有謀未嘗不用後交趾女子徴側等反蠻夷皆應之拜援為伏波將軍擊破之封新息侯援乃擊牛釃酒勞饗軍士將樓船戰士進擊餘黨嶠南悉平後請擊武陵五溪蠻夷時年六十二帝愍其老援曰臣尚能被甲上馬帝令試之援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也遂遣征之進營壺頭㑹暑甚中病卒廣州記曰援到交趾立銅柱為漢之極界前漢張騫漢中人建元中為郎武帝方欲事滅胡廼募能使者騫應募使月氏徑匈奴留十餘歳持漢節不失因與其属亡鄉月氏後亡歸拜大中大夫騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六具為天子言其地形所有元朔中以校尉從大將軍擊匈奴知水草處軍得以不乏封博望侯賛曰禹本紀言河出崑崙崑崙高二千五百里餘日月所相避隱為光明也自張騫使大夏之後窮河源惡睹所謂崑崙者乎舊注云得支機石歸未詳所出李陵初詩田横感歌前漢李陵字少卿前將軍廣之孫少為侍中建章監善騎射愛人謙遜下士甚得名譽武帝以為有廣之風拜騎都尉天漢二年將步卒五千人征匈奴戰敗遂降焉初陵與蘇武俱為侍中武使匈奴明年陵降後昭帝立與匈奴和親武得還漢陵以詩贈别曰携手上河梁游子暮何之徘徊岐路側悢悢不得辭晨風鳴北林熠燿東南飛浮雲日千里安知我心悲武别陵詩曰䨇鳬俱北飛一鳬獨南翔子當留斯館我當歸故郷一别如秦胡㑹見何渠央愴悢切中懐不覺淚沾裳願子長努力言笑莫相忘五言詩盖始此前漢田橫狄人故齊王田氏之族秦末自立為齊王漢將灌嬰敗横軍遂平齊地横懼誅與其徒居海島中高帝召之乃與其客二人乗傳詣洛陽謝使者曰横始與漢王俱南面稱孤今王為天子而横為亡虜其愧已甚遂自剄令客奉其頭奏之高帝為之流涕以王禮葬之拜其二客為都尉既葬二客穿其冡旁皆自剄其餘五百人在海中聞横死亦皆自殺李周翰曰横自殺從者不敢哭而不勝哀故為悲歌以寄情後廣之為薤露蒿里歌以送終至李延年分為二等薤露送王公貴人蒿里送士大夫庶人挽柩者歌之因呼為挽歌武仲不休士衡患多後漢傅毅字武仲扶風茂陵人少博學肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之由是文雅顯于朝廷魏文帝典論曰文人相輕自古而然傅毅之于班固伯仲之間耳而固小之與弟超書曰武仲以能文為蘭臺令史下筆不能自休晉陸機字士衡吳郡人大司馬抗之子身長七尺其聲如雷少有異才文章冠世與弟雲俱入洛造太常張華華素重其名如舊相識曰伐吳之後利獲二俊遂薦之諸公又詣侍中王濟濟指羊酪謂曰吳中何以敵此答云千里蓴羹末下鹽豉時人稱為名對機天才秀逸辭藻宏麗華嘗謂之曰人之為文嘗恨才少而子更患其多弟雲嘗與書曰君苗見兄文輒欲燒其筆硯累遷中書郎為平原内史後成都王頴起兵討長沙王乂假機後將軍河北大都督機以羇旅入官頓居羣士之右皆有怨心譛之于頴頴怒使人收機機歎曰華亭鶴唳豈可復聞乎遂遇害初機有駿犬名黄耳既羇寓京師乆無家問笑語犬曰我家絶無書汝能齎書取消息否犬揺尾作聲機乃為書以竹筒盛之繫其頸犬尋路南走遂至家得報還洛後以為常桓譚非䜟王商止訛後漢桓譚字君山沛國人好音律世祖即位拜議郎給事中後詔㑹議靈臺所處時帝方信䜟多以决定嫌疑謂譚曰吾欲䜟决之何如譚曰臣不讀䜟帝問其故譚復極言䜟之非經帝大怒曰譚非聖無法將下斬之叩頭流血乃得解出為六安郡丞卒前漢王商字子威涿郡蠡吾人成帝時為左將軍京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子召公卿議大將軍王鳳以為太后與上及後宫可御船令吏民上長安城以避水商曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因有大水暴至此必訛言上乃止果訛言上美壮商之固守數稱其議而鳳大慚後為丞相為人多質有威重長八尺餘身體鴻大容貌過人單于來朝商坐未央廷中單于前拜謁商仰視大畏之遷延却退上聞歎曰真漢相矣鳯怨商陰求其短卒為所中免相薨嵇吕命駕程孔傾盖晉書嵇康字叔夜譙國銍人性巧而好鍜宅中有一栁樹甚茂乃激水圜之每夏月居其下以鍜東平吕安服其髙致毎一相思輙千里命駕康友而善之家語曰孔子之郯遭程子于塗傾盖而語終日甚相親顧謂子路曰取束帛以贈先生劇孟一敵周處三害前漢劇孟洛陽人以俠顯吳楚反時條侯周亞夫為太尉東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為己天下騷動大將軍得之若一敵國晉周處字子隱義興陽羡人膂力絶人不修細行州曲患之處自知為人所惡慨然有改勵之志謂父老曰今時和歳豐何苦而不樂父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛虎長橋下蛟幷子為三矣處曰吾能除之乃入山射殺猛虎投水搏殺蛟遂立志好學有文思志存義烈言必忠信克己朞年州府交辟仕吳為御史中丞凡所糾劾不避寵戚及氐人齊萬年反朝臣惡處強直皆曰處名將子忠烈果毅乃使𨽻夏侯駿西征伏波将軍孫秀謂之曰卿有老母可以此辭處曰忠孝之道安得兩全既辭親事君父母安得而子乎已而戰敗左右勸退處按劍曰此吾効節授命之日何退之為且古者良將受命凶門以出盖有進無退也諸君負信勢必不振我為大臣以身殉國不亦可乎遂力戰而沒追贈平西將軍胡廣補闕袁安倚頼後漢胡廣字伯始南郡華容人舉孝亷試章奏安帝以廣為天下第一累為三公年已八十而心力克壯性温柔謹素常遜言恭色逹練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公及共李固趙戒杜喬議立清河王蒜而蠡吾侯志取梁冀妹冀欲立之廣戒憚冀皆曰惟大將軍令獨固與喬堅守本議竟立蠡吾侯是為桓帝以此譏毁于時自在公台三十餘年歴事安順冲質桓靈六帝几一履司空再作司徒三登太尉又為太傅其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝㑹輙稱疾避廣時人榮之後漢袁安字邵公汝南汝陽人嚴重有威見敬于州里肅宗末為司空遷司徒和帝時薨初安以天子㓜弱外戚擅權每朝㑹進見及與公卿言國家事未嘗不噫嗚流涕自天子及大臣皆倚頼之及薨朝廷痛惜焉初安父沒訪求葬地道逄三書生問安何之安告之生乃指一處云葬此地當世為上公須㬰不見安異之于是葬其地故累世隆盛黄覇政殊梁習治最前漢黄覇字次公淮陽陽夏人武帝末以待詔入錢賞官補侍郎謁者後復入穀補左馮翊二百石卒吏馮翊以覇入財為官不署右職使領郡錢榖計簿書正以亷稱宣帝時擢揚州刺史以賢良高第為潁川太守力行教化而後誅罰外寛内明得吏民心户口歳増治為天下第一徴守京兆尹坐貶秩歸潁川前後八年郡中愈治是時鳳皇神雀數集郡國潁川尤多天子以覇治行終長者下詔稱揚賜爵闗内侯黄金百斤秩中二千石後為丞相覇材長於治民及為相總紀綱號令風采不及丙魏于定國功名損于治郡魏志梁習字子虞陳郡柘人以别部司馬領幷州刺史承高幹荒亂之餘胡狄在界張雄䟦扈吏民亡叛入其部落兵家擁衆作為冦害更相扇動徃徃棊峙習到官誘喻招納皆禮召其豪右稍相薦舉使詣幕府邉境肅清百姓布野勤勸農桑令行禁止貢逹名士咸顯于世太祖嘉之賜爵闗内侯更拜為真長老稱詠以為自所聞識刺史未有及習者文帝時復為刺史政治常為天下最墨子悲絲楊朱泣岐淮南子曰楊子見岐路而哭之為其可以南可以北墨子見練絲而泣之為其可以黄可以黒髙誘曰憫其本同而末異朱博烏集蕭芝雉隨前漢朱博字子元杜陵人哀帝時御史府吏百餘區井水皆竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號朝夕烏烏去不來者數月長老異之後二歳餘博為大司空奏言髙皇帝置御史大夫位次丞相今中二千石未更御史大夫而為丞相權輕非所以重國政也臣以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以為百僚率從之乃更拜博御史大夫後為丞相坐事自殺前漢蕭廣濟孝子傳蕭芝至孝除尚書郎有雉數千頭飲啄宿止當上直送至岐路及下直入門飛鳴車前杜后生齒靈王出頿晉書成恭杜皇后諱陵陽鎮南將軍預曽孫后少有姿色然長猶無齒有來求婚者輙中止及帝納采之日一夜齒盡生在位六年無子先是三吳女子相與簪白花望之如素柰傳言天公織女死為之著服至是而后崩左氏傳王子朝曰定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世供職王室其有間王位諸侯不圖而受其亂灾至于靈王生而有頿王甚神聖無惡于諸侯靈王景王克終其世賈誼忌鵩荘周畏犧前漢賈誼雒陽人年十八能誦詩書属文稱於郡中河南守吳公聞其秀材召置門下及為廷尉廼言誼年少頗通諸家書文帝召為博士每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生以為能帝悦之超遷歳中至大中大夫誼以為漢興當改正朔易服色制度定官名興禮樂廼草具其儀帝謙讓未遑也然諸法令所更定皆誼發之天子以誼任公卿之位絳灌之属害之于是上亦踈之不用其議以為長沙王太傅三年有鵩飛入舎止於坐隅鵩似鴞不祥鳥也誼既謫居長沙卑濕自傷悼以為壽不得長廼為賦以自廣歳餘帝思誼徴之入見上方受釐坐宣室因感鬼神事而問鬼神之本誼具道所以然之故至夜半帝前席既罷曰吾乆不見賈生自以為過之今不及也廼拜誼梁王太傅死時年三十三孔臧鴞賦云昔賈生有識之士忌兹鵩鳥荘子曰或聘子荘子荘子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入于太廟雖欲為孤犢其可得乎史記曰荘周蒙人嘗為蒙漆園吏與梁惠王同時其學本于老子著書率寓言洸洋自恣以適已故王公大人不能噐之楚威王聞周賢使使厚幣迎之許以為相周引此辭應之郭象注云樂生者畏犧而辭聘燕昭築臺鄭荘置驛史記燕昭王即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之耻孤之願也先生視可者得身事之隗曰王必致士先從隗始况賢于隗者豈逺千里哉于是昭王為隗改築宫而師事之樂毅自魏徃鄒衍自齊徃劇辛自趙徃士争趨燕後與秦楚三晋合謀伐齊敗之齊城之不下者唯聊莒即墨餘皆属燕孔文舉與曺公書曰昭王築臺以尊郭隗鮑昭樂府曰豈伊白璧賜將起黄金臺注云燕昭王置千金于臺上以延天下之士前漢鄭當時字荘陳人孝文時以任俠自喜脱張羽于阨聲聞梁楚間孝景時為太子舎人毎日五洗沐常置驛馬長安諸郊請謝賔客夜以繼日常恐不徧其知友皆大父行天下有名之士武帝時遷大司農當時為大吏戒門下客至亡貴賤亡留門者執賔主之禮以其貴下人其推轂士及官属丞史常引以為賢于己聞人之善言進之上惟恐後山東諸公以此翕然稱鄭荘後䧟罪起為汝南太守卒家亡餘財先是下邽翟公為廷尉賔客亦填門及廢門外可設爵羅後復為廷尉客欲徃翟公大署其門曰一死一生廼知交情一貧一富乃知交態一貴一賤交情乃見瓘靖二妙岳湛連璧晉書衛瓘字伯玉河東安邑人武帝時拜尚書令加侍中性嚴整以法御下視尚書若参佐郎若掾属瓘學問深博明習文藝與尚書郎索靖俱善草書時號一臺二妙漢末張芝亦善草書論者謂瓘得伯英筋靖得伯英肉瓘筆勝靖然有楷法逺不能及靖靖字㓜安敦煌人少有逸羣之量與鄉人汜衷張甝索紒索永俱詣太學馳名海内號稱敦煌五龍靖該博經史舉賢良對䇿高第累遷遊擊将軍伯英芝字也晉潘岳字安仁滎陽中牟人少以才頴見稱鄉邑為竒童謂終賈之儔也夏侯湛字孝若譙國譙人㓜有盛才文章宏富善構新詞美容觀與潘岳友善每行止同輿接茵京都謂之連璧岳美姿儀辭藻絶麗少時常挾彈出洛陽道婦人遇之者皆連手縈遶投之以菓滿車而歸舉秀才名冠世為衆所疾棲遲十年出為河陽令負其才欝欝不得志後至黄門侍郎湛舉賢良對䇿中第終散騎常侍郤詵一枝戴憑重席晉書郤詵字廣基濟陽單父人博學多才瓌偉倜儻不拘細行州郡禮命並不應泰始中舉賢良對䇿上第拜議郎遷雍州刺史武帝于東堂㑹送問詵曰卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林一枝崑山片玉帝笑詵在任威嚴明斷甚得聲譽後漢戴憑字次仲汝南平輿人光武時舉明經試博士後拜侍中正旦朝賀百僚畢㑹帝令羣臣能説經者更相難詰義有不通輙奪其席以益通者憑遂坐五十餘席故京師為之語曰解經不窮戴侍中鄒陽長裾王符縫掖前漢鄒陽齊人為人有智畧慷慨不茍合漢興諸侯王皆自治民聘賢吳王濞招致四方㳺士陽仕吳以文辯著名久之吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諌畧曰今臣盡智畢議易精極慮則無國不可干飾固陋之心則何王之門不可曵長裾乎然臣所以歴數王之朝背淮千里而自致者非惡臣國而樂吳民也竊高下風之行尤説大王之義願大王母忽王不納陽乃去從梁孝王卒為上客後漢王符字節信安定臨涇人少好學有志操耿介不同于俗以此遂不得升進乃隱居著書三十餘篇以譏當時得失號潛夫論後度遼将軍皇甫規解官歸鄉人有以貨得雁門太守者亦去職還家書刺謁規規卧不迎既入而問卿前在郡食雁美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之説為貴也後竟不仕鳴鶴日下士龍雲間晉書陸雲字士龍六歳能属文性清正有才理少與兄機齊名雖文章不及機而持論過之號二陸幼時吳尚書閔鴻見而竒之曰此兒若非龍駒當是鳯雛後舉賢良吳平入洛雲與荀隱未相識嘗㑹張華坐華曰今日相遇可勿為常談雲因抗聲曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本是雲龍騤騤乃是山鹿野麋獸㣲弩強是以發遲華撫手大笑刺史周浚召為從事謂人曰士龍當今之顔子也官至中書侍郎與機同被害初雲嘗行逗宿故人家夜暗路迷莫知所從忽望草中有火趨之至一家寄宿見一年少美風姿共談老子辭致深逺向曉辭去行十許里至故人家云此數十里中無人居雲意始悟却尋昨宿處乃王弼冡雲本無𤣥學自此談老殊進晉宣狼顧漢祖龍顔晉宣皇帝諱懿字仲逹河内温縣孝敬里人姓司馬氏少聰朗多大畧博學洽聞漢末大亂常慨然有憂天下之心魏武為丞相辟為文學掾累遷相國武帝受禪上尊號曰宣皇帝帝内急而外寛猜忌而權變魏武察帝有雄豪志聞有狼顧相欲騐之乃召使前行令反顧面正向後而身不動又嘗夢三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必預汝家事太子素與帝善每相全佑故免後竟遷魏鼎漢髙祖沛豐邑中陽里人姓劉氏母媪嘗息大澤之陂夢與神遇是時雷電晦冥父太公往視則見交龍于上已而有娠遂產高祖隆凖而龍顏美鬚髯左股有七十二黒子寛仁愛人意豁如也常有大度不事家人生產作業鮑靚記井羊祜識環晉書鮑靚字太𤣥東海人年五嵗語父母云本是曲陽李家兒九歳墮井死其父母訪問皆符騐靚學兼内外明天文河洛書後遷南海太守嘗見仙人陰君授道訣百餘歳卒晉羊祜字叔子泰山南城人世吏二千石至祜九世並以清德聞年五歳時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人東垣桑樹中探得之主人驚曰此吾亡兒所失物云何持去乳母具言之李氏悲惋時人異之謂李氏子即祜之前身也祜博學能属文魏高貴郷公時公車徴拜中書侍郎武帝有滅吳之志以祜都督荆州諸軍事出鎮南夏累進征南大将軍南城侯卒贈太𫝊初有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公祜竟墮馬折臂仕至公而無子祜樂山水每風景必造峴山置酒言詠終日不倦襄陽百姓于祜平生㳺憇之所建碑立廟歳時享祀望其碑者莫不流涕杜預因名為堕淚碑荆州人為祜諱名云仲容青雲叔夜玉山晉書阮咸字仲容陳留尉氏人任逹不拘與叔父籍為竹林之遊當世譏其所為咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服錦繡燦目咸以竿挂大布犢鼻于庭曰未能免俗歴散騎侍郎妙解音律善彈琵琶雖處世不交人事唯共親知絃歌酣宴而已荀朂毎與咸論音律自以為逺不及疾之出補始平太守顔延年作五君詠其一曰仲容青雲器實禀生民秀逹音何用深識微在金奏郭奕己心醉山公非虛覯屢薦不入官一麾乃出守晉嵇康字叔夜有竒才逺邁不羣美詞氣有風儀而土木形骸不自藻飾人以為龍章鳯姿天質自然恬静寡欲含垢匿瑕寛簡有大量博覧該通長好老荘與魏宗室婚拜中散大夫所與交者唯阮籍山濤預其流者向秀劉伶阮咸王戎為竹林之游世所謂竹林七賢也戎與叔夜居山陽二十年未嘗見其喜愠之色世説曰叔夜之為人嵓嵓若孤松之獨立其醉也傀俄若玉山之将頹毛義奉檄子路負米後漢毛義字少節廬江人家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顔色奉者志尚士也心賤之自恨其來固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徴不至張奉嘆曰賢者固不可測往日之喜乃為親屈所謂家貧親老不擇官而仕者也章帝下詔褒寵家賜榖千斛常以八月長吏問起居加賜羊酒壽終于家家語仲由字子路見孔子曰負重渉遠不擇地而休家貧親老不擇禄而仕昔由事二親之時常食藜藿之食為親負米百里之外親沒之後南遊於楚從車百乗積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可得也子曰由也事親可謂生事盡力死事盡忠者也江革巨孝王覧友弟後漢江革字次翁齊國臨淄人少失父獨與母居遭亂負母逃難備歴阻險常採拾以為飬數遇賊或刼欲将去革輙涕泣言有老母辭氣愿欵有足感動人者賊不忍犯之革轉客下邳窮貧祼跣行傭以供母建武末與母歸鄉里稱江巨孝及母終舉賢良方正遷司空長史肅宗崇禮之拜諌議大夫賜告歸因謝病常以八月長吏存問致羊酒以終厥身巨孝之稱行於天下舊本巨作忠非晉王覧字𤣥通母朱遇兄祥無道覧年數歳見祥被楚撻輙涕泣抱持毎諌其母母少止暴虐朱屢以非理使祥覧輙與俱又虐使祥妻覧妻亦趨而共之朱患之乃止祥喪父後漸有時譽朱深疾之宻使酖祥覧知之徑起取酒祥疑其有毒争而不與朱遽奪反之自後朱賜祥饌輙先嘗覧孝友恭恪名亞于祥仕至光禄大夫門施行馬蕭何定律叔孫制禮前漢髙祖初入闗約法三章曰殺人者死傷人及盗抵罪蠲削煩苛秦民大悦其後四夷未附兵革未息三章之法不足以禦奸于是相國蕭何􅫵摭秦法取其宜于時者作律九章髙祖布衣時何數以吏事䕶高祖髙祖為沛公何嘗為丞督事沛公至咸陽諸将皆争走金帛財物之府分之何獨先入收秦丞相御史律令圖書藏之沛公具知天下阨塞戸口多少強弱處民所疾苦者以何得秦圖書也高祖即位論功行封以何功最盛先封酇侯前漢叔孫通薛人秦時以文學待詔博士降漢拜博士號稷嗣君漢王為皇帝悉去秦苛法為簡易羣臣飲争功醉或妄呼㧞劍擊柱上益厭之通説上願徴魯諸生與臣弟子共起朝儀頗采古禮與秦儀雜就之上使徴魯諸生與其弟子為緜蕞野外習之月餘通曰上可試觀七年長樂宫成諸侯羣臣朝十月行禮畢置酒以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝無敢諠譁失禮者帝曰吾乃今日知為皇帝之貴也拜通為奉常賜金五百斤葛豐刺舉息躬歴詆前漢諸葛豐字少季琅邪人以明經為郡文學特立剛直元帝擢為司𨽻校尉刺舉無所避京師為之語曰門何濶逄諸葛上嘉其節加秩光禄大夫前漢息夫躬字子㣲河内河陽人少為博士弟子受春秋通覧記書哀帝擢光祿大夫給事中上疏歴詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延堕弱不任職左將軍公孫禄司𨽻鮑宣皆外有直項之名内實騃不曉政事諸曺以下樸遫不足數卒有強弩圍城長㦸指闕陛下誰與偹之管寧割席和嶠專車世説管寧字幼安與華歆共園鋤菜見地有金寧揮鋤與瓦石不異歆捉而擲之又嘗同席讀書有乗軒冕過門者寧讀書如故歆廢書而㸔寧割席分坐曰子非吾友也寧歆邴原俱遊學三人相善故時人號為一龍謂寧為龍頭原為龍腹歆為龍尾晉和嶠字長輿汝南西平人少有風格厚自崇重有盛名于世朝野許其能整風俗理人倫庾敳見而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用累遷中書令武帝深器遇之舊監令共車入朝時荀朂為監嶠鄙其為人以意氣加之毎同乗高抗專車而坐乃使監令異車自嶠始也時苖留犢羊續懸魚魏畧時苖字德胄鉅鹿人少清白為人疾惡建安中為壽春令令行風靡其始之官乗薄軬車黄㹀牛布被囊歳餘牛生一犢謂主簿曰令來時本無此犢犢是淮南所生時人皆以為激然由此名聞天下後遷中郎將後漢羊續字興祖太山平陽人為南陽太守班宣政令候民病利百姓歎服常敝衣薄食車馬羸敗府丞嘗獻其生魚續受而懸之于庭後又進之續乃出前所懸者以杜其意靈帝欲以為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輙迎致禮敬厚加贈賂續乃坐使于單席舉緼袍示之曰臣所資唯斯而已以此不登公位樊噲排闥辛毗引裾前漢樊噲沛人以屠狗為事從高祖定天下以功封舞陽侯帝嘗病惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者卧噲等流涕曰始陛下與臣等起豐沛定天下何其壮也今天下已定又何􅉵也且陛下疾甚不見臣等計事顧獨枕一宦者且獨不見趙高之事乎帝笑而起初帝已定闗中項王至怒欲攻之帝從百餘騎見羽鴻門亞父范増令項荘㧞劍舞欲擊帝項伯常屛蔽之噲聞事急持盾直入怒甚羽壮之賜以巵酒彘肩噲飲酒㧞劍切肉食之曰臣死且不辭豈特巵酒乎帝如厠麾噲出獨騎馬噲等歩從山下走歸覇上軍是日微噲幾殆魏志辛毗字佐治潁川陽翟人文帝踐阼遷侍中帝欲徙冀州土豪十萬戸實河南時連蝗民饑羣司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諌作色以見之皆莫敢言毗曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣議臣所言非私乃社稷之慮也帝不答起入内毗隨而引其裾帝遂奮衣不還良乆乃出曰卿持我何太急耶毗曰今徙既失民心又無以食帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰于陛下甚樂羣下甚苦帝黙然後遂為之稀出終衛尉孫楚漱石郝隆曬書晉書孫楚字子荆太原中都人才藻卓絶爽邁不羣多所陵傲缺鄉曲之譽年四十餘始参鎮東軍事終馮翊太守初楚少時欲隱居謂王濟曰當枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒世説郝隆七月七日出日中仰卧問其故曰我曬腹中書也枚臯詣闕充國自贊前漢枚臯字少孺至長安上書北闕自陳枚乗之子始乗死詔問乗子無能為文者乗在梁時取臯母為小妻及東歸臯母不肯隨留與母居上得大喜召入見待詔奏賦殿中詔使賦平樂館善之拜為郎使匈奴臯不通經術詼笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舎人等前漢趙充國字翁孫隴西上邽人善騎射補羽林為人沉勇有大畧少好将帥之節而學兵法通知四夷事宣帝時為後将軍封營平侯神爵初諸羌背叛犯塞時充國年七十餘上老之使御史大夫丙吉問誰可将者充國對曰亡踰于老臣者臣願馳至金城圖上方畧充國常以逺斥堠為務行必為戰偹止必堅營壁尤能持重愛士卒先計而後戰遂至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守捕得生口言羌豪相責曰語汝亡反今天子遣趙将軍來年八十九矣善為兵今請欲一鬬而死可得耶充國引兵至先零虜棄輜重赴水溺死者數百降斬五百餘後䍐开不煩兵而下遂上屯田便宜十二事上聽其計後罷屯兵振旅而還乞骸骨賜安車駟馬黄金罷就第每有四夷大議常與参兵謀問籌䇿薨謚壮侯初充國以功德與霍光等列畫未央宫成帝時西𦍑有警上思将帥之臣追美充國廼召黄門郎揚雄即圖畫而頌之王衍風鍳許劭月旦晉書王衍字夷甫神情朗秀風姿詳雅嘗造山濤既去濤目送之曰何物老嫗生寧馨児然誤天下蒼生者未必非此人武帝聞其名問其從兄戎曰夷甫當世誰比戎曰未見其比當從古人中求耳補元城令終日清談縣事亦理衍有盛才美貌明悟若神嘗自比子貢聲名籍甚喜𤣥言惟談老荘為事每捉玉柄麈尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門累居顯職後進景慕歴尚書令及石勒冦京師以衍都督征討諸軍事遷太尉衆共推為元帥舉軍為勒所破衍欲求自免勸勒稱尊號勒怒曰君名盖四海身居重任少壮登朝至於白首何得言不豫世事耶使人夜排墻塡殺之王戎謂王衍神姿髙徹如瑶林瓊樹自然是風塵表物王敦曰夷甫處衆中如珠玉在瓦石間顧愷之畫贊亦稱衍巖巖清峙壁立千仭其為人所尚如此後漢許劭字子將汝南平輿人少峻名節好人倫多所賞識時郭泰亦知人故天下言㧞士者稱許郭曹操微時常卑辭厚禮求為己目邵鄙其人曰君清平之奸賊亂世之英雄操大悦而去初劭與從兄靖俱有高名好共覈論鄉黨人物毎月輙更其品題故汝南俗有月旦評焉舉方正敦樸不就兄虔亦知名汝南稱平輿淵有二龍焉賀循儒宗孫綽才冠晉書賀循字彦先㑹稽山陰人操尚高厲童齓不羣言行進止必以禮讓建武初為中書令加散騎常侍固辭改拜太常朝廷疑滯皆諮之循輙依經禮而對為世儒宗晉書孫綽字興公馮翊太守楚之孫博學善属文居㑹稽遊放山水十餘年絶重張衡左思賦毎云三都二京五經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲榮期曰恐此金石非中宫商然毎至佳句輙云應是我軰語除著作郎後轉廷尉卿綽少以文才稱于時文士綽為其冠温王郗庾諸公薨必須綽為碑文然後刋石焉太叔辯洽摯仲辭翰晉書摯虞字仲洽京兆長安人才學通博著述不倦舉賢良䇿為下第拜中郎武帝詔㑹東堂䇿問對畢擢太子舎人歴太常卿虞性愛士人有表薦者常為甚辭東平太守廣樞機清辯虞不能對虞筆廣不能答更相嗤笑紛然于世云山濤識量毛玠公方晉書山濤字巨源河内懐人少有器量介然不羣年四十始為郡上計擢舉孝亷武帝時遷吏部尚書前後選舉周徧内外並得其才官至右僕射贈司徒初濤布衣家貧謂其妻韓氏曰忍饑寒我後當作三公但不知卿堪作夫人不耳及居榮貴貞慎儉約裴楷有知人鍳嘗謂濤若登山臨下幽然深逺王戎亦曰濤如璞玉渾金人皆欽其寳莫知名其器梁任昉為范雲讓尚書吏部表云在魏則毛玠公方居晉則山濤識量以臣况之一何寥落魏志毛玠字孝先陳留平丘人魏太祖為相玠嘗為東曹掾與崔琰並典選舉其舉用皆清正士雖有盛名而行不由本者終莫得進務以儉率人由是士以亷節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下自治吾復何為哉文帝為五官将親自詣玠属所親眷答曰老臣以能守職幸得免戾今所説人非遷次是以不敢奉命請謁不行時人憚之初太祖平栁城班所獲器物特以素屛風素馮几賜玠曰君有古人之風故賜君古人之服玠居顯位嘗布衣蔬食賞賜以賑施貧族魏國初建為僕射復典選舉時太子未定而臨淄侯植有寵玠宻諌曰近者以袁紹嫡庶不分覆宗㓕國廢立大事非所宜聞後太祖目指曰此古所謂國之司直我之周昌也爰盎郤坐衞瓘撫牀前漢爰盎字絲安陵人孝文時為中郎將上幸上林皇后慎夫人從其在禁中常同坐及坐郎署盎引卻夫人坐夫人怒不肯坐上亦怒起盎因前説曰臣聞尊卑有序則上下和今陛下既已立后夫人乃妾妾主豈可同坐哉且陛下幸之則厚賜之陛下所以為慎夫人適所以禍之也獨不見人彘乎上乃説入語慎夫人夫人賜盎金五十斤然亦以數諌不得久居中晉書衞瓘字伯玉河東安邑人武帝時遷司空為政清簡甚得朝野聲譽惠帝為太子朝臣咸謂純質不能親政事瓘每欲陳啟廢之而未敢發後㑹晏凌雲臺瓘托醉因跪帝床前曰臣欲有所啟欲言而止者三因手撫床曰此座可惜帝悟因謬曰公真大醉耶瓘不復有言賈后由是怨之後告老進位太保就第惠帝立以瓘録尚書事賈后素怨瓘且忌其方直不得騁已滛虐啟帝作詔免瓘官遂被害于公高門曹参趣装前漢于定國字曼倩東海郯人其父于公為縣獄吏郡决曹决獄平罹文法者于公所决皆不恨郡中為之生立祠始其閭門壊父老方共治之于公謂曰少高大門閭令容駟馬髙盖車我治獄多陰德未嘗有所寃子孫必有興者至定國宣帝時為丞相封西平侯子永為御史大夫封侯傳世云前漢曹参沛人從高祖有功剖符封平陽侯高祖以長子肥為齊王以参為相國九年齊國安集大稱名相蕭何薨参聞之告舎人趣治行吾且入相居無何果召参代何為相舉事無所變更一遵何之約束参薨百姓歌之曰蕭何為法較若畫一曹参代之守而勿失載其清净民以寧壹庶女振風鄒衍降霜淮南子曰庶女告天雷電下擊景公臺隕支體傷折海水大出許慎曰庶賤之女齊之寡婦無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣婦寃結告天燕鄒衍事燕惠王左右譖之被繋于獄仰天而哭盛夏天為之降霜江淹書曰昔者賤臣叩心飛霜擊于燕地庶女告天振風襲于齊堂范丹生塵晏嬰脱粟後漢范丹字史雲陳留外黄人受業通經好違時絶俗為激詭之行常慕梁伯鸞閔仲叔之為人桓帝時為萊蕪長遭母憂不到官後辟太尉府以狷急常佩韋于朝議者欲以為侍御史因逃遁梁沛間賣卜于市遭黨人錮禁遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹蔭如此十餘年乃結草室而居有時絶粒窮居自若閭里歌之曰甑中生塵范史雲釡中生魚范萊蕪韓子春秋曰晏嬰字平仲為齊相常食脱粟米不重味詰汾興魏鼈令王蜀北史魏聖武皇帝諱詰汾嘗田于山澤見輜軿自天而下既至見美婦人自稱天女受命相偶旦日請還期年周時復㑹于此言終而别及期帝至先田處果見天女所生男授帝曰此君之子也當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家力微神元諱蜀王本紀曰荆王鼈令死其屍流亡隨江水上至成都復生見蜀王杜宇立以為相杜宇號望帝自以德不如鼈令以其國禪之號開明帝下至五代有開明尚始去帝號復稱王不疑誣金卞和泣玉前漢直不疑南陽人事文帝其同舎郎有告歸誤持其同舎郎金去已而同舎郎覺妄意不疑不疑謝有之買金償後告歸者至而歸金亡金郎即大慚以此稱為長者稍遷中大夫朝廷見人或毁曰不疑状貌甚美然善盗嫂何也不疑聞曰我乃無兄然終不自明景帝末為御史大夫韓非子曰楚人和氏得玉璞楚山中奉獻武王王使玉人相之曰石也王以和為詐而刖其左足及成王即位和又獻之王使玉人相之又曰石也王又以和為詐而刖其右足文王即位和乃抱其璞而哭于楚荆山之下三日三夜泣盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲和曰吾非悲刖也悲夫寳玉而題之以石貞士而名之以詐此吾所以悲也王乃使玉人理其璞而得寳焉遂命之曰和氏之璧檀卿沭猴謝尚鴝鵒前漢平㤙侯許伯入第丞相御史将軍中二千石皆賀盖寛饒為司𨽻校尉不行許伯請之乃往酒酣樂作長信少府檀長卿起舞為沐猴與狗鬬坐皆大笑寛饒不説因起趣出劾奏長信少府以列卿而沐猴舞失禮不敬宣帝欲罪少府許伯為謝廼解寛饒字次公魏郡人明經以孝亷為郎舉方正對䇿髙第為人剛直髙節志在奉公然刻深喜䧟害人又好言事刺譏奸犯上意時上方用刑法信任宦官寛饒奏曰方今聖道寖廢儒術不行以刑餘為周召以法律為詩書韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去上以其謗怨遂下吏自剄晉謝尚字仁祖八歳神悟夙成其父鯤嘗携之送客或曰此児一座之顔回也尚曰坐無尼父焉别顔回席賔歎異及長善音樂博綜衆藝王導比之王戎長呼為小安豐辟為掾始到府通謁導以其有勝㑹謂曰聞君能作鴝鵒舞一坐傾想尚便著衣幘而舞導令坐者撫掌擊節尚俯仰其中旁若無人其率情如此終衛将軍散騎常侍太初日月季野陽秋魏志夏侯𤣥字太初沛國譙人少知名弱冠為黄門侍郎嘗進見與皇后弟毛曽並坐𤣥恥之不悦形于色明帝恨之左遷羽林監世説曰曽與𤣥共坐時人謂蒹葭倚玉樹又云朗朗如明月之入懐晉禇裒字季野河南陽翟人康獻皇后父也少有簡貴之風與杜乂俱有盛名冠于中興桓彛目之曰季野有皮裏陽秋言其外無臧否而内有所褒貶也謝安亦雅重之嘗云裒雖不言而四時之氣亦偹矣仕至征北大将軍荀陳德星李郭仙舟異苑陳寔字仲弓荀淑字季和仲弓與諸子姪造季和父子討論于時德星聚太史奏曰五百里内有賢人聚後漢郭泰字林宗太原介休人家世貧賤博通墳籍善談論美音制遊洛陽始見河南尹李膺膺大竒之遂相友善名震京師後歸鄉里諸儒送至河上車數千兩林宗唯與膺同舟而濟賔客望之以為神仙焉王忳繡被張氏銅鈎後漢王忳字少林廣漢新都人嘗詣京師于空舎中見一書生疾困愍而視之生曰我命在須臾腰下有金十斤願相贈死後乞藏骸骨已而命絶忳鬻一斤營葬餘悉置棺下人無知者忳後署大度亭長初到有馬馳入亭中而止其日大風飄一綉被復堕忳前即言之於縣縣以歸忳後乗馬到洛陽主人見之問所由得馬忳具説其状幷及繡被主人曰卿何陰德而致此忳因説葬書生事主人驚曰是我子也大㤙久不報天以此彰卿德耳由是顯名仕郡為功曹三輔决録扶風張氏之先為郡功曹晨起當朝有鳩從承塵上飛下几前功曹曰鳩何來為禍飛上承塵為福飛入我懐開懐待之鳩乃飛入懐中探得銅鈎帶之官至數郡太守九卿有蜀客至長安私賂張氏婢婢賣鈎與蜀客客家喪禍懼而還張氏張氏得鉤復為二千石後失鉤張氏遂喪丁公遽戮雍齒先侯前漢丁公薛人季布母弟為項羽將遂窘高祖彭城西短兵接髙祖高祖急頋謂丁公曰兩賢豈相戹哉丁公引兵還及項羽㓕丁公謁見髙祖以丁公狗軍中曰丁公為項羽臣不忠使項王失天下者也遂斬之使後為人臣無傚丁公也前漢高祖居雒陽南宫從複道望見諸将徃徃偶語上問張良良曰陛下起布衣與此屬取天下今已為天子而所封皆蕭曹故人所親愛所誅者皆平生仇怨此属畏陛下不能盡封又恐見疑過失及誅故相聚謀反耳上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封齒以示羣臣則人人自堅矣於是上置酒封齒為什邡侯而急趣丞相御史定功行封羣臣罷酒皆喜曰雍齒且侯我属無患矣陳雷膠漆范張雞黍後漢陳重字景公豫章宜春人少與鄱陽雷義為友義字仲公太守舉重孝亷重以讓義太守不聽義明年舉孝亷俱在郎署後俱拜尚書郎義代同時人受罪以此黜退重見義出亦以病免義後舉茂才讓于重不應命郷里為之語曰膠漆自謂堅不如陳與雷三府同時俱辟並至侍御史後漢范式字巨卿山陽金郷人少遊太學與汝南張邵為友邵字元伯二人並告歸郷里式謂元伯曰後二年當還将過拜尊親見孺子焉乃共尅期日後期方至元伯具以白母請設饌以候之母曰二年之别千里結言爾何相信之審對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨卿果到升堂拜母盡歡而别周侯山嶷會稽霞舉世説曰世目周侯嶷如斷山注晉陽秋曰顗正情嶷然雖一時儕俗皆無敢媟近周侯謂周顗也世説曰海西時諸公顗堂堂猶暗唯㑹稽王來軒軒如朝霞舉㑹稽王謂道子也季布一諾阮瞻三語前漢季布楚人任俠有名項籍使将兵數窘髙祖籍滅高祖購求布千金敢有舎匿罪三族布匿濮陽周氏周氏廼髠鉗布衣褐置廣桞車中并與其家僮數十之魯朱家所賣之朱家心知其季布也乃見汝陰侯滕公説曰季布何罪臣各為其主用職耳項氏臣可盡誅耶今上始得天下而以私怨求一人何示不廣也滕公言于上上乃赦布召見拜郎中後為河東守布初不説辯士曹丘生生至揖布曰楚人諺曰得黄金百不如得季布一諾足下何以得此聲於梁楚之間哉僕與足下俱楚人使僕游揚足下名顧不美乎何拒僕深也布大説引為上客史記得黄金百斤不如得季布一諾晉阮瞻字千里始平太守咸之子性清虛寡欲自得于懐詩書不甚研求而黙識其要遇理而辨辭色不足而㫖有餘見司徒王戎戎問曰聖人貴名教老荘明自然其㫖同異瞻曰将無同戎咨嗟良久即命辟之時謂之三語掾永嘉中為太子舎人瞻素執無鬼論自謂此理可以辨幽明忽有客通名謁瞻瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼于是變為異形須臾消滅瞻大惡嵗餘病卒郭文游山袁宏泊渚晉書郭文字文舉河内軹人少愛山水尚嘉遯毎游山林彌旬不返父母終不娶辭家游名山洛陽陷乃歩擔入吳興餘杭大辟山中窮谷無人之地倚木于樹苫覆其上而居焉亦無壁障時猛獸為暴而文獨宿十餘年卒無患常著鹿裘葛巾不飲酒食肉王導召置園中七年未嘗出入後逃歸臨安結廬山中晉袁宏字彦伯陳郡陽夏人有逸才文章絶美謝尚時鎮牛渚秋夜乗月與左右微服泛江㑹宏在舫中諷詠聲清辭文藻㧞遣問焉即迎升舟與談論申旦不寐自此名譽日茂謝安常賞其機對辯速後安為揚州刺史宏出為東陽郡乃祖道于冶亭時賢皆集安欲以卒迫試之臨别執其手顧左右取一扇授之曰聊以贈行宏曰輙當奉揚仁風慰彼黎庶時人歎其率而要焉黄琬對日秦宓論天後漢黄琬字子琰江夏安陸人少辯慧祖父瓊初為魏郡太守建和元年正月日食京師不見瓊以状聞太后詔問所食多少瓊對未知所况琬年七歳在旁曰何不言日食之餘如月之初瓊大驚以其言應詔深竒愛之後瓊為司徒琬以公孫拜童子郎不就知名京師獻帝初遷太尉坐免及徙西都起為司𨽻校尉與司徒王允同謀誅董卓為卓将李傕所害蜀志秦宓字子勑廣漢緜竹人少有才學拜長水校尉吳遣使張温來聘百官往餞衆集而宓未往丞相亮遣使促之温曰彼何人也亮曰益州學士也及至温問曰君學乎宓曰五尺童子皆學何必小人温復問曰天有頭乎宓曰有在西方詩曰乃眷西顧以此推之温曰天有耳乎宓曰天處髙而聽卑詩云鶴鳴于九臯聲聞于天無耳何以聽之温曰天有足乎宓曰詩云天歩艱難無足何以歩之温曰天有姓乎宓曰姓劉天子姓劉以此知之温曰日生於東乎宓曰雖生於東而沒於西答問如響應聲温大敬服宓之文辨皆此類孟軻飬素揚雄草𤣥史記孟軻鄒人受業子思之門學道既通游事齊宣王梁惠王皆不能用以為迂逺而濶于事情是時天下方務合從連衡以攻伐為賢而孟軻乃述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作書七篇嘗曰我善飬吾浩然之氣前漢揚雄字子雲蜀郡成都人有田一壥有宅一區世世以農桑為業雄少而好學不為章句訓詁通而已博覧無所不見為人簡易佚蕩口吃不能劇談黙而好深湛之思清净亡為少嗜欲不汲汲于富貴不戚戚于貧賤不修亷隅以徼名當世家産不過十金乏無儋石之儲晏如也自有大度非聖哲之書不好非其意雖富貴不事哀帝時丁傅董賢用事諸附離之者或起家二千石時雄方草太𤣥有以自守泊如也或嘲雄以𤣥尚白雄解之號曰解嘲客有難𤣥太深衆人之不好雄解之號曰解難向秀聞笛伯牙絶絃晉書向秀字子期河内懐人清悟有逺識少為山濤所知雅好老荘之學荘周内外篇歴世雖有觀者莫適論其㫖統秀乃為之觧發明竒趣振起𤣥風讀之者超然心悟郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉嵇康善鍜秀為之佐相對欣然旁若無人康誅秀入洛作思舊賦云嵇博綜技藝于絲竹特妙臨當就命顧視日影索琴而彈之逝將西邁經其舊廬于時日薄虞泉寒氷凄然鄰人有吹笛者發聲寥亮追想曩者游晏之好感音而歎故作賦云後為散騎常侍在朝不任職容迹而已列子曰伯牙善鼓琴鍾子期善聽伯牙鼓琴志在髙山子期曰善哉峩峩兮若泰山志在流水子期曰善哉洋洋兮若江河伯牙所念子期必得之吕氏春秋曰鍾子期死伯牙破琴絶絃終身不復鼓琴以為世無足為鼓者郭槐自屈南郡猶憐晉書賈充字公閭平陽襄陵人前妻李豐女豐誅李氏坐流徙後娶郭槐號廣成君武帝踐阼李以赦還特詔充置左右夫人郭槐性妬忌怒攘袂數充曰刋定律令為佐命之功我有其分李那得與我並充乃為李築室於永平里而不往來惠帝為太子納郭槐女為妃初槐欲省李氏充曰彼有才氣卿往不如不往及女為妃乃盛威儀而去既入戸李氏出迎槐不覺脚屈因遂再拜自是充每出槐使人尋之恐其過李氏李氏淑美有才行作女訓行於世世説曰桓温尚明帝女南康公主温平蜀以李勢妹為妾甚有寵嘗著别齋後主聞與數十婢㧞刀襲之值李梳頭髪垂地姿貌端麗乃徐下地結髪歛手向主曰國破家亡無心至此今日若能見殺猶生之年神色閑正辭氣悽惋主于是擲刀前抱之曰我見汝亦憐何况老奴遂善遇之魯恭馴雉宋均去獸後漢魯恭字仲康扶風平陵人肅宗時拜中牟令專以德化為理不任刑法郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往亷之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方将雛親瞿然起與恭訣曰所以來者亦察君政迹耳今蟲不犯境化及鳥獸豎子有仁心三異也還府以状白安是嵗嘉禾生恭便坐廷中安上書言状帝異之任事三年州舉尤異去官吏人思之後為司徒性謙退奏議依經皆有補益然終不自顯故不以剛直為稱後漢宋均字叔庠南陽安衆人光武時遷九江太守郡多虎暴數為民患常募設檻穽猶多傷害均到下詔属縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為害咎在殘吏而勤張捕非憂恤之本可一去檻穽其後傳言虎相與東游渡江廣客蛇影殷師牛鬭晉書樂廣字彦輔南陽淯陽人遷河南尹甞有親客久濶不復來廣問其故答曰前在坐蒙賜酒方飲忽見盃中有蛇意甚惡之既飲而疾于時河南聽事壁上有角漆畫作蛇廣意盃中蛇即角影也復置酒于前處謂客曰盃中復有所見否答曰所見如初廣乃告其所以客豁然意解沉疴頓愈廣所在為政無當時功譽毎去職遺愛為人所思凢論人必先稱其所長則所短不言而自見後代王戎為尚書令始戎薦廣而終踐其位時人美之晉殷仲堪陳郡人父師晉陵太守初師病積年仲堪衣不解帶躬學醫術窮其精妙執藥揮淚遂眇一目居喪哀毁以孝聞孝武帝召為中庶子甚相親愛其父嘗患耳聰聞床下蟻動謂之牛鬭帝素聞之而不知其人至是問仲堪曰患此者為誰仲堪流涕而起曰臣進退惟谷帝有愧焉仲堪能清言每云三日不讀道德論便覺舌本間強其談理與韓康伯齊名後假節鎮江陵為桓𤣥追兵逼殺元禮模楷季彦領䄂後漢李膺字元禮潁川襄城人性簡亢無所交接舉孝亷高第遷河南尹及黨議起流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏彊禦陳仲舉天下俊秀王叔茂時張成善風角推占當赦教子殺人膺案殺之其弟子上書告膺等共為部黨誹訕朝廷桓帝震怒逮捕黨人收執膺等後赦歸田里禁錮終身而黨名猶書王府由是海内共相標榜指名士為之稱號上曰三君次曰八俊八顧八及八厨猶古之八元八凱也膺拜司𨽻校尉諸黄門常侍鞠躬屏氣休沐不敢復出宫省是時朝廷綱紀頺弛膺獨持風裁以聲名自高士有被其容接者名為登龍門靈帝時曹節諷有司奏捕前黨皆死獄中晉裴秀字季彦河東聞喜人少好學有風操八嵗能属文叔父徽有盛名賔客甚衆秀時年十歳有詣徽者出則過秀秀母賤嫡母宣氏不之禮嘗使進饌于客見者皆為之起母曰微賤如此當應為小兒故也宣氏知遂止時人為之語曰後進領䄂有裴秀武帝時為司空秀儒學洽聞留心政事以職在地官作禹貢地域圖進之藏於秘府制圖之體有六一曰公率所以辨廣輪之度二曰凖望所以正彼此之體三曰道里所以定所由之數四曰髙下五曰方邪六曰迂直此三者各因地而制宜所以校夷險之異魯襃錢神崔烈銅臭晉書魯襃字元道南陽人好學多聞以貧素自立元康之後綱紀大壊襃傷時貪鄙乃隱姓名而著錢神論以刺之其畧曰親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走觧嚴毅之顏開難發之口錢多者處先少者居後錢之所祐吉无不利何必讀書然後富貴昔吕公欣悦于空版漢高克之于贏二文君觧布裳而被錦繡相如乗高盖而解犢鼻官尊名顯皆錢所致無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺諺曰錢無耳可使鬼凢今之人唯錢而已疾時者傳其文後莫知所終後漢崔烈涿郡安平人有重名于北州歴郡守九卿靈帝時開鴻都門榜賣官爵公卿以下皆有差富者先入錢貧者到官而後倍輸或因常侍阿保别自通逹是時段熲等雖有功勲名譽然皆先輸貨財而後登公位烈因傅母入錢五百萬為司徒嘗問其子鈞曰吾居三公于議者如何鈞曰大人少有英稱歴位卿守人謂當為三公今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭後拜太尉董卓既誅拜城門校尉梁竦廟食趙温雄飛後漢梁竦字叔敬安定烏氏人閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慚竦自負其才欝欝不得意嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食如其不然閑居可以養志詩書足以自娛州郡之職徒勞人耳後辟命不就肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子諸竇恐梁氏得志為己害遂譖殺二貴人而䧟竦以惡逆死獄中和帝立追封襃親愍侯後漢趙温字子柔蜀郡成都人初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去歳飢散家粮賑窮餓所活萬餘人獻帝西遷遂為三公枚乗蒲輪鄭均白衣前漢枚乗字叔淮陰人為吳王濞郎中王謀為逆乘奏書諌王不用卒見禽㓕乗由是知名景帝召拜𢎞農都尉乗久為大國上賔與英俊並遊不樂郡吏以病去官復游梁及孝王薨歸淮陰武帝即位乗年老乃以安車蒲輪徴乗道死後漢鄭均字仲虞東平任城人少好黄老書建初中舉直言不詣公車特徴再遷尚書數納忠言肅宗重之後告歸帝東廵乃幸均舎勅賜尚書禄以終其身時號為白衣尚書陵母伏劍軻親斷機前漢王陵沛人高祖起陵亦聚黨數千人及髙祖擊項羽乃以兵属漢羽取陵母置軍中陵使至則東向坐陵母以招陵陵母私送使者泣曰為妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劍而死古列女傳鄒孟軻母其舎近墓孟子少好遊為墓間之事孟母曰此非吾所以居處子也乃去舎市傍其嬉戲為賈人衒賣之事又曰此非吾所以居處子也復徙舎學宫之傍其嬉戲乃設爼豆揖讓進退孟母曰真可以居吾子矣遂居及孟子既學而歸孟母問學所至孟子自若也孟母以刀斷其織曰子之廢學若我斷斯織也孟子懼旦夕勤學不息師事子思遂成名儒君子謂孟母知為人母之道齊后破環謝女解圍戰國䇿曰齊閔王遇弑其子法章變姓名為莒太史家傭夫太史殷女竒其状貌以為非常人憐而嘗竊衣食之與私焉法章立是為襄王以太史氏女為王后襄王卒子建立后事秦謹與諸侯信以故建立四十餘年不受兵始皇嘗使使者遺后玉連環曰齊多知解此環不后以示羣臣羣臣不知解后引椎椎破之謝秦使曰謹以解矣晉王凝之妻謝氏字道韞聰識有才辨叔父安嘗問詩何句最佳道韞稱吉甫作誦穆如清風仲山甫永懐以慰其心安謂有雅人深致又嘗内集俄而雪驟下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若栁絮因風起安大悦凝之弟獻之嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾歩幛自蔽申獻之前議客不能屈鑿齒尺牘荀朂音律晉書習鑿齒字彦威襄陽人少有志氣博學洽聞以文筆著稱荆州刺史桓温辟為從事累遷别駕温出征伐鑿齒或從或守所在任職毎處機要蒞事有績善尺牘論議温甚器遇之出為滎陽太守時温覬覦非望鑿齒在郡著漢晉春秋以裁正之起漢光武終晉愍帝後徴典國史㑹卒初鑿齒嘗與孫綽共行綽性通率好譏調時綽在前顧鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前晉荀朂字公曽潁川潁隂人漢司空爽曽孫岐嶷夙成十餘歳能屬文長博學逹于政事武帝受禪拜中書監加侍中領著作與賈充共定律令既掌樂事又修律吕並行於世初朂於道逄趙賈人牛鐸識其音聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飯謂在坐人曰此勞薪所炊帝遣問膳夫實用故車脚舉世服其明識後守尚書令朂久在中書專管機事及失之甚悵恨或有賀之者朂曰奪我鳯凰池諸君賀我耶初太子婚未定朂與左衞将軍馮紞伺帝間並稱賈充女才色絶世遂成婚甚為正直者所疾而獲佞媚之譏帝素知太子闇弱恐後亂國遣朂及和嶠往觀之朂還盛稱太子之德而嶠云太子如初於是天下貴嶠而賤朂胡威推縑陸績懐橘魏書胡威字伯武淮南壽春人父質以忠清稱仕魏為荆州刺史威自京都定省家貧無車馬童僕自驅驢單行既至見父而歸父賜絹一疋威曰大人清高何得此絹答曰是吾俸禄之餘威受之辭歸卒取與質帳下都督後為徐州刺史勤於政術風化大行入朝武帝謂曰卿孰與父清對曰臣父清恐人知臣清恐人不知是臣不及逺也吳志陸績字公紀吳人年六歳于九江見袁術術出橘績懐三枚出拜辭堕地術謂曰陸郎作賓客而懷橘乎績跪曰欲歸遺母術大竒之績博學多識星厯算數無不該覧孫權辟為掾以直道見憚出為欝林太守加偏將軍績意在儒雅非其志也雖有軍事著述不廢作渾天圖注易釋𤣥皆傳于世羅含吞鳥江淹夢筆晉書羅含字君章桂陽耒陽人㓜孤為叔母朱氏所養少有志尚嘗晝卧夢一鳥文彩異常飛入口中因驚起説之朱氏曰鳥有文彩汝後必有文章自此藻思日新江夏守謝尚稱曰君章可謂湘中之琳琅桓温以為江左之秀累遷長沙相致仕加中散大夫門施行馬初含在官舎有一白雀栖集堂宇及還家階庭忽蘭菊叢生以為德行之感南史江淹字文通濟陽考城人少孤貧嘗慕司馬長卿梁伯鸞之為人不事章句之學留情文章仕齊為侍中秘書監入梁至金紫光禄大夫淹以文章顯晚節才思微退云為宣城太守時罷歸夢一人自稱張景陽謂曰前以一匹錦相寄今可見還淹探懐中得數尺與之此人大恚曰那得割截都盡顧見丘遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又嘗夢一丈夫自稱郭璞謂曰吾筆在卿處多年可以見還淹乃探懐中得五色筆以授之爾後為詩絶無美句時人謂之才盡李廞清貞劉驎高率世説李廞茂曽第五子清貞有逺操少羸病不肯婚宦王丞相欲招禮之辟為府掾廞得牋命笑曰茂宏乃復以爵假人晉書劉驎之字子驥南陽人少尚質素虛退寡欲不修儀操人莫之知好遊山澤志存遯逸車騎将軍桓冲聞其名請為長史驎之固辭居于陽岐來往莫不投之驎之躬自供給士君子頗以為勞累更憚過焉凡人致贈一無所受世説載驎之高率善史傳蔣詡三逕許由一瓢前漢蔣詡字元卿杜陵人為兖州刺史以廉直為名王莽居攝以病免歸鄉里三輔决録曰詡舎中竹下開三逕唯故人求仲羊仲從之遊逸士傳許由隱箕山無盃噐以手捧水飲之人遺一瓢得以操飲飲訖挂于木上風吹瀝瀝有聲由以為煩遂去之楊僕移闗杜預建橋前漢楊僕宜陽人武帝時為樓船將軍初函谷闗在𢎞農僕既有功恥為闗外民上書乞徙東闗以家財給其用度于是徙于新安去𢎞農三百里以故闗為宏農縣晉杜預字元凱京兆杜陵人博學多通明于興廢之道常言德不可以企及立功立言可庶幾也尚文帝妹高陸公主拜尚書郎武帝時拜度支尚書預以孟津渡險有覆沒之患請建河橋于富平津議者以為殷周所都歴聖賢而不作者必不可立也預曰造舟為梁則河橋之謂也及橋成帝從百僚臨㑹舉觴属預曰非君此橋不成對曰非陛下之明臣亦不得施其微巧壽王議鼎杜林駮堯前漢吾丘壽王字子贛趙人為光禄大夫汾陰得寳鼎薦見宗廟藏于甘泉宫羣臣皆賀得周鼎壽王獨以為非武帝問之對曰臣聞周德始于后稷長于公劉大于太王成于文武顯于周公德澤上昭天下漏泉無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周至于陛下恢廓祖業功德愈盛天瑞並至禎祥畢見天祚有德而寳鼎自出乃漢鼎非周鼎也上曰善賜黄金十斤後漢杜林字伯山扶風茂陵人拜侍御史大夫議郊祀制多以為周郊后稷漢當祀堯詔下公卿議議者僉同光武亦然之杜林獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所宜因循定林議終大司空西施捧心孫壽折腰荘子曰西施病心而矉其眉其里之醜人見而美之歸亦捧心而矉其眉彼知美矉而不知矉之所以美西施越女所謂西子也有絶世之美越王勾踐獻之吳王夫差夫差嬖之卒至傾國後漢梁冀為大将軍其妻孫壽封襄城君加賜赤紱比長公主壽色美善為妖態作愁眉嗁粧堕馬髻折腰歩齲齒笑以為媚惑性鉗忌能制御冀冀甚寵憚之及冀敗自殺靈輙倒戈魏顆結草左傳曰晉靈公不君趙宣子驟諌公患之飲宣子酒伏甲將攻之公嗾夫􅋙焉其車右提彌明搏殺之宣子曰棄人用犬雖猛何為鬭且出明死之初宣子田舎于翳桑見靈輙病不食三日宣子食之舎其半曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸槖以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也左傳曰晉魏顆武子之子初武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及敗秦師于輔氏獲杜回秦之力人也顆見老人結草以亢杜囬囬躓而顛故獲之夜夢之曰予而所嫁婦人之父也爾用先人之治命余是以報逸少傾冩平子絶倒晉書王羲之字逸少司徒導從子年十三謁周顗顗異之時重牛心炙坐客未噉顗先割㗖羲之于是始知名及長辯贍以骨鯁稱尤善𨽻書為古今之冠太尉郗鍳使門生求女壻于導導令徧觀子弟門生歸謂鍳曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹食獨若不聞鍳曰正此佳壻耶訪之乃羲之也遂妻之仕至右軍將軍㑹稽内史世説曰郗夫人謂二弟司空中郎曰王家見二謝傾筐倒冩見汝來平平耳無煩復往二弟謂愔與曇也二謝安石與萬石也晉衞玠好言𤣥理其後多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微王澄字平子有高名少所推服每聞玠言輙歎息絶倒時人為之語曰衞玠談道平子絶倒澄及王𤣥王濟並有盛名皆出玠下世云王家三子不如衞家一兒兄衍有人倫之鍳尤重澄由是顯名有經澄所題目者衍不復有言輙云已經平子矣為荆州刺史為王敦所害澹臺毁璧子罕辭寳博物志澹臺子羽渡河齎千金之璧于河河伯欲之至陽侯波起兩蛟挾船子羽左持璧右操劍擊蛟皆死既渡三投璧于河河伯躍而歸之子羽毁而去左傳曰宋人得玉獻諸司城子罕子罕弗受獻玉者曰以示玉人玉人以為寳故獻之子罕曰我以不貪為寳爾以玉為寳若以與我皆喪寳也不若人有其寳東平為善司馬稱好後漢東平憲王蒼顯宗同母弟少好經書雅有智思顯宗愛重之拜驃騎将軍位三公上既還國後朝京師上問王處家何等最樂王言為善最樂肅宗立恩禮踰於前世既薨帝東廵守幸其宫追感念蒼謂其子曰思其人至其鄉其處在其人亡因泣下幸其陵祠以太牢後漢司馬徽字德操潁川人口不談人之短與人語莫問好惡皆言好有鄉人問徽安否答曰好有人自陳子死答曰大好妻責之曰人以君有德故相告何忽聞人子死便言好徽曰卿言亦大好公超霧市魯般雲梯後漢張楷字公超成都人家河南通春秋尚書門徒常百人自父黨夙儒偕造門車馬塡街徒從無所止黄門貴戚家皆起舎巷次以候過客往來之利楷疾其如此輙徙避之後隱𢎞農山中學者隨之所居成市華陰山南遂有公超市五府連辟舉賢良方正不就性好道術能作五里霧後安車聘之以疾辭淮南子曰楚欲攻宋墨子聞之見楚王曰臣見大王之必傷義而不得宋王曰公輸天下之巧士作為雲梯之械設以攻宋曷為弗取墨子曰令公輸設攻臣請守之于是公輸般設攻宋之械墨子設守宋之偹九攻而墨子九却之弗能入乃偃兵不攻公輸魯般也田單火牛江逌爇雞史記田單齊諸田疏屬也為臨淄市掾不見知及燕使樂毅伐破齊盡降齊城而單得脱東保即墨燕人攻之單乃收城中得千餘牛為絳繒衣畫五彩龍文束兵刃于其角灌脂束葦于其尾燒其端鑿城數十穴夜縱牛壮士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚視之皆龍文所觸盡死傷五千人因銜枚擊之城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大敗遂復齊七十餘城迎襄王于莒王封單號安平君晉江逌字道載陳留圉人中軍將軍殷浩請為諮議叅軍遷長史時羌及丁零叛浩軍震懼姚襄去浩十里結營以逼浩浩令逌擊之逌進兵至襄營謂将校曰今兵非不精而衆少于𦍑且其塹栅甚固難與較力吾當以計破之乃取數百雞以長䋲連之縈火于足羣雞駭散飛集襄營營火發因其亂而擊之襄遂大敗逌後遷太常蔡裔殞盗張遼止啼晉書蔡裔為兖州刺史有勇氣聲若雷震甞有三盗入室裔拊床一呼而盜俱殞故殷浩為中軍將軍北征委以軍鋒焉魏志張遼字文逺雁門馬邑人武力過人數有戰功累遷前將軍舊注云江東小兒啼怖之曰遼來遼來無不止者陳平多轍李廣成蹊前漢陳平陽武戸牗人少家貧好讀書治黄老術為人長大美色及長可取婦富人莫與者貧者平亦媿之久之富人張負有女孫五嫁夫輙死人莫敢娶平欲得之負偉平隨至其家乃負郭窮巷以席為門然門外多長者車轍負歸謂其子仲曰吾欲以女孫予陳平仲曰平貧不事事縣中盡笑其所為奈何予之女負曰固有美如陳平長貧者乎卒與女里中社平為宰分肉甚均父老善之平曰使平得宰天下亦如此肉矣從高祖為䕶軍中尉盡䕶諸将出黄金四萬斤與平恣所為不問出入平多以金從反間于楚軍自初從至天下定凢六出竒計定封曲逆侯惠帝時為左丞相吕后時為右丞相又相文帝乃薨前漢李廣隴西成紀人世世受射法武帝時右北平太守匃奴號曰漢飛將軍避之數歳不入界廣出獵見草中石以為虎而射之中石沒鏃視之石也他日射終不能入廣歴七郡太守前後四十餘年得賞賜輙分其麾下飲食與士卒共之寛緩不苛士樂為用元狩中為前将軍從大将軍衛青擊匈奴惑失道青欲上書報天子失軍曲折長吏責廣之幕府上簿廣謂其麾下曰廣結髪與匃奴大小七十餘戰今又迷失道豈非天哉且廣年六十餘不能復對刀筆吏矣遂引刀自剄百姓聞之知與不知老弱皆為垂泣贊曰李将軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信于士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大陳遵投轄山簡倒載前漢陳遵字孟公杜陵人為京兆史放縱不拘後為校尉擊賊有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門遵嗜酒毎大飲賓客滿堂輙闗門取客車轄投井中雖有急終不得去晉山簡字季倫司徒濤之子温雅有父風永嘉中為征南将軍鎮襄陽四方冦亂天下分崩朝野危懼簡優游卒歳惟酒是躭諸習氏荆土豪族有佳園池簡毎出多之池上置酒輙醉名之曰髙陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭向葛疆何如并州兒疆家在并州簡愛将也淵客泣珠交甫解佩舊注引博物志云鮫人從水中出向人家寄住積日賣綃臨去從主人索器泣而出珠滿盤以與主人今本無載吳都賦云泉室潜織而巻綃淵客慷慨而泣珠淵客盖鮫人也述異記曰南海中有鮫人室水居如魚不廢機織其眼能泣則出珠列仙傳江妃二女皆麗服華装珮兩明珠大如雞卵游于江漢之湄逄鄭交甫交甫説之不知其神也遂下與言曰願請子之珮二女解珮以與交甫受而懐之趨去數十歩視其懐空無珮顧二女忽然不見龔勝不屈孫寳自劾前漢龔勝字君賓舎字君倩楚人二人相友並著名節世謂楚兩龔哀帝時勝為光禄大夫王莽秉政乞骸骨莽後遣使即拜講學祭酒稱疾不應復遣使者奉壐書太子師友祭酒印綬安車駟馬與郡太守縣長吏官属諸生千人以上入里致詔勝稱病篤東首加朝服拖紳勝曰吾受漢家恩厚亡以報今老旦暮入地誼豈以一身事二姓下見故主哉語畢不開口飲食積十四日死舎通五經拜太山太守數月乞骸骨哀帝使使者拜光禄大夫數賜告終不起舎勝歸鄉二千石長吏初到官皆至其家如師弟子之禮前漢孫寳字子嚴潁川鄢陵人以明經為郡吏御史大夫張忠辟為屬欲令授子經寳自劾去後署主簿寳徙入舎忠恠使所親問曰前大夫為君設除大舎子自劾去者欲為髙節也今兩府髙士俗不為主簿子既為之徙舎甚説何前後不相副也寳曰高士不為主簿而大夫君以寳為可一府莫言非士安得獨自髙前日君男欲學文移寳自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎忠聞之慙上書薦寳平帝時為大司農吕安題鳯子猷尋戴世説曰嵇康與吕安善毎一相思千里命駕安後來值康不在嵇喜出戸延之不入題門作鳯字而去喜不覺猶以為忻拆言凡鳥也晉王徽之字子猷右軍羲之之子性卓犖不覊為大司馬桓温叅軍蓬首散帶不綜府事甞寄居空宅中便令種竹或問其故徽之但嘯咏指竹曰何可一日無此君耶甞居山陰夜雪初霽月色清朗四望皓然獨酌酒咏左思招隱詩忽憶戴逵時逵在剡便夜乗小船詣之經宿方至造門不前而反人問其故曰本乗興而行興盡而返何必見安道耶官至黄門侍郎董宣彊項翟璜直言後漢董宣字少平陳留圉人光武時為洛陽令時湖陽公主蒼頭白日殺人匿主家吏不能得及主出以奴驂乗宣候之駐車叩馬大言數主之失叱奴下車因格殺之主訴帝帝怒召宣欲殺之宣曰陛下縱奴殺良人何以理天下臣請自殺即以頭擊楹流血被面帝使宣謝主宣不從強使頓之兩手據地終不肯俯主曰帝昔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勅強項令出賜錢三十萬宣悉以班諸吏由是搏擊豪強京師號為卧虎歌之曰枹鼓不鳴董少平卒于官帝傷之新序曰魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也次至翟璜曰君非仁君也君伐中山不以封君之弟而以封君之長子臣以此知之文侯怒逐璜璜起而出次至任座文侯問之對曰君仁君也臣聞其君仁者其臣直向翟璜之言直是以知也文侯曰善召翟璜入拜為上卿紀昌貫虱養由號猨列子曰甘繩古之善射者彀弓而獸伏鳥下飛衞學射于甘蠅而巧過其師紀昌學射于飛衞衞曰爾學不瞬而後可言射昌歸偃卧其妻之機下以目承牽挺二年之後雖錐末倒眥而不瞬以告衞衛曰未也學視而後可視小如大視微如著而後告我昌以氂懸虱於牖而望之旬月之間寖大也三年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧朔篷之榦射之貫虱之心而懸不絶舊本紀昌誤作甘蠅淮南子曰楚王有白猨自射之則搏矢而熈使養由基射之始調弓矯矢未發而猨擁柱號矣馮衍歸里張昭塞門後漢馮衍字敬通京兆杜陵人㓜有竒才博通羣書王莽時不肯仕甞好俶儻之䇿時莫能聽用其謀衞尉陰興等以外戚貴顯深重衍遂與結交由是為諸王所聘請尋為司𨽻從事光武懲西京外戚賓客故皆以法繩之由此得罪罷歸故鄉閉門自保不敢與親故通顯宗即位又多短衍以文過其實遂廢于家埳壈於時然有大志居常慷慨歎曰衍少事名賢經歴顯位懐金垂紫謁節奉使不求茍得常有凌雲之志三公之貴千金之富不介于懐貧而不哀賤而不恨猶庶幾名賢之風修道德于幽冥之路以終身名為後世法吳志張昭字子布彭城人博覧衆書孫權拜輔吳將軍昭每朝見辭氣壮厲義形於色權以公孫淵稱藩遣張彌許晏至遼東拜淵為燕王昭諫不用稱疾不朝權恨土塞其門昭又于内以土封之淵果殺彌晏權數慰謝昭昭固不起權因出過其門呼昭昭辭疾篤權燒其門欲以恐之昭更閉户權使人滅火住門良久昭諸子共扶昭起權載以還宫深自克責昭不得已然後朝會昭容貎矜嚴有威風權常曰孤與張公言不敢妄也舉朝憚之蘇韶鬼靈盧充幽婚三十國春秋曰中牟令蘓韶卒後從弟節見韶乗馬晝日而行著黒介幘黄綵單衣節因問幽冥之事韶曰死者為鬼俱行天地之中在人間而不與生者接顔回卜商今見為修文郎死之與生畧無有異死虛生實此有異耳言終而不見舊注引孔氏志怪曰漢盧充范陽人家西四十里有崔少府女墓充因獵逐麞忽見朱門官舎有人迎充見崔云近得公尊府書為君娶吾小女故相邀耳将書示充乃父手札崔乃命女粧飾于東廂引充相見成禮留三日臨别謂充曰君婦有娠矣生男則當留之贈充衣衾令車送之充至家經三年三月三日臨水戲忽見水上二犢車乍沉乍浮既逹於岸充視車中見崔氏與小兒共載其别車即崔少府也抱兒還充及詩一首金椀一枚俄而不見及兒長成後歴任數郡震畏四知秉去三惑後漢楊震舉茂才四遷荆州刺史東萊太守當之郡道經昌邑令謁見至夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知宻愧而出性公廉不受私謁子孫蔬食步行故舊或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎震安帝時為太尉為中常侍樊豐所譖而卒共寃之秉字叔節震中子也桓帝時為太尉毎朝廷有得失輙盡忠規諌多見納用秉性不飲酒又早䘮夫人遂不復娶所在以淳白稱甞言曰我有三不惑酒色財三者是也栁下直道叔敖陰德論語曰桞下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦賈誼新書曰孫叔敖為嬰兒出遊而還憂而不食其母問其故泣而對曰今日吾見兩頭蛇恐去死無日矣母曰今蛇安在曰吾聞見兩頭蛇者死吾恐他人見之已埋之矣母曰無憂汝不死吾聞之有陰德者天報以福人聞之皆喻其為仁也及為令尹未治而國人信之列女傳曰有隂德者陽報之德勝不仁祥除百禍天處高而聽卑爾必興於楚及長為令尹老終張湯巧詆杜周深刻前漢張湯杜陵人為廷尉舞文巧詆其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士每朝奏事語國家事日旰天子忘食丞相取充位天下事皆决湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以辠自公卿以下至庶人咸指湯後為御史大夫坐事自殺初湯父為長安丞出湯為児守舎還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治傅爰書訊鞫論報并取鼠與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄前漢杜周南陽杜衍人少言重遲而内深次骨為廷尉其治效張湯上所欲擠者因而陷之上所欲釋者久繫待問而㣲見其寃狀客有謂周曰君為天下决平不循三尺法專以人主意指為獄周曰三尺安出哉前王所是著為律後王所是疏為令當時為是何古之法乎後為執金吾逐捕桑𢎞羊衛皇后昆弟子刻深上以為盡力無私遷御史大夫兩子夾河為郡守家資累巨萬治皆酷暴唯少子延年行寛厚云三王尹京二鮑糾慝前漢王駿諌大夫吉之子以孝廉為郎成帝欲大用之出為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王駿終御史大夫章字仲卿泰山鉅平人遷諌大夫在朝廷名敢直言成帝選為京兆尹時帝舅王鳳輔政專權㑹日食章奏封事召見言鳯不可任用宜選忠賢上不忍退鳯章遂為鳯所陷初章為諸生學長安疾病無被卧牛衣中與妻决涕泣妻怒之曰京師尊貴在朝廷誰踰仲卿者不自激昻乃反涕泣何鄙也後欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也書上果下獄死死非其罪衆共寃之廣漢敞尊互見於後後漢鮑永字君長上黨屯留人少有志操事後母至孝妻甞於母前叱狗永即去之建武中為司𨽻校尉乃辟扶風鮑恢為都官從事恢亦抗直不避強禦帝甞曰貴戚且歛手避二鮑其見憚如此父宣哀帝時為司𨽻校尉為王莽所害子昱中元初亦拜司𨽻校尉章帝時官至太尉孫康映雪車𦙍聚螢孫氏世録曰康家貧無油常映雪讀書少小清介交遊不雜後至御史大夫晉車𦙍字武子南平人恭勤不倦博覧多通家貧不常得油夏月則練囊數十螢火以照書以夜繼日焉桓温在荆州辟為從事以辯識義理深重之稍遷征西長史遂顯於朝廷時武子與吳隱之以寒素博學知名于世又善於賞㑹當時有盛坐而武子不在皆云無車公不樂終吏部尚書李充四部井春五經晉書李充字𢎞度江夏人善楷書妙叅鍾索世咸重之禇裒引為叅軍充以家貧苦求外出裒將許之為縣試問之充曰窮猿投林豈暇擇木乃除剡縣令後為著作郎時典籍混亂充刪除煩重以類相從分作四部秘閣以為永制累遷中書侍郎後漢井丹字大春扶風郿人少受業太學通五經善談論京師為之語曰五經紛綸井大春性清高未甞修刺候人建武末沛王輔等五王居北宫皆好賔客更請丹不能致信陽侯陰就光烈皇后弟也以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要刼丹不得已既至就故為設麥飯葱葉之食丹推去之曰以君侯能共甘㫖故來相過何其薄乎更置盛饌乃食就起左右進輦丹笑曰吾聞桀駕人車豈此耶坐中皆失色就不得已令去輦自是隱閉人事谷永筆札顧愷丹青前漢谷永字子雲長安人與樓䕶俱為五侯上客長安號曰谷子雲筆札樓君卿唇舌言其見信用也永於經書汎為疏達與杜欽杜鄴畧等不能洽浹如劉向父子及揚雄也其于天官京氏易最宻故善言災異終大司農䕶字君卿少隨父為醫出入貴戚家是時王氏方盛賓客滿門五侯争名其客各有所厚不得左右唯䕶盡入其門咸得歡心為人精辯論議常依名節聽者皆竦仕至廣漢太守王莽專政召為前煇光西京雜記曰五侯競致竒膳䕶乃合以為饋世稱五侯鯖以為竒味焉晉顧愷之字長康晉陵無錫人博學有才氣好諧謔人多愛狎之毎食甘蔗常自尾至本人或恠之云漸入佳境尤善丹青圖冩特妙甞以一厨畫糊題其前寄桓𤣥皆其所珍惜者𤣥發其厨後竊其畫而緘閉如舊還之紿云未開愷之見封題如初直云妙畫通靈變化而去亦猶人之登仙了無恠色其矜伐過實少年因相稱譽以為戲弄初在桓温府甞云愷之體中癡黠各半合而論之正得平耳故俗傳愷之有三絶才絶畫絶癡絶終散騎常侍戴逵破琴謝敷應星晉書戴逵字安道譙國人少博學善属文能鼓琴工書畫其餘巧藝靡不畢綜武陵王晞聞其善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晞怒乃引其兄述述欣然擁琴而往後累召不起晉謝敷字慶緒㑹稽人性澄靖寡欲入太平山十餘年召皆不就初月犯少微少微一名處士星占者以隱士當之戴逵有美才人或憂之俄而敷死故㑹稽人士以嘲吳人云吳中高士求死不得死阮修杖頭畢卓甕下晉書阮修字宣子咸從弟也好易老善清言性簡任不修人事常歩行以百錢掛杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無儋石之儲晏如也與兄弟同志常自得於林阜間王衍與修談易言寡㫖暢衍歎服焉修居貧年四十餘未有室王敦等歛錢為婚皆名士也時慕之者求入錢而不得後為太子洗馬避亂為賊所害晉畢卓字茂世新蔡鮦陽人少希放逹為吏部郎常飲酒廢職比舎郎釀熟卓因醉夜至其甕間盜飲為掌酒者所縳明旦視之乃畢吏部也遽釋其縛卓遂引主人宴于甕側致醉而去常謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣過江為温嶠長史文伯羞鼈孟宗寄鮓魯語曰公父文伯飲南宫敬叔酒以路都父為客羞鼈小焉都父怒相延食鼈辭曰将使鼈長而後食之遂出文伯之母聞之怒曰吾聞子之先子曰祭養尸饗養上賓鼈於何有而使夫人怒出遂逐之五日魯大夫辭而復之吳録孟仁字恭武本名宗江夏人少從季肅學其母為作厚蓐大被曰小児無德致客學者多貧故為廣被庶可得與氣類接也其讀書夙夜不懈肅竒之曰卿宰相器也除監池司馬因能結網手以捕魚作鮓寄母母以還之曰汝為魚官而以鮓寄我非避嫌也遷吳令時皆不得將家之官毎得時物未以寄母常不先食楚國先賢傳曰宗母嗜筍冬節將至時筍未生宗入竹林哀歎而筍為之出得以供母皆以為至孝所感仕孫皓至司空史丹青蒲張湛白馬前漢史丹字君仲魯國人元帝即位為侍中時定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵上寢疾皇后太子皆憂丹以親宻臣得侍疾候上間獨寢時直入卧内伏青蒲上涕泣言曰皇太子以適長立十餘年名號繫於百姓天下莫不歸心臣子見定陶王愛幸道路流言以為太子有動搖之意審若此公卿以下必以死争不奉詔臣願先賜死以示羣臣天子素仁恕見丹涕泣言又切至大感曰皇后謹慎先帝又愛太子吾豈可違㫖太子由是為嗣成帝立累遷左將軍後漢張湛字子孝扶風平陵人矜嚴好禮動止有則居幽室必修整遇妻子若嚴君在鄉黨謹言正色三輔以為儀表人或謂湛為詐偽湛曰人皆詐惡我獨詐善建武初拜光禄勲光武臨朝或有惰容輙陳諌常乗白馬上毎見輙曰白馬生且復諌矣及郭后廢稱疾不朝拜太中大夫帝強起之為大司徒湛自陳疾篤遂罷隱之感鄰王修輟社晉書吳隱之字處黙濮陽鄄城人博渉文史以儒雅標名弱冠而介立有清操年十餘丁父憂毎號泣行人為之流涕事母孝謹及其執䘮哀毁過禮與太常韓康伯鄰居康伯母賢明婦人毎聞其哭輟餐投筯為之悲泣謂康伯曰汝若居銓衡當舉如此輩人及康伯為吏部尚書隱之遂階清級廣州珍異所出前後刺史多黷貨朝廷欲革其弊以隱之為刺史州有水曰貪泉飲者懐無厭之欲隱之至泉所酌而飲之因賦詩曰古人云此水一㰱懐千金試使夷齊飲終當不易心及在州清操愈厲後致仕授光禄大夫金章紫綬魏志王修字叔治北海營陵人年七嵗䘮母母以社日亡來嵗鄰里社修感念母哀甚鄰里為之罷社後太祖破南皮閲修家榖不滿十斛有書數百卷太祖歎曰士不妄有名乃辟為司空掾遷魏郡太守為治抑強扶弱百姓稱之阮放八儁江泉四凶晉書羊曼字祖延少知名歴晉陵太守任逹頺縱好飲酒温嶠庾亮阮放桓彛同志友善並為中興名士時州里稱阮放為宏伯郗鍳為方伯胡母輔之為逹伯卞壼為裁伯蔡謨為朗伯阮孚為誕伯劉綏為委伯而曼為濌伯凢八人號兖州八伯盖擬古之八儁也曼弟聃字彭祖少不經學時論皆鄙其凢庸先是兖州有八伯之號其後更有四伯大鴻臚江泉以能食為榖伯豫章太守史疇以太肥為笨伯散騎郎張嶷以狡妄為猾伯而聃以狼戻為𤨏伯盖擬古之四凶也華歆忤㫖陳羣蹙容華嶠譜叙曰文帝受禪朝臣并受爵位歆以忤㫖時徙為司徒而不進爵帝久不懌以問尚書令陳羣曰我應天受禪百辟羣后莫不悦喜形於聲色而相國及公獨有不怡者何也羣曰臣與相國曽臣漢朝心雖悦喜義形於色帝大悦歆字子魚平原髙唐人明帝時進拜太尉世説曰文帝受禪陳羣有蹙容陳羣字長文潁川許昌人進司空録尚書事初羣為兒時祖父實常竒異之謂宗人父老曰此兒必興吾宗博物志曰太丘長陳實實子鴻臚卿紀紀子司空羣羣子泰四世於漢魏並有重名而其德漸漸小减時人為之語曰公慙卿卿慙長蹙或作戚王濬懸刀丁固生松晉書王濬字士治𢎞農湖人博渉墳典踈通亮逹恢廓有大度甞起第宅開門前路廣數十歩欲使容長㦸幡旗衆咸笑之辟河東從事守令有不廉潔者皆望風引去除巴郡太守郡邉吳境兵士苦役生男多不養濬乃嚴其科條寛其徭課其産育者皆與休復所全活數千人轉廣漢太守垂惠布政百姓頼之夜夣懸三刀於卧屋梁上須臾又益一刀濬意甚惡之主簿李毅拜賀曰三刀為州字又益一刀明府其臨益州乎果遷益州刺史後再刺益州武帝謀伐吳詔濬修舟艦乃作大船連舫以木為城起樓櫓畫鷁首怪獸於船首以懼江神舟楫之盛自古未有拜龍驤將軍監軍統兵先在巴郡之所全育者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也濬自發蜀兵不血刃順流鼓棹徑造三山孫皓降濬觧縛受璧焚櫬送於京師以功封襄陽縣侯累轉撫軍大將軍卒諡武吳志丁固仕孫皓為司徒吳録曰初固為尚書夣松生其腹上謂人曰松字十八公也後十八歳吾其為公乎卒如夣焉姜維膽斗盧植音鐘蜀志姜維字伯約天水冀人與費禕共録尚書事加督中外軍事遷大將軍整勒戎馬出戰屢為魏將鄧艾所敗及後主降維投戈放甲詣鎮西將軍鍾㑹㑹厚待之歩則同轝坐則同席謂長史杜預曰以伯約比中土名士公休太初不能勝也㑹既搆鄧艾因將維等詣成都自稱益州牧欲授維兵五萬人使為前驅魏將士憤發殺㑹及維世語曰維死時見剖膽如斗大後漢盧植字子幹涿郡涿人音聲如鐘少與鄭𤣥俱事馬融能通古今學好研精不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之學終辭歸闔門教授性剛毅有大節常懐濟世志不好詞賦能飲酒一石靈帝時為尚書桓温竒骨鄧艾大志晉書桓温字元子譙國龍亢人生未期温嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也父彞以嶠所賞故名之曰温嶠笑曰果爾後將易吾姓也温豪爽有風槩姿貎甚偉靣有七星少與劉琰善琰甞曰温眼如紫石稜鬚作蝟毛磔孫仲謀晉宣王之流亞也尚南康長公主拜駙馬都尉終大司馬南郡公魏志鄧艾字士載義陽棘陽人少家貧毎見高山大澤輙規度指畫軍營處所時人多笑焉後為尚書郎時欲廣田蓄榖為滅賊資使艾行陳項以東至壽春艾以為田良水少不足以盡地利宜開河渠可以引水充溉大積軍粮又通漕運之道乃著濟河論以喻其指後開廣漕渠毎東南有事大軍興衆汎流而下逹於江淮資食有儲而無水害艾所建也累遷征西將軍征蜀大破之劉禪降以勲進太尉鍾㑹忌其威名搆成其事遂見害楊修㨗對羅友黙記後漢楊修字德祖太尉震𤣥孫好學有俊才為丞相曹操主簿操平漢中欲轉㓂蜀漢而不得進欲守之义難為功操出教唯曰雞肋而已衆莫能曉修獨曰夫雞肋食之則無所得棄之則如可惜公歸計决矣操於此廻師修之幾决多有此類又甞出行籌操有問外事乃逆為答記勑守舎児若有令出依次通之既而果然操怪其速廉之知狀忌修遂因事殺之語林曰修至江南讀曹娥碑碑背有八字曰黄絹㓜婦外孫韲臼操不觧問修曰卿知否修曰知之操曰且勿言待朕思之行三十里乃得之令修觧修曰黄絹色絲色絲絶字㓜婦少女少女妙字外孫女子女子好字韲臼受辛受辛辭字操曰一如朕意俗云有智無智校三十里世説云羅友少時多謂之癡常同入祠欲乞食了無怍容為人強記從桓宣武伐蜀按行蜀城道陌果木皆黙記之後宣武集蜀道事亦有遺忘皆名列之坐者歎服杜康造酒蒼頡制字魏武帝樂府短歌行曰慨當以慷憂思難忘何以觧憂惟有杜康注謂杜康古之造酒者吕氏春秋曰儀狄造酒淮南子曰蒼頡作字書而天雨粟鬼夜哭許慎曰蒼頡始視鳥迹之文造書契則詐偽萌生去本趨末棄耕作之業務錐刀之利天知其將餓故為雨粟鬼恐為文書所劾故夜哭也舊云龍潛藏未詳所出樗里智囊邉韶經笥史記樗里子名疾秦惠王之弟疾室在昭王廟西渭南陰鄉樗里故俗謂之樗里子滑稽多智秦人號曰智囊秦武王立以樗里子甘茂為左右丞相疾卒𦵏渭南章臺東曰後百歳是當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙知則樗里後漢邉韶字孝先陳留浚儀人以文學知名教授數百人韶口辯曽晝日假寐弟子私嘲之曰邉孝先腹便便懶讀書但欲眠韶潛聞之應時對曰邉為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙韶之才㨗皆此類桓帝時拜大中大夫著作東觀滕公佳城王果石崖西京雜記滕公駕至東都門馬鳴跼不肯前以足跑地久之滕公使士卒掘馬所跑地入三尺所得石椁滕公以燭照之有銘焉乃以水洗冩其文文皆古異左右莫能知以問叔孫通通曰蝌蚪文也以今文冩之曰佳城鬰鬰三千年見白日吁嗟滕公居此室滕公曰嗟乎天也吾死其即安此乎死遂𦵏焉滕公即前漢夏侯嬰官至太僕初為滕公奉車故號滕公神怪志將軍王果為益州太守路經三峽船中望見江崖石壁千丈有物懸在半崖似棺椁問舊行人皆云已久果令人懸崖就視乃一棺也骸骨存焉有石誌云三百年後水漂我欲及長江垂欲堕欲堕不堕遇王果果見銘愴然曰數百年前知我名如何舎去因留為營歛瘞埋設祭而去買妻恥樵澤室犯齋前漢朱買臣字翁子吳人家貧好讀書不治家産常乂薪樵賣以給食擔束薪行且誦書其妻亦負戴相隨羞之求去買臣曰我年五十當富貴今已四十餘矣汝苦日久待我富貴報汝功妻恚怒曰如公等終餓死溝中耳何能富貴買臣即聽去後數歳隨上計吏為卒將重車至長安詣闕上書待詔公車㑹邑子嚴助貴幸薦買臣進見説春秋言楚詞武帝説之拜中大夫與嚴助俱侍中久之拜㑹稽太守上謂曰富貴不歸故郷如衣繡夜行今子何如買臣頓首謝入吳界見其故妻妻夫治道買臣呼命後車載其夫妻到太守舎置園中給食之妻自經死買臣給其夫錢令𦵏悉召見故人與飲食諸常有恩者皆報焉後漢周澤字穉都北海安丘人顯宗時為司徒性簡忽威儀頗失宰相之望後為太常清潔循行盡敬宗廟嘗卧疾齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁收送詔獄謝罪當世疑其詭激時人為語曰生世不諧作太常妻一年三百六十日三百五十九日齋後數為三老五更漢官儀於齋下云一日不齋醉如泥馬后大練孟光荆釵後漢明德馬皇后伏波將軍援小女年十歳幹理家事同成人嘗久疾太夫人令筮之筮者曰此女雖久疾後當大貴兆不可言後又使相者占諸女見后大驚曰我必為此女稱臣後選入宫顯宗即位以為貴人時賈氏生肅宗帝命令養之謂曰人未必當自生子但患愛子不至耳后盡心撫育過於所生肅宗亦孝性惇篤恩情天至母子慈愛無纎介之間有司奏立長秋宫帝未有所言皇太后曰馬貴人德冠後宫即其人也遂立為皇后既正位宫闈愈自謙肅能誦易經好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加縁後漢梁鴻字伯鸞扶風平陵人同縣孟氏有女状肥陋而黒力舉石臼擇對至三十父母問其故曰得賢如梁伯鸞者鴻聞而聘之及嫁始以装飾入門七日而鴻不答曰吾欲裘褐之人可與俱隱深山者今乃衣綺縞傅粉墨豈所願哉妻曰妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰真梁鴻妻也字之曰德曜名孟光乃共入覇陵山中顔叔秉燭宋𢎞不諧毛公詩傳曰昔者顔叔子獨處于室鄰之嫠婦又獨處於室夜暴風雨至室壊婦人趨而至叔子納之而使執燭放乎旦而蒸盡摍屋而繼之自以為辟嫌亦不審矣若其審者宜若魯人然魯有男子獨處於室鄰之嫠婦又獨處於室夜暴風雨至而室壊婦人趨而託之男子閉户而不納曰吾聞之男女不六十不同居今子㓜吾亦㓜不可以納子婦人曰子何不若栁下惠然嫗不逮門之女國人不稱亂男子曰栁下惠固可吾固不可吾将以吾不可學栁下惠之可孔子曰欲學柳下惠者未有似于是也後漢宋𢎞字仲子京兆長安人光武即位為大司空時帝姊湖陽公主新寡帝與共論朝臣㣲觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後引見帝令坐主屛風後謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣𢎞所得租奉分贍九族家無資産以清行致稱所推進賢士三十餘人或相與及公卿者鄧通銅山郭况金穴前漢鄧通蜀郡南安人以櫂船為黄頭郎文帝甞夢欲上天不能有一黄頭郎推上天顧見其衣尻帶後穿覺而之漸臺以夣中陰自求見通衣後穿夢中所見也召見問其姓名帝悦尊幸之賞賜鉅物以十數官至上大夫然無他技能不能有所薦逹獨謹身媚上而已上使相者相通曰當貧餓死上曰能富通在我於是賜蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此上甞病癰通為上嗽吮之上問曰天下誰最愛我者通曰宜莫若太子及太子入問疾上使齰癰太子色難之已而聞通甞為上齰之太子慙由是心恨通景帝立通免居人告通盜出徼外鑄錢下吏騐問盡沒入之竟寄死人家後漢郭况真定槁人光武郭皇后弟帝善况小心謹慎年始十六拜黄門侍郎以后弟貴重賓客輻凑况謙恭下士頗得聲譽遷大鴻臚帝數幸其第會諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號况家為金穴顯宗即位數受賞賜恩禮俱渥終特進秦彭攀轅侯覇卧轍後漢秦彭字伯平扶風茂陵人自漢興之後世位相承六世祖襲為潁川太守與昆從同時為二千石者五人故三輔號曰萬石秦氏彭為潁川太守仍有鳯凰麒麟嘉禾甘露之瑞集其郡境肅宗幸潁川輙賞賜錢榖恩寵甚異東觀漢記曰彭去任老㓜攀轅號泣後漢侯覇字君房河南宻人矜嚴有威容家累千金不事産業篤志好學王莽末為淮平太守政理有能名及莽敗覇保固自守卒全一郡更始遣使徴覇百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留期年光武時為大司徒淳于炙輠彦國吐屑史記淳于髠齊人博聞強記學無所主其諌説慕晏嬰之為人然而承意觀色為務見梁惠王一語連三日三夜無倦惠王欲以卿相位待之髠因謝去送以安車駕駟束帛加璧黄金百鎰終身不仕齊人頌曰談天衍雕龍奭炙轂過髠劉向别録過字作輠輠者車之盛膏器也炙之雖盡猶尚有流者言髠智不盡如炙輠也衍奭謂二騶晉胡母輔之字彦國泰山奉高人少有知人之鍳性嗜酒任縱不拘小節與王澄王敦庾敳俱為太尉為王衍所昵號曰四友澄嘗與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領袖也元帝時為湘州刺史太真玉臺武子金埒晉書温嶠字太真太原祁人性聰敏有識量博學能屬文少以孝悌稱于邦族成帝時為驃騎將軍始安郡公世説曰嶠䘮婦從姑劉氏家經亂離散唯有一女甚有姿慧姑屬公覔婚公自有婚意答曰佳壻難得但如嶠如何姑云䘮敗之餘乞粗存活便足慰吾餘年何敢希汝比也後少日公報姑已得婚處門地壻身盡不减嶠因下玉鏡臺一枚姑大喜既交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜玉鏡臺是公為劉越石長史北征劉聰所得也晉王濟字武子太原晉陽人少有逸才風姿英爽氣葢一時好弓馬勇力絶人善易及老荘文詞俊茂技藝過人和嶠裴楷齊名尚常山公主起家拜中書郎遷侍中坐免官乃移第北邙山下性豪侈麗服玉食時洛京地甚貴濟買地為馬埒編錢滿之時人謂為金埒巫馬戴星宓賤彈琴吕氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者故勞任人者故逸郝亷留錢雷義送金風俗通郝子亷饑不得食寒不得衣一介不取諸人曽過姊飯留錢席下而去毎行飲水常投一錢井中後漢雷義字仲公豫章鄱陽人初為郡功曹擢用善人不伐其功義常濟人死罪罪者後以金二斤謝不受金主伺義不在黙投金於承塵上後葺理屋宇乃得之金主已死無所復還乃以付縣曹後拜侍御史除南頓令逄萌挂冠胡昭投簪後漢逄萌字子慶北海都昌人之長安學通春秋經時王莽殺其子逄萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門将家屬浮海客於遼東萌素明陰陽知莽將敗乃首戴瓦盎哭於市曰新乎新乎因遂潛藏後光武徴不起魏志胡昭字孔明潁川人養志不仕始避地冀州辭袁紹之命道還鄉里太祖為相頻加禮辟昭往應命自陳一介野生無軍國之用歸誠求去太祖曰人各有志出處異趣勉卒雅尚義不相屈昭乃轉居陸渾山中躬耕樂道以經籍自娛閭里敬愛之建安末民孫狼等叛亂自相約言胡居士賢者一不得犯其部落一州頼昭咸無怵惕後公車特徴㑹卒摯虞作昭贊曰投簪卷帶韜聲匿跡王喬䨇鳬華佗五禽後漢王喬河東人為葉令喬有神術毎月朔望常自詣臺朝顯宗怪其來數而不見車騎宻令太史伺望之言其臨至輙有䨇鳬東南飛來於是候鳬至舉羅張之但得一䨇舄焉後天下玉棺於堂前喬曰天帝獨召我耶乃沐浴服飾寝其中盖便立覆𦵏於城東百姓為立廟號葉君祠後漢華佗字元化沛國譙人兼通數經曉養性之術年且百嵗猶有壯容時人以為仙精於方藥處劑不過數種針灸不過數處若疾發結於内針藥所不能及者乃先令以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截湔洗除去疾穢既而縫合傅以神膏四五日瘡愈一月間平復為人性惡難得意且恥以醫見業曹操累書呼之數期不反竟殺之廣陵吳普從佗學佗語普曰人體欲得勞動但不當使極耳動揺則榖氣得消血脉流通病不得生譬猶戸樞終不朽也古之仙者為導引之事熊經䲭顧引挽腰體動諸闗節以求難老吾有一術為五禽之戲一曰虎二曰鹿三曰熊四曰猨五曰鳥亦能已疾兼利蹏足以當導引使有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施之行年九十餘耳聰目明齒牙完堅程邈𨽻書史籕大篆前漢藝文志曰史籕篇者周時史官教學童書也與孔氏壁中古文異體又曰秦時始造𨽻書起於官獄多事茍趨省易施之於徒𨽻也晉衞恒善草𨽻書為字勢曰昔周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書或曰秦時下邽人程邈為衙獄吏得罪幽繫雲陽十年從獄中作大篆少者増益多者損减方者使員員者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃𨽻字也自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書恒字巨山為黄門郎與父瓘同遇害王承魚盜丙吉牛喘晉書王承字安期汝南内史湛之子為東海太守政尚清静不為細察小吏有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚何足惜耶有犯夜者為吏所拘承問其故答曰從師受學不覺日暮承曰鞭撻寗越以立威名非政化之本使吏送令歸家其從容寛恕若此渡江為元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物衆咸親愛名臣王導衞玠周顗庾亮之徒皆出其下為中興第一前漢丙吉字少卿魯國人宣帝時為丞相嘗出逄清道羣鬭者死傷横道吉過之不問吉前行逄人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬬相殺傷長安令京兆尹職所當禁備逐捕歳竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可太熱恐牛近行因暑故喘此時氣失節恐有所傷害三公典調和隂陽職當憂是以問之掾史乃服以吉知大體初吉為廷尉監治巫蠱郡邸獄時宣帝生數月以皇曽孫坐衞太子事繫吉哀其無辜擇謹厚女徒令保養武帝疾望氣者言獄中有天子氣遣使殺獄繫者内謁者令到獄吉閉門拒之乃劾奏吉上寤因赦天下郡邸獄頼吉得生恩及四海曽孫疾吉視遇甚有恩惠為人深厚不伐善自曽孫遭遇絶口不道前恩後上問知吉有舊恩不言大賢之制詔封博陽侯賈琮褰帷郭賀露冕後漢賈琮字孟堅東郡聊城人靈帝時為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聼糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風震竦其諸贓過者望風解印綬去初交阯屯兵反有司舉琮為刺史琮到部訊其反状咸言賦歛過重民不聊生故相聚為盜賊琮即告示使各安其資業招撫荒散蠲復徭役百姓以安歌曰賈父來晚使我先反今見清平吏不敢犯在事三年為十三州最後漢郭賀字喬卿雒陽人建武中為尚書令曉習故事多所匡益拜荆州刺史到官有殊政百姓歌之曰厥徳仁明郭喬卿忠正朝廷上下平顯宗廵狩到南陽時見嗟嘆賜以三公之服黼黻冕旒勑行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之拜河南尹以清静稱馮媛當熊班女辭輦前漢元帝馮昭儀立将軍奉世女平帝祖母也拜偼伃内寵與傅昭儀等上視虎圏鬭獸後宫皆至熊逸出圈攀檻欲上殿左右貴人傅昭儀等皆驚走偼伃直前當熊而立上問人情驚懼何故前當對曰猛獸遇人而止妾恐熊至御坐故以身當之上嗟歎倍敬重焉前漢成帝班偼伃越騎校尉彪之女帝游後庭嘗欲同輦載辭曰覩古圖畵賢聖之君皆有名臣在側三代末主廼有嬖妾今欲同輦得無近之乎上善其言而止太后聞之喜曰古有樊姬今有班偼伃後趙飛燕譖告許皇后與偼伃挾媚道祝詛後宫詈及主上考問偼伃對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之愬如其無知愬之何益故不為也上善其對憐憫之贈黄金百斤王充閱市董生下帷後漢王充字仲任㑹稽上虞人家貧無書甞遊洛陽市肆閲所賣書一見輙能誦憶遂博通衆流百家之言仕郡為功曹充好論説始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絶弔慶之禮戸牖墻壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑刺史辟為從事轉治中自免還家肅宗詔公車徴不起前漢董仲舒廣川人少治春秋孝景帝時為博士下帷講誦弟子傳以久次相授業或莫見其面盖三年不窺園其精如此進退容止非禮不行學士皆師尊之武帝時舉賢良對䇿為江都相事易王王帝兄素驕好勇仲舒以禮義匡正王敬重焉治國以春秋災異之變推陰陽所以錯行求雨閉諸陽縱諸陰其止雨反是行之得所欲公孫𢎞治春秋不如仲舒希世用事位至公卿仲舒以𢎞為從䛕𢎞嫉之乃言之於上使相膠西王王亦帝兄尤縱恣聞仲舒大儒善待之凢相兩國驕主正身以率下數上書諌争教令國中所居而治及去位不問家産業以修學著書為事朝廷有大議使使者就問之其對皆有明法自魏其武安侯為相而隆儒及仲舒對䇿推明孔氏抑黜百家立學校之官州郡舉茂才孝亷皆其發之以夀終于家徙茂陵子及孫皆至大官平叔傅粉𢎞治凝脂魏志何晏字平叔南陽宛人尚金鄉公主為吏部尚書駙馬都尉世説曰平叔美姿面至白文帝疑其傅粉夏月令食湯餅汗出以巾拭之轉皎白也晉杜乂字𢎞治成恭皇后父也性純和美姿容有盛名於江左王羲之目之曰膚若凝脂眼如㸃漆此神仙人也桓彛亦曰衞玠神清杜乂形清仕為丹陽丞楊寳黄雀毛寳白龜續齊諧記楊寳年九歳時至華陰山北見一黄雀為䲭梟所搏墜於樹下為螻蟻所困寳取之以歸置巾箱中唯食黄花百餘日毛羽成乃飛去其夜有黄衣童子向寳再拜曰我西王母使者君仁愛救拯實感成濟以白環四枚與寳令君子孫潔白位登三事當如此環矣寳哀平世隱居教授王莽徴之遂逃遯光武高其節公車特徴不到子震安帝時為太尉震子秉桓帝時為太尉秉子賜靈帝時為太尉賜子彪獻帝時為太尉魏文帝時復為太尉震至彪四世太尉德業相繼晉毛寳字碩真滎陽陽武人進征虜將軍豫州刺史與西陽太守樊峻以萬人守邾城石虎遣二萬騎攻之城陷寳等率左右突圍出赴江死者六千人寳亦溺死初寳在武昌軍人有於市買得一白龜養之漸大放諸江中邾城之敗飬龜人被鎧持矛自投於水中如覺堕一石上視之乃先所養白龜長五六尺送至岸遂得免宿瘤採桑漆室憂葵古列女傳齊閔王之后項有大瘤號曰宿瘤閔王出道至東郭百姓盡觀宿瘤採桑如故王怪問曰寡人出遊百姓無少長皆來觀汝不一視何也對曰妾受父母教採桑不教觀大王王曰此竒女曰婢妾之職屬之不二予之不忘中心謂何宿瘤何傷王大悦曰此賢女也令後乘載之女曰父母在内使妾不受教而隨王是奔女也王安用之王大慙遣歸使使者奉禮加金百鎰往聘迎之父母驚惶欲洗浴加衣裳女曰如是見主變容更服不見識也於是如故隨使者至閔王以為后出令卑宫室填池澤損膳减樂後宫不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚宿瘤有力焉及死後燕遂屠齊閔王逃亡而弑於外古列女傳魯漆室邑之女過時未適人當穆公時君老太子㓜倚柱而嘯鄰婦曰何嘯之悲子欲嫁耶女曰吾豈為不嫁而悲哉吾憂魯君老而太子㓜也鄰婦笑曰此魯大夫之憂婦人何與焉女曰不然昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使吾終歳不食葵鄰女奔隨人亡其家倩吾兄行追之逢霖雨出溺死令吾終身無兄吾聞河潤九里漸洳三百歩夫魯國有患君臣父子皆被其辱禍及衆庶婦人獨安所逃乎居三年魯果亂齊楚攻之連有㓂男子戰鬭婦人轉輸不息韋賢滿籯夏侯拾芥前漢韋賢字長儒魯國鄒人為人質朴少欲篤志于學兼通禮尚書以詩教授號稱鄒魯大儒宣帝時為丞相以老病乞骸骨賜黄金百斤第一區丞相致仕自賢始少子𤣥成字少翁好學修父業尤謙遜下士復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經𤣥成相元帝七年守正持重不及父而文采過之前漢夏侯勝字長公東平人少好學為人質朴守正簡易亡威儀宣帝時遷太子少傅受詔撰尚書論語説賜黄金百斤年九十卒官初勝授太后尚書故賜錢二百萬素服五日以報師傅之恩儒者以為榮始勝每講授甞謂諸生曰士病不明經術經茍明其取青紫如俛拾地芥耳學經不明不如歸耕阮簡曠逹袁耽俊邁舊注引竹林七賢論曰阮簡咸之從子亦以曠逹聞居父䘮行遇大雪寒凍遂詣浚儀令令為他賓設黍簡食之以致清議廢頓幾二十年晉袁耽字彦道陳郡陽夏人少有才氣倜儻不覊為士類所稱桓温少時游於博徒資産俱盡尚有負進思自振之方莫知所出欲求濟於耽而耽在艱試以告焉耽無難色遂變服懐布㡌隨温與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彦道也遂就局十萬一擲直上百萬耽投馬絶呌探布帽擲地曰竟識袁彥道不其通脱如此仕為從事郎中蘓武持節鄭衆不拜前漢蘓武字子卿杜陵人武帝時以中郎將持節使匈奴單于欲降之遂幽武置大窖中絶不飲食天雨雪武因卧齧雪與氊毛并咽之數日不死匈奴以為神乃徙武北海上使牧羝羝乳乃得歸武杖漢節牧羊卧起操持節旄盡落昭帝立匈奴與漢和親漢求武等匈奴詭言武死常惠教漢使者言天子射上林中得鴈足有係帛書言在某澤中由是得還拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區武留匈奴十九載始以強壯出及還鬚髪盡白至宣帝時以武著節老臣令朝朔望號稱祭酒年八十餘卒後圖畫於麒麟閣法其形貎署其官爵姓名後漢鄭衆字仲師河南開封人精力於學知名於世永平初以明經給事中八年遣衆持節使匈奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆㧞刀自誓單于恐而止後復遣衆言臣前奉使不為匃奴拜單于恚恨遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氊裘謁拜卒不聼衆既行在路連上疏固争詔追還繫廷尉㑹赦歸家後帝見匃奴來者問衆與單于争禮之状皆言衆意氣壮勇雖蘇武不過也復召為軍司馬終大司農郭巨將坑董永自賣舊注引孝子傳云後漢郭巨家貧養老母妻生一子三歳母嘗减食與之巨謂妻曰貧乏不能供給共汝埋子子可再有母不可再得妻不敢違巨遂掘地三尺餘忽見黄金一釜釜上云天賜孝子郭巨官不得奪人不得取舊注漢董永少失母養父家貧傭力至農月以小車推父置田頭陰樹下而營農作父死就主人貸錢一萬約賣身為奴遂得錢葬父還於路忽遇婦人姿容端美求為永妻永與俱詣主人令永妻織縑三百匹放汝夫妻乃織一月而畢主人怪其速遂放之相隨至舊相遇處辭永曰我天之織女也縁君至孝天帝令助君償債言訖凌空而去仲連蹈海范蠡泛湖史記魯仲連齊人好竒偉俶儻之畫䇿不肯仕宦遊於趙㑹秦圍邯鄲而魏将新垣衍欲令趙尊秦昭王為帝仲連乃見平原君曰梁客新垣衍安在吾請為君責而歸之平原君請為介紹見衍衍曰吾觀居此圍城之中者皆有求於平原君今觀先生之玉貎非有求者曷為久而不去仲連曰世以鮑焦無從容而死者皆非也衆人不知則為一身彼秦棄禮義上首功之國也權使其士虜使其民彼即為帝則連蹈東海而死耳不忍為之民也於是衍不敢復言帝秦平原君欲封之遂辭去終身不復見史記范蠡事越王勾踐苦身戮力與勾踐深謀二十餘年卒滅吳報㑹稽之恥以為大名之下難以久居且勾踐可與共患難與處安乃装其輕寳珠玉與其私徒屬乗舟泛湖以行終不反適齊變姓名自謂鴟夷子皮耕於海畔父子致産數千萬齊人聞其賢以為相蠡歎曰居家致千金居官至卿相此布衣之極也乃歸相印盡散其財以分與交友郷黨懐其重寳間行以去至於陶以為天下之中交易有無之路通可以致富自謂陶朱公居無何致貲累巨萬天下稱陶朱公故范蠡三徙成名於天下老死於陶文寳緝栁温舒截蒲楚國先賢傳孫文寳到洛陽在太學左右得一小屋安止母然後入學緝楊栁為簡以寫經前漢路温舒字長君鉅鹿東里人父為里監門使牧羊温舒取澤中蒲截以為牒編用寫書誦習善求為獄小吏因學律令轉獄史縣中疑事皆問焉太守行縣見而異之署决曹史又授春秋通大義舉孝亷為山邑丞宣帝時遷臨淮太守治有異跡伯道無兒嵇紹不孤晉書鄧攸字伯道平陽襄陵人為河東太守沒於石勒乃斫壊車以牛馬負妻子而逃又遇賊掠其牛馬歩走擔其兒及其弟子綏度不能兩全乃謂妻曰吾弟早亡惟有一息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而從之乃棄之朝棄而暮反明日繫之樹而去至江東仕為尚書右僕射攸棄子之後妻不復孕過江納妾甚寵之訊其家屬説是北人遭亂憶父母姓名乃攸之甥攸素有徳行聞之感恨遂不復畜妾卒以無嗣時人義而哀之曰天道無知使鄧伯道無兒晉嵇紹字延祖父康與山濤善臨誅謂紹曰巨源在汝不孤矣後濤薦為秘書丞始入洛或謂王戎曰昨于稠人中始見嵇紹昻昻状若野鶴之在雞羣裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才累遷侍中及惠帝蒙塵馳詣行在所王師敗績百官及侍衛散潰唯紹儼然端冕以身捍衛兵交御輦飛箭雨集遂被害於帝側血濺御服帝深哀嘆之及事定左右欲浣衣帝曰此嵇侍中血勿去元帝表贈太尉謚曰忠穆祠太牢緑珠墜樓文君當壚晉書石崇字季倫渤海南皮人拜衞尉有妓曰緑珠美而艶善吹笛中書令孫秀使人求之崇時在金谷别館方登凉臺臨清流婦人侍側使者以告崇盡出其婢妾十數人以示之皆藴蘭麝被羅縠曰任所擇使者受命指索緑珠不知孰是崇勃然曰緑珠吾所愛不可得也秀怒乃勸趙王倫誅崇遂矯詔收之崇正宴樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當効死于官前因自投于樓下而死崇詣東市歎曰奴軰利吾家財收者曰知財致害何不早散之崇不能答遂被害前漢卓文君蜀郡臨邛富人卓王孫女新寡好音司馬相如與客至其家酒酣設琴而以琴心挑之相如從車騎雍容閒雅甚都文君竊從戸窺之心悦而好之恐不得當也夜亡奔相如相如與馳歸成都家徒四壁卓王孫大怒文君久之不樂謂長卿曰第俱如臨卭從昆弟假貸猶足以為生乃之臨卭盡賣車馬買酒舎令文君當壚相如自著犢鼻褌與庸保雜作滌器於市王孫恥之杜門不出昆弟諸公更謂王孫曰有一男兩女所不足者非財也今文君既失身于長卿長卿故倦游雖貧其人材足依也王孫分與文君僮百人錢百萬歸成都買田宅為富人久之蜀人楊得意為狗監侍武帝帝讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚召之以為即蒙求集註巻上
