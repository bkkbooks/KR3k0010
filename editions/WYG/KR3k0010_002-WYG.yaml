body:
  text: 蒙求集註卷下唐李瀚撰宋徐子光註伊尹負鼎甯戚扣角史記伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致于王道或曰伊尹處士湯使人聘迎之五反然後肯徃從湯言素王及九主之事湯舉任以國政三齊畧記齊桓公夜出迎客甯戚疾擊其牛角高歌曰南山矸白石爛生不逄堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦桓公召與語說之以為大夫趙壹坎壈顔駟蹇剥後漢趙壹字元叔漢陽西縣人體貌魁梧望之甚偉恃才倨傲為鄉黨所擯乃作解擯屢抵罪幾至死友人救得免乃貽書謝恩為窮鳥賦後舉郡上計到京師時司徒袁逄受計計吏數百人皆拜伏廷中壹獨長揖逄異之令左右讓之對曰昔酈食其長揖漢王今揖三公何遽怪哉逄下堂執手延置上座河南尹羊陟與逄共稱薦之名動京師士大夫想望其風采後州郡爭致禮命十辟公府並不就初逄使善相者相壹云仕不過郡吏竟如其言漢武故事曰上至郎署舎見一老郎鬚眉皓白問何時為之對曰臣姓顔名駟文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三朝不遇也上感其言擢為㑹稽都尉一本作景帝好美臣貌醜龔遂勸農文翁興學前漢龔遂字少卿山陽南平陽人以明經為官宣帝時渤海左右郡歲饑盜賊並起二千石不能禽制上選能治者以遂為渤海太守年七十餘遂至界盡移勅屬縣罷捕盜賊吏諸持鉏鍤田器者皆為良民吏毋得問持兵者乃為盜賊盜賊悉平民安土樂業遂乃開倉􅅒假貧民選用良吏慰安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑民有帶刀劒者使賣劒買牛賣刀買犢吏民皆富實獄訟止息後徵遂議曹王生素嗜酒亡節度從至京師㑹遂引入宫王生曰天子即問君何以治渤海宜曰皆聖主之德非小臣之力遂受其言以對上說笑曰君安得長者之言而稱之對曰臣非知此乃議曹教戒臣也上以遂老不任公卿拜水衡都尉王生為丞以褒顯遂云前漢文翁廬江舒人少好學通春秋景帝末為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風欲誘進之乃選郡縣小吏開敏有材者親自飭厲遣詣京師受業博士數歲蜀生皆成就還歸以為右職官有至郡守刺史者又修起學官于成都市中招下縣子弟為學官弟子為除更繇高者以補郡縣吏次為孝弟力田每行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤吏民見而榮之爭欲為學官弟子富人至出錢以求之由是大化蜀地學于京師者比齊魯焉武帝乃令天下郡國皆立學校自文翁始文翁終于蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也晏御揚揚五鹿嶽嶽史記晏平仲嬰為齊相出其御之妻從門間而闚其夫其夫為相御擁大蓋䇿駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去其後夫自抑損晏子怪問之以實對晏子薦以為大夫前漢五鹿充宗字君孟時為少府貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝􅒥登堂抗首而請音動左右既論難連拄五鹿君諸儒為之語曰五鹿嶽嶽朱雲折其角遂為博士蕭朱結綬王貢彈冠前漢蕭育字次君東海蘭陵人哀帝時為光禄大夫執金吾少與陳咸朱博為友著聞當世徃者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦逹也王吉字子陽瑯琊臯虞人少好學明經宣帝時為諫大夫與同郡貢禹為友世稱王陽在位貢公彈冠言其舎取同也禹字少翁以明經潔行著聞仕至御史大夫龎統展驥仇覽棲鸞蜀志龎統字士元襄陽人少時樸鈍未有識者司馬徽有知人鑒稱統當為南州士之冠冕由是漸顯先主領荆州統以從事守耒陽令在縣不治免官呉將魯肅遺先主曰龎士元非百里才也使處治中別駕之任始當展其驥足耳諸葛亮亦言之于先主先主以為治中從事親待亞于亮遂並為軍師中郎將後漢仇覽字季智一名香陳留考城人為蒲亭長厲人生業農畢乃令子弟就學剽輕遊恣者皆役以田桑賑恤窮寡期年大化初到有陳元者獨與母居而母詣覽告元不孝覽親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之語曰父母何在在我庭化我鳲梟哺所生時考城令王渙政尚嚴猛聞覽以德化人署為主簿謂曰主簿聞陳元之過不罪而化之得毋少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳯渙謝遣曰枳棘非鸞鳯所棲百里豈大賢之路乃奉資勉入太學學畢歸鄉里州郡並請皆以疾辭葛亮顧廬韓信升壇蜀志諸葛亮相先主先主病篤召亮屬以後事謂曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢竭股肱之力効忠貞之節繼之以死又為詔勅後主曰汝與丞相從事事之如父自是事無巨細皆決于亮嘗上疏其畧曰臣本布衣躬耕於南陽茍全性命于亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮以當世之事後常以木牛流馬運糧據武功五丈原與司馬宣王對於渭南相持百餘日卒於軍年五十四謚忠武侯亮長於巧思損益連弩木牛流馬皆出其意推演兵法作八陣圖咸得其要云前漢韓信淮隂人家貧無行不得推擇為吏後屬項羽為郎中數以䇿干羽羽弗用亡歸漢漢王以為治粟都尉上未之竒數與蕭何語何竒之信度上不用即亡何追之居一二日來謁上罵曰諸將亡以十數公無所追追信詐也何曰諸將易得至如信國士無雙王必欲爭天下非信無可與計事者于是擇日齋戒設壇場具禮拜為大將一軍皆驚後封楚王都下邳謀反赦為淮隂侯卒為吕后所斬王裒柏慘閔損衣單晉書王裒字偉元城陽營陵人少立操尚博學多能其父儀為文帝司馬見殺裒痛父非命未嘗西向而坐示不臣朝廷也隱居教授廬於墓側旦夕常至墓所拜跪攀柏悲號涕泣著樹樹為之枯母性畏雷母没毎雷輒到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇家貧躬耕計口而田度身而蠶或有助之者不聽遭亂戀壟不去舊註云閔損字子騫早喪母父娶後母生二子損至孝不怠母疾惡之所生子以綿絮衣之損以蘆花絮父冬日令損御車體寒失靷父責之損不自理父察知之欲遣後母損泣啓父曰母在一子寒母去三子單父善之而止母亦悔改待三子均平遂成慈母蒙恬製筆蔡倫造紙初學記云博物志蒙恬造筆又尚書中候𤣥龜負圖出周公援筆以時文冩之曲禮云史載筆此則秦之前已有筆矣蓋諸國或未之名而秦獨得其名恬更為之損益耳故說文曰楚謂之聿呉謂之不律燕謂之拂秦謂之筆也舊註引博物志云蒙恬為秦將製筆自此始今本無之後漢宦者蔡倫字敬仲和帝時轉中常侍加尚方令監作祕劍及諸器械莫不精工堅宻為後世法自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及敝布魚網以為紙奏上之帝善其能自是莫不通用故天下咸稱蔡侯紙孔伋緼袍祭遵布被說苑曰子思居於衛緼袍無裏三旬九食田子方聞之使人遺狐白裘恐其不受因謂之曰吾假人遂亡之吾與人如棄之子思拜而不受子方曰我有子無何故不受子思曰伋聞之妄與人如遺棄物於溝壑伋雖貧不忍以身為溝壑是以不敢後漢祭遵字弟孫潁川潁陽人少好經書家富給而恭儉從光武平河北拜征虜將軍遵為人廉約小心克己奉公賞賜盡與士卒家無私財身衣韋袴布被夫人裳不加縁帝以是重焉及卒愍悼尤甚車駕素服臨之喪禮成親祠以太牢既葬車駕復臨其墳存見夫人室家其後㑹朝帝每嘆曰安得憂國奉公如祭征虜乎其見思如此周公握髮蔡邕倒屣史記曰武王崩周公相成王而使其子伯禽代就封於魯戒之曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人子之魯恒無以國驕人後漢蔡邕字伯喈陳留圉人少博學好辭章數術天文妙探音律閒居翫古不交當世後為中郎將獻帝西遷王粲徙長安邕見而竒之時邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之粲至年既㓜弱容狀短小一座盡驚邕曰此王公之孫有異才吾不如也吾家書籍文章盡當與之粲曾祖龔祖暢皆為三公王敦傾室紀瞻出妓晉書王敦字處仲少有竒人之目尚武帝女襄城公主拜駙馬都尉明帝初移鎮姑孰因領揚州牧謀逆病死剖棺戮尸初石崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如厠者皆易新衣而出客多羞脫衣而敦脫故著新意色無怍羣婢曰此客必能作賊又嘗荒恣於色體為之弊左右諌之敦曰此甚易耳乃開後閣驅諸婢數十人並放之時人嘆異世說王遵與周顗及諸朝士詣尚書紀瞻家觀妓瞻有愛妾能作新聲顗問答之顔無怍色有司奏顗耽荒詔原之今本缺載暴勝持斧張綱埋輪前漢暴勝之字公子武帝末郡國盜賊羣起勝之為直指使者衣綉衣持斧逐捕盜賊督誅郡國車至毎以軍興誅不從命者威振州郡後漢張綱字文紀犍為武陽人少明經學辟為御史時順帝委縱宦官有識危心綱嘗感激慨然嘆曰穢惡滿朝不能奮身出命掃國家之難雖生吾不願也漢安初遣八使循行風俗皆耆儒知名多歴顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽郵亭曰豺狼當路安問狐狸遂奏大將軍梁冀等無君之心十五事京師震竦時冀妹為皇后諸梁姻族滿朝帝雖知言直不忍用終廣陵太守靈運曲笠林宗折巾世說新語謝靈運好戴曲柄笠孔隱士謂曰卿欲希心高逺何不能遺曲蓋之貌謝答曰將不畏影者未能忘懐又南史謝靈運晉車騎將軍𤣥之孫為學博覽羣書文章之美與顔延之為江左第一襲封康樂公世稱謝康樂公為永嘉太守郡有名山水素所愛好肆意遊遨族弟惠連十歲能屬文靈運嘉賞之云每有篇章對惠連輒得佳句嘗於永嘉西堂思詩竟日不就夢見惠連即得池塘生春草大以為工嘗云此語有神助非吾語也後為侍中免官尋山陟嶺必造幽峻登躡嘗著木屐起為臨川内史有逆志徙廣州棄市靈運詩書皆兼獨絶毎文竟手自冩之宋文帝稱為二寳後漢郭泰字林宗辟舉不應性明知人好奬訓士類容貌魁偉褒衣博帶周遊郡國嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此或問范滂曰林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友不知其他林宗雖善人倫而不為危言覈論故宦官擅政而不能傷及黨事起名士多被害惟林宗袁閎得免閉門教授弟子以千數及卒四方之士千餘人㑹葬同志者共刻石立碑蔡邕為其文謂盧植曰吾為碑銘多矣皆有慚德唯郭有道無愧色耳其奬拔士人皆如所鑒屈原澤畔漁父江濱史記屈原名平楚之同姓為懐王左徒博聞强識明于治亂􅈺于辭令王甚任之上官大夫與之同列爭寵而心害其能因讒之王怒而疏平後秦昭王欲與懐王㑹平曰秦虎狼之國不如無行懐王稚子子蘭勸王行王死于秦長子頃襄王立以子蘭為令尹子蘭使上官大夫短原于王王怒而遷之原至江濱披髪行吟澤畔顔色憔悴形容枯槁漁父問曰子非三閭大夫歟何故至于此原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不凝滯于物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懐瑾握瑜而自令見放為原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴常流而葬乎江魚之腹中耳又安能以皓皓之白而蒙世之温蠖乎乃作懐沙之賦懐石自投汨羅以死後百餘年賈生為長沙王太傅過湘水投書以弔之魏勃埽門潘岳望塵前漢魏勃少時欲求見齊相曹參家貧無以自通乃常獨早埽齊相舎人門外舎人怪之因特令閽者而問之勃曰願見相君無因故為子埽于是舎人見勃曹參因以為舎人晉潘岳為黄門侍郎性輕躁趨世利與衛尉石崇等諂事賈謐毎候其出與崇輒望塵而拜謐與之親善號二十四友岳為其首謐搆愍懐太子之文及晉書限斷皆岳之辭也初岳為瑯琊内史孫秀為小史給岳而狡黠自喜岳惡其為人數撻辱之秀常銜忿及趙王倫輔政秀為中書令遂誣岳及石崇謀為亂同被誅謐韓夀子賈充婦郭槐養為己子時賈后淫虐謐干預國事權侔人主京房推律翼奉觀性前漢京房字君明東郡頓丘人受易焦延壽延壽曰得我道以亡身者京生也其說長于災變分六十四卦更直日用事以風雨寒温為候各有占騐房用之尤精好鐘律知音聲孝元時以孝廉為郎與石顯五鹿充宗有隙出為魏郡太守房自知數以議論為大臣所非不欲逺離左右及為太守憂懼乃上封事言災異既而顯告房非謗政治歸惡天子詿誤諸侯王遂棄市房本姓李推律自定為京氏前漢翼奉字少君東海下邳人明經術好律厯隂陽之占元帝即位徵之奉上封事曰治道要務在知下之邪正于是有時客主邪之語其畧曰參之六合五行則可以見人性知人情觀性以厯觀情以律明主所宜獨用後官至諫大夫甘寧奢侈陸凱貴盛呉志甘寧字興霸巴郡臨江人少有氣力好游俠招合輕薄少年為渠帥仕孫權以功拜折衝將軍呉書曰寧輕俠殺人藏舎亡命聞于郡中其出入步則陳車騎水則連輕舟侍從被文綉幃帳以珠玉為飾常以繒錦維舟去或割棄以示奢也江表傳曰曹公出濡湏臨江飲馬權率衆應之使寧為前都督勅使夜入魏軍寧選徤兒百餘人徑詣曹公營下踰壘入營斬數千級北軍驚駭權曰孟德有張遼孤有興霸足相敵也呉志陸凱字敬風呉人丞相遜族子孫皓時為丞相世說曰皓問凱卿一宗在朝有幾人答曰二相五侯將軍十餘人皓曰盛哉凱曰君賢臣忠國之盛也父慈子孝家之盛也今政荒民弊覆亡是懼臣何敢言盛也干木富義於陵辭聘淮南子曰段干木辭禄而處家魏文侯過其門而式之其僕曰干木布衣之士君式其閭不已甚乎文侯曰干木不趨勢利懐君子之道隱處窮巷聲馳千里寡人敢勿式乎干木光于德寡人光于勢干木富于義寡人富于財勢不若德尊財不若義高干木難以勢易寡人弗為古列女傳楚王聞於陵子終賢欲以為相使使者持金百鎰徃聘之子終入謂妻曰王欲以我為相今日為相明日結駟連騎食方丈于前可乎妻曰夫子織屨以為食非與物無治也左琴而右書樂亦在其中矣夫結駟連騎所安不過容膝食方丈于前所甘不過一肉以容膝之安一肉之味而懐楚國之憂其可乎亂世多害妾恐先生之不保命也于是子終出謝使者遂相與逃而為人灌園高士傳曰陳仲子字子終齊人辭母兄將妻適楚居於陵自號於陵仲子元凱傳癖伯英草聖晉書杜預字元凱既立功之後從容無事乃耽思經籍為春秋左氏經傳集解又參考衆家譜第謂之釋例又作盟㑹圖春秋長厯備成一家之學比老乃成又撰女記讃當時論者謂預文義質直世人未之重唯祕書監摯虞賞之曰左丘明本為春秋作傳而左傳遂自孤行設釋例本為傳設而無所發明何但左傳故亦孤行時王濟解相馬又甚愛之而和嶠頗聚歛預常稱濟有馬癖嶠有財癖武帝聞之謂曰卿有何癖對曰臣有左傳癖終司𨽻校尉位特進贈征南大將軍初預好為後世名嘗言高岸為谷深谷為陵刻石為二碑記其􅈴績一沉峴山之下一立峴山之上曰焉知此後不為陵谷乎後漢張芝字伯英敦煌酒泉人善草書衛恒曰章帝時齊相杜度號善作篇後有崔瓘崔實亦皆稱工杜氏殺字甚安而書體微瘦崔氏甚得筆勢而結字小疏伯英因而轉精甚巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆為楷則號匆匆不暇草書寸紙不見遺世尤寳其書韋仲將謂之草聖馮異大樹千秋小車後漢馮異字公孫潁川父城人好讀書通左氏春秋孫子兵法漢兵起以郡掾守父城光武為司𨽻道經父城即開門迎光武署為主簿及王郎起光武自薊東南馳至饒陽蕪蔞亭天寒衆饑疲異上豆粥明旦光武曰昨得公孫豆粥饑寒俱解及至南宫遇大風雨光武入道傍舎燎衣異進麥飯莵肩因渡滹沱河還拜偏將軍為人謙退不伐行與諸將相逄輒引車避道進止皆有表識軍中號為整齊毎所止舎諸將並坐論功異常獨屏樹下軍中號曰大樹將軍及破邯鄲乃更部分諸將各有配𨽻軍士皆言願屬大樹將軍光武以此多之後封陽夏侯拜征西大將軍賜珍寳衣服錢帛詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報異稽首謝前漢車千秋本姓田氏為高寢郎㑹衛太子為江充所譛敗久之武帝頗知太子寃千秋上急變訟曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言上大感悟召千秋至前千秋長八尺餘體貌甚麗帝見而悅之謂曰父子之間人所難言公獨明其不然此高廟神靈使公教我公當為我輔佐立拜大鴻臚數月為丞相封富民侯千秋無他材能術學又無閥閱功勞特以一言寤意旬月取宰相封侯世未嘗有也千秋年老上優之朝見得乘小車入宫殿中故因號曰小車丞相漂母進食孫鍾設𤓰前漢韓信家貧嘗從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食食時信徃不為具食信自絶去至城下釣有一漂母哀之飯信數十日信曰吾必重報母母曰大丈夫不能自食吾哀王孫而進食豈望報乎淮隂少年有侮信衆辱信曰能死刺我不能出跨下信熟視俛出跨下一市皆笑以為怯及信為楚王召漂母賜千金及下鄉亭長錢百曰公小人為德不竟召辱巳少年以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此幽𡨕録孫鍾少時家貧種𤓰𤓰熟有三人來乞𤓰鍾引入庵中設𤓰及飯飯訖謂鍾曰蒙君厚惠今示子葬地欲得世世封侯欲為數代天子又曰我司命也君下山百步勿反顧鍾下六十來步囘看並為白鶴飛去鍾遂於此葬母冢上有氣屬天鍾後生堅堅生權權生亮及休權孫和生皓為晉所滅降為歸命侯壺公謫天薊訓歴家後漢汝南費長房為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因徃再拜奉酒脯翁知長房之意其神也謂曰子明日可更來長房旦日復詣翁翁與俱入壺中維見玉堂嚴麗㫖酒甘肴盈衍其中共飲畢而出翁約不得與人言之後乃就樓上候長房曰我神仙之人以過見責今當去能相隨乎樓下有少酒與卿為別長房使人取之不能勝又令人扛之猶不能舉翁聞笑而下樓以一指提上視器如一升許二人終日飲不盡神仙傳薊子訓齊人舉孝廉除郎中又為都尉人莫知其有道在鄉里常以信讓與人二百餘年顔色不老曾徃抱鄰舎嬰兒誤墮地兒家素尊子訓即埋之二十餘日子訓自外來抱兒還之家恐是鬼子訓既去掘視所埋但泥而已又諸老人鬢白者子訓與對坐共語宿昔皆還黑京師貴人莫不虚心欲見爭請子訓徃盡令太學諸生為請子訓子訓曰吾某月日當徃到期子訓以食時發日中到未半日行千餘里乃見諸生問誰欲見我卿盡語之我日中當徃到日中子訓果徃二十三處諸貴人喜自謂先詣之明日相參問各言子訓衣服顔色如一而所論說隨主所語不同逺近驚異子訓自乗青騾出東門陌上徐徐行諸貴人走馬逐不能及行半日而相去常一里許乃止劉𤣥刮席晉惠聞蟆後漢劉𤣥字聖公光武族兄王莽末平林陳牧等聚衆號平林兵聖公徃從之及破莽軍號聖公為更始將軍衆雖多無所統一遂共立更始為天子更始即帝位南面朝羣臣素懦弱羞愧流汗舉手不能言初入都宛城時漢兵誅王莽傳首詣宛縣於市遂北都洛陽後遷長安初莽敗惟未央宫被焚餘宫館無所毁官府市㕓不改於舊更始既至居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視後赤眉賊入關見殺晉惠帝初為太子朝廷咸知不堪政事武帝亦疑焉嘗使決尚書事不能對賈妃遣左右代對遂安及居大位政出群下綱紀大壊貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市嘗在華林園聞蝦蟆聲謂左右曰此鳴者為官乎私乎或對曰在官地為官在私地為私及天下荒亂百姓餓死帝曰何不食肉糜其蒙蔽皆此類伊籍一拜酈生長揖蜀志伊籍字機伯山陽人先主以為左將軍從事中郎遣使呉孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君乎對曰一拜一起未足為勞機㨗類如此權甚異之前漢酈食其陳留高陽人好讀書家貧落魄無衣食業為里監門縣中賢豪不敢役謂之狂生沛公畧地至高陽召食其入見沛公方踞床使兩女子洗食其長揖不拜曰足下必欲舉義兵誅無道秦不宜踞見長者於是沛公輟洗起延上坐謝之既下陳留號為廣野君韓信東擊齊又使食其說齊王田廣罷歴下兵馮軾下齊七十餘城及信兵至廣以為食其賣已迺烹之馬安四至應璩三入前漢司馬安汲黯姊子少與黯為太子洗馬安文深巧善宦四至九卿終河南太守昆弟以安故同時至二千石十人文章叙録應璩字休璉汝南人博學好屬文魏明文帝世歴散騎常侍齊王即位遷侍中大將軍長史曹爽秉政多違法度璩為百一詩以諷焉其畧曰前者墮官去有人適我閭田家無所有酌醴焚枯魚問我何功德三入承明廬其言雖頗諧合多切世要世共傳之郭解借交朱家脫急前漢郭解字翁伯河内軹人為人靜悍不飲酒少時隂賊感慨不快意所殺甚衆以軀藉友報仇臧命作姦剽攻休乃鑄錢掘冢不可勝數適有天幸窘急常得脫長更折節為儉以德報怨厚施而薄望後坐客殺人解實不知御史大夫公孫𢎞議曰解布衣為任俠行權以睚眦殺人當大逆無道遂族解前漢朱家魯人皆以儒教而朱家用俠聞所臧活豪士以百數其餘庸人不可勝言然終不伐其能飲其德所嘗施者惟恐見之振人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軥牛專趨人之急甚於己私既隂脫季布之厄及布尊貴終身不見自關以東莫不延頸願交虞延刻期盛吉垂泣後漢虞延字子大陳留東昏人延初生其上有物若一匹練遂上升天占者以為吉及長長八尺三寸腰帶十圍力能扛鼎性敦樸不拘小節又無鄉曲之譽王莽末天下大亂延嘗嬰甲胄擁衛親族扞禦刼盜賴其全者甚衆建武初除細陽令每至歲時伏臘輒休遣徒繫歸家並感恩德應期而還有囚於家被病自載詣獄既至而死率掾官屬殯於門外百姓感悅永平中為三公㑹稽典録盛吉字君達拜廷尉性多仁惠務在哀矜毎冬月罪囚當斷其妻執燭吉持丹青筆相向垂泣謝承後漢書盛吉為廷尉每至冬節罪囚當斬妻夜執燭吉持丹青筆夫妻相對垂泣決罪豫讓呑炭鉏麑觸槐史記豫讓晉人嘗事范中行氏去而事智伯智伯尊寵之趙襄子與韓魏合謀滅智伯三分其地襄子怨智伯漆其頭為飲器讓曰士為知己者死女為悅己者容我必為智伯報仇乃變名姓為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動搜之則豫讓也襄子義而釋之又漆身為厲呑炭為啞使形狀不可知伏於橋下襄子至橋馬驚曰此必豫讓問曰子事范中行氏智伯滅之不為報讎而反臣智伯智伯已死獨何報讎之深對曰臣事范中行氏衆人遇我我故衆人報之智伯國士遇我我故國士報之襄子曰寡人赦子亦已足矣子自為計讓曰臣固伏誅然願請君之衣而擊之以致報讐之意襄子持衣與之乃拔劍三躍而擊之曰吾可以下報智伯矣遂伏劍而死左氏傳曰晉靈公不君厚斂以彫牆從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之寘諸畚婦人載過朝盾為正卿驟諫公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死阮孚蠟屐祖約好財晉書阮孚字遙集始平太守咸之子元帝以為安東參軍蓬髮飲酒不以世務嬰心轉從事中郎終日酣縱常為有司所按遷散騎常侍嘗以金貂換酒復為所司彈劾帝宥之初祖約性好財孚性好屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見蠟屐因自嘆曰未知一生當著幾兩屐神色閑暢於是勝負始分終廣州刺史祖約字士少刺史逖之弟蘇峻克京師矯詔以為侍中為石勒所殺初平起石左慈擲盃神仙傳黄初平丹谿人年十五家使牧羊有道士見其良謹使將至金華山石室中四十餘年不復念家其兄初起索之不得見後在市有道士善卜乃就占之道士曰金華山中有牧羊兒是卿弟非邪初起即隨道士尋見兄弟悲喜問羊何在初平曰近在山東初起徃視了不見羊但見白石無數還曰無羊初平曰羊在耳但兄自不見便乃俱徃初平言叱叱羊起於是白石皆起成羊數萬頭初起曰我兄弟神通如此吾可學否初平曰唯好道便得初起便棄妻兒留就初平共服松脂茯苓至五千石能坐在立亡日中無影有童子之色後還鄉諸親死亡畧盡乃去以方教授南伯逄易姓為赤初起改為魯班初平改為赤松子其後傳服此藥得仙者數十人神仙傳左慈字元放盧江人少明五經兼通星氣見漢祚將盡乃嘆曰值此衰運官髙者危才高者死當代榮華不足貪也乃學道術尤明六甲能役鬼神坐致行厨精思於天柱山中得石室九丹金液經神變百端曹操聞而召之閉一室中斷穀食日與二升水朞年出之顔色如故操欲學道左慈曰學道當清淨無為操怒謀殺之為設酒慈乞分杯飲酒時天寒温酒尚未熱慈拔簮以畫杯酒酒即中斷分為兩向慈飲其半送半與操操未即飲慈乞自飲飲畢以杯擲屋棟杯便懸著棟動搖似鳥飛之狀似欲落不落一坐矚目視杯已失慈所在操嘗㑹賓顧衆曰珍羞俱備所少呉江鱸魚耳慈求銅盆貯水以竹竿釣須臾引鱸出操曰一鱸不周坐席慈更餌釣沉之復引出皆三尺餘操膾之恨無蜀薑慈曰易得操恐近取之因曰吾前遣人到蜀買錦可報令增一端語頃即得薑還使報命後返騐問增錦之狀若符契也武陵桃源劉阮天台陶潜桃花源記云晉太元中武陵人捕漁縁溪行忘路之逺近忽逄桃花林夾岸數百步中無雜樹芳華鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源得一山山有小口髣髴若有光便捨舟從口入初極狹纔通人復行數十步豁然開朗土地平曠屋舎儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中徃來種作男女衣著悉如外人黄髮垂髫怡然自樂見漁人乃大驚問所從來具答之便邀還家為設酒殺雞作食村中咸來問訊自云先世避秦亂率妻子邑人來此絶境不復出遂與外人間隔問今是何世乃不知有漢無論魏晉此人為具言聞皆嘆惋餘人各復延至其家皆出酒食停數日辭去既出得其船便扶向路處處誌之及郡詣太守說太守即遣人隨徃尋向所誌遂迷不復得路續齊諧記漢明帝永平中剡縣有劉晨阮肇入天台山採藥迷失道路糧盡望山頭有桃共取食之如覺少徤下山得澗水飲之並澡洗望見蔓菁果從山後出次有一杯流出中有胡麻飯屑二人相謂曰去人不逺因過水行一里又度一山出大溪見二女顔容絶妙世未有便喚劉阮姓名如有舊喜問郎等來何晚因邀過家留館服飾精華東西各有牀帳帷設七寳瓔珞非世所有左右悉青衣端正都無男子須臾進胡麻飯山羊脯甚美又設甘酒有數十客將三五桃至云來慶女壻各出樂器歌調作樂日向暮仙女各還去劉阮就所邀女家止宿行夫婦之道留十五日求還女曰來此皆是宿福所招得與仙女交接流俗何所樂遂住半年天氣和適常如三二月百鳥哀鳴悲思求歸甚切女曰罪根未滅使君子如此更喚諸仙女共作歌吹送劉阮從此山洞口去不逺至大道隨其言得還家鄉並無相識鄉里怪異乃騐得七代子孫傳聞上祖入山不出不知何在既無親屬栖泊無所却欲還女家尋山路不獲至太康八年失二人所在王儉墜車禇淵落水南史齊司徒禇淵字彦囘因送湘州刺史王僧虔閣道壊落水僕射王儉驚跳下車謝超宗抵掌笑曰落水三公墜車僕射彦囘出水霑濕狼籍超宗先在僧虔舫抗聲曰有天道焉天所不容有地道焉地所不受投畀河伯河伯不受彦囘大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士儉字仲寳祖曇首父僧綽俱為侍中儉㓜篤學丹陽尹袁粲見之曰宰相之門栝柏豫章雖小已有棟梁氣矣終當任人家國事仕至中書監寡嗜欲惟以經國為事少有宰相志賦詩曰稷契匡虞夏伊周翼商周舊本儉作常誤也淵年十餘時父有牛墮井營救喧擾淵下簾不視有門生盜其衣淵見謂曰可宻藏之無令人知門生慚而去宋明帝時遷吏部尚書有人求官宻袖一餅金出示之曰人無所知淵曰卿自應得官無假此物若見與必相啓此人懼收金而去後為尚書令歸心齊髙帝帝立進位中書監世以名節譏之百姓語曰可憐石頭城寧為袁粲死不作彦囘生粲為司徒與尚書令劉彦節貳于高帝死其事季倫錦障春申珠履晉書石崇字季倫父苞位至司徒臨終分財物與諸子獨不及崇其母以為言苞曰此兒雖小後自能得為荆州刺史刼逺使商客致富不貲後拜衛尉財産豐積室宇宏麗後房百數皆曵紈綉珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釡崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂武帝每助愷嘗以珊瑚樹賜之高三尺許枝柯扶疎世所罕比愷以示崇崇以鐵如意擊碎愷聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條榦絶俗光彩耀目如愷比者甚衆愷恍然自失史記楚考烈王以黄歇為相封春申君是時齊有孟常君趙有平原君魏有信陵君方争下士招致賓客以相傾奪趙平原君使人於春申君春申君舎之於上舎趙使欲夸楚為瑇瑁簮刀劍室以珠玉飾之請命春申君客春申客三千餘人其上客皆躡珠履以見趙使趙使大慙甄后出拜劉楨平視魏志文帝甄后漢太保甄邯後袁紹為中子熈納之熈出為幽州后留奉姑及冀州平文帝納后於鄴魏畧曰鄴城破紹妻及后共坐皇堂上文帝入紹舎見紹妻及后后怖以頭伏姑膝上紹妻兩手自摶文帝謂曰劉夫人云何如此令新婦舉頭姑乃捧后令仰文帝就視見其顔色非凡稱嘆之太祖聞其意遂為迎取典畧曰太子嘗詣諸文學酒酣坐歡命夫人甄氏出拜坐人衆中皆咸伏而劉楨獨平視太祖聞之乃收楨減死輸作胡嬪爭摴晉武傷指晉書胡貴妃名芳父奮家世將門為鎮軍大將軍武帝多簡良家女以充内職自擇其美者以絳紗繫臂芳既入選下殿號泣左右止之曰陛下聞聲芳曰死且不畏何畏陛下拜為貴嬪時帝多内寵平呉後復納孫皓宫人數千掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宫人乃取竹葉揷戸以鹽汁洒地而引帝車然芳蒙幸殆有專房之寵侍御服飾亞於皇后帝嘗與之摴蒱爭矢遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛此非將種而何帝有慚色石慶數馬孔光温樹前漢石奮趙人孝文帝時官至大中大夫無文學恭謹無與比長子建次甲次乙次慶皆以馴行孝謹官至二千石景帝曰石君及四子皆二千石人臣尊寵迺舉集其門因號奮為萬石君慶武帝時為太僕御出上問車中幾馬慶以䇿數馬畢舉首曰六馬慶於兄弟最為簡易然猶如是後為丞相前漢孔光字子夏孔子十四世孫經學尤明以高第為尚書轉僕射尚書令凡典樞機十餘年有所言輒削草稿以為章主之過以奸忠直人臣大罪有所薦舉惟恐人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也光黙不應答以他語其不泄如是哀帝立拜丞相及王莽權盛稱宰衡光固辭位太后詔曰國之將興尊師而重傅其令太師毋朝十日一賜餐賜靈夀杖光凡為御史大夫丞相各再一為大司徒太傅太師歴三世居公輔位翟湯隱操許詢勝具晉書翟湯字道深潯陽人篤行純素廉潔不屑世事耕而後食永嘉末冦害相繼聞湯名德皆不敢犯鄉鄰賴之辟召不至子莊字祖休遵湯之操不交人物惟以弋釣為事及長不復獵或問漁獵同是害生何止去其一莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌呑鈎豈我哉時以為知言晚節亦復不釣徵命不就子矯亦有髙操屢辭辟命矯子法賜孝武以散騎徵不至世有隐行云舊注世説云許詢字𤣥度好游山澤而體便登陟時人曰許非徒有勝情有濟勝之具詢隱永興幽穴毎致四方詩之遺或謂許曰嘗聞山人乃似爾耳許曰筐篚包苴固當輕於天下之寳今本無載優旃滑稽落下厯數史記優旃秦倡朱儒善為笑言然合於大道秦始皇時置酒而天雨陛楯者皆沾寒旃哀之謂曰汝欲休乎我即呼女女應曰諾有頃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益幸雨立我雖短幸休居於是始皇使得半相代嘗欲大苑囿旃曰善多縱禽獸於其中冦從東方來令麋鹿觸之足矣始皇以故輟止二世立又欲漆其城旃曰佳哉漆城蕩蕩冦來不能上即欲就之易為漆耳顧難為䕃室二世笑而止前漢造太初厯方士唐都巴郡落下閎與焉都分天部而閎運算轉厯其法以律起厯曰律容一龠積八十一寸則一日之分也與長相終律長九寸百七十一分而終復三復而得甲子夫律隂陽九六爻象所從出也故黄鍾紀元氣謂之律律法也莫不取法焉賛曰厯數則唐都落下閎曼容自免子平畢娶前漢邴丹字曼容瑯琊人養志自修為官不肯過六百石輒自免去後漢向長字子平河内朝歌人隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢勅斷家事勿相關遂肆志遊五岳名山不知所終師曠清耳離婁明目吕氏春秋曰晉平公鑄為大鐘使工聽之皆以為調師曠曰不調請更鑄平公曰工皆以為調矣師曠曰後世有知音者譏其不調臣竊為君恥之至師涓果知鐘之不調是師曠欲善調鐘以為後之知音也莊子曰黄帝逰乎赤水之北而遺其𤣥珠使離朱索之即離婁也慎子曰離婁之明察毫末於百步之外仲文照鏡臨江折軸晉書殷仲文陳郡人轉尚書素有名望自謂必當朝政又謝琨之徒疇昔所輕者並皆比肩常怏怏不得志忽遷洛陽太守意彌不平後謀反伏誅仲文嘗照鏡不見其面數日而遇禍前漢臨江閔王榮景帝子立為太子廢為臨江王三歲坐侵廟壖地為宫徴榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置塜上百姓憐之欒巴噀酒偃師舞木神仙傳欒巴蜀郡人漢帝召為尚書正朝大㑹巴獨後到頗有醉色不飲而以酒望西南噀之有司奏巴大不敬詔問巴巴對曰臣鄉里以臣能治鬼䕶病為臣立廟今旦耆老皆入廟致饗是以來遲適臣本縣成都市失火臣噀酒為雨以滅火災詔原罪即遣使徃騐其因正旦失火食時有大雨從東北來火乃息雨皆酒氣後一旦大風天霧暝失巴所在尋問之旦日還成都與親戚別去而昇天矣巴字叔元見後漢列子曰周穆王西巡狩道有獻工人名偃師王問曰若有何能曰臣有所造願王觀之越日謁見王王曰若與偕來者何人耶對曰臣之所造能倡者王視之趨步俯仰信人也巧夫頷其頥則歌合律捧其手則舞應節千變萬化唯意所適王以為實人也與盛姬内御並觀之技將終倡者瞬其目而招王之左右侍妾王怒欲誅偃師偃師立剖散倡者以示王皆傅㑹革木􅑟漆白黑丹青之所為德潤傭書君平賣卜呉志闞澤字德潤越㑹稽人家世農夫至澤好學居貧無資常為人傭書以供紙筆所冩既畢誦讀亦遍追師論講究覽羣籍兼通厯數由是顯名仕孫權為中書令侍中太子太傅每朝大議經典所疑輒諮訪之以儒學勤勞封都鄉侯前漢嚴遵字君平蜀郡人修身自保非其服弗服非其食弗食卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善裁日閱數人得百錢足自養則閉肆下簾而授老子博覽無不通依老莊之指著書十餘萬言揚雄少時從遊學及雄仕京師數為朝廷在位賢者稱君平德年九十餘終叔寳玉潤彦輔氷清晉書衛玠字叔寳五歲風神秀發祖父瓘曰此兒行異於衆顧吾年老不見其成長耳玠舅驃騎將軍王濟雋秀有風姿毎見玠輒嘆曰珠玉在側覺我形穢又嘗語人曰與玠同遊宛若明珠之在側朗然照人玠妻父樂廣有海内重名議者以為婦翁氷清女壻玉潤晉書樂廣字彦輔年八歲夏侯𤣥見之謂其父曰廣神姿朗徹當為名士可令專學必能興卿門户衛瓘見而竒之命諸子造焉曰此人之水鏡見之瑩然若披雲霧而覩青天也王衍自言與人語甚簡及見廣便覺巳之煩其為識者歎美如此衛后髮鬒飛燕體輕張衡西京賦曰衛后興於鬒髮飛燕寵於體輕衛后前漢孝武帝皇后也字子夫其家號曰衛氏出平陽侯家初為平陽公主謳者武帝祓霸上還過主既飲謳者進帝獨悅子夫帝起更衣子夫侍尚衣軒中得幸主因奏子夫逆之宫子夫上車主撫其背曰行矣强飯勉之即貴願無相忘後生男據遂立為皇后而男為太子遭巫蠱事起江充為姦太子與后共誅充太子敗亡后自殺前漢飛燕孝成帝趙皇后也本長安宫人初生父母不舉三日不死遂收養之及壯屬陽阿主家學歌舞號曰飛燕帝嘗微行出過主作樂見而悅之召入宫大幸女弟後入俱為偼伃貴傾後宫立為皇后後寵少衰而弟絶幸為昭儀姊弟專寵十餘年皆無子及帝暴崩民閒歸罪昭儀昭儀自殺哀帝立尊后為皇太后帝崩見廢自殺西京雜記曰飛燕為皇后女弟在昭陽殿后體輕腰弱善行步進退昭儀不能及但弱骨豐肌尤工笑語二人並色如紅玉為當時第一𤣥石沈湎劉伶解酲博物志曰昔劉𤣥石於山中酒家酤酒酒家與千日酒忘言其節度歸至家當醉而家人不知以為死也權葬之酒家計千日滿乃憶𤣥石前日酤酒醉向醒耳徃視之云𤣥石之死三年已葬於是開棺醉始醒俗云𤣥石飲酒一醉千日晉書劉伶字伯倫沛國人放情肆志常以細宇宙齊萬物為心常乘鹿車攜一壺酒使人荷鍤隨之謂曰死便埋我其遺形骸如此常渴甚求酒於妻妻捐酒毁器泣涕諫曰君酒太過非攝生之道宜斷之伶曰善吾不能自禁當祝鬼神自誓可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽仍引酒御肉頺然復醉嘗醉與俗人相忤其人攘袂奮拳而徃伶徐曰雞肋不足以辱尊拳其人笑而止伶未嘗留意文翰著酒德頌一篇嘗為建威參軍太始初對䇿盛言無為之化時輩皆以高第得調伶獨以無用罷竟以夀終趙勝謝躄楚莊絶纓史記平原君趙勝趙之諸公子喜賓客賓客至者數千人相趙惠文王及孝成王三去相三復位家樓臨民家民家有躄者槃散行汲美人居樓上見大笑之明日躄者至門請曰士之不逺千里而來者以君能貴士而賤妾臣不幸有罷癃之病而君之後宫笑臣臣願得笑臣者頭勝笑應曰諾終不殺歲餘賓客稍稍引去者過半勝怪問之客曰以君不殺笑躄者為以愛色而賤士即去耳勝乃斬笑者頭自造躄者因謝焉後乃復來說苑曰楚莊王賜羣臣酒日暮酒酣燈燭滅有引美人之衣者美人援絶其冠纓告王趣火來王視絶纓者王曰賜人酒使醉絶禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不懽羣臣百餘人皆絶去其冠纓而止大盡懽而罷後晉與楚戰有一人常在前五合五獲首却敵卒勝之莊王怪問乃夜絶纓者顯報王也惡來多力蜚廉善走史記蜚廉生惡來惡來有力飛廉善走父子俱以材力事紂惡來蜚廉為諸侯武王伐紂并殺惡來是時蜚廉為紂居北方晏子春秋曰惡來手裂虎兕皇甫謐曰作石棺於北方趙孟疵面田駢天口舊註晉趙孟字長舒為尚書令史善清談面有疵㸃時人曰諸事不決問疵面七畧曰田駢齊人好談論時號曰天口駢言其口如天之不可窮也張慿理窟裴頠談藪晉書張慿字長宗呉郡人有志氣為鄉里所稱舉孝廉負其才自謂必參時彦初欲詣劉惔鄉里及同舉者共笑之既至惔處之下坐神意不接慿欲自發而無端㑹王濛就惔清言有所不通慿于末坐判之言㫖深逺足暢彼我之懐一坐皆驚惔延之上坐清言彌日留宿至旦遣之慿既還船須臾惔遣傳教覔張孝廉船召與同載遂言之于簡文帝帝召與語歎曰張慿勃窣為理窟官至御史中丞晉書裴頠字逸民司空秀之子𢎞雅有逺識博學稽古少知名中丞周弼見而歎曰頠若武庫兵縱横一時之傑也樂廣嘗與頠清言欲以理服之而頠辭語豐博廣笑而不言時人謂頠為言談之林藪累遷左僕射後為趙王倫所殺仲宣獨步子建八斗魏志王粲字仲宣山陽高平人除黄門侍郎以西京擾亂不就乃之荆州依劉表表以粲貌寢而體弱通侻不甚重也歸太祖累拜侍中曹植與楊修書曰今世作者可畧而言昔仲宣獨步于漢南孔璋鷹揚于河朔偉長増名于青土公幹振藻于海隅德璉發迹于大魏足下高視于上京當此之時人人自謂握靈蛇之珠家家自謂抱荆山之玉也孔璋陳琳字偉長徐幹字公幹劉楨字德璉應瑒字也魏志陳思王曹植字子建年十歲餘誦讀詩論及辭賦數十萬言善屬文太祖嘗視其文曰汝倩人耶植曰言出為論下筆成章奈何倩人時銅雀臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之毎進見難問應聲而對時見寵愛文帝即位累封陳王舊註引謝靈運云天下才共有一石子建獨得八斗我得一斗自古及今同用一斗茍不博敏安有繼之廣漢鉤距𢎞羊心計前漢趙廣漢字子都涿郡蠡吾人也遷京兆尹威名流聞其發奸摘伏如神政清吏民稱之不容口自漢興治京兆者莫能及為人强力天性精于吏職尤善為鉤距以得事情鉤距者設欲知馬賈則先問狗巳問羊復問牛然後及馬參伍其賈以類相準則知馬之貴賤不失實矣唯廣漢至精能行之他人效者莫能及郡中盜賊閭里輕俠其根株窟穴所在及吏交賕請求銖兩之姦皆知之後上書告丞相魏相事失實宣帝惡之下廣漢廷尉獄又坐賊殺不辜數罪吏民守闕號泣者數萬人或願代死竟坐要斬百姓追思歌之至今前漢桑𢎞羊雒陽賈人子武帝時以心計用事年十三侍中與𢎞農東郭咸陽孔僅三人者言利事析秋毫拜御史大夫昭帝時謀反伏誅衛青拜幕去病辭第前漢衛青字仲卿其父鄭季河東平陽人以縣吏給事侯家平陽侯曹夀尚武帝姊陽信長公主季與主家僮衛媪通生青青有同母兄衛長君及姊子夫子夫自平陽公主家得幸武帝故青冐姓衛氏給事建章後拜車騎將軍擊匃奴以功封長平侯元朔中將三萬騎出髙闕擊匃奴右賢王得其禆王十餘人衆男女萬五千餘人畜數十百萬引兵還至塞天子使使者持大將軍印即軍府拜青為大將軍諸將皆以兵屬立號而歸李廣傳註衛青征匃奴絶大漠大克獲帝就拜大將軍于幕中府故曰幕府前漢霍去病大將軍衛青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后立去病以后姊子年十八為侍中從大將軍征匃奴以功封冠軍侯驃騎將軍乃置大司馬位去病秩禄皆與青等去病為人少言不泄有氣敢徃上嘗欲教之孫呉兵法對曰顧方畧何如耳不至學古兵法上為治第令視之對曰匃奴未滅無以家為也上益重愛之酈寄賣友紀信詐帝前漢酈寄字況高陽人丞相商之子與吕禄善及高后崩大臣欲誅諸吕吕禄為將軍軍于北軍太尉周勃不得入乃使人刼商令寄詐禄禄信之與出游勃乃得入據北軍遂誅諸吕天下稱酈況賣友前漢紀信為將軍項羽圍漢王滎陽城信曰事急矣臣請誑楚可以間出於是夜出女子東門二千餘人楚兵四面擊之信乃乗王車黄屋左纛曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得與數十騎出西門遁羽見信問漢王安在曰已出去矣於是羽燒殺信濟叔不癡周兄無慧晉書王湛字處沖少有識度龍顙大鼻少言語初有隱德人莫能知兄弟宗族皆以為癡其父昶獨異焉闔門守静不交當世沖素簡淡器量隤然有公輔之望兄子濟輕之嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時看耳濟請言之因剖析𤣥理微妙有竒趣皆濟所未聞武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是又問濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上後仕至汝南内史左氏傳晉欒書中行偃使荀罃士魴逆周子於京師而立之是為悼公周子有兄無慧不辨菽麥故不可立杜預曰菽大豆豆麥殊形易別故不辨為癡者之候不慧蓋世所謂曰癡虞卿擔簦蘇章負笈史記虞卿游說之士躡蹻擔簦說趙孝成王一見賜黄金百鎰白璧一雙再見為趙上卿故號為虞卿前漢蘇章字游卿北海人去官不仕於王莽舊註蘇章負笈追師不逺千里南風擲孕商受斮涉晉惠帝賈皇后名南風父充位三公初武帝欲為太子取衛瓘女曰衛公女有五可賈公女有五不可衛家種賢而多子美而長白賈家種妬而少子醜而短黑元后固請荀顗荀勗並稱充女之美乃定婚南風妬忌多權詐太子畏惑之嬪御罕有進幸者性酷虐常手殺數人或以㦸擲孕妾子隨及墮地武帝怒將廢之荀朂等救得不廢及立為皇后遂荒淫放恣專制天下威服内外初誅楊駿及汝南王亮太保衛瓘楚王瑋等皆臨機專斷天下咸怨及太子廢趙王倫等因衆怒謀廢后后懼遂害太子以絶衆望倫乃率兵入宫廢之矯詔齎金屑酒賜死書太誓商王受斮朝涉之脛剖賢人之心廣德從橋君章拒獵前漢薛廣德字長卿沛郡相人以魯詩教授御史大夫蕭望之薦廣德經行宜充本朝為博士論石渠後拜御史大夫為人温雅有藴藉及為三公直言諫爭既而酧祭宗廟出便門欲御樓船廣德謂當乘輿免冠頓首曰宜從橋陛下不聽臣臣即自刎以血汙車輪陛下不得入廟矣上不悅光禄大夫張猛曰臣聞主聖臣直乗船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶乃從橋後乞骸骨賜安車駟馬黄金六十斤縣其安車傳子孫後漢郅惲字君章汝南西平人明天文厯數王莽時冦賊羣發惲至長安上書收繫詔獄勘以大逆猶以惲據經䜟難即害之使近臣脅令自告狂病不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能道㑹赦出乃南遁蒼梧建武中為上東城門候帝嘗出獵夜還惲拒關不開不受詔帝乃迴從東中門入明日惲上書諫曰昔文王不敢盤於游田以萬民為憂而陛下逺獵山林夜以繼晝其如社稷宗廟何書奏賜布百匹貶東中門候為參封尉再遷長沙太守應奉五行安世三篋後漢應奉字世叔汝南南頓人少聰明自為童兒時及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣録囚徒數百千人及還太守問之奉口說罪繫姓名坐狀輕重無遺脫時人竒之官至司𨽻校尉謝承書曰奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内門扇出半面視奉奉去後數十年於路見車匠識而呼之前漢張安世字子儒少以父湯任為郎用善書給事尚書精力於職休沐未嘗出武帝幸河東亡書三篋詔問莫能知唯安世識之具作其事後購求得書以相校無所遺失上竒其材擢為尚書令昭帝立為右將軍光禄勲封富平侯事武帝三十餘年忠信謹厚勤勞政事夙夜不怠宣帝時為大司馬車騎將軍安世為公侯食邑萬户身衣弋綈夫人自紡績家僮七百人皆有手技作事治産業貨殖富於霍光相如題柱終軍棄繻前漢司馬相如字長卿蜀郡成都人也少好讀書學擊劍名犬子既學慕藺相如之為人更名相如以貲為郎事景帝為武騎常侍非其好也病免家貧無以自業及卓文君奔後卓王孫分與財物為富人久之武帝召以為郎卭筰君長聞南夷與漢通得賞賜多願為内臣妾請吏比南夷拜相如中郎將建節徃使因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交驩王孫喟然嘆自以得使女尚長卿晚相如畧定西南夷卭筰冉駹斯榆之君皆請為臣妾除邊關益斥舊註蜀城北七里有昇仙橋相如題其柱曰大丈夫不乗駟馬車不復過此橋前漢終軍字子雲濟南人少好學以辨博能屬文聞於郡中年十八選為博士弟子步入關關吏與軍繻軍問以此何為吏曰為復傳還當合符軍曰丈夫西遊終不復傳還棄繻而去及為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也後擢諌大夫使南越自請願受長纓必羈南越王而致之闕下軍徃說越王王請舉國内屬其相吕嘉不欲内屬發兵攻殺其王及漢使者皆死軍死時年二十餘故世謂之終童孫晨藁席原憲桑樞三輔決録孫晨字元公家貧織席為業明詩書為京兆功曹冬月無被有藁一束暮卧朝收莊子曰原憲居魯環堵之室茨以生草蓬户不完桑樞甕牖上漏下濕匡坐而弦子貢乗大馬中紺而表素軒車不容巷徃見憲憲華冠縰履杖藜而應門子貢曰嘻先生何病憲曰無財物謂之貧學而不能行謂之病今憲貧也非病也子貢有慚色端木辭金鍾離委珠家語端木賜字子貢魯國之法贖人臣妾於諸侯者皆取金於府子貢贖之辭而不取金孔子聞之曰賜失之矣夫聖人舉事可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉何以相贖乎自今以後魯人不復贖人於諸侯後漢鍾離意字子阿㑹稽山隂人顯宗徵為尚書時交趾太守張恢坐贓千金伏法以資物没入大司農詔賜羣臣意得珠璣委地而不拜賜帝怪問對曰孔子忍渴於盜泉之水曾參囘車於勝母之閭惡其名也此贓穢之寳誠不敢拜帝嘆曰清乎尚書之言乃更以庫錢三十萬賜意轉僕射出為魯相以愛利為化人多殷富卒遺言上書陳昇平之世難以急化宜少寛假帝感傷其意詔賜錢二十萬季札挂劒徐穉置芻史記呉季札呉王夀夢季子也初使北過徐君徐君好季札劒口弗敢言季札心知之為使上國未獻還至徐徐君已死乃解其寳劒繫徐君冡樹而去從者曰徐君已死尚誰予乎季子曰不然始吾心已許之豈以死倍吾心哉札封於延陵故號延陵季子新序徐人嘉而歌之曰延陵季子兮不忘故脫千金之劒兮帶丘墓後漢徐穉字孺子豫章南昌人家貧常自耕稼非其力不食恭儉義讓所居服其德屢辭舉不就桓帝時陳蕃胡廣上疏薦之備禮徵不至嘗為太尉黄瓊所辟瓊卒乃徃設雞酒薄祭哭畢而去不告姓名時㑹者郭林宗等聞之疑其穉也遣茅容追及之共言稼穡之事臨訣謂容曰為我謝林宗大樹將顛非一繩所維何為栖栖不遑寧處及林宗有母憂徃弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之朱雲折檻申屠斷鞅前漢朱雲字游魯人也容貌甚壯以勇力聞好倜儻大節當世髙之舉方正為槐里令坐廢錮成帝時張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐臣願賜上方斬馬劒斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已後當治殿檻上曰勿易因而輯之以旌直臣雲自後不復仕後漢申屠剛字巨卿扶風茂陵人丞相嘉七世孫剛性方直常慕史鰌汲黯之為人平帝時舉賢良方正對䇿王莽令元后下詔罷歸建武七年徵拜侍御史遷尚書令光武嘗欲出遊剛以隴蜀未平不宜宴安逸豫諌不見聽遂以頭觸乘輿帝遂為止以數切諫尖㫖出為平隂令復拜大中大夫舊注云以刀斷馬鞅未詳所出剛轉作綱衛玠羊車王恭鶴􅌁晉書衛玠摠角乗羊車入市見者以為玉人觀者傾都拜太子洗馬以天下亂移家南行至豫章時王敦鎮豫章長史謝鯤雅重玠相見欣然言論彌日敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒玠嘗以人有不及可以情恕非意相干可以理遣故終身不見喜愠色玠以敦豪爽不羣好居物上恐非忠臣求向建業京師人士聞其姿容觀者如堵㑹卒時謂之看殺晉書王恭字孝伯太原晉陽人少有美譽清操過人自負才地高華有宰輔之望為佐著作郎嘆曰仕宦不為宰相才志何足以騁累遷安北將軍為㑹稽王道子所害恭美姿儀人多愛悅或目之云濯濯如春月栁嘗披鶴氅裘涉雪而行孟昶窺見曰此真神仙中人也恭為性不𢎞闇於機㑹尤信佛法臨刑猶誦佛經管仲隨馬倉舒稱象韓非子曰管仲隰朋從桓公伐孤竹春徃冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而有水乃掘地遂得水以管仲隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚必師聖人之智不亦過乎魏志鄧哀王沖字倉舒武帝子少聰察岐嶷五六歲有若成人之智時孫權曾致巨象太祖欲知其斤重訪之羣下莫能出其理沖曰置象大船之上而刻其水痕所至稱物以載之則校其可知矣太祖大悅即施行焉時軍國多事用刑嚴重凡罪應戮而為沖微所辨理賴以濟宥者前後數十太祖數對羣臣稱述有欲傳後意㑹卒丁蘭刻木伯瑜泣杖孝子傳丁蘭事母孝母亡刻木為母事之蘭婦誤以火燒母面應時髮落如割說苑伯瑜有過其母笞之泣母曰他日笞未嘗泣今泣何也對曰他日得罪笞常痛今母之力不能痛是以泣十二國史俞作瑜陳逵豪爽田方簡傲世說爽豪篇晉陳逵字道林住西岸都下諸人共邀至牛渚陳善言理諸人欲共言折陳陳以如意拄頰望雞籠山嘆曰昔孫伯符志業不遂於是竟坐不得談伯符孫䇿字史記魏文侯伐中山使子擊守之子擊逄文侯之師田子方於朝歌引車避下謁子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脫躧然奈何其同之哉子擊不懌而去黄向訪主陳實遺盜後漢黄向豫章人嘗行於路拾得金囊乃訪主還之後漢陳實字仲弓潁川許人少作縣吏為都亭刺史佐志好學坐立誦讀縣令竒之聽受業太學後除太丘長修德清靜百姓以安吏白欲禁訟者實曰訟以求直禁之理將何伸卒無訟者去官吏人追思之在鄉閭平心率物有爭訟輒求判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短時歲荒有盜夜入其室止於梁上實隂見之呼子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以成性遂至於此梁上君子是矣盜大驚自投於地稽顙歸罪實曰視君狀貌不似惡人當由貧困令遺絹二匹自是一縣無盜後累命不起卒於家海内赴者三萬餘人制衰麻者以百數共刋石立碑謚文範先生龎儉鑿井隂方祀竈風俗通龎儉亡其父隨母流落後居盧里鑿井得銅遂富因求奴得老蒼頭於家數日蒼頭自言堂上母自我婦聞乃問之奴曰婦艾氏女字阿宏右足下有黑子右腋下有赤誌如半櫛大母曰我翁也遂為夫婦如初時人曰盧里龎公鑿井得銅買奴得翁後漢隂識字次伯南陽新野人光烈皇后兄封原鹿侯顯宗時拜執金吾位特進其先出自管仲世承其祀謂為相君宣帝時隂子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黄羊因以祀之自是暴至巨富田有七百餘頃輿馬僕𨽻比於邦君子方常言我子孫必將强大至識三世而遂繁昌故後常以臘日祀竈薦黄羊焉韓夀竊香王濛市㡌晉書韓夀字德真南陽堵陽人美姿貌善容止賈充辟為司空掾每燕賓寮其女輒於青瑣中窺之見夀悅焉女大感想發於寤寐婢後徃夀家具說女意并言其女光麗艷逸端美絶倫夀聞而心動令為通殷勤婢以白女女遂潜修音好厚相贈結呼夀夜入夀踰垣而至家中莫知時西域有貢竒香一著人經月不歇帝甚貴之唯賜充及大司馬陳騫其女宻盜以遺夀寮屬聞其芬馥稱之於充充意知女與夀通即以妻焉官至散騎常侍河南尹晉書王濛字仲祖太原晉陽人哀靖皇后父也少放縱不羈不為鄉曲所齒晚節始克己勵行有風流美譽善𨽻書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒耶居貧帽敗自入市買之嫗悅其貌遺以新㡌時人以為達終司徒長史勾踐投醪陸抗嘗藥古列女傳楚子發攻秦軍絶糧士卒升分菽粒而食之子發朝夕芻豢黍梁大破秦軍而歸其母閉門而不内使人數之曰子不聞越王勾踐之伐呉與客有獻醇酒一器者王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗糒者王又以賜軍軍士分而食之甘不足踰嗌而戰自十也今子為將士卒升分菽粒子獨芻豢黍梁何也子非吾子無入吾門子發謝其母然後内之呉志陸抗字㓜節丞相遜次子為呉將時晉平南將軍羊祜鎮南夏石城以西盡為晉有降者不絶祜增修德信以懐初附呉人悅服稱羊公不名祜與抗相對使命交通抗稱祜德量雖樂毅諸葛孔明不能過也抗嘗病祜遺之藥抗服之無疑心人多諫抗抗曰羊祜豈酖人者時以為華元子反復見於今抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫皓聞以詰抗抗曰一鄉一邑不可無信義況大國乎臣不如此正足彰其德於祜無傷也抗終大司馬荆州牧孔愉放龜張顥墮鵲晉書孔愉字敬康㑹稽山隂人與同郡張茂偉康丁潭世康齊名時人號曰㑹稽三康建興初出為丞相掾後以討華軼功封餘不亭侯愉嘗行經餘不亭見賣龜於路者愉買而放之溪中龜中流顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愉乃悟遂佩焉博物志張顥為梁相新雨後有鳥如山鵲飛翔近地市人擲之墮地民爭取之即為一圓石顥令摧破之得一金印文曰忠孝侯印顥字智伯常山人漢靈帝時為太尉田豫儉素李恂清約魏志田豫字國譲漁陽雍奴人齊王時領并州刺史外胡聞其威名相率求獻州界寧肅百姓懐之徵為衛尉屢乞遜位司馬宣王以為豫克壯書喻未聽豫章答曰年過七十而居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固稱疾拜太中大夫食卿禄豫清約儉素賞賜散之將士每胡狄私遺簿藏官不入家家常貧匱雖殊類咸高豫節後漢李恂字叔英安定臨涇人拜御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落悉封奏上肅宗嘉之拜兖州刺史以清約率下嘗席羊皮服布被後遷武威太守歸鄉潜居山澤結草為廬與諸生織席自給歲荒司空張敏司徒魯恭饋糧悉無所受徙居新安闗下拾橡實以自資年九十六卒義縱攻剽周陽暴虐前漢義縱河東人少時嘗與張次公俱攻剽為羣盜縱有姊以醫幸王太后上拜縱為中郎遷長安令直法行治不避貴戚遷河内都尉至則誅滅其豪穰氏之屬道不拾遺為南陽太守破碎甯成家徙定襄太守至則掩其獄中重罪一切捕鞫殺四百餘人郡中不寒而栗時趙禹張湯為九卿然其治尚寛輔法而行縱以鷹擊毛摯為治後以廢格沮事棄市前漢周陽由景帝時為郡守武帝立由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之所居郡必夷其豪為守視都尉如令為都尉陵太守奪之治後為河東都尉與守爭權棄市孟陽擲瓦賈氏如臯晉書張載字孟陽安平人性閑雅博學有文章父收為蜀郡太守太康初至蜀省父道經劍閣載以蜀人恃險好亂因著銘以作誡益州刺史張敏竒之表上其文武帝遣使鐫之於劒閣山焉仕至中書侍郎載甚醜毎行小兒以瓦石擲之委頓而反左氏傳曰叔向適鄭鬷蔑惡欲觀叔向從使之收器者而徃立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手而上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑顔囘簞瓢仲蔚蓬蒿論語一簞食一瓢飲在陋巷人不堪其憂囘也不改其樂賢哉囘也高士傳張仲蔚扶風平陵人明天官博物善屬文好詩賦常居窮素所處蓬蒿没人閉門養性不治名利清高時人莫知惟劉龔知之終身不仕三輔重焉麋竺收資桓景登高蜀志麋竺字子仲東海朐人仕先主累拜安漢將軍搜神記曰竺嘗從洛歸未達家數十里路見婦人從竺求寄載行可數里婦謝去謂竺曰我天使也當徃燒東海麋竺家感君見載故以相語竺因私請之婦曰不可得不燒君可馳去我當緩至日中火發竺乃還家遽出財物日中而火大發續齊諧記汝南桓景隨費長房遊學累年長房謂之曰九月九日汝家當有災厄急宜去令家人各作絳囊盛茱萸以繫臂登高山飲菊酒此禍可消景如言登高夕還見雞犬牛羊一時暴死長房聞之曰代之矣今世人毎至九日登山飲菊酒帶茱萸囊是也雷煥送劒吕虔佩刀晉書初呉之未滅斗牛間嘗有紫氣道術者皆以呉方强盛未可圖惟張華以為不然及呉平紫氣愈明華聞豫章雷煥妙達緯象乃要煥宿屏人共尋天文登樓仰觀煥曰斗牛間有異氣寳劒之精上徹於天耳華問在何郡曰在豫章豐城華即署煥為豐城令煥到縣掘獄屋基得石函中有雙劒並刻題一曰龍泉一曰太阿其夕氣不復見煥遣使送一與華留一自佩或曰得兩送一張公可欺乎煥曰本朝將亂張公當受其禍此劒當繫徐君墓樹耳靈異之物終當化去華得劒報煥書曰詳觀劒文乃干將也莫邪何不至雖然天生神物終當合耳華誅失劒所在煥卒子華為州從事持劒行經延平津忽於腰間躍出墮水使人没水取之不見劒但見兩龍各長數丈蟠縈有文章没者懼而反須臾光彩照水波浪驚沸於是失劒魏志吕虔字子恪任城人遷徐州刺史請王祥為別駕民事一以委之世多其能任賢初虔有佩刀工相之以為登三公可服此刀虔謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥為三公臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多賢才興於江左老萊斑衣黄香扇枕高士傳老萊子楚人少以孝行養親極甘脆年七十父母猶存萊子服斑斕之衣為嬰兒戱於親前言不稱老為親取食上堂足跌而偃為嬰兒啼誠至發中楚室方亂乃隱耕於蒙山之陽著書號老萊子莫知所終舊註云著五色斑斕之衣出列女傳今文無載後漢黄香字文强江夏安陸人博學經典究精道術能文章京師號曰天下無雙江夏黄童官至尚書令魏郡太守陶淵明曰香九歲失母思慕骨立事父母竭力致養冬無被袴而盡滋味暑則扇床枕寒則以身温席和帝嘉之特加異賜王祥守柰蔡順分椹晉書王祥字休徵琅邪臨沂人性至孝繼母朱氏不慈而祥愈恭謹母有疾衣不解帶湯藥必親嘗母嘗欲生魚時天寒氷凍祥解衣將剖氷求之氷忽自解雙鯉躍出母又思黄雀炙復有黄雀數十飛入其幕鄉里驚嘆以為孝感所致有丹柰結實母命守之每風雨輒抱樹而泣篤孝純至如此漢末遭亂扶母攜弟避廬江隱居三十年不應州郡辟命年衰耳順乃應召舉秀才累遷太尉武帝拜太保後漢蔡順字君仲汝南人少孤養母母終未葬里中災火將逼其舎伏棺號哭呌天遂越燒他室太守韓崇召為東閣祭酒母平生畏雷自亡後每有雷震輒圍冢泣曰順在此崇聞輒差車馬到墓所後舉孝廉不就舊註云王莽末天下大荒順拾椹赤黑異器盛之赤眉見而問之順曰黑者奉母赤者自食賊知其孝乃遺米二斗牛蹄一隻淮南食時左思十稔前漢淮南王安高祖之孫好書鼓琴不喜弋獵狗馬馳騁亦欲以行隂德撫循百姓流名譽招致賓客方術之士數千人作為内外書又有中篇言神仙黄白之術武帝時好藝文以安屬為諸父辯博善為文辭甚尊重之毎為報書及賜常召司馬相如等視草乃遣安初入朝使為離騷傳旦受詔食時上每宴見談説得失及方技賦頌昏暮然後罷後謀反自殺晉書左思字太沖齊國臨淄人貌寢口訥而辭藻壯麗造齊都賦一年乃成復欲賦三都乃詣著作郎張載訪岷卭之事遂搆思十年門庭藩溷皆著筆紙遇得一句即便疏之自以所見不博求為祕書郎及賦成時人未之重自以其作不謝班張以示皇甫謐謐稱善為其賦序張載為注魏都劉逵注呉蜀而序之張華見曰班張之流也於是競相傳寫洛陽為之紙貴初陸機欲為此賦聞思作撫掌而笑與弟雲書曰此間有傖父欲作三都賦須其成當以覆酒甕耳及思賦出機嘆服以為不能加遂輟筆焉劉惔傾釀孝伯痛飲晉書何充字次道廬江灊人康帝時為中書監録尚書事充能飲酒雅為劉惔所貴惔毎云見次道飲令人欲傾家釀言其能温克也舊本惔作恢誤世說王孝伯曰但痛飲酒讀離騷便可稱名士女媧補天長房縮地淮南子曰徃古之時四極廢九州裂天不兼覆墬不周載火爁炎而不滅水浩洋而不息猛獸食顓民鷙鳥攫老弱於是女媧鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟冀州積蘆灰以止淫水蒼天補四極正淫水涸冀州平蛟蟲死顓民生後漢費長房既遇仙翁欲求道而顧家人為憂翁乃斷一青竹度與長房身齊使懸之舎後家人見即其形也以為縊死遂葬之長房隨入深山羣虎中留使獨處長房不恐又卧於空室以朽索懸萬斤石於心上衆蛇來齧索且斷長房亦不移翁曰子可教也復使食糞糞中有蟲臭甚長房意惡之翁曰子幾得道恨此不成長房辭歸翁與一竹杖曰騎此任所之則自至既至可以杖投葛陂中又為作一符曰以此主地上鬼神長房乗杖須臾來歸自謂去家適經旬日已十餘年矣即以杖投陂顧視則龍也遂能醫療衆疾鞭笞百鬼後失其符為衆鬼所殺季珪士首安國國器魏志崔琰字季珪河東武城人遷中尉甚有威望朝士瞻仰太祖亦敬憚焉明帝時崔林嘗與陳羣論冀州人士稱琰為首琰從弟林少無名望雖姻族猶輕之琰常曰大器晚成終必逺至孫禮盧毓始入軍府琰曰孫疏亮亢烈剛簡能斷盧清警明理百錬不消皆公才也後咸至鼎輔前漢韓安國字長孺梁成安人徙睢陽事梁孝王為中大夫後坐法抵罪獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之無何漢使使者拜内史起徙中為二千石田甲亡安國曰甲不就官我滅而宗甲肉袒謝安國曰公等足與治乎卒善遇之為人多大畧知足以當世取舎而出於忠厚貪嗜財利然推舉皆廉士賢於己者士亦以此稱之唯天子以為國器官至御史大夫行丞相事陸玩無人賈詡非次晉書陸玩字士瑤呉人器量淹雅累轉尚書散騎常侍尋而王導郗鑒庾亮相繼薨朝野以為三良既没以玩有德望乃遷司空既而歎息謂賓客曰以我為三公是天下為無人談者以為知言玩翼亮累世常以𢎞重為人主所貴嘉性通雅不以名位格物誘納後進謙禮布衣由是縉紳之徒莫不廕其德宇魏志賈詡字文和武威姑臧人少時人莫知唯閻忠異之謂詡有良平之竒後拜尚書與選舉多所匡濟文帝時為太尉荀朂別傳曰晉司徒闕武帝問朂答曰三公具瞻所歸不可用非其次昔魏文帝用賈詡孫權笑之何晏神伏郭弈心醉魏志王弼山陽人好論儒道辭才逸辨注易及老子年二十餘卒何邵為其傳曰弼父業為尚書郎時裴徽為吏部郎弼未冠徃造焉徽一見異之問曰夫無者誠萬物之所資然聖人莫肯致言而老子申之無巳者何弼曰聖人體無無又不可以訓故不說也老子是有者也故常言無所不足何晏為吏部尚書甚竒弼嘆曰仲尼稱後生可畏若斯人者可與言天人之際乎舊云神伏出世說無載晉郭弈字大業太原陽曲人高爽有識量多所推先見阮咸心醉不覺歎焉山濤稱其高簡有雅量太康中為尚書有重名朝臣皆出其下常林帶經高鳯漂麥魏志常林字伯槐河内温人避地上黨耕種山阿當時旱蝗林獨豐收盡呼比隣升斗分之仕至光禄大夫魏畧曰林少單貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻餉之雖在田野相敬如賓後漢高鳯字文通南陽葉人家以農為業鳯專精誦讀晝夜不息妻嘗之田曝麥於庭令鳯䕶雞天雨暴至而鳯持竿誦經不覺潦水流麥妻還怪問方悟後為名儒年老執志不倦太守連召請恐不得免乃詐為寡嫂訟田後舉直言到公車託病隱身漁釣孟嘉落㡌庾敳墮幘晉書孟嘉字萬年江夏人少知名為征西桓温叅軍甚重之九月九日温燕龍山寮佐畢集時佐吏並著戎服有風至吹嘉㡌墮落嘉不之覺温使左右勿言欲觀其舉止嘉良久如厠温令取還之命孫盛作文嘲嘉著嘉坐嘉還見即答之其文甚美嘉好酣飲愈多不亂温問酒有何好而卿嗜之嘉曰公未得酒趣耳又問聽妓絲不如竹竹不如肉何也答曰漸近使之自然晉書庾敳字子嵩潁川鄢陵人長不滿七尺而腰帶十圍雅有逺韻參東海王越軍事轉軍諮祭酒時劉輿見任於越人士多為所構惟敳縱心事外無迹可問後以其性儉家富說越令就換錢千萬冀其有吝因此可乗越於衆坐中問敳敳頺然已醉幘墮几上以頭就穿取徐答云下官家故有兩千萬隨公所取輿於是乃服越甚悅因曰不可以小人之慮度君子之心後石勒亂被害龍逄板出張華台坼舊注引論語隂嬉䜟曰庚子之日金板剋書出地庭中曰臣族虐主禽宋均曰謂殺關龍逄之後庚子之旦庭中地有此板異也龍同姓稱族虐主主殺我必見禽也晉書張華字茂先范陽方城人學業優博辭藻温麗器識𢎞廣初未知名著鷦鷯賦阮籍見之曰王佐才也由是聲名始著晉受禪拜黄門侍郎華强記黙識四海之内若指諸掌武帝嘗問漢宫室制度應對如流聽者忘倦數歲拜中書令賛成伐呉之計封廣武縣侯名重一世衆所推服聲譽益甚有台輔之望惠帝時拜中書監盡忠匡輔彌縫補闕雖當闇主虐后之朝而海内晏然華之功也進司空第舎及省監數有妖怪少子韙以中台星拆勸華退位華不從曰天道𤣥逺惟修德以應耳不如靜以待之以俟天命卒之以忠正為趙王倫孫秀矯詔害之朝野悲痛華好人物士有一介之善為之延譽雅愛書籍嘗徙居載書三十乗天下竒祕世所希有者悉在華所博物洽聞世無與比董奉活燮扁鵲起虢神仙傳董奉字君異侯官人杜燮為交州刺史得毒病死三日奉時在南方乃以三丸藥内其口中令人舉其頭逍遙之食頃燮開目動手足顔色還半日能起坐遂活還廬山下居為人治病不取錢物使病愈者為種一株杏數年有數十萬株鬰然成林杏子大熟奉於林中作倉宣語欲買杏者但自取之一器穀得一器杏毎穀少而杏多者有虎逐之有偷杏虎逐齧死家人知送杏還死者即活自是買杏者自平量量之不敢欺奉以所得糧穀賑救貧窮供給行旅民間僅百年乃昇天顔色常如年三十時也史記扁鵲勃海鄭人姓秦名越人少時長桑君竒之出其懐中藥予之飲乃悉取其禁方書予之忽然不見扁鵲以此視病盡見五臟癥結特以診脈為名耳後過虢虢太子死扁鵲曰臣能生之乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之熨以八減之齊和煮之以更熨兩脅下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人過邯鄲聞貴婦人即為帶下醫過洛陽聞周人愛老人即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦大醫令李䤈自知技不如扁鵲使人刺殺之至今言脈者由扁鵲冦恂借一何武去思後漢冦恂字子翼上谷昌平人光武拜恂河内太守行大將軍事謂曰昔高祖留蕭何鎮關中今吾委公以河内堅守轉運給足軍糧卒厲士馬防遏他兵勿令北度而已後拜潁川太守入為金吾明年潁川盜賊起帝謂曰潁川近迫京師當以時定惟念獨卿能卒平之耳從九卿復出以憂國可知也即日車駕南征從至潁川賊盜悉降而竟不拜郡百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏民受納餘降恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾自士大夫以致此可獨享乎時人歸其長者以為有宰相器前漢何武字君公蜀郡郫人舉賢良對䇿拜諫大夫成帝時累進大司空為人仁厚好進士奬稱人善為楚内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷世以此多焉然疾朋黨問文吏必於儒者問儒者必於文吏以相參撿欲除吏先為科例以防請託其所居亦無赫赫名去後常見思後為御史大夫免官王莽為宰衡隂誅不附己者見誣自殺兩龔謂勝舎兩唐謂林遵也韓子孤憤梁鴻五噫史記韓非韓之諸公子也喜刑名法術之學歸本於黄老為人口吃不能道說而善著書與李斯俱事荀卿非見韓之削弱數以書諫韓王王不能用於是觀徃者得失之變作孤憤五蠧内外儲說林說難十餘萬言人或傳其書至秦秦王見之曰寡人得見此人與之游死不恨矣後非使秦秦王悅之未信用李斯毁之王下吏治非斯使人遺藥使自殺後漢梁鴻受業太學家貧尚節介博覽不為章句歸鄉里勢家慕其高節多欲女之鴻並不娶後娶孟氏隱霸陵山中以耕織為業詠詩書彈琴以自娯因東出闗過京師作五噫之歌曰陟彼北邙兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓名居齊魯之間遂至呉依大家臯伯通居廡下為人賃舂每歸妻為具食不敢鴻前仰視舉案齊眉伯通異之曰彼傭能使其妻敬之如此此非凡人也乃舎之於家鴻潜閉著書十餘篇卒於呉蔡琰辨琴王粲覆棋後漢蔡琰字文姬中郎將邕之女博學有才辯妙於音律舊註云琰年九歲時邕夜鼓琴絃絶琰曰第二絃邕故絶一絃以問之琰曰第四弦邕曰爾偶中耳琰曰昔季札觀風知國之存亡師曠吹律識南風之不競以此推之何不知也魏志王粲累拜侍中博物多識問無不對與人共行讀道邊碑人問曰卿能闇誦乎曰能因使背而誦之不失一字觀人圍棋局壊粲為覆之棋者不信以帕蓋局使更以他局為之用相比校不誤一道其强記黙識如此性善算作算術畧盡其理善屬文舉筆便成無所改定時人以為宿搆然正復精意覃思亦不能加也典畧曰粲既才高辨論應機鍾繇王朗等雖為卿相至於朝廷奏議皆閣筆不能措手西門投巫何謙焚祠史記魏文侯時西門豹為鄴令豹到問民所病苦長老曰苦為河伯娶婦以故貧俗語不為河伯娶婦水來漂没溺其人民豹曰至時幸來告吾亦徃送女至其時豹徃㑹河上三老官屬豪長者里父老皆㑹其巫老女子從弟子女十人皆衣繒單衣立大巫後豹呼河伯婦視之曰是女不好煩大巫嫗為報河伯更求好女使吏卒抱大巫嫗投之河中有頃曰何久也弟子趣之凡投三弟子豹曰巫嫗女不能白事煩三老為入白之覆投三老河中豹簮筆磬折嚮河立良久又曰三老不還欲使廷掾與豪長者一人入趣之皆叩頭流血豹曰狀河伯留客之久若皆罷去吏民大驚恐從是不敢復言河伯娶婦豹即發民鑿十二渠引河水灌田皆得水利民人足富豹名聞天下澤流後世晉書何謙字恭子東海人從謝𤣥征伐驍果多權畧舊註云謙不畏神祠遇有靈廟皆焚之孟嘗還珠劉昆反火後漢孟嘗字伯周㑹稽上虞人為合浦太守郡不産穀實而海出珠寳與交阯比境常通商販貨糴糧食先時宰守並多貪穢詭人採求不知紀極珠漸徙於交阯郡界行旅不至人物無資貧者死餓於道嘗到官革易前弊求民病利未踰歲去珠復還百姓皆反業商貨流通稱為神明徵還吏民攀車請之乃夜遁去隱處自耕鄰縣士民慕德就居止者百餘家後漢劉昆字桓公陳留東昏人建武初除江陵令縣連年火災昆輒向火叩頭多能降雨止風稍遷𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝異之徵為光禄勲詔問昆前在江陵反風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳左右笑其質訥帝嘆曰此長者之言命書諸䇿姜肱共被孔融讓果後漢姜肱字伯淮彭城廣戚人與弟仲海季江俱以孝行著聞其友愛天至嘗共卧起肱博通五經兼明星緯士之就學者三千餘人二弟名聲相次皆不應徵聘肱嘗與季江夜遇盜欲殺之兄弟更相爭死遂兩釋焉桓帝徵不至使畫工圖其形狀肱卧以被韜面竟不得見之後隱遁逺浮海濱竄伏賣卜給食還卒於家弟子劉操頌德謝承書曰肱性篤孝繼母年少嚴厲肱感凱風之孝兄弟同被而寢不入房室以慰母心後漢孔融字文舉魯國人孔子二十世孫幼有異才十歲隨父詣京師時河南尹李膺簡重不妄接士自非當世名人及與通家皆不得白融造門曰我是李君通家子弟門者言之膺請融問曰髙明祖父嘗與僕有恩舊乎融曰然先君孔子與老君同德比義而相師友則融與君累世通家衆坐嘆息大中大夫陳煒後至曰夫人小而聰了大未必竒融曰觀若所言將不早慧乎膺大笑曰髙明必為偉器融家傳曰兄弟七人融第六四歲時與諸兄共食梨棗輒引小者人問其故答曰我小兒法當取小者由是宗族竒之端康相代亮陟隔坐三輔決録韋康字元將京兆人父端從涼州牧徵為太僕康代為涼州刺史時人榮之孔融嘗與端書曰前日元將來淵才亮𢎞雅度量毅偉世之器也昨日仲將又來懿性貞實文愍篤誠保家之主也不應雙珠近出老蚌仲將名誕有文才善屬辭章官至光禄大夫呉録紀陟字子上丹陽人呉主孫休時其父亮為尚書而陟為中書令毎朝㑹詔以屏風隔其坐舊註引宣城記云隔以雲母屏風陟誤作隲趙倫瘤怪梁孝牛禍晉書趙王倫字子彞宣帝第九子拜車騎將軍諂事中宫大為賈后所親信嬖人孫秀搆害愍懐太子遂廢賈后為庶人倫矯詔自為使持節大都督中外諸軍事秀封大郡據兵權百官總已聽於倫倫素庸下無智䇿受制於秀秀威權振朝廷天下皆事秀無求於倫秀起自琅邪小吏累官於趙國以諂媚自達既執權衡遂恣其姦謀多殺忠良以逞私欲倫僣即帝位以秀為中書監驃騎將軍同謀者超越階次奴卒厮役亦加爵位每朝㑹貂蟬盈坐時人諺曰貂不足狗尾續倫祀太廟遇大風飄折麾蓋時有雉入殿中又於殿中得異鳥問皆不知名累日向夕宫中有素衣小兒言是服劉鳥倫使録小兒并鳥閉置牢室明日開視户扃如故並失所在倫目上有瘤時以為妖惠帝復位賜死前漢梁孝王武文帝子景帝初入朝是時上未置太子與王宴飲從容言曰千秋萬歲後傳於王王心内喜復入朝入則侍帝同輦出則同車遊獵上林中及廢太子太后心欲以王為嗣大臣及袁盎等有所關說於帝王怨盎隂使人刺殺之上由此怨望於王益疎之後入朝欲留弗許歸國意不樂北獵梁山有獻牛足上出背上王惡之病薨王未死時財巨萬及死藏府黄金尚四十餘萬斤他財物稱是賛曰怗親亡厭牛禍告罰桓典避馬王尊叱馭後漢桓典字公雅沛郡龍亢人太傅榮𤣥孫拜侍御史時宦官秉權典執正無所迴避常乗騘馬京師畏憚為之語曰行行且止避騘馬御史後以忤宦官七年不調獻帝時為光禄勲前漢王尊字子贛涿郡南陽人少孤牧羊澤中勤學問能史書畧通尚書論語大義及為益州刺史先是王陽為刺史行部至卭郲九折阪嘆曰奉先人遺體奈何數乗此險後以病去及尊為刺史至其阪問曰此非王陽所畏道耶曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣居部二歲懐來徼外蠻夷歸附其威信後為東郡太守河水盛溢泛浸瓠子金隄尊躬率吏民投沉白馬請以身填金隄而水波稍却迴還吏民奏狀天子嘉之秩中二千石賜黄金二十斤卒於官吏民紀之舊本尊誤作遵鼂錯陗直趙禹廉倨前漢鼂錯潁川人學申商刑名以文學為太常掌故錯為人陗直刻深孝文時舉賢良對䇿高第遷中大夫孝景帝時為御史大夫請諸侯之罪過削其支郡所更令三十章諸侯讙譁呉楚七國俱反以誅錯為名上問袁盎盎素不好錯對曰方今計獨有斬錯赦七國復其故地則兵可無血刃而俱罷上黙然曰顧誠何如吾不愛一人謝天下後丞相等劾奏錯欲疏羣臣大逆無道當要斬使中使召錯紿載行市錯衣朝衣斬東市前漢趙禹斄人武帝時以刀筆吏積勞遷御史至中大夫與張湯論定律令作見知吏傳相監司以法盡自此始為人廉倨為吏以來舎無食客公卿相造請禹終不行報謝務在絶知友賓客孤立行一意而已嘗中廢己為廷尉以夀卒羞懿巾幗紿操匕箸晉書諸葛亮帥衆十餘萬壘於郿之渭水南原天子遣護軍秦朗督步騎三萬受宣帝節度朝廷以亮逺冦利在急戰毎命帝持重以候其變亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣衛尉辛毗仗節以制之亮復挑戰帝將出兵以應之毗仗節而立軍門帝乃止對壘百餘日㑹亮卒先是亮使至帝問諸葛公食可幾米對曰三四升又問政事曰二十罰已上皆自省覽帝曰其能久乎竟如其言漢晉春秋曰楊儀等整軍而出百姓奔告宣王王追焉姜維令儀反旗鳴鼓若將向宣王者王乃退不敢逼於是儀結陣而去入谷然後發喪宣王之退百姓諺曰死諸葛走生仲達或以告王王曰吾便料生不便料死也蜀志先主涿郡涿縣人也西漢景帝子中山靖王勝之後少孤與母販履織席為業舎東南角籬上有桑樹生髙五丈餘遙望見童童如小車蓋或謂當出貴人先主少時與諸小兒於樹下戲言吾必當乗此羽葆蓋車先主垂手下膝顧自見耳好交結豪俠年少爭附之靈帝末黄巾起州郡各舉義兵先主率其屬討賊有功除安喜尉累遷豫州牧從曹公還許曹公從容謂曰今天下英雄惟使君與操耳本初之徒不足數也先主方食失匕箸本初袁紹字張翰適意陶潜歸去晉書張翰字季鷹呉人有清才善屬文而縱任不拘時人號為江東步兵既入洛齊王冏辟為大司馬東曹掾翰因見秋風起乃思呉中菰菜蓴羮鱸魚鱠曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸俄而冏敗人皆謂之見機或曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達晉陶潜字元亮潯陽人大司馬侃曾孫少懐高尚博學善屬文穎脫不羈任真自得為鄉鄰所貴嘗著五栁先生傳以自況時人謂之實録為彭澤令在縣公田悉令種秫穀曰令吾嘗醉於酒足矣妻子固請種秔乃使一頃五十畝種秫五十畝種秔素簡貴不私事上官郡遣督郵至縣吏白應束帶見之潜歎曰吾豈能為五斗米折腰拳拳事鄉里小人邪解印綬去縣乃賦歸去來後徵著作郎不就又不營生業遇酒則飲嘗言夏月虚閒髙卧北窻之下清風䬃至自謂羲皇上人性不解音畜素琴一張絃徽不具毎朋酒之㑹則撫而和之曰但識琴中趣何勞絃上聲魏儲南館漢相東閣魏文帝丕字子桓為太子時嘗與元城令呉質書畧曰毎念昔日南皮之㳺誠不可忘既妙思六經逍遙百氏彈棋間設終以博奕高談娯心哀箏順耳馳騁北場旅食南館浮甘瓜於清泉沉朱李於寒氷皎日既没繼以朗月同乘並載以遊後園余顧而言兹樂難常質字季重濟隂人以文才為文帝所善官至振威將軍前漢公孫𢎞菑川薛人少家貧牧豕海上年四十餘乃學春秋雜說武帝立時𢎞年六十以賢良徵為博士免歸後復徵賢良文學對䇿天子擢為第一召見容貌甚麗拜博士待詔金馬門稍遷至丞相封平津侯其後以為故事至丞相封自𢎞始時上方興功業屢舉賢良𢎞自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脫粟飯故人賓客仰衣食奉禄皆以給之家無所餘然其性意忌諸嘗與有隙雖陽與善後竟報其過殺主父偃徙董舒仲膠西皆𢎞力也楚元置醴陳蕃下榻前漢楚元王交字游乃高祖少弟好書多材藝嘗與魯穆生白生申公俱受詩於浮丘伯及封楚王以穆生等為中大夫敬禮申公等穆生不嗜酒毎置酒常為穆生設醴及元王薨後至孫戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市先王之所以禮吾三人者為道之存今而忽之是忘道也忘道之人胡可與久處遂謝病去申公白公獨留王稍淫暴二人諫不聽胥靡之後漢陳蕃字仲舉汝南平輿人年十五嘗閒處一室而庭宇蕪穢父友薛勤來候之謂蕃曰孺子何不洒掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚竒之後為樂安太守時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆字孟玉高潔之士前後郡守招命不至唯蕃能致焉字而不名特為置一榻去則懸之後為豫章太守以禮待徐穉為功曺性方峻不接賓客惟穉來特設一榻去則懸之靈帝初為太傅録尚書事與大將軍竇武謀誅中官事泄見害廣利泉涌王霸氷合前漢李廣利發屬國六千騎及郡國惡少年數萬人以徃至貳師城取善馬故號貳師將軍耿恭曰昔貳師拔佩刀刺山飛泉涌出後漢王霸字元伯潁川潁陽人從光武為功曹令史光武曰潁川從我者皆逝而子獨留努力疾風知勁草及王郎起光武在薊即南馳聞郎兵在後從者皆恐至滹沱河候吏還白河水流澌無船不可濟令霸徃視霸恐驚衆欲且前阻水還即詭云氷堅可渡官屬皆喜光武笑曰候吏果妄語遂前比至河河氷亦合乃令霸䕶渡未畢數騎而氷解上謂曰安吾衆得濟免者卿之力也又謂官屬曰王霸權以濟事殆天瑞也以為軍正後至上谷太守孔融坐滿鄭崇門雜後漢孔融好學博涉多該覽為北海相時袁曹方盛而融無所協附負其高氣志在靖難而才疎意廣迄無成功先主表領青州刺史後為少府拜大中大夫性寛容少忌好士喜誘益後進及退閒職賓客日盈門嘗嘆曰坐上客常滿樽中酒不空吾無憂矣聞人之善若出諸己言有可採必演而成之面告其短而退稱所長薦達賢士多所奬進知而未言以為己過海内英俊皆信服之曹操既積嫌忌而郗慮搆成其罪遂見害魏文帝深好融文辭每嘆曰揚班儔也前漢鄭崇字子㳺高宻大族世與王家相嫁娶徙平陵後哀帝擢為尚書僕射數求諫爭上初納用之每見曳革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商諫太后大怒又諫董賢貴寵過度由是重得罪尚書令趙昌佞諂害崇奏與宗族通疑有奸請治上責曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治寃死獄中張堪折轅周鎮漏船後漢張堪字君游南陽宛人年十六受業長安志美行厲諸儒號曰聖童世祖即位拜蜀郡太守又為漁陽太守捕擊姦猾賞罰必信吏民皆樂為用匃奴常以萬騎入漁陽堪擊破之郡界以靜乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張公為政樂不可支視事八年匃奴不敢犯塞帝嘗召見諸郡計吏問前後守令能否蜀計掾進曰張堪昔在蜀仁以惠下威能討奸前公孫破時珍寳山積捲握之物足當十世而堪去職之日乘折轅車布被囊而已帝聞歎息舊註引世説云周鎮罷臨川泊清溪渚王丞相導徃看之時夏暴雨船狹小又大漏殆無坐處王曰胡威之清何以過此即啓用之今本無載郭伋竹馬劉寛蒲鞭後漢郭伋字細侯少有志行王莽時為并州牧建武中復為牧伋前在并州素結恩德及後入界老幼相攜逄迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬於道次拜迎伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋計日告之既還先期一日伋為違信於諸兒遂止野亭須期乃入後漢劉寛字文饒𢎞農華隂人桓帝時遷南陽太守歴典三郡温仁多恕雖倉卒未嘗疾言遽色吏人有過但用蒲鞭罰之示辱而已靈帝時為太尉帝頗好學藝毎引見常令講經寛常於坐被酒睡伏帝問太尉醉耶對曰臣不敢醉但任重責大憂心如醉帝重其言夫人欲試寛令恚伺當朝㑹裝嚴已訖使婢奉肉羮翻汙朝服寛遽收之神色不異乃徐言曰羮爛汝手其性度如此海内稱為長者許史侯盛韋平相延前漢宣帝許皇后元帝母也為霍光夫人顯所毒崩及元帝為太子迺封后父廣漢為平恩侯其弟舜為博望侯延夀為樂成侯許氏侯者三人廣漢薨諡戴侯宣帝以延夀為大司馬車騎將軍武帝衛太子史良娣宣帝祖母也良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害皇孫有男號皇曾孫既登位是為宣帝而良娣母及兄恭已死乃封恭子髙為樂陵侯曾為將陵侯𤣥為平臺侯及高子丹以功德封武陽侯侯者凡四人高至大司馬車騎將軍丹左將軍前漢韋賢及子𤣥成皆為丞相平當字子思平陵人以明經為博士公卿薦當論議通明給事中毎有灾異輒傅經術言得失文雅雖不及蕭望之匡衡然指意畧同哀帝時為丞相上召欲封當當病篤不應召或謂當不可强起受侯印為子孫邪當曰吾居大位已負素餐責矣起受侯印還卧而死有餘罪今不起者所以為子孫也遂乞骸骨上賜養牛一上尊酒十石月餘卒子晏以明經歴任大司徒漢興惟韋平父子至宰相雍伯種玉黄尋飛錢搜神記羊公雍伯洛陽人性篤孝父母亡葬無終山遂家焉山高無水公汲水作義漿於坂頭行者飲之三年有一人就飲以斗石子與之云玉當生其中後當得好婦言畢不見乃種其石數歲時時徃視見玉子生北平徐氏有女人多求不許公試求焉徐氏戲云白璧一雙來當為婚公至所種石中得五雙以聘遂以女妻之天子異之拜為大夫於種玉處四角作大石柱各一丈中央一頃地名曰玉田幽𡨕録海陵黄尋先貧因天雨散飛錢至其家觸籬園誤落者無數餘處皆拾得富至數千萬擅名江北王允千里黄憲萬頃後漢王允字子師太原祁人郭林宗見而竒之曰王生一日千里王佐才也遂與定交允少好大節有志於立功常習誦經傳朝夕試馳射三公並辟以司徒髙第為侍御史獻帝時為司徒及董卓遷都關中朝政大小悉委於允允矯性屈意每相承附卓亦推心不疑故得扶持王室於危亂之中臣主内外莫不倚恃允見卓簒逆已萌宻與司𨽻黄琬等謀兵誅之允性剛稜疾惡初懼卓豺狼故折節圖之卓既殱滅自謂無復患難仗正持重不循權宜之計羣下不甚附之反為卓將李傕所殺後漢黄憲字叔度汝南慎陽人也世貧賤父為牛醫陳蕃周舉嘗相謂曰時月之間不見黄生則鄙吝之萌復存乎心及蕃為三公嘆曰叔度若在吾不敢先佩印綬郭林宗少游汝南過袁閎不宿而退從憲累日方還或問之林宗曰奉高之器譬諸汎濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也後舉辟無所就奉髙閎字世說千作萬淆作撓與此小異虞􅔎才望戴淵鋒頴晉書虞􅔎字思行㑹稽餘姚人歴呉興太守王導嘗謂曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎官未達而喪時人惜之舊本才誤作休世說戴淵少遊俠嘗在江淮間攻掠陸機赴假還洛輜重甚盛淵在岸上據胡床指揮左右皆得其宜淵既神姿鋒穎雖處鄙事神氣尤異機於船上遙謂之曰卿才如此亦復作刼耶淵泣涕投劒而歸辭氣非常機彌重之便與定交史魚黜殯子囊城郢家語曰衛大夫蘧伯玉之賢靈公不用彌子瑕不肖反任之史魚驟諫不從將卒命其子曰吾在朝不能進蘧伯玉退彌子瑕是不能正君也生不能正君死無以成禮我死汝置屍牖下於我畢矣其子從之靈公弔焉怪而問之其子以其父言告公公愕然失容曰是寡人之過也命之殯於客位進伯玉退子瑕孔子聞之曰古之烈諫者死則已矣未有若史魚死而屍諫忠感其君者也可不謂直乎左氏傳楚子囊將死遺言謂子庚必城郢君子謂子囊忠君薨不忘増其名將死不忘衛社稷可不謂忠乎初楚共王疾告大夫曰不榖不德若以大夫之靈獲保首領以没於地請為靈若厲及卒子囊曰君命以共請諡之共楚徙都郢未有城郭築城未訖子囊欲訖未暇故遺言見意戴封積薪耿恭拜井後漢戴封字平仲濟北剛人舉賢良方正對策第一擢拜議郎遷西華令汝潁有蝗灾獨不入界時督郵行縣蝗忽大至及去蝗亦頓除一境竒之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至逺近嘆服遷中山諸縣囚四百餘人當行刑封哀之皆遣歸家與剋期日皆無違者官至太常後漢耿恭字伯宗扶風茂陵人少慷慨多大畧有將帥才永平末為戊巳校尉屯金蒲城匃奴攻城恭乘城搏戰以毒藥傅矢傳語匃奴曰漢家箭神其中瘡者必有異因發强弩射之虜中矢者視創皆沸匃奴相謂曰漢兵神真可畏也遂解去恭以疏勒城旁有澗水可固引兵據之匃奴復攻恭恭募先登數千人直馳之胡騎散走遂擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰嘆曰聞昔貳師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣向井拜禱有頃水泉奔出乃令吏士揚水以示虜虜以為神明遂引去後復攻恭恭擊走之數月食盡窮困乃煮鎧弩食其筋革恭與士推誠同死生故皆無二心虜圍之不能下關寵上書求救肅宗用司徒鮑昱議遣軍迎恭歸復奏恭節過蘇武宜蒙爵賞遂拜騎都尉汲黯開倉馮煖折劵前漢汲黯字長孺濮人其先有寵于古之衛君至黯十世世為卿大夫孝景帝時為大子洗馬以嚴見憚武帝即位黯為謁者河内失火燒千餘家上使徃視還報曰家人失火屋比延燒不足憂河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟賑貧民請歸節伏矯制罪上賢而釋之後為主爵都尉列於九卿治務無為引大體不拘文法性倨少禮面折不能容人之過以數直諫不得久居位武帝曰古有社禝臣如黯近之矣大將軍青侍中上踞厠視之丞相𢎞宴見上或時不冠至黯不冠不見也戰國䇿齊人有馮煖者貧乏不能自存使人屬孟嘗君田文願寄食門下君受之左右食以草具居有頃倚柱彈其劒歌曰長鋏歸來乎食無魚君聞食之比門下客有頃復彈鋏歌曰長鋏歸來乎出無車君為之駕比門下之車客後復彈鋏歌曰長鋏歸來乎無以為家君問煖有老母使人給其食用無使乏後君出記問門下客誰能為文收債於薛者煖署曰能煖治裝載劵契而行辭曰債畢收以何市而反君曰視吾家所寡有者煖之薛召諸民當償者悉來合劵以債賜民因燒其劵民稱萬歲至齊見君曰臣竊計君宫中積珍寳狗馬實外廐美人充下陳所寡有者義耳竊為君市義矯命以債賜諸民因燒其劵乃臣所以為君市義後君就國於薛民扶老攜幼迎道中君顧謂煖曰先生所為文市義乃今見之齊景駟千何曽食萬論語齊景公有馬千駟晉書何曽字穎考陳留陽夏人少好學博聞仕魏為司徒武帝踐阼拜太尉曽性至孝閨門整肅自少及長無聲樂嬖幸之好年老與妻相見皆整衣冠相待如賓然性奢豪務在華侈帷帳車服必窮極綺麗厨膳滋味過於王者毎朝見不食太官所設帝輒命取其食蒸餅上不坼作十字不食食日萬錢猶曰無下箸處劉毅等數劾奏曾侈忲無度帝以其重臣一無所問顧榮錫炙田文比飯晉書顧榮字彦先呉人弱冠為黄門侍郎同陸機兄弟入洛號三俊歴廷尉正及趙王倫簒位倫子虔為大將軍以榮為長史初榮與同寮宴飲見執炙者容貌不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督率救之得免元帝時終散騎常侍史記孟嘗君田文齊威王孽孫父嬰為齊相卒文代立封萬户於薛招致賓客及亡人有罪者皆歸之以故傾天下之士食客數千人無貴賤一與文等曽待客夜食有一人蔽火客怒以飯不等輟食辭去文起自持其飯比之客慚自剄士以此多歸之文相齊湣王湣王欲去之乃如魏魏昭王以為相齊襄王立孟嘗君中立為諸侯無所屬襄王與連和孔珪蛙鳴彦倫鶴怨南史孔珪字德璋㑹稽山隂人齊明帝時為南郡太守珪風韻清疎好文詠飲酒七八斗不樂世務居宅盛營山水慿几獨酌傍無雜事門庭之内草萊不剪中有蛙鳴或問之曰欲為陳蕃乎珪曰我以此當兩部鼓吹何必效蕃王晏嘗鼓吹候之聞羣蛙鳴曰此殊聒人耳珪曰我聽鼓吹殆不及此晏有慚色仕至散騎常侍舊本作稚圭南史周顒字彦倫宋元徽中為剡令音辭辨麗長於佛理著三宗論言空假義入齊終國子博士兼著作太學諸生慕其風爭事華辨始著四聲切韻行於時初隱鐘山及出為縣令孔稚珪過鍾山草堂作北山移文其詞有曰蕙帳空兮夜鶴怨山人去兮曉猿驚亷頗負荆須賈擢髮史記廉頗為趙將藺相如拜上卿位在頗右頗曰我為將有攻城野戰之大功而相如徒以口舌為勞位居我上又素賤人吾羞為之下宣言曰我見必辱之相如聞不肯與㑹每朝時嘗稱病不欲與頗爭列已而出望見頗引車避匿舎人諫曰廉君宣惡言而君畏匿恐懼庸人尚羞之況於將相乎相如曰公之視頗孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣吾雖駑獨畏廉將軍哉顧念强秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生吾所以為此者先國家之急而後私讐也頗聞之肉袒負荆至門謝罪曰鄙賤之人不知將軍寛之至此卒相與驩為刎頸之交史記范雎字叔魏人游説諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈賈使齊雎從齊襄王聞雎辯口乃使人賜金及牛酒賈怒以為雎持魏國隂事告齊既歸以告魏齊齊怒使舎人笞擊雎雎佯死即卷以簀置厠中賓客醉更溺之㑹齊醉雎告守者得出亡伏匿更名姓曰張禄夜見秦謁者王稽稽知雎賢載入秦言於昭王王拜為客卿遂為相封應侯賈後使秦雎微行敝衣步見賈賈驚曰范叔無恙乎留與坐飲食取綈袍賜之雎取大車駟馬為賈御入相府乃先入賈待良久問門下曰范叔不出何也門下曰無范叔乃吾相張君也賈大驚乃肉祖膝行謝罪曰賈不意君能自致於青雲之上賈不敢復讀天下之書與天下之事賈有湯鑊之罪請自屏於胡貉之地唯君死生之擢賈之髮以續罪尚未足雎曰汝罪有三耳然所以得無死者以綈袍戀戀有故人之意故釋之孔翊絶書申嘉私謁晉先賢傳孔翊字元性為洛陽令置水於庭得求囑書皆投水中一無所發前漢申屠嘉梁人以材官蹶張從髙帝擊楚孝文時稍遷至丞相為人廉直門不受私謁時鄧通方愛幸居上旁有怠慢之禮嘉奏曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅罷朝坐府中為檄召通詣丞相府不來且斬通通恐入告上上曰汝第徃吾今使人召若通至免冠徒跣頓首謝嘉嘉責曰夫朝廷者高皇帝之朝廷通小臣戲殿上大不敬當斬通頓首出血不解上度丞相已困通使使持節召通而謝丞相乃釋之淵明把菊真長望月南史陶潜字淵明名元亮江州刺史王𢎞欲識之不能致也潜嘗徃廬山𢎞令潜故人龎通之齎酒具於半道要之潜有脚疾使一門生二兒舉籃轝及至欣然共飲先是顔延之在潯陽與潜情欵後為始安郡經過潜臨去留三萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐久之逄𢎞送酒至即便就酌醉而後歸郡將候潜逄其酒熟取頭上葛巾漉酒畢還復著之卒號靖節先生其妻翟氏志趣亦同能安苦節夫耕於前妻鉏於後云晉書劉惔字真長沛國相人少清逺有標竒與母寓居京口家貧織芒屩以為養雖蓽門陋巷晏如也王導深器之後稍知名惔雅善言理簡文作相惔與王濛並為談客俱蒙上賓禮累遷丹陽尹為政清整門無雜賓桓温嘗問㑹稽王談更進耶惔曰極進然故第二流耳温曰第一復誰曰故在我輩其高自位置如此舊註云惔夜在簡文座愀然歎曰清風朗月恨死𤣥度𤣥度髙士許詢也子房取履釋之結韤前漢張良字子房其先韓人嘗游下邳圯上有一老父衣褐至良所直墮其履圯下謂曰孺子下取履良欲毆之為其老迺彊下取履因跪進父以足受之笑去復還曰孺子可教後五日平明與我期此良跪曰諾乃徃父已先在怒曰與老人期後何也去後五日早㑹五日雞鳴徃父又先在復怒曰去後五日早來五日良夜半徃有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北榖城山下黄石即我已遂去不見旦日視其書乃太公兵法良異之常習誦後從髙帝過濟北果得黄石取而寳祠之良死并葬焉初良數以兵法說髙祖常用其䇿為他人言皆不省良以為天授遂從不去良多病未嘗特將兵常為畫䇿臣及封功臣良未嘗有戰鬬功帝曰運籌帷幄中決勝千里外子房功也迺封為留侯前漢張釋之字季南陽堵陽人以貲為騎郎事文帝十年不得調亡所知名後拜廷尉持議平天下稱之王生者善為黄老言嘗召居廷中公卿盡㑹立王生老人曰吾韤解顧謂釋之為我結韤釋之跪而結之或讓王生獨奈何廷辱張廷尉王生曰吾老且賤自度無益於張廷尉廷尉天下名臣吾聊使結韤欲以重之諸公聞之賢王生而重釋之郭丹約關祖逖誓江後漢郭丹字少卿南陽穰人幼孤孝順後母哀憐之為鬻衣裝買産業後從師長安買符入函谷關乃慨然嘆曰丹不乘使者車終不出關丹至京師常為都講諸儒咸敬重之後更始徵為諫議大夫持節使歸南陽安集受降果如其志建武中辟舉高第累轉司徒在朝廉直公正與侯霸杜林張湛郭伋齊名相善晉書祖逖字士雅范陽遵人博覽書記該涉古今京師亂避地淮泗元帝以為軍諮祭酒逖以社稷傾覆常懐振復之志遷奮威將軍豫州刺史仍將本流徙部民百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如此江辭色壯烈衆皆慨嘆屯于淮隂起冶鑄兵器得二千餘人而後進逖愛人下士雖疎交賤𨽻皆恩禮遇之由是黄河以南盡為晉土未幾病卒豫州士女若喪考妣譙梁百姓為之立祠册贈車騎將軍王敦久懐逆亂畏逖不敢發至是始得肆意焉賈逵問事許慎無雙後漢賈逵字景伯扶風平陵人弱冠能誦左氏傳及五經本文以大夏侯尚書教授兼達五家穀梁之說自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節尤明左氏傳國語為之解詁永平中獻之拜為郎與班固並校祕書應對左右後為侍中領騎都尉所著經傳義詁及論難百餘萬言學者宗之後世稱為通儒後漢許慎字叔重汝南召陵人性淳篤博學經籍馬融敬之時人為之語曰五經無雙許叔重為郡功曹舉孝廉再遷除洨長卒初慎以五經傳說臧否因撰為五經異義又作說文解字皆傳於世婁敬和親白起坑降前漢高祖在洛陽婁敬說曰陛下都洛陽豈欲與周比隆哉然取天下與周異臣竊以為不侔矣且秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有此亦扼天下之吭而撫其背也即日駕西都關中賜敬姓劉氏拜郎中號奉春君封建信侯是時冐頓單于兵强控弦四十萬騎數苦邊上患之問敬敬曰陛下誠能以適長公主妻單于厚奉遺之彼必以為閼氏生子必為太子冐頓在固為子壻死外孫為單于豈聞外孫敢與大父抗禮哉上欲遣長公主吕后泣曰妾唯一女奈何棄之匃奴乃取家人子為公主妻單于使敬徃結和親史記白起郿人善用兵事秦昭王號武安君秦攻趙壘數挑戰趙廉頗堅壁不出秦使人為反間曰秦獨畏馬服子趙括將耳廉頗易與趙王既怒頗數敗復聞反間之言因使括代頗秦使起為上將軍括至擊秦軍秦軍佯敗走張二竒兵以刼之趙軍分而為二糧道絶秦發河内民年十五以上悉詣長平遮絶趙救及糧食趙卒不得食四十六日皆内隂相殺食來攻秦壘不能出括出鋭卒自搏戰秦軍射殺括括軍敗卒四十萬人降起起以為趙卒反覆非盡殺之恐為亂乃挾詐盡坑殺之斬首虜四十五萬人趙人大震蕭史鳳臺宋宗雞窻列仙傳蕭史秦穆時人善吹簫能致孔雀白鶴居數年吹似鳳聲鳳凰來止其屋公作鳯臺夫婦止其上不下數年一日皆隨鳯凰飛去故秦人作鳳女祠雍宫中時有簫聲幽𡨕録晉兖州刺史沛國人宋處宗嘗買一長鳴雞愛養甚至常著窻間後雞作人語與處宗談論極有𤣥致終日不輟處宗因此功業大進王陽囊衣馬援薏苡前漢王吉字子陽子駿孫崇並至御史大夫崇平帝時為大司空自吉至崇世名清廉然材器名稱稍不能及父而禄位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去所載未嘗過囊衣不蓄積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黄金後漢馬援在交趾常餌薏苡實能輕身省慾以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞卒後有人上書譛之者以前所載還皆明珠文犀呉祜傳呉惔為西海太守其子祜年十二隨到官惔欲殺青簡以冩經書祜諫曰大人踰越五嶺逺在海濱其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼輛昔馬援以薏苡興謗王陽以囊衣徵名嫌疑之間先賢所慎惔乃止撫其首曰呉氏世不乏季子矣劉整交質五倫十起南史劉整仕梁除中軍參軍初兄寅為西陽内史卒其子徃整塾停住十二日整就兄妻范求米范未還整怒乃自取范車帷為質范詣臺訴御史中丞任昉論曰昔人睦親衣無嘗主整之撫侄食未數旬何其不能折契鍾庾而襜帷交質人之無情一何至此實教義所不容紳冕所共棄臣請免整新除官付廷尉治罪後漢第五倫字伯魚京兆長陵人為京兆督鑄錢掾領長安市時鑄錢多姦巧倫平銓衡正斗斛市無阿枉百姓悅服毎讀詔書嘗嘆息曰此聖主也一見決矣等輩笑之曰爾說將尚不下安能動萬乗乎倫曰未遇知巳道不同耳建武永平間為㑹稽蜀郡守肅宗初立擢司空倫奉公盡節數上書言事無所依違性質慤少文采在位以貞白稱時人方之貢禹然少藴藉不修威儀亦以此見輕或問倫有私乎對曰昔人有與吾千里馬者吾雖不受毎三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十徃退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎病乞罷以二千石俸終其身張敞畫眉謝鯤折齒前漢張敞字子髙平陽人徙杜陵為京兆尹長安市偷盜尤多敞視事窮治所犯盡行法罰枹鼓稀鳴市無偷盜敞本治春秋以經術自輔其政頗雜儒雅表賢顯善不醇用誅罰以此能自全然無威儀罷朝㑹走馬章臺街使御史驅自以便面拊馬又為婦畫眉長安中傳張京兆眉嫵有司以奏帝宣問之對曰臣聞閨門之内夫婦之私有過於畫眉者上愛其能弗備責也後為冀州刺史盜賊禁止守太原太原郡清晉書謝鯤字幼輿陳國陽夏人少知名通簡有高識不修威儀東海王越辟為掾任達不拘坐除名鯤清歌鼓琴不以屑意鄰家高氏女有美色鯤嘗挑之女投梭折其兩齒時人為之語曰任達不已幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌後為王敦長史嘗使至都明帝在東宫見之甚相親重問曰論者以君方庾亮自謂何如答曰端委廟堂使百僚準則鯤不如亮一丘一壑自謂過之終豫章太守盛彦感螬姜詩躍鯉晉書盛彦字翁子廣陵人母因疾失明彦不應辟召躬自侍養母食必自哺之母疾久婢使數見捶楚婢怒恨伺彦暫行取蠐螬炙紿之母食以為美然疑是異物宻藏以示彦彦見之抱母痛哭絶而復蘇母目豁然即開仕呉中書侍郎呉平為小中正後漢姜詩廣漢人事母至孝妻龎奉順尤篤母好飲江水水去舎六七里妻常沂流而汲後值風不時得還母渴詩責而遣之妻寄止鄰舎晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慚呼還恩養愈謹其子後因逺汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舎側忽有泉湧味如江水毎旦輒出雙鯉魚常以供二母之膳赤眉散賊經詩里弛兵而過曰驚大孝必觸鬼神時歲荒賊乃遺詩米肉受而埋之比落蒙其安全永平初舉孝廉拜郎中除江陽令宗資主諾成瑨坐嘯後漢桓帝受業於甘陵周福及即位擢為尚書時同郡河南房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賓客至相譏揣各樹朋徒尤隙漸成由是甘陵有南北部黨人之議自此始矣汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡又為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯凡黨事始自甘陵周福汝南宗資成於李膺張儉海内塗炭二十餘年諸所蔓衍皆天下善士伯武之類皆字也舊本宗作宋伯成辭耕嚴陵去釣莊子曰堯治天下伯成子髙立為諸侯堯授舜舜授禹伯成子髙辭為諸侯而耕後漢嚴光字子陵㑹稽餘姚人少與光武同游學光武即位乃變名姓隱身不見帝思其賢乃令物色以訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁聘之三反而後至舎於北軍給床褥太官進膳車駕幸其館光卧不起帝即卧所撫光腹良久乃張目熟視曰昔唐堯著德巢父洗耳士固有志何至相迫乎帝嘆息而去復引入論道舊故相對累日因共偃卧光以足加帝腹上明日太史奏客星犯帝座甚急帝笑曰朕故人子陵共卧耳除諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀬焉董遇三餘譙周獨笑魏畧董遇字季直性質訥好學與兄季中耒耜負販常挾持經書閉門習讀明帝時至大司農初遇作老子訓註又善左氏傳更為朱墨别異人有從學者遇不肯教去必當先讀百遍言讀百遍而義自見從學者云苦暍無日遇言當以三餘冬者歲之餘夜者日之餘隂雨者時之餘蜀志譙周字允南巴西西充國人耽古篤學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食研精六經尤善書札頗曉天文遷光禄大夫位亞九列及魏大將軍鄧艾入隂平後主使羣臣㑹議計無所出或以為蜀與呉本為和國宜可奔呉或以為南中七郡阻險斗絶易以自守宜可奔南唯周以為自古無寄他國為天子者乃上疏諫遂從周䇿劉氏無虞一邦蒙賴周之謀也時晉文王為魏相國以為周有全國之功封陽城亭侯晉室踐阼除散騎常侍不拜將閭仰天王凌呼廟史記秦公子將閭昆弟三人二世胡亥信趙髙之謀囚於内宫議其罪使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗不從賓賛也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭仰天大呼天者三曰天乎吾無罪昆弟三人皆流涕拔劒自殺魏志王凌字彦雲太原祁人為征東將軍都督揚州諸軍事累遷太尉假節鉞謀廢齊王立楚王彪嘉平三年凌詐言呉人塞涂水請發兵以討之司馬宣王知其計不聽自帥中軍汎舟到甘城凌計無所出乃迎於武丘面縛水次曰凌若有罪公當折簡召凌何苦自來邪宣王曰以君非折簡之客故耳即以凌歸於京師道徑賈逵廟凌呼曰賈梁道王凌是大魏忠臣惟爾有神知之至頃仰鴆而死六月宣王疾夢凌逵為祟遂薨二疏散金陸賈分槖前漢疏廣字仲翁東海蘭陵人兄子受字公子宣帝時廣為太子太傅受為太子少傅毎朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮後廣謂受曰吾聞知足不辱知止不殆功成身退天之道也豈如歸老故鄉以夀命終父子遂乞骸骨上賜黄金二十斤太子贈五十斤公卿大夫故人邑子設祖道供帳東都門外送者車數百兩既歸鄉里日具酒食請族人故舊賓客相與娯樂趣賣金以供具或勸買田宅廣曰吾顧自有舊田廬令子孫勤力其中足以供衣食此金聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日族人悅服皆以夀終前漢陸賈楚人有口辯時中國初定尉佗平南越因王之髙祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈賈因說佗佗蹶然起謝賈留與飲數月賜賈槖中裝直千金他送亦千金賈令佗稱臣奉漢約歸報高祖大說拜太中大夫孝惠時病免以好畤田地善徃家焉有五男乃出槖中裝千金分其子子二百金令為生産常乗安車駟馬從歌鼓瑟侍者十人寳劍直百金謂其子曰與女約過女女給人馬酒食極飲十日而更所死家得寳劍後為陳平畫數事平用其計乃以奴婢百人車馬五十乗錢五百萬遺賈為食飲費賈以此游漢廷公卿間名聲藉甚及誅吕氏立孝文賈頗有力以夀終慈明八龍禰衡一鶚後漢荀爽字慈明潁川潁隂人父淑字季和舉賢良方正對䇿補朗陵侯相涖事明理稱為神君有子八人儉緄靖燾汪爽肅敷並有名稱時人謂八龍爽幼好學十二通春秋論語太尉杜喬見而稱之曰可為人師爽耽思經書慶弔不行徵命不應潁川為之語曰荀氏八龍慈明無雙獻帝即位董卓輔政徵之爽欲遁不得就拜平原相行至苑陵進為光禄勲視事三日拜司空自被命及登台司九十五日因從遷都長安爽見卓忍暴必危社稷辟舉才畧之士將共圖之㑹病薨後漢禰衡字正平平原般人少有才辯氣尚剛傲好矯時慢物游㯋川乃隂懐一刺既而無所之至於刺字漫滅時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾安能從屠沽兒耶又問荀文若趙稚長云何衡曰文若可借面弔喪稚長可使監厨請客唯善孔融楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數融亦深愛其才衡始冠而融四十遂與為交友上書薦之有云鷙鳥累百不如一鶚融數稱述於曹操操以其言忤逆送與劉表表不能容送與江夏太守黄祖祖性急衡言不遜遂殺之年二十六不占殞車子雲投閣新序曰齊崔杼殺莊公有陳不占者聞君難將赴之比去餐則失匕上車失式御者曰怯如是去有益乎曰死君義也先勇私也不以私害公遂聞戰鬬之聲恐駭而死人曰不占可謂仁者之勇也前漢揚雄字子雲年四十餘自蜀來遊京師大司馬王音竒其文雅召為門下吏與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官莽簒談說之士用符命稱功德獲封爵甚衆雄復不侯以耆老久次轉大夫恬於勢利如是及莽誅甄豐父子投劉歆子棻四裔辭所連及便收不請時雄校書天禄閣上治獄使者欲收雄雄恐不能自免迺從閣自投下幾死棻嘗從雄學竒字莽以雄素不與事有詔勿問然京師為之語曰惟寂寞自投閣爰清淨作符命蓋以雄解嘲之言譏之也雄家貧嗜酒人希至門時有好事者載酒肴從遊學而侯芭嘗從雄居受太𤣥法言焉劉歆謂曰今學禄利者尚不能明易又如𤣥何吾恐後人用覆醬瓿也雄笑而不應年七十一卒侯芭為起墳魏舒堂堂周舎鄂鄂晉書魏舒字陽元任城樊人少孤為外家甯氏所養甯氏起宅相者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外氏成此宅相舒姿望秀偉飲酒石餘遲鈍質朴不為鄉親所重不修常人之節不為皎厲之事每欲容才長物終不顯人之短年四十餘對䇿升第遷尚書郎時欲沙汰郎官非才者罷之舒曰吾即其人也襆被而出轉相國參軍文帝深器重之每朝㑹罷目送之曰魏舒堂堂人之領袖也及山濤薨領司徒陳留周震累為諸府所辟辟書既下公輒喪亡僉號震為殺公掾舒辟之竟無患識者稱其達命年老遜位賜几杖安車駟馬門施行馬時論以為晉興以來三公能辭榮善終者未之有史記晉大夫趙簡子有臣曰周舎好直諫周舎死簡子毎聽朝常不悅大夫請罪簡子曰大夫無罪吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舎之鄂鄂是以憂也舊本鄂作諤無鹽如漆姑射若氷古列女傳鍾離春者無鹽邑之女宣王正后也為人極醜無雙臼頭深目長指大節昻鼻結喉肥項少髮折腰出胷皮膚若漆年四十無所容入衒嫁不售乃拂拭短褐自詣宣王願備後宫之掃除宣王方置酒於漸臺罷女樂退諂諛去彫琢進直言延側陋立太子拜無鹽為后而齊因大安莊子曰藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五穀吸風飲露乗雲氣御飛龍而遊乎四海之外邾子投火王思怒蠅左氏傳邾子在門臺臨廷閽以缾水投廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投於床廢於鑪炭爛遂卒莊公卞急而好絜故及是莊公即邾子諡旋小便廢墮也魏志王思濟隂人領豫州刺史思能吏然苛碎無大體官至九卿封列侯魏畧曰思性急嘗執筆作書蠅集筆端馳去復來如是再三思恚怒自起逐蠅不能得還取筆擲地蹋壊之苻朗皂白易牙淄澠晉書苻朗字元達畧陽臨渭氐人堅從兄子拜青州刺史降晉加員外散騎侍郎既至揚州風流邁於一時超然自得善識味鹹酢及内皆别所由㑹稽王為設盛饌極江左精肴食訖問曰關中之食孰若此答曰皆好惟鹽味小生耳既問宰夫皆如其言或人殺雞以食之既進朗曰此雞棲常半露檢之皆騐又食鵝肉知黑白之處人不信記而試之無差時人咸謂知味列子引孔子曰淄澠之合易牙嘗而知之易牙齊桓公嬖臣知味者也周勃織簿灌嬰販繒前漢周勃其先卷人徙沛以織簿曲為生常以吹簫給喪事材官引强高祖起勃以中涓從攻戰以功封絳侯勃為人木彊敦厚髙帝以為可屬大事勃不好文學每召諸生說士東鄉坐責之趣為我語其椎魯少文如此舊本簿作畚非前漢灌嬰睢陽販繒者也以中涓從髙祖及項藉敗垓下嬰以御史大夫將軍騎别追至東城破之所將卒五人共斬藉以功賜爵潁隂侯文帝時為丞相馬良白眉阮籍青眼蜀志馬良字季常襄陽宜城人弟兄五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主稱尊號以良為侍中及東征呉遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號咸如意指晉書阮籍字嗣宗陳留尉氏人為散騎常侍轉從事中郎聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉籍不拘禮教能為青白眼見禮法之士以白眼對之母終嵇喜來弔籍作白眼喜不懌退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見青眼由是禮法之士疾之如讐籍率意獨駕不由徑路車迹所窮輒痛哭而反黥布開關張良燒棧前漢黥布六人姓英氏少時客相之當刑而王及壯坐法欣然笑曰人相我當刑而王幾是乎聞者笑之布以論輸驪山驪山之徒數十萬人布與其徒長豪傑交通乃率其曹耦亡之江中為羣盜衆數千人後以兵屬項梁楚兵常勝功冠諸侯兵皆服屬楚者以布數以少敗衆也項籍引兵西至關不得入又使布等先從間道破關下軍遂得入至咸陽布為前鋒項羽封諸將立布為九江王歸漢封淮南王前漢項羽自立為西楚霸王王梁楚地更立沛公為漢王王巴蜀漢中漢王就國張良辭歸韓漢王送至褒中因說漢王燒絶棧道以備諸侯盜兵亦示羽無東意乃使良還行燒絶棧道陳遺飯感陶侃酒限南史宋初呉郡陳遺少為郡吏母好食鐺底焦飯遺在役常帶囊每煮食輒儲其焦以貽母後孫恩亂聚得數升常帶自隨及敗迯竄多有餓死遺以此得活母晝夜泣涕目為失明耳無所聞遺還入户再拜號咽豁然朗明晉書陶侃字士行鄱陽人徙尋陽早孤貧為縣吏孝廉范逵嘗過侃時倉卒無以待賓客其母截髮得雙髲以易酒肴樂飲極歡雖僕從亦過所望拜大尉都督荆江等諸軍事長沙郡公侃毎飲酒有定限常歡有餘而限已竭屬吏殷浩等勸更少進侃曰年小曽有酒失亡親見約故不敢踰楚昭萍實束晳竹簡家語楚昭王渡江江中有物大如斗圓而赤直觸王舟舟人取之王怪之問羣臣莫能識使使聘魯問孔子孔子曰此萍實也可剖食之吉祥也惟霸者為能獲焉使者反王遂食之大美久之使來以告魯大夫大夫因子游問曰夫子何以知其然曰吾昔之鄭過陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此楚王之應吾是以知之晉書束晳字廣微陽平元城人漢疏廣之後廣曽孫避難徙居因去疎之足遂改姓焉晳學多聞少遊國學後為著作佐郎初太康二年汲郡人盜發魏襄王墓或言安釐王冢得竹書數十車武帝以其書付祕書校綴次第尋考指歸而以今文冩之晳在著作得觀竹書隨疑分釋皆有義證遷尚書郎時人有于嵩髙山下得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晳晳曰此漢明帝顯節陵中䇿文也檢騐果然時人服其博識曼倩三冬陳思七步前漢東方朔字曼倩平原厭次人武帝舉方正賢良文學材力之士待以不次之位四方士上書言得失自衒鬻者以千數朔上書曰臣少失父母長養兄嫂年十二學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫呉兵法戰陣之具鉦鼓之教亦誦二十二萬言又常服子路之言年二十二長九尺三寸目若懸珠齒若編具勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜髙自稱譽上偉之令待詔公車後常為郎與枚臯郭舎人俱在左右詼啁而已世說曰魏文帝嘗令東阿王作詩七步不成當行法即應聲為詩曰萁在釡下燃豆在釡中泣本自同根生相煎何太急帝深有慚色東阿即陳思王曹植舊封劉寵一錢廉范五袴後漢劉寵字祖榮東萊牟平人拜㑹稽太守山民愿朴乃有白首不入市者頗為官吏所擾寵除煩苛禁察非法郡中大化徵為將作大匠山隂縣有五六耆叟龎眉皓髮自若耶山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民間至夜不絶明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵為人選一大錢受之後官至太尉寵前後歴宰二郡累登卿相而清約省素家無貨積嘗出京師欲息亭舎亭吏止之曰整頓洒掃以待劉公不可得也寵無言而去時人稱其長者後漢廉范字叔度京兆杜陵人肅宗時遷蜀郡太守厲以敦厚成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便歌曰廉叔度來何暮不禁火民安作平生無襦今五袴在蜀數年免歸汜毓字孤郗鑒吐哺晉書汜毓字稚春濟北盧人奕世儒素敦睦九族客居青州逮毓七世時號其家兒無常父衣無常主少履高操安貧有志業武帝累召不就晉書郗鑒字道徽髙平金鄉人少孤貧博覽經籍躬耕隴畝吟詩不倦以儒雅著名成帝時為太尉初值永嘉喪亂在鄉里甚窮餒鄉人以鑒名德傳共飯之時兄子邁外甥周翼並小常攜之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒於是獨徃食訖以飯著兩頰邊還吐與二兒後並得存同過江邁至䕶軍翼剡縣令鑒薨翼追撫育之恩解職席苫心喪三年茍弟轉酷嚴母掃墓晉書茍晞字道將河内山陽人為兖州刺史晞練於官事文簿盈積斷決如流人不敢欺其從母依之奉養甚厚其子求為將晞距之曰吾不以王法貸人將無後悔固欲之晞乃以為督䕶後犯法晞仗節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兖州刺史哭弟者茍道將其仗法如此後領青州刺史多置參佐轉易守令以嚴刻立功日加斬戮流血成川號曰屠伯出屯無鹽以弟純領青州刑殺甚於晞百姓號小茍酷於大茍前漢嚴延年字次卿東海下邳人遷河南太守野無行盜威震旁郡其治務推折豪强扶助貧弱貧弱雖陷法曲文以出之豪傑侵小民者以文内之衆謂當死者一朝出之謂當生詭殺之吏民莫能測其意深淺冬月傳屬縣囚㑹論府上流血數里河南號曰屠伯其母從東海來到洛陽見刑囚大驚止都亭不肯入府延年至謁母閉閣不見延年免冠頓首閣下良久乃見之因數責延年幸得備郡守不聞仁愛教化以全安愚民顧多刑殺人欲以立威天道神明人不可獨殺我不意當老見壯子被刑戮行矣去女東歸掃除墓地耳遂去歲餘延年坐棄市東海賢其母延年兄弟五人至大官東海號曰萬石嚴嫗洪喬擲水陳泰挂壁晉書殷羡字洪喬陳郡長平人為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵其資性介立如此魏志陳泰字𤣥伯司空羣之子為并州刺史加振威將軍使持節䕶匈奴中郎將懐柔吏民甚有威惠京邑貴人多寄寳貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之王述忿狷荀粲惑溺晉書王述字懐祖東海太守承之子安貧守約不求聞達性沉靜年三十尚未知名人或謂之癡累遷尚書令屢居州郡清潔絶倫禄賜皆散之親故但性急為累嘗食雞子以筯刺之不得大怒擲地雞子圓轉不止便下床以屐齒踏之又不得嗔甚掇内口中以齒齧破即出吐之既躋重位每以柔克為用謝奕性麄嘗忿述極言罵之述無所應面壁而已居半日奕去復坐人以此稱之舊本述誤作術荀粲傳曰粲字奉倩常以婦人才智不足論自宜以色為主驃騎將軍曹洪女有美色粲聘焉容服帷帳甚麗專房歡宴歴年後氏病亡傅嘏徃唁粲不哭而神傷嘏問曰婦人才色並茂為難子遺才而好色此自易遇何哀之甚粲曰佳人難再得顧逝者不能有傾國之色未可謂之易遇痛悼不能已歲餘亦亡世說曰奉倩後少時亦卒以是獲譏於世見惑溺篇奉倩與婦至厚冬月婦病熱乃出中庭自取冷還以身熨之婦亡宋女愈謹敬姜猶績古列女傳宋鮑女宗者鮑蘇妻妻養姑甚謹蘇去仕衛三年而娶外妻女宗因徃來者請問其夫不輟賂遺外妻甚厚女宗之姒曰可以去矣女宗曰婦人固以一醮不改夫死不嫁為分者也吾姒不教吾以居室之禮而反欲使吾為見棄之行將安用此遂不聽事姑愈謹宋公聞而美之表其閭號曰女宗君子謂女宗謙而知禮古列女傳魯季敬姜莒之女也號戴已魯大夫公父穆伯之妻文伯之母博達知禮文伯退朝朝敬姜敬姜方績文伯曰以歜之家而主猶績懼干季孫之怒其以歜為不能事主乎敬姜嘆曰魯其亡乎使童子備官而未之聞邪昔聖王處民男女效績否則有辟古之制也又出魯語鮑照篇翰陳琳書檄南史鮑照字明逺東海人文辭贍逸嘗謁宋臨川王義慶未見知欲貢詩言志人止之曰卿位尚卑不可輕忤大王照勃然曰千載上有英才異士沈没而不聞者安可數哉大丈夫豈藴智能碌碌與燕雀相隨乎於是奏詩義慶竒之賜帛二十四匹尋擢為國侍郎文帝以為中書舎人上好文章自謂人莫能及照悟其㫖文章多鄙言累句咸謂照才盡實不然也嘗賦擬古詩云十五諷詩書篇翰靡不通文選照作昭魏志廣陵陳琳字孔璋陳留阮瑀字元瑜琳避難冀州袁紹使典文章袁氏敗歸太祖太祖愛其才並以琳瑀為司空軍謀祭酒管記室軍國書檄多琳瑀所作典論曰琳作諸書及檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我疾加厚賜嘗使瑀作書與韓遂時從太祖出因於馬上具草書成呈之太祖覽畢欲有所定而竟不能增損魏文帝與呉質書曰孔璋章表殊徤微為繁富元瑜書記翩翩致足樂也浩浩萬古不可備甄李子言自史記至晉宋子史向千卷芟煩摭華爾曹勉旃今以有限之力讀無涯之書徒欲强記洽聞終恐唇腐齒落所以芟除繁冗採摭精華冀爾曹披尋儻獲微益也蒙求集註卷下
