body:
  text: 跋跋蒙求二卷書録解題云唐李翰撰宋葉大慶考古質疑亦以翰為唐人明顧起綸標注序謂翰故趙人天寶末擢進士歷官翰林學士父華弟觀並以文章擅名宋宗室諸家家孰各有蒙求實翰倡之今考李翰本傳中所著蒙求未載唐藝文志止有王範續蒙求白延翰唐蒙求而不及翰四庫提要謂晉李瀚撰瀚之始末亦未詳以李匡乂資暇録有宗人瀚作蒙求桑維翰傳稱李瀚為翰林學士好飲而多酒過即其人按五代史補李瀚有逸才性嗜酒唐長興三年楊凝式嘗受詔撰錢鏐碑自以作不逮瀚乃多市美酒召瀚飲俟其酣使代筆經宿而成萬五千字莫不詞理典贍又釋文瑩玉壺清話云宋太祖擒劉鋹遣學士李瀚問儀注似其人歷唐晉而至宋猶存者顧各書所載不符要以冊府所定為可徵耳其書駢羅經史屬對工整於初學大有裨益因刻諸家孰為課孫之助云嘉慶甲子小春張海鵬識於問棠書屋
