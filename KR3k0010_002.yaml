body:
  text: 卷下蕭朱結綬王貢彈冠前漢蕭育字次君東海蘭陵人哀帝時為光祿大夫執金吾少與士陳咸朱博為友著聞當世往者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言薦達也前漢王吉字子陽琅邪皇虞人少好學明經宣帝時為諫大夫與同郡貢禹為友世稱王陽在位貢禹彈冠言其取舍同也禹字少翁以明經潔行著聞仕至御史大夫龐統展驥仇覽棲鸞蜀志龐統字士元襄陽人少時朴鈍未有議者司馬徽有知人鑒稱統當為南州士之冠冕由是漸顯先主領荊州統以從事守耒陽令在縣不治免官吳將魯肅遺先主曰龐士元非百里才也使處治中別駕之任始當展其驥足耳諸葛亮亦言之於先主先主以為治中從事親待亞於亮遂並為軍師中郎將後漢仇覽字季智一名香陳留考城人為蒲亭長勸人生業農畢乞令子弟就學剽輕游恣者皆役以田桑賑恤窮寡期年大化初到有陳元者獨與母居而母詣覽告元不孝覽親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之諺曰父母何在在我庭化我鴟梟哺所生時考城令王渙政尚嚴猛聞覽以德化人署為主簿謂曰主簿聞陳元之過不罪而化之得無少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路以奉資勉入太學學畢歸鄉里州郡並請皆以疾辭葛亮顧廬韓信升壇蜀志諸葛亮相先主先主病篤召亮屬以後事謂曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢竭股肱之才效忠貞之節繼之以死又為詔敕後主曰汝與丞相從事事之如父自是事無巨細皆決於亮嘗上疏其略曰臣本布衣躬耕於南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事後常以木牛流馬運糧據武功黃河原與司馬宣王對於渭南相持百餘日卒于軍年五十四諡忠武侯長於巧思損益連努木牛流馬皆出其意推演兵法作八陳圖咸得其要云前漢韓信淮陰人家貧無行不得推擇為吏後屬項羽為謁中數以策干羽羽弗用亡歸漢漢主以為治粟都尉上未之奇數與蕭何語何奇之信度上不用即亡何追之居一二日來謁上罵曰諸將亡以十數公無所追追信詐也何曰諸將易得至如信國士無雙王必欲爭天下非信無可與計事者於是擇日齊戒設壇場具禮拜為大將諸軍皆驚後封楚王都下邳謀反赦為淮陰侯卒為呂后所斬王裒柏慘閔損衣單晉書王裒字偉元城陽營陰人少立操尚博學多能其父儀為文帝司馬見殺裒痛父非命未嘗西向而坐示不臣朝廷也隱居教授廬于墓側旦夕嘗至墓所拜跪攀柏悲號涕泣著樹樹為之枯母性畏雷母沒每雷輒到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇家貧躬耕計口而田度身而蠶或有助之者不聽舊本裒作褒非舊注閔損字子騫早喪母父娶後妻生二子損至孝不怠母疾惡之所生子以綿絮衣之損以蘆花絮父冬月令損御車體寒失靷父責之損不自理父察知之欲遣後母損泣啓父曰母在一子寒母去三子單父善之而止母亦悔改待三子均平遂成慈母蒙恬製筆蔡倫造紙初學記博物志蒙恬造筆又尚書中侯元龜負圖出周公援筆以時文寫之曲禮云史載筆則秦之前已有筆矣蓋諸國或未之名而秦獨得其名恬更為之損益耳故說文曰楚謂之聿吳謂之不律燕謂之拂秦謂之筆也注引博物志云蒙恬為秦將製筆自此始今本無之後漢宦者蔡倫字敬仲和帝時轉中常侍加尚方令監作祕劍及諸器械皆精工堅密為後世法自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意樹膚麻頭及敝布魯網以為紙奏上之帝善其能自是莫不從用故天下咸稱蔡侯紙孔伋縕袍祭遵布被說苑子思居於衛縕袍無裏三旬九食田子方聞之使人遺狐白裘恐其不受因謂之曰吾假人遂忘之吾與人如棄之子思辭而不受子方曰我有子無何故不受子思曰伋聞之妄與不如遺棄物於溝壑伋雖貧不忍以身為溝壑是以不敢當後漢祭遵字第孫潁川潁陽人少好經書家富給而恭儉從光武平河南拜征虜將軍遵為人廉約小心克己奉公賞賜盡與士卒家無私財身衣韋袴布被夫人裳不加緣帝以是重焉及卒愍悼尤甚車駕素服臨之喪禮成親祠以太牢既葬車駕復臨其墳存見夫人室家其後會朝帝每歎曰安得憂國奉公如祭征虜乎其見思如此周公握髮蔡雍倒屣史記武王崩周公相成王而使其子伯禽代就封於魯戒之曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人後漢蔡雍字伯喈陳留郡人少博學好辭章數術天文妙探音律閒居玩古不交當世後為中郎將獻帝西遷王粲徙長安雍見而奇之時雍才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之粲至年既幼弱容狀短小一坐盡驚雍曰此王公之孫有異才吾不如也吾家書籍文章盡當與之粲曾祖龔祖暢皆為三公王敦傾室紀瞻出妓晉書王敦字處重少有奇人之目尚武帝女襄城公主拜駙馬都尉明帝初移鎮姑孰敦自領揚州牧謀逆病死割棺戮尸初石崇以奢豪矜物廁上常有十餘婢侍列皆有容色置白煎粉沉香汁有如廁者皆易新衣而出客多羞脫衣而敦脫故著新意色無怍群婢曰此客必能作賊又嘗荒恣於色體為之弊左右諫之敦曰此甚易耳乃開後閣驅諸婢妾數十人並放之時人歎異舊注引世說云王遵與周顗及諸朝士詣尚書紀瞻家觀妓瞻有愛妓能作新聲顗問答之頃無怍色有司奏顗淫荒詔原之今本無載暴勝持斧張綱埋輪前漢暴勝之字公子武帝末郡國盜賊群起勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國東至海以軍興誅不從命者威振州郡後漢張綱字文紀犍為武陽人少明經學辟為御史時順帝委縱宦官有識危心綱常感激慨然歎曰穢惡滿朝不能奮身出命掃國家之難雖生吾不願也漢安初遣八使狥行風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐貍遂奏大將軍梁冀等無君之心十五事京師震竦時冀妹為皇后諸梁姻族滿朝帝雖知言直不忍用終廣陵太守靈運曲笠林宗折巾世說新語謝靈運好戴曲柄笠孔隱士謂曰卿欲希心高遠何不能遺曲蓋之貌謝答曰將不畏影者未能忘懷南史謝靈運晉車騎將軍元之孫學博覽群書文章之美與顏延之為江左第一襲封康樂公世稱謝康樂為永嘉太守郡有名山水素所愛好肆意遊遨族弟惠連十歲能屬文靈運嘉賞之云每有篇章對惠連輒得佳句嘗於永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草大以為工常云此語有神助非吾語也後為侍中免官尋山陟嶺必造幽峻登躡常著木屐起為臨川內史有逆志徙廣州棄市靈運詩書皆兼獨絶每文竟手自寫之宋文帝稱為二寶後漢郭泰字林宗辟舉不應性明知人好獎訓士類容貌魁偉褒衣博帶周游郡國嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此或問范滂曰林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友不知其他林宗雖善人倫而不為危言激論故宦官擅政而不能傷及黨事起名士多被害惟林宗袁閎得免閉門教授弟子以千數及卒四方之士千餘人會葬同志者共刻石立碑蔡雍為其文謂盧植曰吾為碑銘多矣皆有慚德唯郭有道無愧色耳其獎拔士人皆如所鑒屈原澤畔漁父江濱史記屈原名平楚之同姓為懷王左徒博聞強志明於治亂嫺於辭令王甚任之上官大夫與之同列爭寵而心害其能因讒之王怒而疏平後秦昭王欲與懷王會平曰秦虎狼之國不如無行懷王稚子子蘭勸王行王死於秦長子頃襄王立以子蘭為令尹子蘭使上官大夫短原於王王怒而遷之原至江濱被髮行吟澤畔顏色憔悴形容枯槁漁父問曰子非三間大夫歟何故至此原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懷瑾握瑜而自令見放為原曰吾聞之新沐者必彈冠新浴者必振衣誰能以身之察察受物之汶汶者乎寧赴湘流而葬于江魚腹中耳又安能以皓皓之白而蒙世之塵埃乎乃作懷沙之賦懷石自投汨羅以死後百餘年賈生為長沙王太傅過湘水投書以弔之魏勃掃門潘嶽望塵前漢魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之因特令閽者而問之勃曰願見相君無因故為子掃於是舍人見勃曹參因以為舍人晉潘嶽為黃門侍郎性輕躁趍世利與衛尉石崇等諂事賈謐每候其出與崇輒望塵而拜謐與之親善號二十四友嶽為其首謐搆愍懷太子之文及晉書限斷皆嶽之辭也初嶽為琅邪內史孫秀為小史給嶽而狡黠自喜嶽惡其為人數撻辱之秀常銜忿及趙王倫輔政秀為中書令遂誣嶽及石崇謀為亂同被誅謐韓壽子賈充婦郭槐養為己子時賈后淫虐謐干預國事權侔人主京房推律翼奉觀性前漢京房字君明東郡頓邱人治易事梁人焦延壽壽曰得我道以亡身者京生也其說長於災變分六十卦更直日用事以風雨寒溫為候各有古驗房用之尤精好鍾律知音聲孝元時以孝廉為郎與石顯五鹿充宗有隙出為魏郡太守房自知數以論議為大臣所非不欲遠離左右及為太守憂懼乃上卦事言災異既而顯告房非謗政治歸惡天子誑誤諸侯王遂棄市房本姓李推律自定為京氏前漢翼奉字少君東海下邳人明經術好律歷陰陽之占元帝即位徵之奉上封事曰治道要務在知下之邪正於是有辰時客主邪正之語其略曰參之六合五行則可以見人性知人情觀性以歷觀情以律明主所宜獨用官至諫大夫甘寧奢侈陸凱貴盛吳志甘寧字興霸巴郡臨江人少有氣力好游俠招合輕薄少年為之渠帥仕孫權以功拜折衝將軍吳書曰寧輕俠殺人藏舍亡命聞於郡中共出入步則連車騎水則連輕舟侍從被文繡幃帳以珠玉為飾常以繪錦維舟去或割棄以示奢也江表傳曰曹公出濡須臨江飲馬權率衆應之使寧為前部督敕使夜入魏軍寧選健兒百餘人竟詣曹公營下踰壘入營斬數十級北軍驚駭權曰孟德有張遼孤有興霸足相敵也吳志陸凱字敬風吳人丞相遜族子孫皓時為丞相世說曰皓問凱卿一宗在朝有幾人答曰二相五侯將軍十餘人皓曰盛哉凱曰君賢臣忠國之盛也父慈子孝家之盛也今政荒民弊覆亡是懼臣何敢言盛也干木富義於陵辭聘淮南子段干木辭祿而處家魏文侯過其閭而軾之其僕曰干木布衣之士君軾其閭不已甚乎文侯曰干木不趍勢利懷君子之道隱處窮巷聲馳千里寡人敢勿軾乎干木光于德寡人光于勢干木富于義寡人富于財勢不若德尊財不若義高干木雖以己易寡人弗為古列女傳楚王聞於陵子終賢欲以為相使使者持金百鎰往聘之子終入謂妻曰王欲以我為相今日為相明日結駟連騎食方丈於前可乎妻曰夫子織屨以為食非與物無治也左琴右書樂亦在其中矣夫結駟連騎所安不過容膝食方丈於前所甘不過一肉今以容膝之安一肉之味而懷楚國之憂其可乎亂世多害妾恐先生之不保命也於是子終出謝使者遂相與逃而為人灌園高士傳曰陳仲子字子終齊人辭母兄將妻適楚居於陵自號於陵仲子元凱傳癖伯英草聖晉書杜預字元凱既立功之後從容無事乃耽思經籍為春秋左氏經傳集解又參考衆家譜第謂之釋例又作盟會圖春秋長歷備成一家之學比老乃成又撰女記讚當時論者謂預文義質直世人未之重唯祕書監摯虞賞之曰左邱明本為春秋作傳而左傳遂自孤行釋例本為傳設而無所發明何但左傳故亦孤行時王濟解相馬又甚愛之而和嶠頗聚斂預嘗稱濟有馬癖嶠有財癖武帝聞之謂曰卿有何癖對曰臣有左傳癖終司隸校尉位特進贈征南大將軍初預好為後世名常言高岸為谷深谷為陵刻石為二碑記其勳績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎後漢張芝字伯英燉煌酒泉人善草書衛恆曰章帝時齊相杜度號善作篇後有崔瑗崔實亦皆稱工杜氏殺字甚安而書體微瘦崔氏甚得筆勢而結字小疏伯英因而轉精甚巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號匆匆不暇草書十紙不見遺世尤寶其書韋仲將謂之草聖馮異大樹千秋小車後漢馮異字公孫潁川父城人好讀書通左氏春秋孫子兵法漢兵起以郡掾守父城光武為司隸道經父城即開門迎光武署為主簿及王郎起光武自薊東南馳至饒陽無婁亭天寒衆饑疲異上豆粥明旦光武曰昨得公孫豆粥饑寒俱解及至南宮遇大風雨光武入道傍舍燎衣異進麥飯菟肩因渡滹沱河還拜偏將軍為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍及破邯鄲乃更部分諸將各有配隸軍士皆言願屬大樹將軍光武以此多之後封陽夏侯拜征西大將軍賜珍寶衣服錢帛詔曰倉卒無婁亭豆粥滹沱河麥飯厚意久不報異稽首謝前漢車千秋本姓田氏為高寢郎會衛太子為江充所譖敗久之武帝頗知太子冤千秋上急變訟曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言上大感寤召千秋至前千秋長八尺餘體貌甚麗帝見而說之謂曰父子之間人所難言公獨明其不然此高廟神靈使公教我公當為吾輔佐位拜大鴻臚數月為丞相封富民侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有初千秋年老上優之朝見得乘小車入宮殿中故因號曰車丞相漂母進食孫鍾設瓜前漢韓信家貧嘗從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食食時信往不為具食信自絶去至城下釣有一漂母哀之飯信數十日信曰吾必重報母母曰大丈夫不能自食吾哀王孫而進食豈望報乎淮陰少年又侮信衆辱信曰能死刺我不能出跨下信熟視俯出跨下一市皆笑以為怯及信為楚王召漂母賜千金及下鄉亭長錢百曰公小人為德不竟召辱己年少以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此幽冥録孫鍾少時家貧種瓜瓜熟有二人來乞瓜鍾引入菴中設瓜及飯飯訖謂鍾曰蒙君厚惠今示子葬地欲得世世封侯為欲數代天子又曰我司命也君下山百步勿反顧鍾下六十來步回看並為白鶴飛去鍾遂於此葬母冢上有氣屬天鍾後生堅堅生權權生亮及休權孫和生皓為晉所滅降為歸命侯壺公謫天薊訓歷家後漢汝南費長房為市掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因往再拜奉酒脯翁知長房之意其神也謂曰子明日可更來長房旦日復詣翁翁與俱入壺中唯見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今當去能相隨乎樓下有少酒與卿為別長房使人取之不能勝又令十人扛之猶不舉翁聞笑而下樓以一指提上視器如一升許二人終日飲不盡神仙傳薊子訓齊人舉孝廉除郎中又為都尉人莫知其有道在鄉里常以信讓與人二百餘年顏色不老曾求抱鄰舍嬰兒誤墮地死兒家素尊子訓即埋之二十餘日子訓自外來抱兒還之家恐是鬼子訓既去掘視所埋但泥而已又諸老人鬢白者子訓與對坐共語宿昔皆還黑京師貴人莫不虛心欲見爭請子訓比居太學諸生為請子訓子訓曰吾某月日當往到期子訓以食時發日中到未半日行千餘里乃見書生問誰欲見我卿盡語之吾日中當往到日中子訓果往二十三處諸貴人喜自謂先詣之明日相參問各言子訓衣服顏色如一而所論說隨主人所咨不同遠近驚異子訓去乘青騾出東門陌上徐徐行諸貴人走馬逐不能及行半日而相去常一里許乃止劉元刮席晉惠聞蟆後漢劉元字聖公光武族兄王莽末平林陳牧等聚衆號平林兵聖公往從之及破莽軍號聖公為更始將軍衆雖多無所統一遂共立更始為天子更始即帝位南面朝群臣素懦弱羞愧流汗舉手不能言初入都宛城時漢兵誅王莽傳首詣宛縣於市遂北都洛陽後遷長安初莽敗惟未央宮被焚餘宮館無所毀官府市里不改於舊更始既至居長樂宮升前殿郎吏以次列庭中更始羞怍俯首刮席不敢視後赤眉賊入關見殺晉惠帝初為太子朝廷咸知不堪政事武帝亦疑焉嘗使決尚書事不能對賈妃遣左右代對遂安及居大位政出群下綱紀大壞貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市嘗在華林園聞蝦蟆聲謂左右曰此鳴者為官乎私乎或對曰在官地為官在私地為私及天下荒亂百姓餓死帝曰何不食肉糜其蒙蔽皆此類伊籍一拜酈生長揖蜀志伊籍字機伯山陽人先主以為左將軍從事中郎遣使吳孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君乎對曰一拜一起未足為勞機捷類如此權甚異之前漢酈食其陳留高陽人好讀書家貧落魄無衣食業為里監門縣中賢豪不敢役謂之狂生沛公略地至高陽召食其入見沛公方踞床使兩女子洗食其長揖不拜曰足下必欲舉義兵誅無道秦不宜踞見長者於是沛公輟洗起衣延上坐謝之既下陳留號為廣野君韓信東擊齊又使食其說齊王田廣罷歷下兵馮軾下齊七十餘城及信兵至廣以為食其賣己乃烹之馬安四至應璩三入前漢司馬安汲黯姊子少與黯為太子洗馬安文深巧善宦四至九卿終河南太守昆弟以安故同時至二千石十人文章敘録應璩字休璉汝南人博學好屬文魏文明帝世歷散騎常侍齊王即位遷侍中大將軍長史曹爽秉政多違法度璩為百一詩以諷焉其略曰前者墮官去有人適我閭田家無所有酌醴梵枯魚問我何功德三入承明廬其言雖頗諧合多切世要世共傳之郭解借交朱家脫急前漢郭解字翁伯河內軹人為人靜悍不飲酒少時陰賊感概不快意所殺甚衆以軀借交報仇臧命作姦剽攻劫及鑄錢掘冢不可勝數適有天幸窘急常得脫長更折節為儉以德報怨厚施而薄望後坐客殺人解實不知御史大夫公孫宏議曰解布衣為任俠行權以睚眥殺人當大逆無道遂族解前漢朱家魯人魯人皆以儒教而朱家用俠聞所藏活豪士以百餘其餘庸人不可勝言然終不伐其能飲其德諸所嘗施惟恐見之賑人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軻車專趍人之急甚於己私既陰脫季布之厄及布尊貴終身不見自關以東莫不延頸願交虞延刻期盛吉垂泣後漢虞延字子大陳留東昏人延初生其上有物若一匹練遂上升天占者以為吉及長長八尺二寸要帶十圍力能扛鼎性敦朴不拘小節又無鄉曲之譽王莽末天下大亂延常嬰甲胄擁衛親族捍禦鈔盜賴其全者甚衆建武初除細陽令每至歲時伏臘輒休遣徒繫歸家並感恩德應期而還有囚於家被病自載詣獄既至而死率掾官屬殯于門外百姓感悅永平中為三公會稽典録盛吉字君達拜廷尉性多仁惠務在哀矜每冬月罪囚當斷其妻執燭吉持丹青筆相向垂泣謝承後漢書盛吉為廷尉每至冬節罪囚當斬妻夜執燭吉持丹筆夫妻相對垂泣決罪豫讓吞炭鉏麑觸槐史記豫讓晉人嘗事范中行氏去而事智伯智伯尊寵之趙襄子與韓魏合謀滅智伯三分其地襄子怨智伯漆其頭為飲器讓曰士為知己者死女為說己者容我必為智伯報讎乃變名姓為刑人入宮塗廁中挾七首欲以刺襄子襄子如廁心動搜之則豫讓也襄子義而釋之又漆身為厲吞炭為啞使形狀不可知伏於橋下襄子至橋馬驚曰此必豫讓問曰子事范中行氏智伯滅之不為報讎而反臣智伯智伯已死獨何報讎之深對曰臣事范中行氏衆人遇我我故衆人報之智伯國士遇我我故國士報之襄子曰寡人赦子亦足矣子自為計讓曰臣固伏誅然願請君之衣而擊之以致報讎之意襄子持衣與之乃拔劍三躍而擊之曰吾可以下報智伯矣遂伏劍而死左氏傳晉靈公不君厚斂以雕牆從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之置諸畚婦人載過朝盾為正卿驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死阮孚蠟屐祖約好財晉書阮孚字遙集始平太守咸之子元帝以為安東參軍蓬髮飲酒不以王務嬰心轉從事中郎終日酣縱常為有司所按遷散騎從侍嘗以金貂換酒復為所司彈劾帝宥之初祖約性好財孚性好屐同是纍而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見其蠟屐因自歎曰未知一生當著幾量屐神色閒暢於是勝負始分終廣州刺史約字士少豫州刺史逖之子蘇峻剋京師矯詔以為侍中為石勒所殺初平起石左慈擲杯神仙傳王初平丹溪人年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起索之不得見後在市有道士善卜乃就占之道士曰金華山中有牧羊兒是卿弟非邪初起即隨道士尋見兄弟悲喜問羊何在初平曰近在山東初起往視了不見羊但見白石無數還曰無羊初平曰羊在耳但兄自不見便乃俱往初平言叱叱羊起於是白石皆起成羊數萬頭初起曰吾弟得神通如此吾可學否初平曰唯好道便得初起便棄妻兒留就初平共服松脂茯苓至五千日能坐在立亡日中無影有童子之色後還鄉諸親死亡略盡乃去以方教授南伯逢易姓為赤初起改為魯班初平改為赤松子其後傳服此藥得仙者數十人神仙傳左慈字元放廬江人少明五經兼通星氣見漢祚將盡乃歎曰值此衰運官高者危才高者死當代榮華不足貪也乃學道術尤明六甲能役鬼神坐致行廚精思於天柱山中得石室九丹金液經能變萬端曹操聞而召之閉一室中斷穀食日與二升水期年出之顏色如故操欲學道左慈曰學道當清淨無為操怒謀殺之為設酒慈乞分杯飲酒時天寒溫酒尚未熱慈拔簪以畫杯酒酒即中斷分為兩向慈飲其半送半與操操未即飲慈乞自飲飲畢以杯擲屋棟杯便懸著棟動搖似鳥飛之狀仰欲落不落一坐骲目視杯已失慈所在操嘗會賓顧衆曰珍羞具備所少吳江鱸魚耳慈求銅盆貯水以竹竿釣須臾引鱸出操曰一魚不周坐席慈更餌釣沉之復引出皆三尺餘操鱠之恨無蜀薑慈曰易得操恐近取之因曰吾前遣人到蜀買錦可報令增二端語頃即得薑還使報命後返驗問增錦之狀若符契也武陵桃源劉阮天臺陶潛桃花源記晉太元中武陵人捕魚緣溪行忘路之遠近忽逢桃花林夾岸數百步中無雜樹芳華鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源得一山山有小口髣佛若有光便捨船從口入初極狹才通人復行數十步豁然開朗土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黃髮垂髫怡然自樂見漁人大驚問所從來具答之便邀還家為設酒殺雞作食村中咸來問訊自云先世避秦亂率妻子邑人來此絶境不復出遂與外人間隔問今是何世乃不知有漢無論魏晉此人為具言聞皆歎惋餘人各復延至其家皆出酒食停數日辭去既出得其船便扶向路處處志之及郡詣太守說太守即遣人隨往尋向所志遂迷不復得路續齊諧記漢明帝永平中剡縣有劉晨阮肇入天臺山採藥迷失道路糧盡望山頭有桃共取食之如覺少健下山得澗水飲之並澡洗望見蔓菁菜從山腸出次有一杯流出中有胡麻飯屑二人相謂曰去人不遠因過水行一里又度一山出大溪見二女顏容絶妙世未有便喚劉阮姓名如有舊喜問郎等來何晚因邀過家宮館服飾精華東西各有床帳帷設七寶瓔珞非世所有左右直悉青衣端正都無男子須臾下胡麻飯山羊脯甚美又設甘酒有數十客將三五桃至云來慶女壻各出樂器歌調作樂日向暮仙女各遷去劉阮就所邀女家止宿行夫婦之道留十五日求還女曰來此皆是宿福所招得與仙女交接流俗何所樂遂住半年天氣和適常如三二月百鳥哀鳴悲思求歸甚切女曰罪根未滅使君等如此更喚諸仙女共作歌吹送劉阮從此山洞口去不遠至大道隨其言得還家鄉並無相識鄉里怪異乃驗得七代子孫傳聞上祖入山不出不知何在既無親屬棲泊無所卻欲還女家尋山路不獲至太康八年失二人所在王儉墜車褚淵落水南史齊司徒褚淵字彥回因送湘州刺史王僧虔閣道壞落水僕射王儉驚跳下車謝超宗撫掌笑曰落水三公墜車僕射彥回出水霑濕狼籍超宗先在僧虔舫抗聲曰有天道焉天所不容有地道焉地所不受投畀河伯河伯不受彥回大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士儉字仲玉祖曇首父僧綽俱為侍中儉幼篤學丹陽尹袁粲見之曰宰相之門栝柏豫章雖小已有棟梁器終當任人家國事仕至中書監寡嗜欲惟以經國為事少有宰相志賦詩云稷契正虞夏伊呂翼商周舊本儉作常誤也褚淵年十餘時父有牛墮井營救喧擾淵下簾不視有門生盜其衣淵見謂曰可密藏之無令人知門生慚而去宋明帝遷吏部尚書有人求官密袖一餅金出示之曰人無所知淵曰卿自應得官無假此物若見與必相啓此人懼收金而去後為尚書令歸心齊高帝帝立進位中書監世以名節譏之百姓語曰可憐石頭城寧為袁粲死不作彥回生粲為司徒與尚書令劉彥節二於高帝死其事季倫錦障春申珠履晉書石崇字季倫父苞位至司徒臨終分財物與諸子獨不及崇其母以為言苞曰此兒雖小後自能得為荊州刺史卻遠使商客致富不資後拜衛尉財産豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶疏世所罕比愷以示崇崇以鐵如意擊碎愷聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條幹絶俗光彩耀日如愷比者甚衆愷恍然自失史記楚考烈王以黃歇為相對春申君是時齊有孟嘗君趙有平原君魏有信陵君方爭下士招致賓客以相傾奪趙平原君使人於春申君春申君舍之於上舍趙使欲夸楚為玳瑁簪刀劍室以珠玉節之請命春申君客春申君客三千餘人皆躡珠履以見趙使趙使大慚甄后出拜劉楨平視魏志文昭甄皇后漢太保甄邯後袁紹為中子熙納之熙出為幽州后留養姑及冀州平文帝納后於鄴魏略曰鄴城破紹妻及后共坐皇堂上文帝入紹舍見紹妻及后后怖以頭伏姑膝上紹妻兩手自摶文帝謂曰劉夫人云何如此令新婦舉頭姑乃捧后令仰文帝就視見其顏色非凡稱歎之太祖聞其意遂為迎取典略曰太子嘗請諸文學酒酣坐歡命夫人甄氏出拜坐中衆人皆咸伏而劉楨獨平視太祖聞之乃收楨減死輸作胡嬪爭摴晉武傷指晉書胡貴嬪名芳父奮家世將門為鎮軍大將軍武帝多簡良家女以充內職自擇其美者以絳紗繫臂芳既入選下殿號泣左右止之曰陛下聞聲芳曰死且不畏何畏陛下拜為貴嬪時帝多內寵平吳後復納孫皓宮人數千掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車然芳蒙幸殆有專房之寵侍御服飾亞於皇后帝嘗與之摴蒲爭失遂傷上指帝怒曰此固將種也對曰北伐公孫西距諸葛非將種而何帝有慚色石慶數馬孔光溫樹前漢石奮趙人孝文時官至太中大夫無文學恭謹無與比長子建次甲次乙次慶皆以馴行孝謹官至二千石景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君慶武帝時為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易然猶如此後為丞相前漢孔光字子夏孔子十四世孫經學尤明以高第為尚書轉僕射尚書令凡典樞機十餘年有所言輒削草藁以為章主之過以好忠直人臣大罪有所薦舉惟恐人之聞知沐日歸侍兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光默不應答以他語其不泄如是哀帝立拜丞相及王莽權盛稱宰衡光固辭位太后詔曰國之將興尊師而重傅其令太師每朝十日一賜餐賜靈壽杖光凡為御史大夫丞相各再一為大司徒太傅太師歷三世居公輔位翟湯隱操許詢勝具晉書翟湯字道深尋陽人篤行純素廉潔不屑世事耕而後食永嘉末寇害相繼聞湯名德皆不敢犯鄉鄰賴之辟召不至子莊字祖休遵湯之操不交人物惟以弋釣為事及長不復獵或問漁獵同是害生何止去其一莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鉤豈我哉時以為知言晚節亦不復釣徵命不就子矯亦有高操屢有辭辟命矯子法賜孝武時以散騎郎徵不至世有隱行云舊注引世說許詢字元度好遊山澤而體便登陟時人曰許非徒有勝情有濟勝之具詢隱永興幽穴每致四方諸侯之遺或謂許曰嘗聞箕山人乃似爾耳許曰筐篚苞苴固當輕於天下之寶今本無載優旃滑稽落下歷數史記優旃秦倡侏儒善為笑言然合於大道秦始皇時置酒而天雨陛楯者皆沾寒旃哀之謂曰汝欲休乎我即呼女汝應曰諾有頃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益幸雨立我雖短幸休居於是始皇使得半相代嘗欲大苑囿旃曰善多縱禽獸於其中寇從東方來令麋鹿觸之足矣始皇以故輟止二世而又欲漆其城旃曰佳哉漆城蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室二世笑而止前漢方士唐都分天部巴郡落下閎與焉都分天部而閎運算轉歷其法以律起歷曰律容一籥積八十一寸則一日之分也與長相終律長九寸百七十一分而終復三復而得甲子夫律陰陽九六爻象所從出也故黃鍾紀元氣謂之律律法也莫不取法焉贊曰歷數則唐都落下閎曼容自免子平畢娶前漢邴丹字曼容琅邪人養志自修為官不肯過六百石輒自免去後漢向長字子平河內朝歌人隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢敕斷家事勿相關遂肆意遊五嶽名山不知所終師曠清耳離婁明目呂氏春秋晉平公鑄為大鐘使工聽之皆以為調師曠曰不調請更鑄之平公曰工皆以為調矣師曠曰後世有知音者將知不調臣切為君恥之至師涓果知鐘之不調是師曠欲善調鐘以為後之知音也慎子離朱之明察毫末於百步之外下水尺不能見淺深非目不明其勢難覩也仲文照鏡臨江折軸晉書殷仲文陳郡人轉尚書素有名望自謂必當朝政又謝琨之徒疇昔所輕者並皆比肩常怏怏不得志忽遷洛陽太守意彌不平後謀反伏誅仲文常照鏡不見其面數日而遇禍前漢臨江閔王榮景帝子立為太子廢為臨江王三歲坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕切言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之欒巴噀酒偃師舞木神仙傳欒巴蜀郡人漢帝召為尚書正朝大會巴獨後到頗有醉色不飲而以酒望西南噀之有司奏巴大不敬詔問巴巴對曰臣鄉里以臣能治鬼護病為臣立廟今旦耆老皆入廟致饗是以來遲適臣本縣成都市失火臣噀酒為雨以滅火災詔原罪即遣使往驗其言答云正旦失火食時有大雨從東北來火乃息雨皆酒氣後一旦大風天霧暗失巴所在尋問之旦日還成都與親戚別去而升天矣巴字叔元見後漢列子周穆王西巡狩道有獻士人名偃師王問曰若有何能曰臣有所造願王觀之越日謁見王王曰若與俱來者何人邪對曰臣之所造能倡者王視之趨步俯仰信人也巧夫鎖其頤則歌合律捧其手則舞應節千變萬化唯意所適王以為實人也與盛姬內御並觀之技將終倡者瞬其目而招王之左右侍妾王怒欲誅偃師偃師立剖散倡者以示王皆傅會衆木膠漆白黑丹青之所為德潤傭書君平賣卜吳志闞澤字德潤乃會稽人家世農夫至澤好學居貧無資常為人傭書以供紙筆所寫既畢誦讀亦遍追師論講究覽群籍兼通歷數由是顯名仕孫權為中書令侍中太子太傅每朝大議經典所疑輒咨訪之以儒學勤勞封都鄉侯前漢嚴遵字君平蜀郡人修身自保非其服弗服非其食弗食卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢道之以善裁日閲數人得百錢足自養則閉肆下簾而授老子博覽亡不通授老莊之指著書十餘萬言揚雄少時從遊學及而仕京數為朝廷在位賢者稱君平德年九十餘終叔寶玉潤彥輔冰清晉書衛玠字叔寶五歲風神秀發祖父瓘曰此兒有異於衆顧吾年老不見其成長耳玠舅驃騎將軍王濟雋爽有風姿每見玠輒歎曰珠玉在側覺我形穢又嘗語人曰與玠同遊宛若明珠之在側朗然照人玠妻父樂廣有海內重名議者以為婦公冰清女壻玉潤晉樂廣字彥輔年八歲夏侯元見之謂其父曰廣神姿朗徹當為名士可令專學必能興卿門戶衛瓘見而奇之命諸子造焉曰此人如冰鏡見之瑩然若披雲霧而覩青天也王衍自言與人語甚簡及見廣便覺己之煩其為識者歎美如此衛后髮鬒飛燕體輕張衡西京賦衛后興於鬒髮飛燕寵於體輕衛后前漢孝武帝皇后也字子夫其家號曰衛氏出平陽侯邑初為平陽公主謳者武帝中得幸主因奏子夫送之宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘後生男據遂立為皇后而男為太子遭巫蠱事起江充為姦太子與后共誅充太子敗亡后自殺前漢飛燕孝成帝趙皇后也本長安宮人初生父母不舉三日不死遂收養之及壯屬陽阿主家學歌舞號曰飛燕帝嘗微行出過主作樂見而說之召入宮大幸女弟復入俱為倢妤貴傾後宮立為皇后後寵少衰而弟絶幸為昭儀娣弟顓寵十餘年皆無子及帝暴崩民間歸罪昭儀昭儀自殺哀帝立尊后為皇太后帝崩見廢自殺西京雜記曰飛燕為皇后女弟在昭陽殿后體輕腰弱善行步進退昭儀不能及但弱骨豐肌尤工笑語二人並色如紅玉為當時第一元石沈湎劉伶解酲博物志昔劉元石於中山酒家酤酒酒家與千日酒忘言其節度歸至家當醉而家人不知以為死也權葬之酒家計千日滿乃憶元石前日醉酒醉向醒耳往視之云元石之死三年已葬於是開棺醉始醒俗云元石飲酒一醉千日晉書劉伶字伯倫沛國人放情肆志常以細宇宙齊萬物為心常乘鹿車攜一壺酒使人荷鍤隨之謂曰死便埋我其遺形骸如此嘗渴甚求酒於妻妻指毀酒器涕泣諫曰君酒太過非攝生之道宜斷之伶曰善吾不能自禁當祝鬼神自誓可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽仍飲酒御肉頽然復醉嘗醉與俗人相忤其人攘袂奮拳而往伶徐曰雞肋不足以安尊拳其人笑而止伶未嘗厝意文翰著酒德頌一篇嘗為建威參軍太始初對策盛言無為之化時輩皆高第得調伶獨以無用罷竟以壽終趙勝謝躄楚莊絶纓史記平原君趙勝趙之諸公子喜賓客賓客至者數千人相趙惠文王及孝成王三去相三復位家樓臨民家有躄者槃散行汲美人居樓上見大笑之明日躄者至門請曰士之不遠千里而來者以君能貴士而賤妾臣不幸有罷癃之病而君之後宮笑臣臣願得笑臣者頭勝笑應曰諾終不殺歲餘賓客稍稍引去者過半勝怪之客曰以君不殺笑躄者以為愛色而賤士即去耳勝乃斬笑者頭自造躄者門謝焉後乃復求說苑楚莊王賜群臣酒日暮酒酣燈燭滅有引美人之衣者美人援絶其冠纓告王趣火來上視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不歡群臣百餘人皆絶去其冠纓而上火盡歡而罷後晉與楚戰有一臣常在前五合五獲首卻敵卒勝之莊王怪問乃夜絶纓者顯報王也惡來多力蜚廉善走史記蜚廉生惡來惡來有力蜚廉善走父子俱以材力事紂惡來蜚廉遊諸侯武王伐紂并殺惡來是時蜚廉為紂居北方晏子春秋曰惡來手裂虎兕皇甫謐曰作石棺於北方趙孟疵面田駢天口舊注晉趙孟字長舒為尚書令史難口清談面有疵點時人曰諸事不決問疵面七略曰田駢齊人好談論時號曰天口開言其口如天不可窮也張憑理窟裴頠談藪晉書張憑字長宗吳郡人有志氣為鄉閭所稱舉孝廉負其才自謂必參時彥初欲詣劉惔鄉里及同舉者共笑之既至惔處之下坐神意不接憑欲自發而無端會王濛就惔清言有所不通憑於末坐判之言旨深遠足暢彼我之懷一坐皆驚惔延之上坐清言彌日留宿至旦遣之憑既還船須臾惔遣傳教覓張孝廉船召與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至御史中丞晉書裴頠字逸民司空秀之子宏雅有遠識博學稽古少知名中丞周弼見而歎曰頠若武庫五兵縱橫一時之傑也樂廣嘗與頠清言欲以理服之而頠辭語豐博廣笑而不言時人謂頠為言談之林藪纍遷左僕射為趙王倫所害仲宣獨步子建八斗魏志王粲字仲宣山陽高平人除黃門侍郎以西京擾亂不就乃之荊州依劉表表以粲貌衰而體弱進退不甚重也歸太祖纍拜侍中曹植與楊修書曰今世作者可略而言昔仲宣獨步於漢南孔璋鷹揚於河朔偉長擅名於青土公幹振藻於海隅德璉發跡於大魏足下高視於上京當此之時人人自謂握靈蛇之珠家家自謂抱荊山之玉也孔璋陳琳字偉長徐幹字公幹劉楨字德璉應璩字也魏志陳思王曹植字子建年十歲餘誦讀詩論及辭賦數十萬言善屬文太祖嘗視其文曰汝倩人邪植曰言出為論下筆成章奈何倩人時銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之每進見難問應聲而對特見寵愛文帝即位纍封陳王舊注引謝靈運云天下才共有一石子建獨得八斗我得一斗自古及今同用一斗奇才博敏安有繼之廣漢鉤距宏羊心計前漢趙廣漢字子都涿郡蠡吾人也遷京兆尹威名流聞其發奸摘伏如神政清吏民稱之不容口自漢興治京兆者莫能及為人強力天性精於吏職尤善為鉤距以得事情鉤距者設欲知馬賈則先問狗已問羊又問牛然後及馬參伍其賈以類相準則知馬之貴賤不失實矣唯廣漢至精能行之他人效者莫能及郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之後上書告丞相魏相事失實宣帝惡之下廣漢廷尉獄又坐賊殺不辜數罪吏民守闕號泣者數萬人或願代死竟坐腰斬百姓追思歌之至今前漢桑宏羊雒陽賈人子武帝時以心計用事年十三侍中與大農丞東郭陽孔僅三人者言利事析秋毫拜御史大夫昭帝時謀反伏誅衛青拜幕去病辭第前漢衛青字仲卿其父鄭季河東平陽人以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛媼通生青青有同母兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏給事建章後拜車騎將軍擊胸奴以功封長平侯元朔中將三萬騎出高闕追胸奴右賢王得賢禆王十餘人衆男女萬五千餘人畜數十百萬引兵還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸李廣傳注衛青征胸奴絶大漠大克獲帝就拜大將軍於幕中府故曰幕府前漢霍去病大將軍衛青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后立去病以后姊子年十八為侍中從大將軍征胸奴以功封冠軍侯驃騎將軍後置大司馬位去病秩祿皆與青等去病為人少言不泄有氣敢往上嘗欲教之吳孫兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰胸奴不滅無以家為也上益重愛之酈寄賣友紀信詐帝前漢酈寄字況高陽人丞相商之子與呂祿善及高后崩大臣欲誅諸呂呂祿為將軍軍於北軍太尉周勃不得入乃使人劫商令寄紿祿祿信之與出遊勃乃得入據北軍遂誅諸呂天下稱酈寄賣友前漢紀信為將軍項羽圍漢王榮陽信曰事急矣臣請誑楚可以間出之是夜出女子東門二千餘人楚因四面擊之信乃乘王車黃屋左纛曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得與數十騎出西門遁羽見信問漢王安在曰已出去矣羽燒殺信濟叔不癡周兄無慧晉書王湛字處仲少有識度龍顙大鼻少言語初有隱德人莫能知兄弟宗族皆以為癡其父昶獨異焉闔門守靜不交當世沖素簡淡器量隤然有公輔之望兄子濟輕之嘗詣湛見床頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之因剖析元理微妙有奇趣皆濟所未聞武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是又問濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上仕至汝南內史左氏傳晉欒書中行偃使荀罃士魴逆周子于京師而立之是為悼公周子有兄無慧不辨菽麥故不可立杜預曰菽大豆豆麥殊形易別故以為癡者之候不慧蓋世所謂曰癡虞卿擔簦蘇章負笈史記虞卿游說之士躡蹻擔簦說趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿前漢蘇章字游卿北海人去官不仕於王莽舊注曰章負笈追師不遠千里南風擲孕商受斫涉晉書惠帝賈皇后名南風父充位三公初武帝欲為太子取衛瓘女曰衛公女有五可賈公女有五不可衛家種賢而多子美而長白賈家種妬而少子醜而短黑元后固請荀顗荀勗並稱充女之美乃定婚南風妬忌多權詐太子畏惑之嬪御罕有進幸者性酷虐嘗手殺數人或以戟擲孕妾子隨分墮地武帝怒將廢之荀勗等救得不廢及立為皇后遂荒淫放恣專制天下威服內外初誅楊駿及汝南王亮太保衛瓘楚王瑋等皆臨機專斷天下咸怨及太子廢趙王倫等因衆怒謀廢后后懼遂害太子以絶衆望倫乃率兵入宮廢之矯詔金屑酒賜死書太誓商王受斫朝涉之脛剖賢人之心廣德從橋君章拒獵前漢薛廣德字長卿沛郡相人以魯詩教授御史大夫蕭望之薦廣德經行宜充本朝為博士論石渠後拜御史大夫為人溫雅有醞藉及為三公直言諫爭元帝酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說光祿大夫張猛曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶乃從橋後乞骸骨賜安車駟馬黃金六十斤縣其安東傳子孫後漢郅惲字君章汝南平西人明天文歷數王莽時寇賊群發惲至長安上書莽大怒收繫詔獄劾以大逆猶以惲據經識難即害之使近臣脅令自告狂病不覺所言惲乃瞑目詈曰所陳皆天文聖意非狂人所能道會赦出乃南遁蒼梧建武中為上東城門候帝嘗出獵夜還惲拒關不開不受詔帝乃回從東中門入明日惲上書諫曰昔文王不敢盤于游田以萬民惟憂而陛下遠獵山林夜以繼晝其如社稷宗廟何書奏賜布百匹貶東中門候為參封尉再遷長沙太守應奉五行安世三篋後漢應奉字世叔汝南南頓人少聰明自為兒童及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣録囚徒數百千人及還太守問之奉口說罪繫姓名坐狀輕重無遺脫時人奇之官至司隸校尉謝承書曰奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於內開扇出半面視奉奉去後數十年於路見車匠識而問之前漢張安世字子孺少以父湯任為郎用善書給事尚書精力於職休沐未嘗出武帝幸河東嘗亡書三篋詔問莫能知唯安世知之具作其事後購求得書以相校無所遺失上奇其材擢為尚書令昭帝立為右將軍光祿勳封富平侯事武帝二十餘年忠信謹厚勤勞政事夙夜不怠宣帝時為大司馬車騎將軍安世為公侯食邑萬戶身衣弋綈夫人自紡績家僮七百人皆有手技作事治産業殖貨富於霍光相如題柱終軍棄繻前漢司馬相如字長卿蜀郡成都人也少好讀書學擊劍名犬子既學慕藺相如之為人更名相如以訾為郎事景帝為武騎將軍非其好也病免家貧無以自業及卓文君從奔後卓王孫分與財物為富人久之武帝召以為郎卬筰君長聞南夷與漢通得賞賜多願為內臣妾請使西南夷拜相如中郎將建節往使因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卬諸公皆因門下獻牛酒以交歡王孫喟歎自以得使女尚長卿晚相如略定西南夷卭筰冉駹斯揄之君皆請為臣妾除邊關邊關益斥舊注云蜀城北七里有升仙橋相如題其柱曰大丈夫不乘駟馬車不復過此橋前漢終軍字子雲濟南人少好學以辨博能屬文聞於郡中年十八武帝選為博士步入關關吏與軍繻軍問以此何為吏曰為復傳還當合符軍曰丈夫西遊終不復傳還棄繻而去及為謁者使行郡國建節東山出關關吏識之曰此使者乃前棄繻生也後擢諫大夫使南越自請願受長纓必羈南越王而致之闕下軍往說越王王請舉國內屬其相呂嘉不欲內屬發兵攻殺其王及漢使者皆死軍死時年二十餘故世謂之終童孫晨藁席原憲桑樞三輔決録孫晨字元公家貧織席為業明詩書為京兆功曹冬月無被有藁一束暮臥朝取莊子曰原憲居魯環堵之室茨以生草蓬戶不完桑樞甕牖上漏下濕匡坐而弦子貢乘大馬中紺而表素軒車不容巷往見憲憲草冠屣履杖藜而應門子貢曰嘻先生何病憲曰無財謂之貧學而不能行謂之病今憲貧也非病也子貢有慚色端木辭金鍾離委珠家語端木賜字子貢魯國之法贖人臣妾于諸侯者皆取金於府子貢贖之辭而不取金孔子聞之曰賜失之矣夫聖人舉事可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉何以相贖乎自今以後魯人不復贖人於諸侯後漢鍾離意字子阿會稽山陰人顯宗徵為尚書時交址太守張掞坐贓千金伏法以資物沒入大司農詔賜群臣意得珠璣委地而不拜賜帝怪問對曰孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此贓穢之寶誠不敢拜帝歎曰清乎尚書之言乃更以庫錢三十萬賜意轉僕射出為魯相以愛利為化人多殷富卒遺言上書陳升平之世難以急化宜少寬假帝感傷其意詔賜錢二十萬季札掛劍徐稚置芻史記吳季札吳王壽夢季子也初使北過徐君徐君好季札劍口弗敢言季札心知之為使上國未獻還至徐徐君已死乃解其寶劍繫徐君冢樹而去從者曰徐君已死尚誰豫乎季子曰不然始吾心已許之豈以死倍吾心哉札封於延陵故號延陵季子新序徐人嘉而歌之曰延陵季子兮不忘故脫千金之劍兮帶邱墓後漢徐稚字孺子豫章南昌人家貧常自耕稼非其力不食恭儉義讓所居服其德屢辭舉不就桓帝時陳蕃胡廣上疏薦之備禮徵不至嘗為太尉黃瓊所辟瓊卒乃往設雞酒薄祭哭畢而去不告姓名時會者郭林宗等聞之疑其稚也遣茅容追及之共言稼穡之事臨訣謂容曰為我謝林宗大樹將顛非一繩所維何為棲棲不遑寧處及林宗有母憂往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之朱雲折檻申屠斷鞅前漢朱雲字游魯人也容貌甚壯以勇力聞好倜儻大節當世高之舉方正為槐里令坐廢錮成帝時張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐臣願賜上方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素昔狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已後當治殿檻上曰勿易因而輯之以旌直臣雲自後不復仕後漢申屠剛字巨卿扶風茂陵人丞相嘉七世孫剛性方直常慕史鰌汲黯之為人平帝時舉賢良方正對策王莽令元后下詔罷歸建武七年徵拜侍御史遷尚書令光武嘗欲出游剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止以數切諫失旨出為平陰令復拜大中大夫舊注云以刀斷馬鞅未詳所出剛轉作綱衛玠羊車王恭鶴氅晉書衛玠總角乘羊車入市見者以為玉人觀者傾都拜太子洗馬以天下亂移家南行至豫章時王敦鎮豫章長史謝鯤雅重玠相見欣然言論彌日敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒玠嘗以人有不及可以情恕非意相干可以理遣故終身不見喜慍色玠以敦豪爽不群好居物上恐非忠臣求還建業京師人士聞其姿容觀者如堵會卒時謂被看殺晉書王恭字孝伯太原晉陽人少有美譽清操過人自負才地高華有宰輔之望為佐著作郎歎曰仕宦不為宰相才志何足以騁纍遷安化將軍為會稽王道子所害恭美姿儀人多愛悅或目之云濯濯如春月柳嘗披鶴氅裘涉雪而行孟昶窺見曰此真神仙中人也恭為性不宏暗於機會尤信佛法臨刑猶誦佛經管仲隨馬倉舒稱象韓非子管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水以管仲隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚必當師聖人之智不亦過乎魏志鄧哀王沖字倉舒武帝子少聰察岐嶷五六歲有若成人之智時孫權曾致巨象太祖欲知其斤重訪之群下莫能出其理沖曰置象大船之上而刻其水痕所至稱物以載之則校其可知矣太祖大悅即施行焉時軍國多事用刑嚴重凡應罪戮而為沖微所辨理賴以濟宥者前後數十太祖數對群臣稱述有欲傳後意會卒丁蘭刻木伯瑜泣杖孝子傳丁蘭事母孝母亡刻木為母事之蘭婦誤以火燒母面應時髮落如割說苑伯俞有過其母笞之泣母曰他日笞未嘗泣今泣何也對曰他日得罪笞常痛今母之力不能痛是以泣十二國史俞作瑜陳逵豪爽田方簡傲世說豪爽篇晉陳逵字道林往西岸都下諸人共邀至牛渚陳善言理諸人欲共言折陳陳以如意柱頰望雞籠山歎曰昔孫伯符志業不遂於是竟坐不得談伯符孫策字也史記魏文侯伐中山使子擊守之子擊逢文侯之師田子方於朝歌引車避下謁子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脫屣然奈何其同之哉子擊不懌而去黃向訪主陳實遺盜舊注後漢黃向豫章人嘗行於路拾得金囊乃訪主還之後漢陳實字仲弓潁川許人少作縣吏為都亭刺佐有志好學坐立誦讀縣令奇之聽受業太學後除太邱長修德清靜百姓以安吏白欲禁訟者實曰訟以求直禁之理將何申卒無訟者去官吏人追思之在鄉閭平心率物有爭訟輒率判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短時歲荒有盜夜入其室止於梁上實陰見之呼子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子是矣盜大驚自投於地稽顙歸罪歎曰視君狀貌不似惡人當由貧困令遺絹一匹自是一縣無盜後纍命不起卒于家海內赴者三萬餘人制衰麻者以百數共刊立石碑諡文範先生龐儉鑿井陰方祀竈風俗通龐儉亡其父隨母流落後居盧里鑿井得銅遂富因求奴得老蒼頭於家數日蒼頭自言堂上母是我婦母聞乃問之奴曰婦艾氏女字阿宏左足下有黑子右腋下有赤志如半櫛大母曰我翁也遂為夫婦如初時人謂曰盧里龐公鑿井得銅買奴得翁後漢陰識字次伯南陽新野人光烈皇后兄封原鹿侯顯宗時拜執金吾位特進其先出自管仲世奉其祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祀之自是暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言吾子孫必將強大至識三世而遂繁昌故後常以臘日祀竈薦黃牛羊焉韓壽竊香王濛市帽晉書韓壽字德真南陽堵陽人美姿貌善容止賈充辟為司空掾充每宴賓寮其女輒於青瑣中窺之見壽悅焉女大感想發於寤寐婢後往壽家具說女意并言其女光麗艷逸端美絶倫壽聞而心動令為通殷勤婢以白女女遂潛修音好厚相贈結呼壽夜入壽踰垣而至家中莫知時西域有貢奇香一著人則經月不歇帝甚貴之唯賜充及大司馬陳騫其女密盜以遺壽寮屬聞其芬馥稱之於充充意知女與壽通即以妻焉官至散騎常侍河南尹晉書王濛字仲祖太原晉陽人哀靖皇后父也少放縱不羈不為鄉曲所齒晚節始克己勵行有風流美譽善隸書美姿容嘗覽鏡自照稱其父字曰王文聞生如此兒邪居貧帽敗自入市買之嫗悅其貌遺以新帽時人以為達終司徒長史勾踐投醪陸抗嘗藥古列女傳楚子發攻秦軍絶糧士卒升分菽粒而食之子發朝夕芻豢黍梁大破秦將而歸其母閉門而不內使人數之曰子不聞越王勾踐之伐吳與客有獻醇酒一器者王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗糒者王又以賜軍軍士分而食之其不足踰嗌而戰自十也今子為將士卒升分菽粒子獨芻豢黍梁何也子非吾子無入吾門子發謝其母然後內之吳志陸抗字幼節丞相遜次子為吳將時晉平南將軍羊祜鎮南夏后城以西盡為晉有降者不絶祜增修德信以懷初附吳人悅服稱羊公不名祜與抗相對使命交通抗稱祜德量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈鴆人者時談以為華元子反復見於今抗每告其戍曰彼專為德我專為暴是不戰而自服也孔愈放龜張皓墮鵲晉書孔愈字敬康會稽山陰人也永嘉中愈為參軍應召為丞相掾仍除駙馬都尉參丞相軍事時年已五十矣以討華軼功封餘不亭侯愈嘗行經餘不亭見籠龜於路者愈買而放之溪中龜中流左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愈乃悟遂佩焉搜神記張皓為梁相天新雨後有鳥如山鵲飛翔近地令人摘之化為石皓命椎破得一金印文曰忠孝侯印皓上之藏宮後議郎汝南樊衡夷上言堯舜時舊有此官今天降印宜可復置田豫儉素李恂清約魏志田豫字國讓為并州刺史清約儉素賞賜皆散下士後漢李恂字叔英安定臨涇人也少習韓詩教授嘗數百人太守潁川李鴻辟從事後拜御史持節使幽州宣布恩澤肅宗嘉之拜兗州刺史以清約率下常席羊裘服布被遷張掖太守有威重名義縱攻剽周陽暴虐前漢義縱河東人少時常與張次公俱攻剽為群盜縱有姊以醫幸王太后太后問有子兄弟為官者乎姊曰有弟無行不可太后乃告上上拜義姁弟縱為中郎補上黨郡縱以鷹擊毛摯為治前漢周陽由為郡守二千石中最為暴虐驕恣所愛者撓法活之所憎者曲法滅之所居郡必夷其豪為守視都尉如令為都尉陵太守奪之治孟陽擲瓦賈氏如皋晉書張載字孟陽安平人也父收蜀郡太守載性閒雅博學有文章太康初至蜀省父道經劍閣載以蜀人恃險好亂因著銘以作誡益州刺史張敏奇之表上其文武帝遣使鐫之於劍閣山焉仕至中書侍郎載甚醜每行小兒以瓦石擲之委頓而反左氏傳叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手而上曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑顏回簞瓢仲蔚蓬蒿論語一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也高士傳張仲蔚扶風平陵人明天官博物善屬文好詩賦常居窮素所處蓬嵩沒人閉門養性不治名利清高時人莫知惟劉龔知之終身不仕三輔重焉麋竺收資桓景登高蜀志麋竺字子仲東海朐人仕先主纍拜安漢將軍搜神記曰竺嘗從洛歸未達家數十里路見婦人從竺求寄載行可數里婦謝去謂竺曰我天使也當往燒東海麋竺家感君見載故以相語竺因私請之婦曰不可得不燒君可馳去我當緩行日中火當發竺乃還家遽出財物日中而火大發續齊諧記汝南桓景隨費長房遊學纍年長房謂之曰九月九日汝家當有災厄急宜去令家人各作絳囊盛茱萸以繫臂登高山飲菊酒此禍可消景如言舉家登高夕還見雞犬牛羊一時暴死長房聞之曰代之矣今世人每至九日登山飲菊酒帶茱萸囊是也雷煥送劍呂虔佩刀晉書初吳之未滅斗牛間常有紫氣道術者皆以吳方強盛未可圖惟張華以為不然及吳平紫氣愈明華聞豫章雷煥妙達緯象乃要煥宿屏人共尋天文登樓仰觀煥曰惟斗牛間有異氣寶劍之精上徹於天耳華問在何郡曰在豫章豐城華即署煥為豐城令煥到縣掘獄屋基得石函中有雙劍並刻題一曰龍泉二曰太阿其夕氣不復見煥遣使送一與華留一自佩或曰得兩送一張公可欺乎煥曰本朝將亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去華得劍報煥書曰詳觀劍文乃干將也莫邪何不至雖然天生神物終當合耳華誅失劍所在煥卒子華為州從事得劍行經延平津忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反須臾光彩照水波浪驚沸於是失劍魏志呂虔字子恪任城人遷徐州刺史請王祥為別駕民事一以委之世多其知能任賢初虔有佩刀王相之以為必登三公可服此刀虔謂王曰茍非其人刀或為害卿有公輔之量故以相與祥為三公臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多賢才興於江左老萊斑衣黃香扇枕高士傳老萊子楚人少以孝行養親極甘脆年七十父母猶存萊子服斑斕之衣為嬰兒戲於親前言不稱老為親取食上堂足失而偃因為嬰兒啼誠至發中楚室方亂乃隱耕於蒙山之陽著書號老萊子莫知所終舊注云著五色斑斕之衣出列女傳今文無載後漢黃香字文強江夏安陸人博學經典究精道術能文章京師號曰天下無雙江夏黃童官至尚書令魏郡太守陶淵明曰香九歲失母思慕骨立事父竭力致養冬無被袴而盡滋味暑則扇床枕寒則以身溫席和帝嘉之時加異賜王祥守奈蔡順分椹晉書王祥字休徵琅邪臨沂人性至孝繼母朱氏不慈而祥愈恭謹母有病衣不解帶湯藥必親嘗母嘗欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解雙鯉躍出母又思黃雀炙復有黃雀數十飛入其幕鄉里驚歎以為孝感所致有丹奈結實母命守之每風雨輒抱樹而泣篤孝純至如此漢末遭亂扶母攜弟避地廬山隱居三十年不應州郡之命年衰耳順乃應召舉秀才纍遷太尉武帝時拜太保後漢蔡順字君仲汝南人少孤養母母終未葬里中災火將逼其舍順伏棺號哭叫天火遂越燒他室太守韓崇召為東閣祭酒母平生畏雷自亡後每有雷震順輒環冢泣曰順在此崇聞輒差車馬到墓所後舉孝廉不就舊注云王莽末天下大荒順拾椹赤黑異器盛之赤眉賊見而問之順曰黑者奉母赤者自食賊知其孝乃遺米二斗牛蹄一隻淮南食時左思十稔前漢淮南王安高祖之孫好書鼓琴不喜弋獵狗馬馳騁亦欲以行陰德拊循百姓流名譽招致賓客方術之士數千人作為內外書又有中篇言神仙黃白之術時武帝好藝文以安屬為諸父辨博善為文辭甚尊重之每為報書及賜常召司馬相如等視草乃遣安初入朝使為離騷傳旦受詔日食時上每宴見談說得失及方技賦頌昏暮然後罷後謀反自殺晉書左思字太沖齊國臨淄人貌寢口訥而辭藻莊麗造齊都賦一年乃成復欲賦三都乃詣著作郎張載訪岷邛之事遂搆思十年門庭藩溷皆著筆紙遇得一句即便疏之自以所見不博求為祕書郎及賦成時人未之重自以其作不謝班張以示皇甫謐謐稱善為其賦序張載為注魏都劉逵注吳蜀而序之張華見曰班張之流也於是競相傳寫洛陽為之紙貴初陸機欲為此賦聞思作撫掌而笑與弟雲書曰此間有傖父欲作三都賦須其成當以覆酒甕耳及思賦出機歎伏以為不能加遂輟筆焉劉惔傾釀孝伯痛飲晉書何充字次道廬江灊人康帝時為中書監録尚書事充能飲雅為劉惔所貴惔每云見次道飲令人欲傾家釀言其能溫克也舊本惔作恢誤世說王孝伯曰但痛飲酒讀離騷便可稱名士女媧補天長房縮地淮南子往古之時四極廢九州裂天不兼覆地不周載火爁炎而不滅水浩洋而不息猛獸食顓民鷙鳥攫老弱於是女媧鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟冀州積蘆灰以止淫水蒼天補四極正淫水涸冀州平狡蟲死顓民生後漢費長房既遇仙翁欲求道而顧家人為憂翁乃斷一青竹度與長房身齊使懸之舍後家人見即其形也以為縊死遂葬之長房隨入深山群虎中留使獨處長房不恐又臥於空室以朽索懸萬斤石於心上衆蛇來齧索且斷長房亦不移公曰子可教也復使食糞糞中有蟲臭甚長房意惡之翁曰子幾得道恨此不成長房辭歸翁與一竹杖曰騎此任所之則自至既至可以杖投葛陂中又為作一符曰以此主地上鬼神長房乘杖須臾來歸自謂去家適經旬日已十餘年矣即以杖投陂顧視則龍也後遂能醫療衆疾鞭笞百鬼後失其符為衆鬼所殺季圭士首長孺國器魏志崔琰字季圭河南武城人遷中尉甚有威望朝士瞻仰太祖亦敬憚焉明帝時崔林嘗與陳群論冀州人士稱琰為首林琰從弟少無名望雖姻族猶輕之琰常曰大器晚成終必遠至孫禮盧育始入軍府琰曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後咸至鼎輔前漢韓安國字長孺梁成安人徙睢陽事梁孝王為中大夫後坐法抵罪蒙獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之無何漢使使者拜內史起徙中為二千石田甲亡安國曰甲不就官我滅而宗甲肉袒謝安國曰公等足與治乎卒善遇之為人多大略知足以當世取舍而出於忠厚貪嗜財利然所推舉皆廉士賢於己者士亦以此稱之唯天子以為國器官至御史大夫行丞相事陸玩無人賈詡非次晉書陸玩字士瑤吳人器量淹雅纍轉尚書散騎常侍尋而王導郗鑒庾亮相繼薨朝野以為三良既沒以玩有德望乃遷司空既而歎息謂賓客曰以我為三公是天下為無人談者以為知言玩翼亮纍世常以宏重為人主所貴嘉性通雅不以名位格物誘納後進謙禮布衣由是縉紳之徒莫不廕其德宇魏志賈詡字文和武威姑臧人少時人莫知唯閻忠異之謂詡有良平之奇後拜尚書典選舉多所匡濟文帝時為太尉荀勗別傳曰晉司徒闕武帝問勗答曰三公具瞻所歸不可用非其次昔魏文帝用賈詡孫權笑之何晏神伏郭奕心醉魏志王弼山陽人好論儒道辭才逸辨注易及老子年二十餘卒何劭為其傳曰弼字輔嗣為尚書郎時裴徽為吏部郎弼未冠往造焉徽一見異之問曰夫無者誠萬物之所資然聖人莫肯致言而老子申之無己者何弼曰聖人體無無又不可以訓故不說也老子是有者也故常言無所不足何晏為吏部尚書甚奇弼歎曰仲尼稱後生可畏若斯人者可與言天人之際乎舊云神伏出世說無載晉郭奕字大業太原陽曲人高爽有識量少所推先見阮咸心醉不覺歎焉山濤稱其高簡有雅量太康中為尚書有重名朝臣皆出其下常林帶經高鳳漂麥魏志常林字伯槐河南溫人避地上黨耕種山阿當時旱蝗林獨豐收盡呼比鄰升斗分之仕至光祿大夫魏略曰林少單貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻餉之雖在田野相敬如賓後漢高鳳字文通南陽葉人家以農為業鳳專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞天雨暴至而鳳持竿誦經不覺潦水流麥妻還怪問方悟後為名儒年老執志不倦太守連召請恐不得免乃詐與寡嫂訟田後舉直言到公車託病隱身漁釣孟嘉落帽庾敳墮幘晉書孟嘉字萬年江夏人少知名為征西相溫參軍溫甚重之九月九日溫燕龍山寮佐畢集時佐吏並著戎服有風至吹嘉帽墮落嘉不之覺溫使左右勿言欲觀其舉止嘉良久如廁溫令取還之命孫盛作文嘲嘉著嘉坐嘉還見即答之其文甚美嘉好酣飲愈多不亂溫問酒有何好而卿嗜之嘉曰公未得酒中趣耳又問聽妓絲不如竹竹不如肉何也答曰漸近使之然晉書庾敳字子嵩潁川𨻳陵人長不滿七尺而腰帶十圍雅有素韻參東海王越軍事轉軍咨祭酒時劉輿見任於越人士多為所構惟敳縱心事外無跡可間後以其性儉家富說越令就換錢千萬冀其有吝因此可乘越於衆坐中問敳敳頽然已醉幘墮幾上以頭就穿取徐答云下官家故有兩千萬隨公所取輿於是乃服越甚悅因曰不可以小人之慮度君子之心後石勒亂被害龍逢板出張華臺坼舊注引論語陰嬉讖曰庚子之日金板剋書出地庭中曰臣族虐王禽宋均曰謂殺關龍逢之後庚子之旦庭中地有此板異也龍同姓稱族虐王王殺我必見禽也晉書張華字茂先范陽方城人學業優博辭藻溫麗器識宏廣初未知名著鷦鷯賦阮籍見之曰王佐才也由是聲名始著晉受禪拜黃門侍郎華強記默識四海之內若指諸掌武帝嘗問漢宮室制度應對如流聽者忘倦數歲拜中書令贊成伐吳之計封廣武縣侯名重一世衆所推服聲譽益甚有臺輔之望惠帝時拜中書監盡忠匡輔彌縫補闕雖當暗主虐后之朝而海內晏然華之功也進司空第舍及省監數有妖怪少子韙以中臺星坼勸華遜位華不從曰天道元遠惟修德以應耳不如靜以待之以俟天命卒之以忠正為趙王倫孫秀等矯詔害之朝野悲痛華性好人物士有一介之善為之延譽雅愛書籍嘗徙居載書三十乘天下奇祕世所稀有者悉在華所博物洽聞世無與比董奉活燮扁鵲起虢神仙傳董奉字君異候官人杜燮為交州刺史得毒病死三日奉時在南方乃往以三丸藥內其口中令人舉其頭逍遙之食頃燮開口動手足顏色還半日能起坐遂活奉還廬山下居為人治病不取錢物使病愈者為種一株杏數年有數十萬株鬱然成林杏子大熟奉於林中作倉宣語欲買杏者但自取之一器穀得一器杏每穀少而取杏多者有虎逐之有偷杏虎逐齧死家人知送杏還死者即活自是買杏者自平量之不敢欺奉以所得糧穀賑救貧窮供給行旅民間僅百年乃升天顏色常如年三十時也史記扁鵲勃海鄭人姓秦名越人少時長桑君奇之出其懷中藥豫之飲乃悉取其禁書豫之忽然不見扁鵲以此視病盡見五藏癥結特以診脈為名耳後過虢虢太子死扁鵲曰臣能生之乃使弟子子陽厲針砥石以取外三陽五會有間太子蘇乃使子豹為五分之尉以八減之齊和煮之以更尉兩脅下太子起坐更適陰陽但服湯二旬而復故故天下盡以扁鵲為能生死人過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦太醫李醯自知技不如扁鵲使人刺殺之至今言脈者由扁鵲寇恂借一何武去思後漢寇恂字子翼上谷昌平人光武拜恂河內太守行大將軍事謂曰昔高祖留蕭何鎮關中今吾委公以河內堅守轉運給足軍糧率厲士馬防遏他兵勿令北度而已後拜潁川太守入為執金吾明年穎川盜賊起帝謂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也即日車駕南征從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此可獨享乎時人歸其長者以為有宰相器前漢何武字君公蜀郡郫人舉賢良對策拜諫大夫成帝時纍進大司空為人仁厚好進士獎稱人善為楚內史後兩龔在沛郡後兩唐及為公卿薦之朝廷世以此多焉然疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先為科例以防請託其所居亦無赫赫名去後常見思後為御史大夫免官王莽為宰衡陰誅不附己者見誣自殺兩龔為勝舍兩唐謂林遵也韓子孤憤梁鴻五噫史記韓非韓之諸公子也喜刑名法術之學歸本於黃老為人口吃不能道說而善著書與李斯俱事荀卿非見韓之削弱數以書諫韓王王不能用於是觀往者得失之變作孤憤五蠹內外儲說林說難十餘萬言人或傳其書至秦秦王見之曰寡人得見此人與之游死不恨矣後非使秦秦王悅之未信用李斯毀之王下吏治非斯使人遺藥使自殺後漢梁鴻受業太學家貧尚節介博覽不為章句歸鄉里勢家慕其高節多欲女之鴻並不娶後娶孟氏隱霸陵山中以耕織為業詠詩書彈琴以自娛因東出關過京作五噫之歌曰陟彼北邙兮噫顧覽帝京兮噫宮室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得乃易姓名居齊魯之間遂至吳依大家皋伯通居廡下為人賃舂每歸妻為具食不敢鴻前仰視舉案齊眉伯通異之曰彼傭能使其妻敬之如此非凡人也乃舍之於家鴻潛閉著書十餘篇卒於吳蔡琰辨琴王粲覆棊後漢蔡琰字文姬中郎將雍之女博學有才辨妙於音律舊注云琰年九歲時雍夜鼓琴絃絶琰曰第二絃雍故絶一絃以問之琰曰第四絃雍曰爾偶中耳琰曰昔季札觀風知國之存亡師曠吹律識南風之不競以此推之何不知也魏志王粲纍拜侍中博物多識問無不對與人共行讀道邊碑人問曰卿能暗誦乎曰能因使背而誦之不失一字觀人圍棋局壞粲為覆之棋者不信以帊蓋局使更以他局為之用相比校不誤一道其強記默識如此性善算作算術略盡其理善屬文舉筆便成無所改定時人以為宿構然正復精意覃思亦不能加也典略曰粲既才高辨論應機鍾繇王朗等雖為卿相至於朝廷奏議皆閣筆不能措手西門投巫何謙焚祠史記魏文侯時西門豹為鄴令豹到問民所疾苦長老曰苦為河伯娶婦以故貧俗語不為娶婦水來漂溺人民豹曰至時幸來告吾亦往送女至其時豹往會河上三老官屬豪長者里父老皆會其巫老女子從弟子女十人皆衣繒單衣立大巫後豹呼河伯婦視之曰是女不好煩大巫嫗為報河伯更求好女使吏卒拘大巫嫗投之河中有頃曰何久也弟子趣之凡投三弟子豹曰巫嫗女子不能白事煩三老為入白之復投三老河中豹簪筆磬折嚮河立良久又曰三老不還欲使廷掾與豪長者一人入趣之皆叩頭血流豹白狀河伯留客之久若皆罷去吏民大驚恐從是不敢復言河伯娶婦豹即發民鑿十二渠引河水灌民田皆得水利民人足富豹名聞天下澤流後世晉書何謙字恭子東海人從謝元征伐驍果多權略舊注云謙不畏神祠遇有靈廟皆焚之孟嘗還珠劉昆反火後漢孟嘗字伯冏會稽上虞人遷合浦太守郡不産穀實而海出珠寶與交址比竟常通商販貨糴糧食先時宰守並多貪穢詭人採求不知紀極珠漸徙於交恥郡界行旅不至人物無資貧者死餓於道嘗到官革易前弊求民病利未踰歲去珠復還百姓皆反業商貨流通稱為神明徵還吏民攀車請之乃夜遁去隱處自耕鄰縣士民慕德就居止者百餘家後漢劉昆字桓公陳留東昏人建武初除江陵令時縣連年火災昆輒向火叩頭多能降雨止風稍遷宏農太守先是崤黽驛道多虎災行旅不通昆為政三年仁風大行虎皆負子渡河帝異之徵為光祿勳詔問昆前在江陵反風滅火後守宏農虎北渡河行何德政而致是事昆對曰偶然耳左右笑其質訥帝歎曰此長者之言命書諸策姜肱共被孔融讓果後漢姜肱字伯淮彭城廣威人與弟仲海季江俱以行孝著聞其友愛天至嘗共臥起肱博通五經兼明星緯士之就學者至千餘人二弟名聲相次皆不應徵聘肱嘗與季江夜遇盜欲殺之兄弟更相爭死遂兩釋焉桓帝徵不至使畫工圖其形狀肱臥以被韜面竟不得見之後隱遁遠浮海濱竄伏賣卜給食還卒於家弟子劉操頌德謝承書曰肱性篤孝事繼母年少嚴厲肱感凱風之孝兄弟同被而寢不入房室以慰母心後漢孔融字文舉魯國人孔子二十世孫幼有異才十歲隨父詣京師時河南尹李膺簡重不妄接士自非當世名人及與通家皆不得白融造門曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有舊恩乎融曰然先君孔子與李老君同德比義而相師友則融與君纍世通家衆坐歎息太中大夫陳偉後至曰夫人小而聰了大未必奇融曰觀若所言將不早慧乎膺大笑曰高明必為偉器融家傳曰兄弟七人融第六四歲時與諸兄共食梨棗輒引小者人問其故答曰我小兒法當取小者由是宗族奇之端康相代亮陟隔坐三輔決録韋康字元將京兆人父端從涼州牧徵為太僕康代為涼州刺史時人榮之孔融嘗與端書曰前日元將來淵才亮茂雅度宏毅偉世之器也昨日仲將又來懿性貞實文愍篤誠保家之主也不意雙珠近出老蚌仲將名誕有文才善屬辭章官至光祿大夫吳録紀陟字子上丹陽人吳主孫休時其父亮為尚書而陟為中書令每朝會詔以屏風隔其坐舊注引宣城記云隔以雲母屏風陟誤作騭趙倫瘤怪梁孝牛禍晉書趙王倫字子彝宣帝第九子拜車騎將軍諂事中宮大為賈后所親信嬖人孫秀構害懷愍太子遂廢賈后為庶人倫矯詔自為使持節大都督中外諸軍事秀封大郡據兵權百官總己聽於倫倫素庸下無智策受制於秀秀威權振朝廷天下皆事秀無求於倫秀起自琅邪小史纍官於趙國以諂媚自達既執權衡遂恣其姦謀多殺忠良以逞私欲倫僭即帝位以秀為中書監驃騎將軍餘同謀者超越階次奴卒廝役亦加爵位每朝會貂蟬盈坐時人諺曰貂不足狗尾續倫祠太廟遇大風飄折麾蓋時有雉入殿中又於殿中得異鳥問皆不知名纍日向夕宮西有素衣小兒言是服劉鳥倫使録小兒並鳥閉置牢室明日開視戶扃如故並失所在倫目上有瘤時以為妖惠帝復位賜死前漢梁孝王武文帝子景帝初入朝是時上未置太子與王宴飲從容言曰千秋萬歲後傳於王王心內喜後復入朝入則侍帝同輦出則同車遊獵上林中及栗太子廢太后心欲以王為嗣大臣及袁盎等有所關說於帝王怨盎陰使人刺殺之上由此怨望於王益疏之後入朝欲留弗許歸國意不樂北獵梁山有獻牛足上出背上王惡之病薨王不死時財巨萬及死藏府黃金尚四十餘萬斤他財物稱是贊曰怙親亡厭牛禍告罰桓典避馬王尊叱馭後漢桓典字公雅沛郡龍亢人太傅榮元孫拜侍御史時宦官秉權典執正無所回避常乘駿馬京師畏憚為之語曰行行且止避聰馬御史後以忤宦官七年不調獻帝時為光祿勳前漢王尊字子贛涿郡高陽人少孤牧羊澤中勤學問能史書略通尚書論語大義稍遷益州刺史先是王陽為刺史行部至邛郲九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣居部二歲懷來徼外蠻夷歸附其威信後為東郡太守河水盛溢泛浸瓠子金隄尊躬率吏民投沈白馬請以身填金隄而水波稍卻回選吏民奏狀天子嘉之秩中二千石賜黃金二十斤卒官吏民祀之舊本尊誤作遵綿錯峭直趙禹廉倨前漢綿錯潁川人學申商刑名以文學為太常掌故錯為人峭直刻深孝文時舉賢良對策高第遷中大夫孝景時為御史大夫請諸侯之罪過削其支郡所更令三十章諸侯歡譁吳楚七國俱反以誅錯為名上問袁盎盎素不好錯對曰方今計獨有斬錯赦七國復其故地則兵可毋血刃而俱罷上默然曰顧誠何如吾不愛一人謝天下後丞相等劾奏錯欲疏群臣大逆無道當要斬使中使召錯紿載行巿錯衣朝衣斬東市前漢趙禹斄人武帝時以刀筆吏積勞遷御史至中大夫與張湯論定律令作見知吏傳相監司以法盡自此始為人廉倨為吏以來舍無食客公卿相造請禹終不行報謝務在絶知友賓客之請孤立行一意而已嘗中廢已為廷尉以壽卒亮遺巾幗備失匕箸晉書諸葛亮帥衆十餘萬壘于郿之渭水南原天子遣護軍秦朗督步騎二萬受宣帝節度朝廷以亮遠寇利在急戰每命帝持重以候其變亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣衛尉辛毗杖節以制之亮復挑戰帝將出兵以應之毗杖節而立軍門帝乃止對壘百餘日會亮卒先是亮使至帝問諸葛公食可幾何對曰三四升次問政事曰二十罰已上皆自省覽帝曰其能久乎竟如其言漢晉春秋曰楊儀等整軍而出百姓奔告宣王王追焉姜維令儀反旗鳴鼓若將向宣王者王乃退不敢逼於是儀結陳而出入谷然後發喪宣王之退百姓諺曰死諸葛走生仲達或以告王王曰吾便料生不便料死也蜀志先主劉備字元德涿郡涿縣人漢中山靖王勝之後少孤與母販履織席為業舍東南角籬上有桑樹生高五丈餘遙望見童童如小車蓋或謂當出貴人先主少時與諸小兒於樹下戲見吾必當乘此羽葆蓋車先主垂手下膝顧自見其耳好交結豪俠年少爭附之靈帝末黃巾起州郡各舉義兵先主率其屬討賊有功除安喜尉纍遷豫州牧從曹公還許曹公從容謂曰今天下英雄惟使君與操耳本初之徒不足數也先主方食失匕箸本初袁紹字張翰失意陶潛歸去晉書張翰字季膺吳人有清才善屬文而縱任不拘時人號為江東步兵既入洛齊王冏辟為大司馬車曹掾翰因見秋風起乃思吳中菰菜蒪羹鱸魚鱠曰人生貴得適志何能羈官數千里以要名爵乎遂命駕而歸俄而冏敗人皆謂之見機或曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達晉陶潛字元亮潯陽人大司馬侃曾孫少懷高尚博學善屬文穎脫不羈任真自得為鄉鄰所貴嘗著五柳先生傳以自況時人謂之實録為彭澤令在縣公田悉令種秫穀曰令吾常醉於酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳素簡貴不私事上官郡遣督郵至縣吏白應朿帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人即解印綬去縣乃賦歸去來後徵著作郎不就又不營生業遇酒則飲嘗言夏月虛閒高臥北窗之下清風颯至自謂羲皇上人性不解音畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲魏儲南館漢相東閣魏文帝諱丕字子桓為太子時嘗與元城令吳質書其略曰每念昔日南皮之遊誠不可忘既妙思六經逍遙百氏彈棋閒設終以博奕高談娛心哀箏願耳馳騁北場旅食南館浮甘瓜於清泉沉朱李於寒水皎日既沒繼以朗月同乘並載以遊後園余顧而言茲樂難常質字季重濟陰人以文才為文帝所善官至振威將軍前漢公孫宏菑川薛人少家貧牧豕海上年四十餘乃學春秋雜說武帝立時宏年六十以賢良徵為博士免歸後復徵賢良文學對策天子擢為第一召見容貌甚麗拜博士待詔金馬門稍遷至丞相封平津侯其後以為故事至丞相封自宏始時上方興功業婁舉賢良宏自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議宏身食一肉脫粟飯故人賓客仰衣食奉祿皆以給之家無所餘然其性意忌諸嘗有隙雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆宏力也楚元置醴陳蕃下榻前後楚元王交字游高祖少弟好書多材藝嘗與魯穆生白生申公俱受詩於浮邱伯及封楚王以穆生等為中大夫敬禮申公等穆生不嗜酒每置酒常為穆生設醴及元王薨後至孫戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市先王之所以禮吾三人者為道之存今而忽之是忘道也忘道之人胡可與久處遂謝病去申公白公獨留王稍淫暴二人諫不聽胥靡之後漢陳蕃字仲舉汝南平輿人年十五嘗間處一室而庭宇蕪穢父友薛勤來候之謂蕃曰孺子何不灑掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚奇之後為樂安太守時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆字孟玉高潔之士前後郡守招命不至唯蕃能致焉字而不名特為置一榻去則懸之後為豫章太守以禮待徐稚為功曹性方峻不接賓客惟稚來特設一榻去則懸之靈帝初為太傅録尚書事與大將軍竇武謀誅中官事泄見害廣利泉涌王霸水合前漢李廣利發屬國六千騎及郡國惡少年數萬人以往至二師城取善馬故號二師將軍耿恭曰昔二師拔佩刀刺山飛泉涌出後漢王霸字元伯潁川潁陽人從光武為功曹令史光武曰潁川從我者皆逝而子獨留努力疾風知徑草及王郎起光武在薊即南馳聞郎兵在後後者皆恐至滹沱河候吏還曰河水流澌無船不可濟令霸往視霸恐驚衆欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語遂前比至河河冰亦合乃令霸護渡未畢數騎而冰解上謂曰安吾衆得濟免者卿之力也又謂官屬曰王霸權以濟事殆天瑞也以為軍正後至上谷太守孔融坐滿鄭崇門雜前漢孔融好學博涉多該覽為北海相時袁曹方盛而融無所葉附負其高氣志在靖難而才疏意廣迄無成功劉備表領青州刺史後為少府拜太中大夫性寬容少忌好士喜誘益後進及退閒職賓客日盈門常歎曰坐上客恆滿樽中酒不空吾無憂矣聞人之善若出諸己言有可採必演而成之面告其知而退稱所長薦達賢士多所獎進知而未言以為己過海內英俊皆信服之曹操既積嫌忌而郗慮構成其罪遂見害魏文帝好融文辭每歎曰楊班儔也前漢鄭崇字子游高密大族世與王家相嫁娶徙平陵哀帝擢為尚書僕射數求見諫爭上初納用之每見崇革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫太后大怒又諫董賢貴寵過度由是重得罪尚書令趙昌佞害崇奏與宗族通疑有姦請治上責曰君門如市又何以欲禁切主上對曰臣門如市臣心如水願得考覆上怒下崇獄窮治竟死獄中張堪折轅周鎮漏船後漢張堪字君遊南陽宛人年十六受業長安志美行厲諸儒號曰靈童世祖即位拜蜀郡太守又遷漁陽太守捕擊姦猾賞罰必信吏民皆樂為用胸奴常以萬騎入漁陽堪擊破之郡界以靜乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張公為政樂不可支視事八年胸奴不敢犯塞帝嘗召見諸郡計吏問前後守令能否蜀計掾進曰張堪昔在蜀仁以惠下威能討奸前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已帝聞歎息舊注引世說周鎮罷臨川泊清溪渚王丞相導往看之時夏暴雨船狹小又大漏殆無坐處王曰胡威之清何以過此即啓用之今本無載郭伋竹馬劉寬蒲鞭後漢郭伋字細侯少有志行王莽時為并州牧建武中復為牧伋前在并州素結恩德及後入界老幼相攜逢迎道路所過問民疾苦聘求耆德雄俊設幾杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自遠求對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋計日告之既還先期一日伋為遺信於諸兒遂止野亭須期方入後漢劉寬字文饒宏農華陰人桓帝時遷南陽太守典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色吏人有過但用蒲鞭罰之示辱而已靈帝時為太尉帝頗好學藝每引見常令講經寬常於坐被酒睡伏帝問太尉醉邪對曰臣不敢醉但任重責大憂心如醉帝重其言夫人欲試寬令恚伺當朝會裝嚴已訖使婢奉肉羹翻污朝衣寬遽收之神色不異乃徐言曰羹爛汝手其性度如此海內稱為長者許史侯盛韋平相延前漢宣帝許皇后元帝母也為霍光夫人顯所毒崩及元帝為太子乃封后父廣漢為平恩侯其弟舜為博望侯延壽為樂成侯許氏侯者三人廣漢薨諡戴侯宣帝以延壽為大司馬車騎將軍輔政元帝立復封延壽中子嘉為平恩侯後亦為大司馬車騎將軍武帝衛太子史良娣宣帝祖母也良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害皇孫有男號皇曾孫既登位是為宣帝而良娣母及兄恭已死乃封恭子高為樂陵侯曾為將陵侯元為平臺侯及高子丹以功德封武陽侯侯者凡四人高至大司馬車騎將軍丹左將軍前漢韋賢及子元成皆為丞相平當字子思平陵人以明經為博士公卿薦當論議通明給事中每有災異輒傅經術言得失文雅雖不及蕭望之匡衡然指意略同哀帝時為丞相上召欲封當當病篤不應召或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂乞骸骨上賜養牛一上尊酒十石月餘卒子晏以明經歷任大司徒漢興韋平父子至宰相雍伯種玉黃尋飛錢搜神記羊公雍伯洛陽人性篤孝父母亡葬無終山遂家焉山高無水公汲作義漿於坂頭行者皆飲之二年有一人就飲以斗石子與之云玉當生其中後當得好婦言畢不見乃種其石數歲時時往視見玉子生北平徐氏有女人多求不許公試求焉徐氏戲云得白璧一雙來當為婚公至所種石中得五雙以聘遂以女妻之天子異之拜為大夫於種玉處四角作大石柱各一丈中央一頃地名曰玉田幽冥録海陵黃尋先貧因大風雨散飛錢至其家觸籬園誤落者無數餘處皆拾得富至數千萬擅名江北王允千里黃憲萬頃後漢王允字子師太原祁人郭林宗見而奇之曰王生一日千里王佐才也遂與定交允少好大節有志於立功常習誦經傳朝夕試馳射三公並辟以司徒高第為侍御史獻帝時為司徒及董卓遷都關中朝政大小悉委於允允矯性屈意每相承附卓亦推心不疑故得扶持王室於危亂之中臣主內外莫不倚恃允見卓篡逆已兆密與司隸黃琬等謀兵誅之允性剛稜疾惡初懼卓豺狼故折節圖之卓既殲滅自謂無復患難仗正持重不循權宜之計群下不甚附之反為卓將李傕所殺後漢黃憲字叔度汝南慎陽人世貧賤父為牛醫陳蕃周舉嘗相謂曰時月之間不見黃生則鄙吝之萌復存乎心及蕃為三公歎曰叔度若在吾不敢先佩印綬郭林宗少游汝南先過袁閎不宿而退從憲纍日方還或問之林宗曰奉高之器譬諸泛濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也後舉辟無所就奉高閎字虞𩦎才望戴淵峰穎晉書虞𩦎字思行會稽餘姚人歷吳興太守王導嘗謂曰孔愈有公才而無公望丁潭有公望而無公才兼之者其在卿乎官未達而喪時人惜之世說戴淵少遊俠嘗在江淮間攻掠陸機赴假還洛輜重甚盛淵在岸上據胡床指揮左右皆得其宜淵既神姿峰穎雖處鄙事神氣尤異機於船上遙謂之曰卿才如此亦復作劫邪淵泣涕投劍而歸辭厲非常機彌重之便與定交史魚黜殯子囊城郢家語衛大夫蘧伯玉之賢靈公不用彌子瑕不肖反任之史魚驟諫不從將卒命其子曰吾在朝不能進蘧伯玉退彌子瑕是不能正君也生不能正君死無以成禮我死汝置尸牖下於我畢矣其子從之靈公弔焉怪而問之其子以其父言告公公愕然失容曰是寡人之過也命之殯於客位進伯玉退子瑕孔子聞之曰古之烈諫者死則已矣未有若史魚死而尸諫忠感其君者也可不謂直乎左氏傳楚子囊將死遺言謂子庚必城郢君子謂子囊忠君薨不忘增其名將死不忘衛社稷可不謂忠乎初楚共王疾告大夫曰不穀不德若以大夫之靈獲保首領以沒於地請為靈若厲及卒子囊曰君命以共謂諡之共楚徙都郢未有城郭築城未訖會子囊疾未暇故遺言見意戴封積薪耿恭拜井後漢戴封字平仲濟北剛人舉賢良方正對策第一擢拜議郎遷西華令汝潁有蝗災獨不入界時督郵行縣蝗忽大至及去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至遠近歎服遷中山諸縣囚四百餘人當行刑封哀之皆遣歸家與剋期日皆無違者官至太常後漢耿恭字伯宗扶風茂陵人少慷慨多大略有將帥才永平末為戊己校尉屯金蒲城胸奴攻城恭乘城搏戰以毒藥傅矢傳語胸奴曰漢家箭神其中瘡者必有異因發強弩射之虜中矢者視創皆沸胸奴相謂曰漢兵神真可畏也遂解去恭以疏勒城旁有澗水可固引兵據之胸奴復攻恭恭募先登樓千人直馳之胡騎散走遂擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰歎曰聞昔二師將軍拔佩刀剌山飛泉涌出今漢德神明豈有窮哉乃整衣向井拜禱有頃水泉奔出乃令吏士揚水以示虜虜以為神明遂引去後復攻恭恭擊走之數月食盡窮困乃煮鎧弩食其筋革恭與士推誠同死生故皆無二心虜圍之不能下關寵上書求救肅宗用司徒鮑昱議遣軍迎恭歸復奏恭節過蘇武宜蒙爵賞遂拜騎都尉汲黯開倉馮歡折券前漢汲黯字長孺濮陽人其先有寵於古之衛君至黯十世世為卿大夫孝景時為太子洗馬以嚴見憚武帝即位黯為謁者河內失火燒千餘家上使往視之還報曰家人失火屋比延燒不足憂河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以賑貧民請歸節伏矯制罪上賢而釋之後為主爵都尉列於九卿治務無為引大體不拘文法性倨少禮面折不能容人之過以數直諫不得久居位武帝曰古有社稷臣如黯近之矣大將軍青侍中上踞廁視之丞相宏宴見上或時不冠至黯不冠不見也戰國策齊人有馮歡者貧乏不能自存使人屬孟嘗君田文願寄食門下君受之左右食以草具居有頃倚柱彈其劍歌曰長鋏歸來乎食無魚君聞食之比門下客有頃復彈鋏歌曰長鋏歸來乎出無車君為之駕比門下之車客後復彈鋏歌曰長鋏歸來乎無以為家君問歡有老母使人給其食用無使乏後君出記問門下客誰能為文取責於薛者歡署曰能歡治裝載券契而行辭曰責畢收以何市而反君曰視吾家所寡有者歡之薛召諸民當償者悉來合券以責賜民因燒其券民稱萬歲反齊見君曰臣竊計君宮中積珍寶狗馬實外廄美人充下陳所寡有者義耳切為君市義矯命以責賜諸民因燒其券乃臣所以為君市義後君就國於薛民扶老攜幼迎道中君顧謂歡曰先生所為文市義乃今見之齊景駟千何曾食萬論語齊景公有馬千駟晉書何曾字穎考陳留陽夏人少好學博聞仕魏為司徒武帝踐祚拜大尉曾性至孝閨門整肅自少及長無聲樂嬖幸之好年老與妻相見皆正衣冠相待如賓然性奢豪務在華侈帷帳車服窮極綺麗廚膳滋味過於王者每朝見不食太官所設帝輒命取其食蒸餅上不折作十字不食食日萬錢猶曰無下箸處劉毅等數劾奏曾侈忲無度帝以其重臣一無所問顧榮錫炙田文比飯晉書顧榮字彥先吳人弱冠為黃門侍郎吳平二陸同入洛號三俊歷廷尉正及趙王倫篡位倫子處為大將軍以榮為長史初榮與同寮宴飲見執炙者容貌不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督率救之得免元帝時終散騎常侍史記孟嘗君田文齊威王産孫父嬰為齊相卒文代立封萬戶於薛招致賓客及亡人有罪者皆歸之以故傾天下之士食友數千人無貴賤一與文等曾待客食夜有一人蔽火光客怒以飯不等輟食辭去文起自持其飯比之客慚自剄士以此多歸之文相齊湣王湣王欲去之乃如魏魏昭王以為相齊襄王立孟嘗君中立為諸侯無所屬襄王與連和卒諡孟嘗君稚圭蛙鳴彥倫鶴怨南史孔圭字德璋會稽山陰人齊明帝時為南郡太守圭風韻清疏好文詠飲酒七八斗不樂世務居宅盛榮山水憑幾獨酌傍無雜事門庭之內草莖不翦中有蛙鳴或問之曰欲為陳蕃乎圭曰我以此當兩部鼓吹何必效蕃王晏嘗鳴鼓吹候之聞群蛙鳴曰此殊聒人耳圭曰我聽鼓吹殆不及此晏有慚色仕至散騎常侍舊本作稚圭南史周顒字彥倫宋元徽中為剡令音辭辨麗長於佛理著三宗論言空假義入齊終國子博士兼著作太學諸生慕其風爭事華辨始著四聲切韻行於時初隱鍾山及出為縣令孔稚圭過鍾山草堂作北山移文其辭有曰蕙帳空兮夜鶴怨山人去兮曉猿驚廉頗負荊須賈擢髮史記廉頗為趙將藺相如拜上卿位在頗右頗曰我為將有攻城野戰之大功而相如徒以口舌為勞位居我上又素賤人吾羞為之下宣言曰我見必辱之相如聞不肯與會每朝時當稱病不欲與頗爭列已而出望見頗引車避匿舍人諫曰廉君宣惡言而君畏匿恐懼庸人尚羞之況於將相乎相如曰公之視頗孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其群臣吾雖駑獨畏廉將軍哉顧念強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生吾所以為此者先國家之急而後私讎也頗聞之肉袒負荊至門謝罪曰鄙賤之人不知將軍寬之至此卒相與歡為刎頸之交史記范睢字叔魏人游說諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈賈使齊睢從齊襄王聞睢辨口乃使人賜金及牛酒賈怒以為睢持魏國陰事告齊既歸以告魏齊齊怒使舍人笞擊睢睢佯死即卷以簀置廁中賓客醉更溺之會齊醉睢告守者得出亡伏匿更名姓曰張祿夜見秦謁者王稽稽知睢賢載入秦言於昭王王拜為客卿遂為相封應侯賈後使秦睢微行敝衣步見賈賈驚曰范叔無恙乎留與坐飲食取綈袍賜之睢取大車駟馬為賈御入相府乃先入賈待良久問門下曰范叔不出何也門下曰無范叔乃吾相張君也賈大驚乃肉袒膝行謝罪曰賈不意君能自致於青雲之上賈不敢復讀天下之書與天下之事賈有湯鑊之罪請自屏於胡貉之地唯君死生之擢賈之髮以贖罪尚未足睢曰汝罪有三耳然所以得無死者以綈袍戀戀有故人之意故釋公孔翊絶書申嘉私謁晉先賢傳孔翊字元性為洛陽令置水於庭得求囑書皆投水中一無所發前漢申屠嘉梁人以材官蹶張從高帝擊楚孝文時稍遷至丞相為人廉直門不受私謁時鄧通方愛幸居上旁有怠慢之禮嘉奏曰陛下幸愛群臣則富貴之至於朝廷之禮不可以不肅罷朝坐府中為檄召通詣丞相府不來且斬通通恐入言上上曰汝第往吾今使人召若通至免冠徒跣頓首謝嘉嘉責曰夫朝廷者高皇帝之朝廷也通小臣戲殿上太不敬當斬通頓首出血不解上度丞相已困通使使持節召通而謝丞相乃釋之淵明把菊真長望月南史陶潛字淵明或云字深明名元亮江州刺史王宏欲識之不能致潛嘗往廬山宏令潛故人龐通之齊酒具於半道要之潛有腳疾使一門生二兒舉籃輿及至欣然共飲先是顏延之在潯陽與潛情款後為始安郡經過潛臨去留二萬錢與潛潛悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐久之逢宏送酒至即便就酌醉而後歸郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之卒號靖節先生其妻翟氏志趣亦同能安苦節夫耕於前妻鉏於後云晉書劉惔字真長沛國相人少清遠有標奇與母寓居京口家貧織芒屩以為養雖篳門陋巷晏如也王導深器之後稍知名惔雅善言理簡文作相惔與王濛並為談客俱蒙上賓見纍遷丹陽尹為政清整門無雜賓桓溫嘗問會稽王談更進邪惔曰極進然故第三流耳溫問第一復誰曰故在我輩其高自標置如此舊注云惔夜在簡文座愀然歎曰清風朗月恨無元度元度高士許詢也子房取履釋之結襪前漢張良字子房其先韓人嘗遊下邳圯上有一老父衣褐至良所直墮其履圯下謂曰孺子下取履良欲驅之為其老乃疆忍下取履因跪進父以足受之笑去復還曰孺子可教後五日平明與我期此良跪曰諾及往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰去後五日蚤來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我也遂去不見旦日視其書乃太公兵法良異之常習誦後從高帝過濟北果得黃石取而寶祠之良死并葬焉初良數以兵法說高祖常用其策為他人言皆不省良以為天授遂從不去良多病未嘗特將兵常為畫策臣及封功臣良未嘗有戰鬭功帝曰運籌帷幄中決勝千里外子房功也乃封為留侯前漢張釋之字季南陽堵陽人以資為騎郎事文帝十年不得調亡所知名後拜廷尉持議平天下稱之王生者善為黃老言嘗召居廷中公卿盡會立王生老久曰吾襪解謂釋之為我結襪釋之跪而結之或讓王生獨奈何廷辱張廷尉王生曰吾老且賤自度終亡益於張廷尉廷尉天下名臣吾聊使結襪欲以重之諸公聞之賢王生而重釋之郭丹約關祖逖誓江後漢郭丹字少卿南陽穰人幼孤孝順後母哀憐之為鬻衣裝買産業後從師長安買符入函谷關乃慨然歎曰丹不乘使者車終不出關至京師當為都講諸儒咸敬重之後更始徵為諫議大夫持節使歸南陽安集受降果如其志建武中辟舉高第纍轉司徒在朝廉直公正與侯霸杜林張湛郭伋齊名相善晉書祖逖字士雅范陽遒人博覽書記該涉古今京師亂避地淮泗元帝以為軍咨祭酒逖以社稷傾覆常懷振復之志遷奮威將軍豫州刺史仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎屯于淮陰起鑄冶兵器得二千餘人而後進逖愛人下士雖疏交賤隸皆恩禮之由是黃河以南盡為晉土未幾病卒豫州士女若喪考妣譙梁百姓為之立祠冊贈車騎將軍王敦久懷逆亂畏逖不敢發至是始得肆意焉賈逵問事許慎無雙後漢賈逵字景伯扶風平陵人弱冠能誦左氏傳及五經本文以大夏侯尚書教授兼通五家穀梁之說自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節尤明左氏傳國語為之解詁永平中獻之拜為郎與班固並校祕書應對左右後為侍中領騎都尉所著經傳義詁及論難百餘萬言學者宗之後世稱為通儒後漢許慎字叔重汝南召陵人性淳篤博學經籍馬融敬之時人為之語曰五經無雙許叔重為郡功曹舉孝廉再遷除洨長卒初慎以五經傳說臧否不同撰為五經異義又作說文解字皆傳於世婁敬和親白起坑降前漢高祖在洛陽婁敬說曰陛下都洛陽豈欲與周比隆哉然取天下與周異臣竊以為不侔矣且秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有此亦扼天下之吭而拊其背也即日駕西都關中賜敬姓劉氏拜郎中號奉春君封建信侯是時冒頓單于兵強控弦四十萬騎數苦邊上患之問敬敬曰陛下誠能以適長公主妻單于厚奉遺之彼必以為閼氏生子必為太子冒頓在固為子壻死外孫為單于豈聞外孫敢與太父抗禮哉上欲遣長公主呂后泣曰妾唯一女奈何棄之胸奴乃取家人子為公主妻單于使敬往結和親約史記白起郿人善用兵事秦昭王號武安君秦攻趙壘數挑戰趙將廉頗堅壁不出秦使人為反間曰秦獨畏馬服子趙括將耳廉頗易與趙王既怒頗數敗復聞反間之言因使括代頗秦使起為上將軍括至擊秦軍秦軍佯敗走張二奇兵以劫之趙軍分而為二糧道絶秦發河內民年十五以上悉詣長平遮絶趙救及糧食趙卒不得食四十六日皆內陰相殺食來攻秦壘不能出括出鋭卒自搏戰秦軍射殺括括軍敗卒四十萬人降起起以為趙卒反覆非盡殺之恐為亂乃挾詐盡坑殺之斬首虜四十五萬人趙人大震蕭史鳳臺宋宗雞窗列仙傳蕭史者秦穆公時人善吹簫能致孔雀白鶴居數年吹似鳳聲鳳凰來止其屋公作鳳臺夫婦止其上不下數年一日皆隨鳳凰飛去故秦人作鳳女祠離宮中時有簫聲幽冥録晉兗州刺史沛國宋處宗嘗買一長鳴雞愛養甚至常著窗間後雞作人語與處宗談論極有言說終日不輟處宗因此功業大進王陽囊衣馬援薏苡前漢王吉字子陽子駿孫崇並至御史大夫崇平帝時為大司空自吉至崇出名清廉然林器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不蓄積餘財去位家居亦布衣蔬食天下服其廉而怪其奢故俗傳王陽能作黃金後漢馬援在交址常餌薏苡實能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞卒後有人上書譖之者以為前所載還皆明珠文犀吳祐傳吳惔為南海太守其子祐年十二隨到官恢欲殺青簡以寫經書祐諫曰大人踰越五嶺遠在海濱其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以囊衣徼名嫌疑之間先賢所慎恢乃止撫其首曰吳氏世不乏季子矣劉整交質五倫十起南史劉整仕梁除中軍參軍初整兄寅為沔陽內史卒其子往整孰停住十二日整就兄妻范求米范未還整怒仍自取范車帷為質范詣臺訴御史中丞任昉論曰昔人睦親衣無常主整之撫姪食有故人何其不能折契鍾庾而襜帷交質人之無情一何至此實教義所不容紳冕所共棄臣請免整新除官付廷尉治罪後漢第五倫字伯魚京兆長陵人為京兆督鑄錢掾領長安市時鑄錢多姦巧倫平銓衡正斗斛市無阿枉百姓悅服每讀詔書常歎息曰此聖主也一見決矣等輩笑之曰爾說將尚不下安能動萬乘乎倫曰未遇知己道不同故耳建武永平間為會稽蜀郡守肅宗初立擢司空倫奉公盡節數上書言事無所依違性質愨少文采在位以貞白稱時人方之貢禹然少蘊藉不修威儀亦以此見輕或問倫有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎病乞罷以二千石奉終其身張敞畫眉謝鯤折齒前漢張敞字子高平陽人徙杜陵為京兆尹長安市偷盜尤多敞視事窮治所犯盡行法罰枹鼓稀鳴市無偷盜敞本治春秋以經術自輔其政頗雜儒雅表賢顯善不純用誅罰以此能自全然無威儀罷朝會走馬章臺街使御史驅自以便面拊馬又為婦畫眉長安中傳張京兆眉嫵有司以奏宣帝問之對曰臣聞閨房之內夫婦之私有過於晝眉者上愛其能弗備責也後為冀州刺史盜賊禁止守太原太原郡清晉書謝鯤字幼輿陳國陽夏人少知名通簡有高識不修威儀東海王越辟為掾任達不拘坐除名鯤清歌鼓琴不以屑意鄰家高氏女有美色鯤嘗挑之女投梭折其兩齒時人為之語曰任達不巳幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌後為王敦長史嘗使至都明帝在東宮見之甚相親重問曰論者以君方庾亮自謂何如答曰端委廟堂使百寮準則則鯤不如亮一邱一壑自謂過之終豫章太守盛彥感螬姜詩躍鯉晉書盛彥字翁子廣陵人母因疾失明彥不應辟召躬自侍養母食必自哺之母疾久婢使數見捶撻婢忿恨伺彥暫行取蠐螬炙飴之母食以為美然疑是異物密藏以示彥彥見之抱母慟哭絶而復蘇母目豁然頓開仕吳中書侍郎吳平為小中正後漢姜詩廣漢人事母至孝妻龐奉順尤篤母好飲江水水去舍六七里妻常泝流而汲後值風不時得還母渴詩責而遣之妻寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慚呼還恩養愈謹其子後因遠汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有湧泉味如江水每日輒出雙鯉魚常以供其母之膳赤眉散賊經詩里弛兵而過曰驚大孝必觸鬼神時歲荒賊乃遺詩米肉受而埋之比落蒙其安全永平初舉孝廉拜郎中除江陵令宗資主諾成瑨坐嘯後漢桓帝受學於甘陵周福及即位擢為尚書時同郡河南房植有名當朝鄉人為之謠曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣各樹朋徒尤隙漸成由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡又為謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝宏農成瑨但坐嘯凡黨事始自甘陵周福汝南宗資成於李膺張儉海內塗炭二十餘年諸所蔓衍皆天下善士伯武之類皆字也舊本宗誤作宋伯成辭耕嚴陵去釣莊子堯治天下伯成子高立為諸侯堯授舜舜授禹伯成子高辭為諸侯而耕後漢嚴光字子陵會稽餘姚人少與光武同游學光武即位乃變名姓隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車元纁聘之三反而後至舍於北軍給床褥太官進膳車駕幸其館光臥不起帝即臥所撫光腹良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝歎息而去復引入論道舊故相對纍日因共偃臥光以足加帝腹上明日太史奏客星犯帝坐甚急帝笑曰朕故人子陵共臥耳除諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨焉董遇三餘譙周獨笑魏略董遇字季直性質訥好學與兄季中耒耜負敗常挾持經書投閒習讀明帝時官至大司農初遇作老子訓注又善左氏傳更為作朱墨別異人有從學者遇不肯教云必當先讀百遍言讀書百遍而義自見從學者云若暍無日遇言當以三餘冬者歲之餘夜者日之餘陰雨者時之餘蜀志譙周字允南巴西西充國人耽古好學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食研精六經尤善書札頗曉天文遷光祿大夫位亞九列及魏大將軍鄧艾入陰平後主使群臣會議計無所出或以為蜀與吳本為和國宜可奔吳或以為南中七郡阻險斗絶易以自守宜可奔南唯周以為自古無寄他國為天子者乃上疏諫遂從周策劉氏無虞一邦蒙賴周之謀也時晉文王為魏相國以為周有全國之功封陽城亭侯晉室踐祚除散騎常侍不拜將閭仰天王凌呼廟史記秦公子將閭昆弟三人二世胡亥信趙高之謀囚於內宮議其罪使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭仰天大呼天者三曰天乎吾無罪昆弟三人皆流涕拔劍自殺魏志王凌字彥雲太原沂人為征東將軍都督揚州諸軍事纍遷太尉假節鉞謀廢齊王立楚王彪嘉平三年凌詐言吳人徐水請發兵以討之司馬宣王知其計不聽自帥中軍泛舟到甘城凌計無所出乃迎于武邱面縛水次曰凌若有罪公當折簡召凌何若自來邪宣王曰以君非折簡之客故耳即以凌歸于京師道經賈逵廟凌呼曰賈梁道王凌是大魏忠臣唯爾有神知之至項仰鴆而死六月宣王疾夢凌逵為崇遂薨二疏散金陸賈分橐前漢疏廣字仲翁東海蘭陵人兄子受字公子宣帝時廣為太子太傅受為太子少傅每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮後廣謂受曰吾聞知足不辱知止不殆功成身退天之道也豈如歸老故鄉以壽命終父子遂乞骸骨上賜黃金二十斤太子贈五十斤公卿大夫故人邑子設祖道供張東都門外送者車數百兩既歸鄉里日具酒食請族人故舊賓客相與娛樂趣賣金以供具或勸買田宅廣曰吾顧自有舊田廬令子孫勤力其中足以供衣食此金聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日族人悅服皆以壽終前漢陸賈楚人有口辨時中國初定尉他平南越因王之高祖使賈賜他印為南越王賈至尉他魋結箕踞見賈賈因說他他蹶然起謝賈留與飲數月賜賈橐中裝直千金他送亦千金賈令他稱臣奉漢約歸報高帝大說拜太中大夫孝惠時病免以好時田地善往家焉有五男乃出橐中裝賣千金分其子子二百金令為生産常乘安車駟馬從歌鼓琴侍者十人寶劍直百金謂其子曰與女約過女女給人馬酒食極飲十日而更所死家得寶劍後為陳平畫數事平用其計乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此游漢廷公卿間名聲籍甚及誅呂氏立孝文賈頗有力以壽終慈明八龍禰衡一鶚後漢荀爽字慈明潁川潁陰人父淑字季和舉賢良方正對策補朗陵侯相涖事明理稱為神君有子八人儉緄靖壽注爽肅專並有名稱時人謂八龍爽幼好學十二通春秋論語太尉杜喬見而稱之曰可為人師爽耽思經書慶弔不行徵命不應潁川為之語曰荀氏八龍慈明無雙獻帝即位董卓輔政徵之爽欲遁不得就拜平原相行至宛陵追為光祿勳視事三日拜司空自被命及登臺司九十五日因從遷都長安爽見卓忍暴必危社稷辟舉才略之士將共圖之會病薨後漢禰衡字正平平原般人少有才辨尚氣剛傲好矯時慢物游潁川乃陰懷一刺既而無所之至於剌字漫滅時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾安能從屠沽兒邪又問荀文若趙稚長云何衡曰文若可借面弔喪稚長可使監廚請客唯善孔融楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數融亦深愛其才衡始冠而融四十遂與為交友上書薦之有云鷙鳥纍百不如一鶚融數稱述於曹操操以其言悖逆送與劉表表不能容送與江夏太守黃祖祖性急衡言不遜遂殺之年二十六不占殞車子雲投閣新序齊崔杼弒莊公有陳不占者聞君難將赴之比去餐則失匕上車失式御者曰怯如是去有益乎曰死君義也無勇私也不以私害公遂往聞戰鬭之聲恐駭而死人曰不占可謂仁者之勇也前漢楊雄字子雲年四十餘自蜀來遊京師大司馬王音奇其文雅召為門下史與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官莽篡位談說之士用符命稱功德獲封爵甚衆雄復不侯以耆老久次轉大夫恬於勢利如是及莽誅甄豐父子投劉歆子棻四裔辭所連及便收不請時雄校書天祿閣上治獄使者欲收雄雄恐不能自免乃從閣自投下幾死棻嘗從雄學奇字莽以雄素不與事有詔勿問然京師為之語曰惟寂寞自投閣爰清靜作符命蓋以雄解嘲之言譏之也雄家貧嗜酒人希至其門時有好事者載酒肴從游學而侯芭嘗從雄居受太元法言焉劉歆謂曰今學者祿利尚不能明易又如元何吾恐後人用覆醬瓿也雄笑而不應年七十一卒侯芭為起墳魏舒堂堂周舍鄂鄂晉書魏舒字陽元彭城樊人少孤為外家寧氏所養寧氏起宅相者云常出貴甥外祖母以盛氏甥小而慧意謂應之舒曰當為外氏成此宅相舒姿望秀偉飲酒石餘遲鈍質朴不為鄉親所重不修常人之節不為皎勵之事每欲容才長物終不顯人之短年四十餘對策升第遷尚書郎時欲沙汰郎官非才者罷之舒曰吾即其人也襆被而出轉相國參軍文帝深器重之每朝會罷目送之曰魏舒堂堂人之領袖也及山濤薨領司徒陳留周震纍為諸府所辟辟書既下公輒喪亡僉號震為殺公掾舒命之竟無患識者稱其達命年老遜位賜幾杖安車駟馬門施行馬時論以為晉興以來三公能辭榮善終者未之有史記晉大夫趙簡子有臣曰周舍好直諫周舍死簡子每聽朝常不悅大夫請皋簡子曰大夫無皋吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也舊本鄂作諤無鹽如漆姑射若冰古列女傳鍾離春者齊無鹽邑之女宣王正后也為人極醜無雙臼頭深目長指大節昂鼻結喉肥項少髮折腰出胸皮膚若漆年四十無所容入衒嫁不售乃拂拭短褐自詣宣王願備後宮之掃除宣王方置酒於漸臺左右聞之掩口大笑王召見之無鹽為陳四殆王於是立拆漸臺罷女樂退諂諛去雕琢進直言延側陋立太子拜無鹽為后而齊國大安莊子藐姑射之山有神人居焉肌膚若冰雪綽約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外邾子投火王思怒蠅左氏傳邾子在門臺臨廷閽以鉼水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于床廢于錘炭爛遂卒莊公卞急而好潔故及是莊公即邾子諡旋小便廢墮也魏志王思濟陰人領豫州剌史思能吏然苛碎無大體官至九卿封列侯魏略曰思性急嘗執筆作書蠅集筆端驅去復來如是再三思恚怒自起逐蠅不能得還取筆擲地踏壞之苻朗皂白易牙淄澠晉書苻朗字元達略陽臨渭氐人堅從兄子拜青州刺史降晉加員外散騎侍郎既至揚州風流邁於一時超然自得善識味鹹酢及肉皆別所由會稽王為設盛饌極江左精肴食訖問曰關中之食孰若此答曰皆好惟鹽味小生耳既問宰夫皆如其言或人殺雞以食之既進朗曰此雞棲常半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無差時人咸以為知味列子引孔子曰淄澠之合易牙嘗而知之易牙齊桓公嬖臣知味者也周勃織薄灌嬰販繒前漢周勃其先卷人徙沛以織薄曲為生常以吹簫給喪事材官引強高祖起勃以中涓從攻戰以功封絳侯勃為人木彊敦厚高帝以為可屬大事勃不好文學每召諸生說事東鄉坐責之趣為我語其椎魯少文如此舊本薄作畚非前漢灌嬰雎陽販繒者也以中涓從高祖及項籍敗垓下嬰以御史大夫將軍騎別追至東城破之所將卒五人共斬籍以功賜爵潁陰侯文帝時為丞相馬良白眉阮籍青眼蜀志馬良字季常襄陽眉城人兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主稱尊號以良為侍中及東征吳遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號咸如意指晉書阮籍字嗣宗陳留尉氏人為散騎常侍轉從事中郎聞步兵廚營人善釀有貯酒三百斛乃求為步兵校尉籍不拘禮教能為青白眼見禮法之士以白眼對之及嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見青眼由是禮法之士疾之若讎籍時率意獨駕不由徑路車跡所窮輒慟哭而反黥布開關張良燒棧前漢黥布六人姓英氏少時客相之當刑而王及壯坐法欣然笑曰人相我當刑而王幾是乎聞者笑之布以論輸驪山驪山之徒數十萬人布與其徒長豪傑交通乃率其曹耦亡之江中為群盜衆數千人後以兵屬項梁楚兵常勝功冠諸侯兵皆服屬楚者以布數以少敗衆也項籍引兵西至關不得入又使布等先從間道破關下軍遂得入至咸陽布為前鋒項羽封諸將立布為九江王歸漢封淮南王前漢項羽自立為西楚霸王王梁楚地更立沛公為漢王王巴蜀漢中漢王就國張良辭歸韓漢王送至褒中因說漢王燒絶棧道以備諸侯盜兵亦示羽無東意乃使良還行燒絶棧道陳遺飯感陶侃酒限南史宋初吳郡陳遺少為郡吏母好食鐺底焦飯遺在役常帶囊每煮食輒録其焦以貽母後孫恩亂聚得數升常帶自隨及敗逃竄多有餓死遺以此得活母晝夜泣涕目為失明耳無所聞遺還入戶再拜號咽母豁然朗明晉書陶侃字士行鄱陽人徙尋陽早孤貧為縣吏孝廉范逵常過侃時倉卒無以待賓客其母乃截髮得雙髲以易酒肴樂飲極歡雖僕從亦過所望侃至太尉都督荊江等諸軍事長沙郡公侃每飲酒有定限常歡有餘而限已竭佐吏浩等勸更少進侃曰年小曾有酒失亡親見約故不敢踰楚昭萍實束晳竹簡家語楚昭王渡江江中有物大如斗圓而赤直觸王舟舟人取之王怪問群臣莫能識使使聘魯問孔子孔子曰此萍實也可剖食之吉祥也惟霸者為能獲焉使者反王遂食之大美久之使來以告魯大夫大夫因子游問曰夫子何以知其然曰吾昔之鄭過陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此楚王之應吾是以知之晉書束字廣微陽平元城人漢疏廣之後廣曾孫避難徙居因去疏之足遂改姓焉晳博學多聞少遊國學後為佐著作郎初太康二年汲郡人盜發魏襄王墓或言安釐王冢得竹書數十車武帝以其書付祕書校綴次第尋考指歸而以今文寫之晳佐著作得觀竹書隨宜分釋皆有義證遷尚書郎時有人於嵩高山下得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晳晳曰此漢明帝顯節陵中策文也檢驗果然時人服其博識曼倩三冬陳思七步前漢東方朔字曼倩平原厭次人武帝舉方正賢良文學材力之士待以不次之位四方士上書言得失自衒鬻者以千數朔上書曰臣少失父母長養兄嫂年十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言又常服子路之言年二十二長九尺三寸目若懸珠齒若編具勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜高自稱譽上偉之令待詔公車後常為郎與枚皋郭舍人俱在左右詼啁而已世說魏文帝嘗令東阿王七步詩作不成當行法即應聲為詩曰箕在釜下然豆在釜中泣本自同根生相煎何太急帝深有慚色東阿即陳思王曹植舊封劉寵一錢廉范五袴後漢劉寵字祖榮東萊牟平人拜會稽太守山民願朴乃有白首不入市中者頗為官吏所擾寵除煩苛禁察非法郡中大化徵為將作大匠山陰縣有五六老叟龐眉皓髮自若邪山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民間至夜不絶明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵為人選一大錢受之後官至太尉寵前後歷宰二郡纍登卿相而清約省素家無貨積嘗出京師欲息亭舍亭吏止之曰整頓灑掃以待劉公不可得也寵無言而去時入稱其長者後漢廉范字叔度京兆杜陵人肅宗時遷蜀郡太守厲以淳厚成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毀削先令但嚴使儲水而已百姓為便歌曰廉叔度來何暮不禁火民安作平生無襦今五袴在蜀數年免歸汜育字孤郗鑒吐哺晉書汜育字稚春濟北盧人奕世儒素敦睦九族客居青州逮育七世時人號其家兒無常父衣無常主少履高操安貧有志業武帝纍召不就晉書郗鑒字道徽高平金鄉人少孤貧博覽經籍躬耕畎畝吟詠不倦以儒雅著名成帝時為太尉初值永嘉喪亂在鄉里甚窮餒鄉人以鑒名德傳共飴之時兄子邁外甥周翼並小常攜之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒於是獨往食訖以飯著兩頰邊還吐與二兒後並得存同過江邁至護軍翼剡縣令鑒薨翼追撫育之恩解職席苫心喪三年茍弟轉酷嚴母掃墓晉書茍晞字道將河內山陽人為兗州刺史晞練於官事文簿盈積斷決如流人不敢欺其從母依之奉養甚厚其子求為將晞距之曰吾不以王法貸人將無後悔固欲之晞乃以為督護後犯法晞仗節斬之從母扣頭請救不聽既而素服哭之流涕曰殺汝者兗州刺史哭弟者茍道將其仗法如此後領青州剌史多置參佐轉易守令以嚴刻立功日加斬戮流血成川號曰屠伯晞出屯無鹽以弟純領青州刑殺甚於晞百姓號小茍酷於大茍前漢嚴延年字次卿東海下邳人遷河南太守野無行盜威震旁郡其治務摧折豪強扶助貧弱貧弱雖陷法曲文以出之豪強侵小民者以文內之衆謂當死者一朝出之謂當生者詭殺之吏民莫能測其意深淺冬月傳屬縣囚謂論府上流血數里河南號曰屠伯其母從東海來到洛陽見報囚大驚止都亭不肯入府延年至謁母閉閣不見延年免冠頓首閣下良久乃見之因數責延年幸得備郡守不聞仁愛教化以全安愚民顧多刑殺人欲以立威天道神明人不可獨殺我不意當老見壯子被刑戮行矣去女東歸掃除墓地耳遂去歲餘延年坐棄市東海賢其母延年兄弟五人至太守東海號曰萬石嚴嫗洪喬擲水陳泰掛壁晉書殷羡字洪喬陳郡長平人為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵其資性介立如此魏志陳泰字元伯司空厚之子為并州刺史加振威將軍使持節護胸奴中郎將懷柔吏民甚有威惠京邑貴人多寄寶貨因泰市奴婢泰皆掛之於壁不發其封及徵為尚書悉以還之王述忿狷荀粲惑溺晉書王述字懷祖東海太守承之子安貧守約不求聞達性沉靜年三十尚未知名人或謂之癡纍遷尚書令屢居州郡清潔絶倫上賜皆散之親故但性急為纍嘗食雞子以筯剌之不得大怒擲地雞子圓轉不止便下地以屐齒踏之又不得嗔甚掇內口中以齧破即吐之既躋重每以柔克為用謝奕性粗常忿述極言罵之述不能應唯面壁而巳居半日奕去始復坐人以此稱之荀奉倩本傳曰粲嘗以婦人才智不足論自宜以色為主騎將軍曹洪女有色粲於是聘焉容服幃帳甚麗專房燕婉後婦病亡未殯傅嘏往唁粲粲不言而神傷嘏問曰婦人才色並茂為難子之聘也遺才存色非難遇也何哀之甚粲曰佳人難再得顧逝者不能有傾國之色未可易遇痛悼不能已歲餘亦亡世說曰荀奉倩與婦至厚冬月婦病熱乃出中庭自取冷還以身尉之婦亡奉倩後少時亦卒以是獲譏於世見惑溺篇宋女愈謹敬姜猶績古列女傳宋鮑女宗者鮑蘇妻也養姑甚謹蘇去仕衛三年而娶外妻女宗因往來者請問其夫不輟略遺外妻甚厚女宗之姒曰可以去矣女宗曰婦人固以一醮不改夫死不嫁為分者也吾姒不教吾以居室之禮而反欲使吾為見棄之行將安用此遂不聽事姑愈謹宋公聞而美之表其閭號曰女宗君子謂女宗謙而知禮古列女傳魯季敬姜莒女也號戴己魯大夫公父穆伯之妻文伯之母博達知禮文伯退朝朝敬姜敬姜方績文伯曰以歜之家而主猶績乃逢季孫之怒其以歜為不能事主乎敬姜歎曰魯其亡乎使童子備官而未之聞邪昔聖王處民男女效績否則有辟古之制也又出魯語鮑照篇翰陳琳書檄南史鮑照字明遠東海人文辭瞻逸嘗謁宋臨川王義慶未見知欲貢詩言志人止之曰卿位尚卑不可輕忤大王照勃然曰千載上有英才異士沉沒而不聞者安可數哉大丈夫豈蘊智能碌碌與燕雀相隨乎於是奏詩義慶奇之賜帛二十四尋擢為國侍郎文帝以為中書舍人上好文章自謂人莫能及照悟其旨文章多鄙言纍句咸謂照才盡實不然也嘗賦擬古詩云十五諷詩書篇翰靡不通文選照作昭魏志廣陵陳琳字孔璋陳留阮瑀字元瑜琳避難冀州袁紹使典文章袁氏敗歸太祖太祖愛其才並以琳瑀為司空軍謀祭酒管記室軍國書檄多琳瑀自作典略曰琳作諸書及檄草成呈太祖太祖先苦頭風是日疾發臥讀琳所作翕然而起曰此愈我病數然厚賜嘗使瑀作書與韓遂時從太祖出因於馬上具草書成呈之太祖攬筆欲有所定而竟不能增損魏文帝與吳質元瑜孔璋章表殊健微為繁富元瑜書記翩翩致足樂也浩浩萬古不可備甄李子言自史子萬古之事史向千卷況搜神列異浩浩雜書若長河之水流而不息猶難甄拔之矣芟繁托華爾曹勉旃人以有限之功當讀無涯之書徒欲強記洽聞終恐脣腐齒落所以芟繁雜捃托精華冀爾曹當勉搜尋誠有益也
