  - {type: variant, offset: 2, length: 0, content: '', WYG: 唐李瀚撰宋徐子光註伊尹負鼎甯戚扣角史記伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致于王道或曰伊尹處士湯使人聘迎之五反然後肯徃從湯言素王及九主之事湯舉任以國政三齊畧記齊桓公夜出迎客甯戚疾擊其牛角高歌曰南山矸白石爛生不逄堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦桓公召與語說之以為大夫趙壹坎壈顔駟蹇剥後漢趙壹字元叔漢陽西縣人體貌魁梧望之甚偉恃才倨傲為鄉黨所擯乃作解擯屢抵罪幾至死友人救得免乃貽書謝恩為窮鳥賦後舉郡上計到京師時司徒袁逄受計計吏數百人皆拜伏廷中壹獨長揖逄異之令左右讓之對曰昔酈食其長揖漢王今揖三公何遽怪哉逄下堂執手延置上座河南尹羊陟與逄共稱薦之名動京師士大夫想望其風采後州郡爭致禮命十辟公府並不就初逄使善相者相壹云仕不過郡吏竟如其言漢武故事曰上至郎署舎見一老郎鬚眉皓白問何時為之對曰臣姓顔名駟文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三朝不遇也上感其言擢為㑹稽都尉一本作景帝好美臣貌醜龔遂勸農文翁興學前漢龔遂字少卿山陽南平陽人以明經為官宣帝時渤海左右郡歲饑盜賊並起二千石不能禽制上選能治者以遂為渤海太守年七十餘遂至界盡移勅屬縣罷捕盜賊吏諸持鉏鍤田器者皆為良民吏毋得問持兵者乃為盜賊盜賊悉平民安土樂業遂乃開倉􅅒假貧民選用良吏慰安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑民有帶刀劒者使賣劒買牛賣刀買犢吏民皆富實獄訟止息後徵遂議曹王生素嗜酒亡節度從至京師㑹遂引入宫王生曰天子即問君何以治渤海宜曰皆聖主之德非小臣之力遂受其言以對上說笑曰君安得長者之言而稱之對曰臣非知此乃議曹教戒臣也上以遂老不任公卿拜水衡都尉王生為丞以褒顯遂云前漢文翁廬江舒人少好學通春秋景帝末為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風欲誘進之乃選郡縣小吏開敏有材者親自飭厲遣詣京師受業博士數歲蜀生皆成就還歸以為右職官有至郡守刺史者又修起學官于成都市中招下縣子弟為學官弟子為除更繇高者以補郡縣吏次為孝弟力田每行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤吏民見而榮之爭欲為學官弟子富人至出錢以求之由是大化蜀地學于京師者比齊魯焉武帝乃令天下郡國皆立學校自文翁始文翁終于蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也晏御揚揚五鹿嶽嶽史記晏平仲嬰為齊相出其御之妻從門間而闚其夫其夫為相御擁大蓋䇿駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去其後夫自抑損晏子怪問之以實對晏子薦以為大夫前漢五鹿充宗字君孟時為少府貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝􅒥登堂抗首而請音動左右既論難連拄五鹿君諸儒為之語曰五鹿嶽嶽朱雲折其角遂為博士}
