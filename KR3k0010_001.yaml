body:
  text: 卷上王戎簡要裴楷清通晉書王戎字濬沖琅邪臨沂人幼而穎悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電阮籍素與戎父渾為友戎年十五隨渾在郎舍少籍二十歲籍與之交籍每適渾去輒過視戎良久然後出謂渾曰濬沖清賞非卿倫也共卿言不如共阿戎談歷官至司徒晉裴楷字叔則河東聞喜人明悟有識量少與戎齊名鍾會薦於文帝辟相國掾及吏部郎缺帝問會會曰裴楷清通王戎簡要皆其選也於是用楷楷風神高邁容儀俊爽博涉群書特精理義時謂之玉人又稱見叔則如近玉山映照人也轉中書郎出入官省見者肅然改容武帝登祚探策以卜世數多少既而得一不悅群臣失色楷曰臣聞天得一以清地得一以寧王侯得一以為天下貞帝大悅纍遷中書令侍中孔明臥龍呂望非熊蜀志諸葛亮琅邪陽都人躬耕隴畝好為梁父吟每自比管仲樂毅時人莫之許惟崔州平徐庶與亮友善謂為信然時先主屯新野徐庶見之謂曰諸葛孔明臥龍也將軍豈願見之乎此人可就見不可屈致宜枉駕顧之先主遂詣亮凡三往乃見因屏人與計事善之於是情好日密關羽張飛等不悅先主曰孤之有孔明猶魚之有水也願勿復言及稱尊號以亮為丞相漢晉春秋曰亮家南陽鄧縣襄陽城西號曰隆中六韜文王將田史編布卜日田於渭陽將大得焉非龍非螭非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王曰兆致是也史編曰編之太祖史疇為禹占得皋陶兆比於此文王乃齋三日田於渭陽卒見太公坐茅以漁文王勞而問之乃載與歸立為師舊本作非熊非羆疑流俗承誤後世莫知是正耳按後漢崔駰達旨辭曰或以漁父見兆於元龜注云西伯出獵卜之曰所獲非龍非螭非熊非羆所獲霸王之輔所謂非熊蓋本諸此楊震關西丁寬易東後漢楊震字伯起宏農華陰人少好學明經博覽無不窮究諸儒為之語曰關西孔子楊伯起常客居於湖不答州郡禮命數十年衆謂之晚暮而志愈篤後有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三臺也先生自此升矣年五十乃始仕州郡安帝時為太尉前漢丁寬字子襄梁人初梁項生從田何受易時寬為項生從者讀易精敏材過項生遂事何學成東歸何謂門人曰易以東矣寬復從周王孫受古義號周氏傳景帝時為梁孝王將軍作易説三萬言訓故舉大誼而已謝安高潔王導公忠晉書謝安字安石陳國陽夏人年四歲桓彝見而嘆曰此兒風神秀徹後當不減王東海王導亦深器之由是少有重名初辟除並以疾辭有司奏安被召歷年不至禁錮終身遂棲遲東山常往臨安山中放情邱壑然每遊賞必以妓女從時弟萬為西中郎將揔藩任之重安雖處衡門出其右有公輔望年四十餘始有仕志征西大將軍桓溫請為司馬朝士咸送中丞高嵩戲之曰卿屢違朝旨高臥東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安有愧色後拜吏部尚書時孝武立政不自已桓溫威振內外安盡忠匡翼終能輯穆進中書監録尚書事符堅率衆次淮肥加安征討大都督既破堅以揔統功進太保薨贈太傅諡文靖晉王導字茂宏光祿大夫覽之孫少有風鑒識量清遠陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潛有興復之志帝亦雅相器重會帝出鎮下邳請導為安東司馬軍謀密策知無不為帝嘗謂曰卿吾之蕭何也纍遷中書監録尚書事及帝登尊號百官陪列命導升御床共坐導固辭曰若太陽下同萬物蒼生何由仰照帝乃止進位司空匡衡鑿壁孫敬閉戶前漢匡衡字稚圭東海承人父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡語詩解人頤射策甲科元帝時為丞相西京雜記曰衡勤學無燭鄰舍有燭而不逮衡乃穿壁引其光而讀之邑大姓文不識名家富多書衡乃與其客作而不求償願得書遍讀之主人感歎資給以書遂成大學楚國先賢傳孫敬字文寶常閉戶讀書睡則以繩繫頭懸之梁上嘗入市市人見之皆曰閉戶先生來也辟命不至郅都蒼鷹寧成乳虎前漢郅都河東太陽人景帝時為中郎將敢直諫面折大臣於朝遷中尉是時民朴畏罪自重而都獨先嚴酷故行法不避貴戚列侯宗室見皆側目而視號曰蒼鷹拜鴈門太守胸奴素聞都節舉邊為引去竟都死不近鴈門胸奴至為偶人象都令騎馳射莫能中其見憚如此胸奴患之乃中都以漢法卒斬之前漢寧成南陽穰人以郎謁者事景帝好氣為小吏必陵其長吏為人上躁下急如束溼為中尉其治效郅都其廉弗如武帝即位徙為內史外戚多毀其短抵罪後上欲以為郡守公孫宏曰臣為小吏時成為濟南都尉其治如狼牧羊不可使治民上乃拜為關都尉歲餘關東吏隸郡國出人關者號曰寧見乳虎無值寧成之怒其暴如此周嵩狼抗梁冀跋扈晉書周嵩字仲智兄顗字伯仁汝南安成人中興時顗等並列貴位嘗冬至置酒其母舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識暗好乘人之弊非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也後顗嵩並為王敦所害謨歷侍中護軍世説抗直作狼抗晉書周顗傳處仲剛愎強忍狼抗無上處仲王敦字也後漢梁冀字伯卓褒親愍侯竦之元孫為人鳶肩豹目洞精瞪眄口吟舌言拜大將軍侈暴滋甚沖帝崩冀立質帝少聰惠知冀驕橫嘗朝群臣目冀曰此跋扈將軍也冀聞深惡之遂鴆殺復立桓帝而枉害太尉李固杜喬海內嗟懼其四方調發歲時貢獻皆先輸上第於冀乘輿乃其次焉一門前後七封后三皇后六貴人二大將軍在位二十餘年窮極滿盛威行內外百僚側目莫敢違命天子恭已不得有所親豫帝既不平之後發怒誅冀中外宗親無長少皆棄市他連及公卿列校刺史二千石死者數十人故吏賓客免黜者三百餘人朝廷為空收冀財貨三十餘萬萬以充王府用減天下稅租之半郗超髯參王珣短簿晉書郗超字景興太尉鑒之孫少卓犖不羈有曠世之度善談論義理精微大司馬桓溫辟為參軍溫英氣高邁罕有所推與超言常謂不能測遂顧意禮待超亦深自結納時王珣為溫主簿亦為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也晉王珣字元琳丞相導之孫弱冠與謝元為溫掾溫嘗謂之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也孝武時為僕射領吏部帝雅好典籍以才學文章見眤夢人以大筆如掾與之既覺語人曰此當有大手筆事俄而帝崩哀册諡議皆珣所草元字幼度少穎悟為叔父安所器重安嘗戒約子姪因曰子弟亦何豫人事而正欲使其佳諸人莫有言者元答曰譬如芝蘭玉樹欲使其生於庭階耳安悅時符堅入寇朝廷求文武良將可以鎮禦北方安乃以元應舉纍進冠軍將軍為前鋒都督與從弟輔國將軍琰決戰淝水南堅衆奔潰棄甲宵遁聞風聲鶴唳皆以為王師已至進號前將軍伏波標柱博望尋河後漢馬援字文淵扶風茂陵人少有大志嘗謂賓客曰丈夫為志窮當益堅老當益壯建武中歷虎賁中郎將數被進見為人明鬚髮眉目如畫間於進對又善兵策帝嘗言伏波論兵與我意合有謀未嘗不用後交址女子徵側等反蠻夷皆應之拜援為伏波將軍擊破之封新息侯援乃擊牛釃酒勞饗軍士將樓船戰士進擊餘黨嶠南悉平後復請擊武陵五溪蠻夷時年六十二帝愍其老援曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也遂遣征之進營壺頭會暑甚中病卒廣州記曰援到交址立銅柱為漢之極界前漢張騫漢中人建元中為郎武帝方欲事滅胡乃募能使者騫應募使月氐徑胸奴留十餘歲持漢節不失因與其屬亡鄉月氐後亡歸拜太中大夫騫身所至者大宛大月氐大夏康居而傳聞其旁大國五六具為天子言其地形所有元朔中以校尉從大將軍擊胸奴知水草處軍得以不乏封博望侯贊曰禹本紀言河出昆侖昆侖高二千五百里餘日月所相避隱為光明也自張騫使大夏之後窮河源惡睹所謂昆侖者乎舊注云得支機石歸未詳所出李陵初詩田橫感歌前漢李陵字少卿前將軍廣之孫少為侍中建章監善騎射愛人謙遜下士甚得名譽武帝以為有廣之風拜騎都尉天漢二年將步卒五千人征胸奴戰敗遂降焉初陵與蘇武俱為侍中武使胸奴明年陵降後昭帝立與胸奴和親武得還漢陵以詩贈別曰攜手上河梁遊子暮何之徘徊蹊路側悢悢不得辭晨風鳴北林熠耀東南飛浮雲日千里安知我心悲武別陵詩曰雙鳧俱北飛一鳧獨南翔子當留斯館我當歸故鄉一別如秦胡會見何渠央愴悢切中懷不覺淚霑裳願子長努力言笑莫相忘五言詩蓋自此始前漢田橫狄人故齊王田氏之族秦末自立為齊王漢將灌嬰敗橫軍遂平齊地橫懼誅與其徒居海島中高帝召之乃與其客二人乘傳詣洛陽謝使者曰橫始與漢王俱南面稱孤今王為天子而橫為亡虜其愧已甚遂自剄令客奉其頭奏之高帝為之流涕以王禮葬之拜其二客為都尉既葬二客穿其冢旁皆自剄其餘五百人在海中聞橫死亦皆自殺李周翰曰橫自殺從者不敢哭而不勝哀故為悲歌以寄情後廣之為薤露蒿里歌以送終至李延年分為二等薤露送王公貴人蒿里送士大夫庶人挽柩者歌之因呼為挽歌武仲不休士衡患多後漢傅毅字武仲扶風茂陵人少博學肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之由是文雅顯於朝廷魏文帝典論曰文人相傾自古而然傅毅之於班固伯仲之聞耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休晉陸機字士衡吳郡人大司馬抗之子身長七尺其聲如鐘少有異才文章冠世與弟雲俱入洛造太常張華華素重其名如舊相識曰伐吳之役利獲二人遂薦之諸公又詣侍中王濟濟指羊酪謂曰吳中何以敵此答云千里蓴羹未下鹽豉時人稱為名對機天才秀逸辭藻宏麗華嘗謂之曰人之為文常恨才少而子更患其多弟雲嘗與書曰君苗見兄文輒欲燒其筆硯華薦之諸公纍遷中書郎後成都王穎起兵討長沙王乂假機後將軍河北大都督機以羇旅入官頓居群士之右皆有怨心譖之於穎穎怒使人收機機歎曰華亭鶴唳豈可復聞乎遂遇害初機有駿犬名黃耳既羇寓京師久無家問笑語犬曰我家絶無書汝能齎書取消息否犬搖尾作聲機乃為書以竹筒盛之繫其頸犬尋路南走遂至家得報還洛後以為常桓談非讖王商止訛後漢桓談字君山沛國相人好音律世祖即位拜議郎給事中後詔會議靈臺所處時帝方信讖多以決定嫌疑謂談曰吾欲讖決之何如談曰臣不為讖帝問其故談復極言讖之非經帝大怒曰談非聖無法將下斬之叩頭流血乃得解出為六安郡丞卒前漢王商字子威涿郡蠡吾人成帝時為左將軍京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子召公卿議大將軍王鳳以為太后與上及後宮可御船令吏民上長安城以避水商曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因有大水暴至此必訛言上乃止果訛言上每壯商之固守數稱其議而鳳大慚後為丞相為人多質有威重長八尺餘身體鴻大容貌過人單于來朝商至未央廷中單于前拜謁商仰視大畏之遷延卻退上聞歎曰真漢相矣鳳怨商陰求其短卒為所中免相薨嵇呂命駕程孔傾蓋晉書嵇康字叔夜譙國郅人性巧而好鍛宅中有一柳樹甚茂乃激水圜之每夏月居其下以鍛東平呂安服其高致每一相思輒千里命駕康友而善之家語孔子之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛以贈先生劇孟一敵周處三害前漢劇孟洛陽人以俠顯吳楚反時條侯周亞夫為太尉東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為已天下騷動大將軍得之若一敵國晉周處字子隱義興陽羡人膂力絶人不修細行州曲患之處自知為人所惡慨然有改勵之志謂父老曰今時和歲稔何苦自不樂父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛虎長橋下蛟并子為三矣處曰吾能除之乃入山射殺猛虎投水搏殺蛟遂勵志好學有文思志存義烈言必忠信克己期年州府交辟仕吳為御史中丞凡所糾劾不避寵戚及氐人齊萬年反朝臣惡處強直皆曰處名將子忠烈果毅乃使隸夏侯駿西征伏波將軍孫秀謂之曰卿有老母可以此辭處曰忠孝之道安得兩全既辭親事君父母安得而子乎巳而戰敗左右勸退處按劍曰此吾效節授命之日何退之為且古者良將受命凶門以出蓋有進無退也諸君負信勢必不振我為大臣以身殉國不亦可乎遂力戰而沒追贈平西將軍胡廣補闕袁安倚賴後漢胡廣字伯始南郡華容人察孝廉試章奏安帝以廣為天下第一纍為三公年已八十而心力充壯性溫柔謹素常遜言恭色達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公及共李固趙戒杜喬議立清河王蒜而蠡吾侯志娶梁冀妹冀欲立之廣戒憚冀皆曰惟大將軍令獨固與喬堅守本議竟立蠡吾侯是為桓帝以此譏毀於時自在公臺三十餘年歷事安順沖質桓靈六帝凡一履司空再作司徒三登太尉又為太傅其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會輒稱疾避廣時人榮之後漢袁安字邵公汝南汝陽人嚴重有威見敬於州里肅宗末為司空遷司徒和帝時薨初安以天子幼弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫嗚流涕自天子及大臣皆倚賴之及薨朝廷痛惜焉初安父沒訪求葬地道逢三書生問安何之安告之生乃指一處云葬此地當世為上公須臾不見安異之於是葬其地故纍世隆盛黃霸政殊梁習治最前漢黃霸字次公淮陽陽夏人武帝末以待詔入錢賞官補侍郎謁者後復入穀補左馮翊二百石卒史馮翊以霸入財為官不署右職使領郡錢穀計簿書正以廉稱宣帝時擢揚州刺史以賢良高第為潁川太守力行教化而後誅罰外寬內明得吏民心戶口歲增治為天下第一徵守京兆尹坐貶秩歸潁川前後八年郡中愈治是時鳳凰神爵數集郡國潁川尤多天子以霸治行終長者下詔稱揚賜爵關內侯黃金百斤秩中二千石後為丞相霸材長於治民及為相總綱紀號令風采不及丙魏于定國功名損於治郡魏志梁習字子虞陳郡拓人以別部司馬領并州刺史承高幹荒亂之餘胡狄在界張雄跋扈吏民亡叛入其部落兵家擁衆作為寇害更相扇動往往棋跱習到官誘喻招納皆禮召其豪右稍相薦舉使詣幕府邊境肅清百姓布野勤勸農桑令行禁止貢達名士咸顯於世太祖嘉之賜爵關內侯更拜為真長老稱詠以為自所聞識刺史未有及習者文帝時復為刺史政治常為天下最舊本習作集誤墨子悲絲楊朱泣歧淮南子楊子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可以黃可以墨高誘曰憫其本同而末異朱博烏集蕭芝雉隨前漢朱博字子元杜陵人哀帝時御史府吏舍百餘區井水皆竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二歲餘博為大司空奏言高皇帝置御史大夫位次丞相今中二千石未更御史大夫而為丞相權輕非所以重國政也臣以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以為百僚率從之乃更拜博御史大夫後為丞相坐事自殺前漢蕭廣濟孝子傳蕭芝至孝除尚書郎有雉數千頭飲啄宿止當上直送至歧路及下直入門飛鳴車前杜后生齒靈王出頿晉書成恭杜皇后諱陵陽鎮南將軍預曾孫后少有姿色然長猶無齒有來求婚者輒中止及帝納采之日一夜齒盡生在位六年無子先是三吳女子相與簪白花望之如素奈傳言天公織女死為之著服至是而后崩左氏傳王子朝曰定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世供職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世賈誼忌鵬莊周畏犧前漢賈誼維陽人年十八能誦詩書屬文稱於郡中河南守吳公聞其秀材召置門下及為廷尉乃言誼年少頗通諸家書文帝召為博士每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生以為能帝説之超遷歲中至太中大夫誼以為漢興當改正朔易服色制度定官名興禮樂乃草具其儀帝謙讓未遑也然諸法令所更定皆誼發之天子以誼任公卿之位絳灌之屬害之於是上亦疏之不用其議以為長沙王太傅三年有服飛入舍止於坐隅服似梟不祥鳥也誼既適居長沙卑濕自傷悼以為命不得長乃為賦以自廣歲餘帝思誼徵之入見上方受釐坐宣室因感鬼神事而問鬼神之本誼具道所以然之故至夜半帝前席既罷曰吾久不見賈生自以為過之今不及也乃拜誼梁王太傅死年三十三孔臧鶚賦云昔賈生有識之士忌茲服烏莊子或聘於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲為孤犢其可得乎史記曰莊周蒙人嘗為蒙漆園吏與梁惠王同時其學本於老子著書率寓言洸洋自恣以適己故王公大人不能器之楚威王聞周賢使使厚幣迎之許以為相周引此辭應之郭象注云樂生者畏犧而辭聘燕昭築臺鄭莊置驛史記燕昭王即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趍燕後與秦楚三晉合謀伐齊敗之齊城之不下者唯聊莒即墨餘皆屬燕孔文舉與曹公書曰昭王築臺以尊郭隗鮑昭樂府曰豈伊白璧賜將起黃金臺注云燕昭王置千金於臺上以延天下之士前漢鄭當時字莊陳人孝文時以任俠自喜脫張羽於厄聲聞梁楚間孝景時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日常恐不遍其知友皆大父行天下有名之士武帝時遷大司農當時為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人其推轂士及官屬丞史常引以為賢於己聞人之善言進之上唯恐後山東諸公以此翕然稱鄭莊後陷罪起為汝南太守卒家亡餘財先是下邽翟公為廷尉賓客亦填門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見瓘靖二妙嶽湛連璧晉書衛瓘字伯玉河東安邑人武帝時拜尚書令加侍中性嚴整以法御下視尚書若參佐郎若掾屬瓘學問深博明習文藝與尚書郎索靖俱善草書時號一臺二妙漢末張芝亦善草書論者謂瓘得伯英筋靖得伯英肉瓘筆勝靖然其楷法遠不能及靖靖字幼安敦煌人少有逸群之量與鄉人泛衷張彪索紛索永俱詣太學馳名海內號稱敦煌五龍靖該博經史舉賢良對策高第纍遷遊擊將軍伯英芝字也晉潘嶽字安仁滎陽中牟人少以才穎見稱鄉邑號為奇童謂終賈之儔也夏侯湛字孝若譙國譙人幼有盛才文章宏富善構新詞美容觀與潘嶽友善每行止同輿接茵京都謂之連璧嶽美姿儀辭藻絶麗少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果滿車而歸舉秀才名冠世為衆所疾棲遲十年出為河陽令負其才鬱鬱不得志後至黃門侍郎湛舉賢良對策中第終散騎常侍郤詵一枝戴憑重席晉書郤詵字廣基濟陰單父人博學多才瓖偉倜儻不拘細行州郡禮命並不應泰始中舉賢良對策上第拜議郎遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林一枝崑山片玉帝笑詵在任威嚴明斷甚得聲譽後漢戴憑字次重汝南平輿人光武時舉明經試博士後拜侍中正旦朝賀百僚畢會帝令群臣欲説經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中舊本憑作馮誤鄒陽長裾王符縫掖前漢鄒陽齊人為人有智略慷慨不茍合漢興諸侯王皆自治民聘賢吳王濞招致四方遊士陽仕吳以文辨著名久之吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諫略曰今臣盡智畢議易精極慮則無國不可姦飾固陋之心則何王之門不可曳長裾乎然臣所以歷數王之朝背淮千里而自致者非惡臣國而樂吳民也竊高下風之行尤説大王之義願大王無忽王不納陽乃去從梁孝王卒為上客後漢王符字節信安定臨涇人少好學有志操耿介不同於俗以此遂不得升進乃隱居著書三十餘篇以譏當時失得號潛夫論後度遼將軍皇甫規解官歸鄉人有以貨得雁門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食雁美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也後竟不仕鳴鶴日下士龍雲間晉書陸雲字士龍六歲能屬文性清靜有才理少與兄機齊名雖文章不及機而持論過之號二陸幼時吳尚書閔鴻見而奇之曰此兒若非龍駒是鳳雛後舉雲賢良吳平入洛雲與荀隱未相識嘗會張華坐華曰今日相遇可勿為常談雲因抗聲曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野麋獸微弩強是以發遲華撫手大笑刺史周浚召為從事謂人曰士龍當今之顏子也官至中書侍郎與機同被害初雲嘗行迫宿故人家夜暗迷路莫知所從忽望草中有火趍之至一家寄宿見一年少美風姿共談老子辭致深遠向曉辭去行十許里至故人家云此數十里中無人居雲意始悟郤尋昨宿處乃王弼冢雲本無元學自此談老殊進晉宣狼顧漢祖龍顏晉宣皇帝諱懿字仲達河內溫縣孝敬里人姓司馬氏少聰朗多大略博學洽聞漢末大亂常慨然有憂天下心魏武為丞相辟為文學掾纍遷相國武帝受禪上尊號曰宣皇帝帝內忌而外寬猜忌而權變魏武察帝有雄豪志聞有狼顧相欲驗之乃召使前行令反顧面正向後而身不動又嘗夢三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必預汝家事太子素與帝善每相全佑故免前漢高祖諱邦字季沛豐邑中陽里人姓劉氏母媼嘗息大澤之陂夢與神遇是時雷電晦冥父太公往視則見交龍於上已而有娠遂産高祖隆準而龍顏美鬚髯左股有七十二黑子寬仁愛人意豁如也常有大度不事家人生産作業鮑靚記井羊祜識環晉書鮑靚字太元東海人年五歲語父母云本是曲陽李家兒九歲墮井死其父母訪問皆符驗靚學兼內外明天文河洛書後遷南海太守嘗見仙人陰君授道訣百餘歲卒晉羊祜字叔子泰山南城人世吏二千石至祜九世並以清德聞祜年五歲時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人東垣桑樹中探得之主人驚曰此吾亡兒所失物云何持去乳母具言之李氏悲惋時人異之謂李氏子即祜之前身也祜博學能屬文魏高貴鄉公時公車徵拜中書侍郎武帝有滅吳之志以祜都督荊州諸軍事出鎮南夏纍進征南大將軍南城侯卒贈太傅初有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公祜竟墮馬折臂仕至公而無子祜樂山水每風景必造峴山置酒言詠終日不倦襄陽百姓於祜平生遊憩之所建碑立廟歲時享祀望其碑者莫不流涕杜預因名為墮淚碑荊州人為祜諱名云仲容青雲叔夜玉山晉書阮咸字仲容陳留尉氏人任達不拘與叔父籍為竹林之遊當世譏其所為咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服錦綺粲目咸以竿挂大布犢鼻於庭曰未能免俗歷散騎侍郎妙解音律善彈琵琶雖處世不交人事唯共親知絃歌酣宴而已荀勗每與咸論音律自以為遠不及疾之出補始平太守顏延年作五君詠其一曰仲容青雲器實稟生民秀達音何用深識微在金奏郭奕已心醉山公非虛覯屢薦不入官一麾乃出守晉嵇康字叔夜有奇才遠邁不群美詞氣有風儀而土木形骸不自藻飾人以為龍章鳳姿天質自然恬靜寡欲含垢匿瑕寬簡有大量博覽該通長好老莊與魏宗室婚拜中散大夫所與交者唯阮籍山濤預其流者向秀劉伶阮咸王戎為竹林之遊世所謂竹林七賢也戎與叔夜居山陽二十年未嘗見其喜慍之色世説曰叔夜之為人嵒嵒若孤松之獨立其醉也嵬峨若玉山之將頽毛義奉檄子路負米後漢毛義字少節廬江人家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顏色奉者志尚士也心賤之自恨來固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵不至張奉歎曰賢者固不可測往日之喜乃為親屈所謂家貧親老不擇官而仕者也章帝下詔褒寵義賜穀千斛常以八月長吏問起居加賜羊酒壽終于家家語仲由字子路見孔子曰負重涉遠不擇地而休家貧親老不擇祿而仕昔由事二親之時常食藜藿之實為親負米百里之外親沒之後南遊於楚從車百乘積粟萬鍾纍茵而坐列鼎而食願欲食藜藿為親負米不可得也子曰由也事親可謂生事盡力死事盡思者也江革巨孝王覽友弟後漢江革字次翁齊國臨淄人少失父獨與母居遭亂負母逃難備歷阻險常採拾以為養數遇賊或劫欲將去革輒涕泣言有老母辭氣願款有足感動人者賊不忍犯之革轉客下邳窮貧裸跣行傭以供母建武末與母歸鄉里至歲時縣當案比革以母老不欲搖動自在轅中挽車不用牛馬由是鄉里稱江巨孝及母終舉賢良方正遷司馬長史肅宗崇禮之拜諫議大夫賜告歸因謝病常以八月長吏存問致羊酒以終厥身巨孝之稱行於天下舊本巨作忠非晉王覽字元通母朱遇兄祥無道覽年數歲見祥被楚撻輒涕泣抱持每諫其母母少止凶虐朱屢以非理使祥覽輒與俱又虐使祥妻覽妻亦趨而共之朱患之乃止祥喪父後漸有時譽朱深疾之密使鴆祥覽知之徑起取酒祥疑其有毒爭而不與朱遽奪反之自後又賜祥饌覽輒先嘗覽孝友恭恪名亞於祥仕至光祿大夫門施行馬蕭何定律叔孫制禮前漢高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛秦民大説其後四夷未附兵革未息三章之法不足以禦姦於是相國蕭何捃托秦法取其宜於時者作律九章高祖布衣時何數以吏事護高祖高祖為沛公何嘗為丞督事沛公至咸陽諸將皆爭走金帛財物之府分之何獨先入收秦丞相御史律令圖書藏之沛公具知天下厄塞戶口多少強弱處民所疾苦者以何得秦圖書也高祖即位論功行封以何功最盛先封酇侯前漢叔孫通薛人秦時以文學待詔博士降漢拜博士號稷嗣君漢王為皇帝悉去秦儀法為簡易群臣飲爭功醉或妄呼拔劍擊柱上益厭之通説上願徵魯諸生與臣弟子共起朝儀頗采古禮與秦儀雜就之上使徵魯諸生與其弟子為綿蕝野外習之月餘通曰上可試觀七年長樂宮成諸侯群臣朝十月行禮畢置酒以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝無敢喧譁失禮者帝曰吾乃今日知為皇帝之貴也拜通為太常賜金五百斤葛豐刺舉息躬歷詆前漢諸葛豐字少季琅邪人以明經為郡文學特立剛直元帝擢為司隸校尉刺舉無所避京師為之語曰間河闊逢諸葛上嘉其節加秩光祿大夫前漢息夫躬字子微河內河陽人少為博士弟子受春秋通覽記書哀帝擢光祿大夫給事中上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延墮弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遫不足數卒有強弩圍城長戟指闕陛下誰與備之管寧割席和嶠專車世説管寧字幼安與華歆共園鋤菜見地有金寧揮鋤與瓦石不異歆捉而擲之又嘗同席讀書有乘軒冕過門者寧讀書如故歆廢書而看寧割席分坐曰子非吾友也寧歆邴原俱遊學三人相善故時人號為一龍謂寧為龍頭原為龍腹歆為龍尾晉和嶠字長輿汝南西平人少有風格厚自崇重有盛名於世朝野許其能整風俗理人倫庾顗見而歎曰嶠森森如千丈松雖磊砢多節目施之大廈有棟梁之用纍遷中書令武帝深器遇之舊監令共車入朝時荀勗為監嶠鄙其為人以意氣加之每同乘高抗專車而坐乃使監令異車自嶠始也時苗留犢羊續懸魚魏略時苗字德胄巨鹿人少清白為人疾惡建安中為壽春令習俗風靡苗始之官乘薄軬車黃牸牛布被囊歲餘牛生一犢及去留其犢謂主簿曰令來時本無此犢犢是淮南所生時人皆以為激然因此名聞天下後遷中郎將後漢羊續字興祖泰山平陽人為南陽太守班宣政令候民病利百姓歎服常敝衣薄食車馬羸敗府吏嘗獻其生魚續受而縣之於庭後又進之續乃出前所懸者以杜其意靈帝欲以為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輒迎致禮敬厚加贈賂續乃坐使於單席舉縕袍示之曰臣所資唯斯而已以此故不登公位樊噲排闥辛毗引裾前漢樊噲沛人以屠狗為事從高祖定天下以功封舞陽侯帝嘗病惡見人臥禁中詔戶者無得入群臣群臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者臥噲等流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下疾甚惡見臣等計事顧獨一宦者絶乎且獨不見趙高之事乎帝笑而起初帝已定關中項王至怒欲攻之帝從百餘騎見羽鴻門亞夫范增令項莊拔劍舞欲擊帝項伯常屏蔽之噲聞事急持盾直入怒甚羽壯之賜以巵酒彘肩噲飲酒拔劍切肉食之曰臣死且不辭豈特巵酒乎帝如廁麾噲出獨騎馬噲等步從山下走歸霸上軍是日微噲幾殆魏志辛毗字佐治潁川陽翟人文帝踐祚遷侍中帝欲徙冀州士家十萬戶實河南時旱蝗民飢群司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下不以臣不肖置之左右廁之謀議之官安得不與臣議臣所言非私乃社稷之慮也帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰卿持我何太急邪毗曰今徙既失民心又無以食帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂群下甚苦帝默然後遂為之稀出終衛尉孫楚漱石郝隆曬書晉書孫楚字子荊太原中都人才藻卓絶爽邁不群多所陵傲缺鄉曲之譽年四十餘始參鎮東軍事終馮翊太守初楚少時欲隱居謂王濟曰當欲枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒世説郝隆七月七日出日中仰臥問其故曰我曬腹中書也枚皋詣闕充國自贊前漢枚皋字少孺至長安上書北闕自陳枚乘之子始乘死詔問乘子無能為文者乘在梁時取皋母為小妻及東歸皋母不肯隨留與母居上得大喜召入見待詔因賦殿中詔使賦平樂館善之拜為郎使胸奴皋不通經術談笑類俳倡為賦頌妤嫚戲以故得媟黷貴幸比東方朔郭舍人等前漢趙充國字翁孫隴西上邽人善騎射補羽林為人沉勇有大略少好將帥之節而學兵法通知四夷事宣帝時為後將軍封營平侯神爵初諸羌背叛犯塞時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者臣願馳至金城圖上方略充國常以遠斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂至西部都尉府日饗軍士卒皆欲為用虜數挑戰充國堅守捕得生口言羌豪相責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬭而死可得邪充國引兵至先零虜棄車重赴水溺死者數百降斬五百餘後空開不煩兵而下遂上屯田便宜十二事上聽其計後罷屯兵振旅而還乞骸骨賜安車駟馬黃金罷就第每有四夷大議常與參兵謀問籌策薨諡壯侯初充國以功德與霍光等列畫未央宮成帝時西羌有警上思將帥之臣追美充國乃召黃門郎揚雄即圖畫而頌之王衍風鑒許劭月旦晉書王衍字夷甫神情明秀風姿詳雅嘗造山濤既去濤目送之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人武帝聞其名問其從兄戎曰夷甫當世誰比戎曰未見其比當從古人中求耳補元城令終日清談縣事亦理衍有盛才美貌明悟若神常自比子貢聲名籍甚喜空言惟談老莊為事每捉玉柄麈尾與手同色議理有所不安隨即改更世號口中雌黃朝野翕然謂之一世龍門纍居顯職後進景慕歷尚書令及石勒寇京師以衍都督征討諸軍事遷太尉衆共推為元帥舉軍為勒所破衍欲求自免勸勒舉尊號勒怒曰君名蓋四海身居重任少壯登朝至於白首何得言不豫世事邪使人夜排墻填殺之王戎謂王衍神姿高徹如瑤林瓊樹自然是風麈表物王敦曰夷甫處衆中如珠玉在瓦石間顧愷作畫贊亦稱衍巖巖清峙壁立千仞其為人所尚如此後漢許劭字子將汝南平輿人少峻名節好人倫多所賞識時郭太亦知人故天下言拔士者稱許郭曹操微時常卑辭厚禮求為己目劭鄙其人曰君清平之姦賊亂世之英雄操大悅而去初劭與從兄靖俱有高名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉舉方正敦朴不就兄虔亦知名汝南稱平輿淵有二龍焉賀循儒宗孫綽才冠晉書賀循字子先會稽山陰人操尚高厲童齔不群言行進止必以禮讓建武初為中書令加散騎常侍固辭改拜太常朝廷疑滯皆咨之循輒依經禮而對為世儒宗晉書孫綽字興公馮翊太守楚之子博學善屬文居會稽遊放山水十餘年絶重張衡左思賦每云三都二京五經之鼓吹也常作天臺山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲榮期曰恐此金石非中宮商然每至佳句輒云應是我輩語除著作郎後轉延尉卿綽少以文才稱于時文士綽為其冠溫王郗庾諸公薨必須綽為碑文然後刊石焉太叔辨洽摯仲辭翰晉書摯虞字仲治京兆長安人才學通博著述不倦舉賢良策為下第拜中郎武帝詔會東堂策問對畢擢太子舍人歷太常卿虞性愛辨人有表薦者常為其辭東平太叔廣樞機清辨廣談虞不能對虞筆廣不能答更相唾笑紛然於世云山濤識量毛玠公方晉書山濤字巨源河內懷人少有器量介然不群年四十始為郡上計擢舉孝廉武帝時遷吏部尚書前後選舉周遍內外並得其才官至右僕射贈司徒初濤布衣家貧謂妻韓氏曰忍飢寒我後當作三公但不知卿堪作夫人不耳及居榮貴真慎儉約裴楷有知人鑒嘗謂濤若登山臨下幽然深遠王戎亦目濤如璞玉渾金人皆欽其寶莫知名其器梁任昉為范雲讓尚書吏部表云在魏則毛玠公方居晉則山濤識量以臣況之一何遼落魏志毛玠字孝先陳留平邱人魏太祖為相玠嘗為東曹掾與崔琰並典選舉其舉用皆清正士雖有盛名而行不由本者終莫得進務以儉率人由是士以廉節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下自治吾復何為哉文帝為五官將親自詣玠屬所親眷答曰老臣以能守職幸得免戾今所説人非遷次是以不敢奉命請謁不行時人憚之初太祖平柳城時所獲器物特以素屏風素馮幾賜玠曰君有古人之風故賜君古人之服玠居顯位常布衣蔬食賞賜以振施貧族魏國初建為僕射復典選舉時太子未定而臨災侯植有寵玠密諫曰近者袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞後太祖目指曰此古所謂國之司直我之周昌也爰盎卻坐衛瓘撫床前漢爰盎字絲安陵人孝文時為中郎將上幸上林皇后慎夫人從其在禁中常同坐及在郎署盎引卻夫人坐夫人怒不肯坐上亦怒起盎因前説曰臣聞尊卑有序則上下和今陛下既已立后夫人乃妾妾主豈可同坐哉且陛下幸之則厚賜之陛下所以為慎夫人適所以禍之也獨不見人豕乎上乃説入語慎夫人夫人賜盎金五十斤然亦以數諫不得久居中晉書衛瓘字伯玉河東安邑人武帝時遷司空為政清簡甚得朝野聲譽惠帝為太子朝臣咸謂純質不能親政事瓘每欲陳啓廢之而未敢發後會宴陵雲臺瓘託醉因跪帝床前曰臣欲有所啓欲言而止者三因以手撫床曰此座可惜帝悟因謬曰公真大醉邪瓘不復有言賈后由是怨之後告老進位太保就第惠帝立以瓘録尚書事賈后素怨瓘且忌其方直不得騁已淫虐啓帝作詔免瓘官遂被害于公高門曹參趣裝前漢于定國字曼倩東海郯人其父于公為縣獄吏郡功曹決獄平罹文法者于公所決皆不恨郡中為之生立祠始其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未嘗有所冤子孫必有興者至定國宣帝時為丞相封西平侯子永為御史大夫封侯傳世云前漢曹參沛人從高祖有功剖符封平陽侯高祖以長子肥為齊王以參為相國九年齊國安集大稱名相蕭何薨參聞之告舍人趣治行吾且入相居無何果召參參代何為相舉事無所變更一遵何之約束參薨百姓歌之曰蕭何為相較若畫一曹參代之守而勿失載其清淨民以寧一庶女振風鄒衍降霜淮南子庶女告天雷電下擊景公臺隕支體傷折海水大出許慎曰庶賤之女齊之寡婦無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣婦不能自明冤結告天燕鄒衍事燕惠王左右譖之被繫於獄仰天而哭盛夏天為之降霜江淹書曰昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺范丹生塵晏嬰脫粟後漢范丹字史雲陳留外黃人受業通經好違時絶俗為激詭之行常慕梁伯鸞閔仲叔之為人桓帝時為萊蕪長遭母憂不到官後辟太尉府以狷急常佩韋於朝議者欲以為侍御史因遁逃梁沛間賣卜於市遭黨人錮禁遂推鹿車載妻子捃拾自資或寓息客店或依宿木蔭如此十餘年乃結草室而居有時糧值盡常自若閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪韓子春秋曰晏嬰字平仲為齊相常食脫粟米不重味詰汾興魏鱉令王蜀北史魏聖武皇帝諱詰汾嘗田於山澤見轓軿自天而下既至見美婦人自稱天女受命相偶旦日請還期年周時復會于此言終而別及期帝至先田處果見天女以所生男授帝曰此君之子也當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家力微神元諱蜀王本紀曰荊人鱉令死其尸流亡隨江水上至成都見蜀王杜宇立以為相杜宇號望帝自以德不如鱉令以其國禪之號開明帝下至五代有開明尚始去帝號復稱王不疑誣金卞和泣玉前漢直不疑南陽人為郎事文帝其同舍郎有告歸誤持其同舍郎金去已而同舍郎覺亡意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慚以此稱為長者稍遷中大夫或毀曰不疑狀貌甚美然善盜嫂何也不疑聞曰我乃無兄然終不自明景帝末為御史大夫韓非子楚人和氏得玉璞楚山中奉獻厲王王使玉人相之曰石也王以和為詐而刖其左足及武王即位和又獻之王使玉人相之又曰石也王又以和為詐而刖其右足文王即位和乃抱其璞而哭於楚山之下三日三夜泣盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲和曰吾非悲刖也悲夫寶玉而題之以石貞士而名之以詐此吾所以悲也王乃使玉人理其璞而得寶焉遂命曰和氏之璧檀卿沐猴謝尚鴝鵒前漢平恩侯許伯入第丞相御史將軍中二千石皆賀蓋寬饒為司隸校尉不行許伯請之乃往酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭坐皆大笑寬饒不説因起趨出劾奏長信少府以列卿而沐猴舞失禮不敬宣帝欲罪少府許伯為謝乃解寬饒字次公魏郡人明經以孝廉為郎舉方正對策高第為人剛直高節志在奉公然刻深喜陷害人又好言事刺譏干犯上意時上方用刑法信任宦官寬饒奏曰方今聖道寖廢儒術不行以刑餘為周召以法律為詩書又引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去上以其怨謗遂下吏自剄晉謝尚字仁祖八歲神悟夙成其父鯤嘗攜之送客或曰此兒一坐之顏回也尚曰坐無尼父焉別顏回席賓歎異及長善音樂博綜衆藝王導比之王戎長呼為小安豐辟為掾始到府通謁導以其有勝會謂曰聞君能作鴝鵒舞一坐傾想尚便著衣幘而舞導令坐者撫掌擊節尚俯仰其中旁若無人其率詣如此終衛將軍散騎常侍太初日月季野陽秋魏志夏侯元字太初沛國譙人少知名弱冠為黃門侍郎嘗進見與皇后弟毛曾並坐元恥之不悅形於色明帝恨之左遷羽林監世説曰曾與元共坐時人謂兼葭倚玉樹又云朗朗如日月之入懷晉褚裒字季野河南陽翟人康獻皇后父也少有簡貴之風與杜乂俱有盛名冠于中興桓彝目之曰季野有皮裏陽秋言其外無臧否而內有所褒貶也謝安亦雅重之常云裒雖不言而四時之氣亦備矣仕至征北大將軍荀陳德星李郭仙舟異苑陳實字仲弓荀淑字季和仲弓與諸子姪造季和父子討論于時德星聚太史奏曰五百里內有賢人聚後漢郭泰字林宗太原界休人家世貧賤博通墳籍善談論美音律遊洛陽始見河南尹李膺膺大奇之遂相友善名震京師後歸鄉里諸儒送至河上車數千兩林宗唯與膺同舟而濟賓客望之以為神仙焉王忳繡被張氏銅鉤後漢王忳字少林廣漢新都人嘗詣京師於空舍中見一書生疾困愍而視之生曰我命在須臾腰下有金十斤願相贈死後乞藏骸骨已而命絶忳鬻一斤營葬餘悉置棺下人無知者忳後署大度亭長初到有馬馳入亭中而止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳後乘馬到雒縣主人見之問所由得馬忳具説其狀并及繡被主人曰卿何陰德而致此忳因説葬書生事主人驚曰是我子也大恩久不報天以此彰卿德耳由是顯名仕郡為功曹三輔決録扶風張氏之先為郡功曹晨起當朝有鳩從承塵上飛下幾前功曹曰鳩何來為禍飛上承塵為福飛入我懷開懷承之鳩乃飛入懷中探得銅鉤帶之官至數郡太守九卿有蜀客至長安私賂張氏婢婢賣鉤與蜀客客家喪禍懼而還張氏張氏得鉤復為二千石後失鉤張氏遂衰丁公遽戮雍齒先侯前漢丁公薛人季布母弟為項羽將逐窘高祖彭城西短兵接高祖急顧謂丁公曰兩賢豈相厄哉丁公引兵還及項羽滅丁公謁見高祖以丁公徇軍中曰丁公為項王臣不忠使項王失天下者也遂斬之曰使後為人臣無效丁公也前漢高祖居雒陽南宮從復道望見諸將往往偶語上問張良良曰陛下起布衣與此屬取天下今已為天子而所封皆蕭曹故人所親愛所誅者皆平生仇怨此屬畏陛下不能盡封又恐見疑過失及誅故相聚謀反耳上平生所憎群臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封齒以示群臣則人人自堅矣於是上置酒封齒為什邡侯而急趣丞相御史定功行封群臣罷酒皆喜曰雍齒且侯我屬無患矣陳雷膠漆范張雞黍後漢陳重字景公豫章宜春人少與鄱陽雷義為友義字仲公太守舉重孝廉重以讓義太守不聽義明年舉孝廉俱在郎署後俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免義後舉茂才讓於重不應命鄉里謂之語曰膠漆自謂堅不如陳與雷三府同時俱辟並至侍御史後漢范式字臣卿山陽金鄉人少遊太學與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期日後期方至元伯具以白母請設饌以候之母曰二年之別千里結言爾何相信之審對曰臣卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜飲盡歡而別舊注引殺雞炊黍事無載周侯山嶷會稽霞舉世説云世目周侯嶷如斷山注晉陽秋曰顗正情嶷然雖一時儕類皆無敢媟近周侯謂周顗也世説海西時諸公每朝朝堂猶暗唯會稽王來軒軒如朝霞舉會稽王為簡文昱也季布一諾阮瞻三語前漢季布楚人任俠有名項籍使將兵數窘高祖籍滅高祖購求布千金敢有舍匿罪三族布匿濮陽周氏周氏乃髡鉗布衣褐置廣柳車中并與其家僮數十之魯朱家所賣之朱家心知其季布也乃見汝陰侯滕公説曰季布何罪臣各為其主用職耳項氏臣可盡誅邪今上始得天下而以私怨求一人何示不廣也滕公言於上上乃赦布召見拜郎中後為河東守布初不説辨士曹邱生生至揖布曰楚人諺曰得黃金百不如得季布諾足下何以得此聲梁楚之間哉僕與足下俱楚人使僕遊揚足下名顧不美乎何距僕深也布大悅引為上客史記得黃金百斤不如得季布一諾晉阮瞻字千里始平太守咸之子性清虛寡欲自得於懷讀書不甚研求而默識其要遇理而辨辭不足而旨有餘見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時謂之三語掾永嘉中為太子舍人瞻素執無鬼論自謂此理可以辨正幽明忽有客通名謁瞻瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼於是變為異形須臾消滅瞻大惡歲餘疾卒郭文遊山袁宏泊渚晉書郭文字文舉河內軹人少愛山水尚嘉遁每遊山林彌旬而反父母終不娶辭家遊名山洛陽陷乃步擔入吳興餘杭大辟山中窮谷無人之地倚木於樹苫覆其上而居焉亦無壁障時猛獸為暴而文獨宿十餘年卒無患常著鹿裘葛巾不飲酒食肉王導召置園中七年未嘗出入後逃歸臨安結廬山中晉袁宏字彥伯陽郡陽夏人有逸才文章絶美謝尚時鎮牛渚秋夜乘月與左右微服泛江會宏在舫中諷詠聲清辭又藻拔特遣問焉即迎升舟與談論申旦不寐自此名譽日茂謝安常賞其機對辨速後安為揚州刺史宏出為東陽郡乃祖道於冶亭時賢皆集安欲以卒迫試之臨別執其手顧左右取一扇授之曰聊以贈行宏曰輒當奉揚仁風慰彼黎庶時人歎其率而要焉黃琬對日秦宓論天後漢黃琬字子琰江夏安陸人少辨慧祖父瓊初為魏郡太守建和元年正月日食京師不見瓊以狀聞太后詔問所食多少瓊對未知所況琬年七歲在旁曰何不言日食之餘如月之初瓊大驚以其言應詔深奇愛之後瓊為司徒琬以公孫拜童子郎不就知名京師獻帝初遷太尉坐免及徙西都起為司隸校尉與司徒王允同謀誅董卓為卓將李傕所害蜀志秦宓字子勑廣漢綿竹人少有才學拜長水校尉吳遣使張溫來聘百官往餞衆集而宓未往丞相亮遣使促之溫曰彼何人也亮曰益州學士也及至溫問曰君學乎宓曰五尺童子皆學何必小人溫復問曰天有頭乎宓曰有在西方詩曰乃眷西顧以此推之溫曰天有耳乎宓曰天處高而聽卑詩云鶴鳴九皋聲聞于天無耳何以聽之溫曰天有足乎宓曰詩云天步艱難無足何以步之溫曰天有姓乎宓曰姓劉天子姓劉以此知之溫曰日生於東乎宓曰雖生於東而沒於西答問如響應聲溫大敬服宓之文辨皆此類舊本宓誤作密孟軻養素揚雄草元史記孟軻鄒人受業子思之門學道既通遊事齊宣王梁惠王皆不能用以為迂遠而闊於事情是時天下方務合從連衡以攻伐為賢而孟軻乃述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作書七篇嘗曰我善養吾浩然之氣前漢揚雄字子雲蜀郡成都人有田一廛有宅一區世世以農桑為業雄少而好學不為章句訓詁通而已博覽無所不見為人簡易佚蕩口吃不能劇談默而好深湛之思清靜亡為少嗜欲不汲汲於富貴不戚戚於貧賤不修廉隅以徼名當世家産不過十金無儋石之儲晏如也自有大度非聖哲之書不好非其意雖富貴不事哀帝時丁傅董賢用事諸附離之者或起家至二千石時雄方草太元有以自守泊如也或嘲雄以元尚白雄解之號曰解嘲客有難元太深衆人不好雄解之號曰解難向秀聞笛伯牙絶絃晉書向秀字子期河內懷人清悟有遠識少為山濤所知雅好老莊之學莊周內外篇歷世雖有觀者莫適論其旨統秀乃為之解發明奇趣振起元風讀之者超然心悟郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉嵇康善鍛秀為之佐相對欣然旁若無人康誅秀入洛作思舊賦云嵇博綜伎藝於絲竹特妙臨當就命顧視日影索琴而彈之逝將西邁經其舊廬于時日薄虞泉寒冰凄然鄰人有吹笛者發聲寥亮追想曩者遊宴之好感音而歎故作賦云後為散騎常侍在朝不任職容迹而已列子伯牙善鼓琴鍾子期善聽伯牙鼓琴志在高山子期曰善哉峨峨乎若泰山志在流水子期曰善哉洋洋志若江河伯牙所志子期必得之呂氏春秋曰鍾子期死伯牙破琴絶絃終身不復鼓琴以為世無足為鼓者郭槐自屈南郡猶憐晉書賈充字公閭平陽襄陵人前妻李豐女豐誅李氏坐流徙後娶郭槐號廣城君武帝踐祚李以赦還特詔充置左右夫人郭槐性妬忌怒攘袂數充曰刊定律令為佐命之功我有其分李那得與我並充乃為李築室於永平里而不往來惠帝為太子納槐女為妃初槐欲省李氏充曰彼有才氣卿往不如不往及女為妃乃盛威儀而去既入戶李氏出迎槐不覺腳屈因遂再拜自是充每出槐使人尋之恐其過李氏李氏淑美有才行作女訓行於世舊本槐作隗非世説桓溫尚明帝女南康公主溫平蜀以李勢妹為妾甚有寵嘗著別齋後主聞與數十婢拔刃襲之值李梳頭髮垂地姿貌端麗乃徐下地結髮斂手向主曰國破家亡無心至此今日若能見殺猶生之年神色間正辭氣悽惋主於是擲刀前抱之曰我見汝亦憐何況老奴遂善遇之魯恭馴雉宋均去獸後漢魯恭字仲康扶風平陵人肅宗時拜中牟令專以德化為理不任刑法郡國螟傷稼犬牙緣界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然起與恭訣曰所以來者欲察君政迹耳今蟲不犯境化及鳥獸豎子有仁心三異也還府以狀白安是歲嘉禾生恭便坐廷中安上書言狀帝異之在事三年州舉尤異去官吏人思之後為司徒性謙退奏議依經潛有補益然終不自顯故不以剛直為稱後漢宋均字叔庠南陽安衆人光武時遷九江太守郡多虎暴數為民患常募設檻穽猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為害在殘吏而勞勤張捕非憂恤之本可一去檻穽其後傳言虎相與東遊度江廣客蛇影殷師牛鬭晉書樂廣字彥輔南陽淯陽人遷河南尹嘗有親客久闊不復來廣問其故答曰前在坐蒙賜酒方飲忽見杯中有蛇意甚惡之既飲而疾于時河南聽事壁上有角弓畫作蛇廣意杯中蛇即角影也復置酒於前處謂客曰杯中復有所見不答曰所見如初廣乃告其所以客豁然意解沉痾頓愈廣所在為政無當時功譽每去職遺愛為人所思凡論人必先稱其所長則所短不言而自見後代王戎為尚書令始戎薦廣而終踐其位時人美之晉殷仲堪陳郡人父師晉陵太守初師病積年仲堪衣不解帶躬學醫術究其精妙執藥揮淚遂眇一目居喪毀以孝聞孝武帝召為中庶子甚相親愛其父嘗患耳聰聞床下蟻動謂之牛鬭帝素聞之而不知其人至是問仲堪曰患此者為誰仲堪流涕而起曰臣進退惟谷帝有愧焉仲堪能清言每云三日不讀道德論便覺舌本間強其談理與韓康伯齊名後假節鎮江陵為桓元追兵逼殺元禮模楷季彥領袖後漢李膺字元禮潁川襄城人性簡亢無所交接舉孝廉高第遷河南尹及黨議起流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂時張成善風角推占當赦教子殺人膺按殺之其弟子上書告膺等共為部黨誹訕朝廷桓帝震怒逮捕黨人收執膺等後放歸田里禁錮終身而黨名猶書王府由是海內共相標榜指名士為之稱號上曰三君次曰八俊八顧八及八廚猶古之八元八凱也膺拜司隸校尉諸黃門常侍皆鞠躬屏氣休沐不敢復出宮省是時朝廷網紀頽弛膺獨持風裁以聲名自高士有被其容接者名為登龍門靈帝時曹節諷有司奏捕前黨皆死獄中晉裴秀字季彥河東聞喜人少好學有風操八歲能屬文叔父徽有盛名賓客甚衆秀年十餘歲有詣徽者出則過秀秀母賤嫡母宣氏不之禮嘗使進饌於客見者皆為之起母曰微賤如此當應為小兒故也宣氏知遂止時人為之語曰後進領袖有裴秀武帝時為司空秀博學洽聞留心政事以職在地官作禹貢地域圖奏之藏於祕府制圖之體有六一曰分率所以辨廣輪之度二曰準望所以正彼此之體三曰道里所以定所由之數四曰高下五曰方邪六曰遷直此三者各因地而制宜所以校夷險之異魯褒錢神崔烈銅臭晉書魯褒字元道南陽人好學多聞以貧素自立元康之後網紀大壞褒傷時貪鄙乃隱姓名而著錢神論以刺之其略曰親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處先少者居後錢之所祐吉無不利何必讀書然後富貴昔呂公欣悅於空版漢高克之於贏二文君解布裳而被錦繡相如乘高蓋而解犢鼻官尊名顯皆錢所致無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺諺曰錢無耳可使鬼凡今之人唯錢而已疾時者傳其文後莫知所終後漢崔烈涿郡安平人有重名於北州歷郡守九卿靈帝時開鴻都門榜賣官爵公卿以下皆有差富者先入錢貧者到官而後倍輸或因常侍阿保別自通達是時段熲等雖有功勳名譽然皆先輸貨財而後登公位烈因傅母入錢五百萬為司徒嘗問其子鈞曰吾居三公於議者如何鈞曰大人少有英稱歷位卿守人謂當為三公今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭後拜太尉董卓既誅拜城門校尉梁竦廟食趙溫雄飛後漢梁竦字叔敬安定鳥氏人閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慚竦自負其才鬱鬱不得意嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食如其不然間居可以養志詩書足以自娛州郡之職徒勞神耳後辟命不就肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子諸竇恐梁氏得志為己害遂譖殺二貴人而陷竦以惡逝死獄中和帝立追封褒親愍侯後漢趙溫字子柔蜀郡成都人初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去歲飢散家糧賑窮餓所活萬餘人獻帝西遷遂為三公枚乘蒲輪鄭均白衣前漢枚乘字叔淮陰人為吳王濞郎中王謀為逆乘奏書諫三不用卒見禽滅乘由是知名景帝召拜宏農都尉乘久為大國上賓與英俊並遊不樂郡吏以病去官復遊梁及孝王薨歸淮陰武帝即位乘年老乃以安車蒲輪徵乘道死後漢鄭均字仲虞東平任城人少好黃老書建初中舉直言不詣公車特徵再遷尚書數納忠言肅宗重之後告歸帝東巡乃幸均舍勑賜尚書祿以終其身時號為白衣尚書陵母伏劍軻親斷機前漢王陵沛人高祖起陵亦聚黨數千人及高祖擊項羽乃以兵屬漢羽取陵母置軍中陵使至則東向坐陵母以招陵陵母私送使者泣曰為妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劍而死列女傳鄒孟軻母其舍近墓孟子少好遊為墓間之事孟母曰此非吾所以居處子也乃去舍市傍其嬉戲乃賈人衒賣之事又曰此非吾所以居處子也復徙舍學宮之傍其嬉戲乃設俎豆揖讓進退孟母曰真可以居吾子矣遂居及孟子既學而歸孟母問學所至孟子自若也孟母以刀斷其織曰子之廢學若吾斷斯織也孟子懼旦夕勤學不息師事子思遂成名儒君子謂孟母知為人母之道齊后破環謝女解圍戰國策齊閔王遇弒其子法章變姓名為莒太史家庸夫太史敫女奇其狀貌以為非常人憐而常竊衣食之與私焉法章立是為襄王以太史氏女為皇后襄王卒子建立后事秦謹與諸侯信以故建立四十餘年不受兵始皇嘗使使者遺后玉連環曰齊多知解此環不后以示群臣群臣不知解后引椎椎破之謝秦使曰謹以解矣晉王凝之妻謝氏字道韞聰識有才辨叔父安嘗問詩何句最佳道韞稱吉甫作誦穆如清風仲山甫永懷以慰其心安謂有雅人深致又嘗內集俄而雪驟下安曰何所似也安兄子朗曰撒鹽空中差可擬道韞曰未若柳絮因風起安大悅凝之弟獻之嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步幛自蔽申獻之前議客不能屈鑿齒尺牘荀勗音律晉書習鑿齒字彥威襄陽人少有志氣博學洽聞以文筆著稱荊州刺史桓溫辟為從事纍遷別駕溫出征伐鑿齒或從或守所在任職每處機要涖事有績善尺牘論議溫甚器遇之出為滎陽太守時溫覬覦非望鑿齒在郡著漢晉春秋以裁正之起漢光武終晉愍帝後徵典國史會卒初鑿齒嘗與孫綽共行綽性通率好譏調時綽在前顧鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之粳粃在前晉荀勗字公曾潁川潁陰人漢司空爽曾孫歧嶷夙成十餘歲能屬文長博學達於從政武帝受禪拜中書監加侍中領著作與賈充共定律令既掌樂事又修律呂並行於世初勗於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飯謂在坐人曰此勞薪所炊帝遣問膳夫實用故車腳舉世伏其明識後守尚書令勗久在中書專管機事及失之甚悵恨或有賀之者勗曰奪我鳳凰池諸君賀我耶初太子婚未定勗與左衛將軍馮紞伺帝間並稱賈充女才色絶世遂成婚當時甚為正直者所疾而獲佞媚之譏帝素知太子暗弱恐後亂國遣勗及和嶠往觀之勗還盛稱太子之德而嶠云太子如初於是天下貴嶠而賤勗胡威推縑陸績懷橘晉書胡威字伯武淮南壽春人父質以忠清稱仕魏為荊州刺史威自京都定省家貧無車馬僮僕自驅驢單行既至見父而歸父賜絹一匹威曰大人清高何得此絹答曰是吾俸祿之餘威受之辭歸卒取與質帳下都督後為徐州刺史勤於政術風化大行入朝武帝謂曰卿孰與父清對曰臣父清恐人知臣清恐人不知是臣不及遠也吳志陸績字公紀吳人年六歲於九江見袁術術出橘績懷三枚去拜辭墮地術謂曰陸郎作賓客而懷橘乎績跪曰欲歸遺母術大奇之績博學多識星歷算數無不該覽孫權辟為掾以直道見憚出為鬱林太守加偏將軍績意在儒雅非其志也雖有重事著述不廢作渾天圖注易釋元皆傳於世羅含吞鳥江淹夢筆晉書羅含字君章桂陽耒陽人幼孤為叔母朱氏所養少有志尚嘗晝臥夢一鳥文彩異常飛入口中因起驚説之朱氏曰鳥有文彩汝後必有文章自此藻思日新江夏守謝尚稱曰君章可謂湘中之琳琅桓溫以為江左之秀纍遷長沙守致仕加中散大夫門施行馬初含在官舍有一白雀棲集堂宇及還家階庭忽蘭菊叢生以為德化之感南史江淹字文通濟陽考城人少孤貧嘗慕司馬長卿梁伯鸞之為人不事章句之學留情文章仕齊為侍中祕書監入梁至金紫光祿大夫淹以文章顯晚節才思微退云為宣城太守時罷歸夢一人自稱張景陽謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰那得割截都盡顧見邱遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又嘗夢一丈夫自稱郭璞謂曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詞絶無美句時人謂之才盡李廞清貞劉驎高率世説李廞茂曾第五子清貞有遠操少羸病不肯婚宦王丞相欲招禮之辟為府掾廞得箋命笑曰茂宏乃復以爵假人晉書劉驎之字子驥南陽人少尚質素虛退寡欲不修儀操人莫之知好遊山澤志存遁逸車騎將軍桓沖聞其名請為長史驎之固辭居于岐陽來往莫不投之驎之躬自供給士君子頗以勞纍更憚過焉凡人致贈一無所受世説載驎之高率善史傳蔣詡三徑許由一瓢前漢蔣詡字元卿杜陵人為兗州刺史以廉直為名王莽居攝以病免歸鄉里三輔決録曰詡舍中竹下開三徑唯故人求仲羊仲從之遊逸士傳許由隱箕山無杯器以手捧水飲之人遺一瓢得以操飲飲訖挂於木上風吹瀝瀝有聲由以為煩遂去之楊僕移關杜預建橋前漢楊僕宜陽人武帝時為樓船將軍初函谷關在宏農僕既有功恥為關外民上書乞徙東關以家財給其用度於是徙於新安去宏農三百里以故關為宏農縣晉杜預字元凱京兆杜陵人博學多通明於興廢之道常言德不可以企及立功立言可庶幾也尚文帝妹高陸公主拜尚書郎武帝時拜度支尚書預以孟津渡險有覆沒之患請建河橋于富平津議者以為殷周所都歷聖賢而不作者必不可立也預曰造舟為梁則河橋之謂也及橋成帝從百僚臨會舉觴屬預曰非君此橋不成對曰非陛下之明臣亦不得施其微巧壽王議鼎杜林駮堯前漢吾邱壽王字子贛趙人為光祿大夫汾陰得寶鼎薦見宗廟藏於甘泉宮群臣皆賀得周鼎壽王獨以為非武帝問之對曰臣聞周德始乎后稷長於公劉大於大王成於文武顯於周公德澤上昭天下漏泉無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周至於陛下恢廓祖業功德愈盛天瑞並至珍祥畢見天祚有德而寶鼎自出乃漢鼎非周鼎也上曰善賜黃金十斤後漢杜林字伯山扶風茂陸人拜侍御史大夫議郊祀制多以為周郊后稷漢當祀堯詔下公卿議議者僉同光武亦然之林獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循定林議終大司空西施捧心孫壽折腰莊子西施病心而矉其眉其里之醜人見而美之歸亦捧心而矉其眉彼知美矉而不知矉之所以美西施越女所謂四子也有絶世之美越王勾踐獻之吳王夫差夫差嬖之卒至傾國後漢梁冀為大將軍其妻孫壽封襄城君加賜赤紱比長公主壽色美善為妖態作愁眉啼粧墮馬髻折腰步齲齒笑以為媚惑性鉗忌能制御冀冀甚寵憚之及冀敗自殺靈輒扶輪魏顆結草左傳晉靈公不君趙宣子驟諫公患之飲宣子酒伏甲將攻之公嗾夫獒其車右提彌明搏殺之宣子曰棄人用犬雖猛何為鬭且出明死之初宣子田舍于翳桑見靈輒病不食三日宣子食之舍其半曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉置請橐以與之既而與為公介倒戟以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也左傳晉魏顆武子之子初武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及敗秦師于輔氏獲杜回秦之力人也顆見老人結草以亢杜回回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報逸少傾寫平子絶倒晉書王羲之字逸少司徒導從子年十三謁周顗顗異之時重牛心炙坐客未噉顗先割啖之於是始知名及長辨膽以骨鯁稱尤善隸書為古今之冠太尉郗鑒使門生求女壻於導導令遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹食獨若不聞鑒曰正此佳壻邪訪之乃羲之也遂妻之仕至右軍將軍會嵇內史世説曰郗夫人為二弟司空中郎曰王家見二謝傾筐倒寫見汝來平平耳無煩復往二弟愔與曇也二謝安石與萬石也晉衛玠好言元理其後多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微王澄字平子有高名少所推服每聞玠言輒歎息絶倒時人為之語曰衛玠談道平子絶倒澄及王元王濟並有盛名皆出玠下世云王家三子不如衛家一兒兄衍有人倫之鑒尤重澄由是顯名有經澄所題目者衍不復有言輒云已經平子矣為荊州刺史為王敦所害淡臺毀璧子罕辭寶博物志淡臺子羽渡河齎千金之璧于河河伯欲之至陽侯波起兩鮫挾船子羽左操璧右操劍擊鮫皆死既渡三投璧于河河伯躍而歸之子羽毀而去左傳宋人得玉獻諸司城子罕子罕弗受獻玉者曰以示玉人玉人以為寶故獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶東平為善司馬稱好後漢東平憲王蒼顯宗同母弟少好經書雅有智思顯宗愛重之拜驃騎將軍位三公王既還國後朝京師上問王處家何等最樂王言為善最樂肅宗立恩禮踰於前世既薨帝東巡狩幸其宮追感念蒼謂其子曰思其人至其鄉其處在其人亡因泣下幸其陵祠以太牢後漢司馬徽字德操潁川人口不談人之短與人語莫問好惡皆言好有鄉人問徽安否答曰好有人自陳子死答曰大好妻責之曰人以君有德故相告何忽聞人子死便言好徽曰卿言亦大好公超霧市魯般雲梯後漢張楷字公超成都人家河南通春秋尚書門徒常百人自父黨夙儒偕造門束馬填街徒從無所止黃門貴戚家皆起舍巷次以候過客往來之利楷疾其如此輒徙避之後隱宏農山中學者隨之所居成市華陰山南遂有公超市五府連辟舉賢良方正不就性好道術能作五里霧後安車聘之以疾辭淮南子楚欲攻宋墨子聞而憚之見楚王曰臣見大王之心傷義而不得宋王曰公輸天下之巧士作為雲梯之械設以攻宋曷為弗取墨子曰令公輸設攻臣請守之於是公輸般設攻宋之械墨子設守宋之備九攻而墨子九卻之弗能入乃偃兵不攻公輸魯般也田單火牛江逌爇雞史記田單齊諸田疏屬也為臨淄市掾不見知乃燕使樂毅伐破齊盡降齊城而單得脫東保即墨燕人攻之單乃收城中得千餘牛為絳繒衣畫五彩龍文東兵刃於其角灌脂束葦於其尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱恕而奔燕軍燕軍夜大驚視之皆龍文所觸盡死傷五千人因銜枚擊之城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大敗遂復齊七十餘城迎襄王於莒王封單號安平君晉江逌字道載陳留圉人中軍將軍殷浩請為咨議參軍遷長史時羌及丁零叛浩軍震懼姚襄去浩十里結營以逼浩浩令逌擊之逌進兵至襄營謂將校曰今兵非不精而衆少於羌耳其塹柵甚固難與校力吾當以計破之乃取數百雞以長繩連之縈火於足群雞駭散飛集襄營營火發因其亂而擊之襄遂少敗逌後遷太常蔡裔殞盜張遼止啼晉書蔡裔為兗州刺史有勇氣聲若雷震嘗有三盜入室裔拊床一呼而盜俱殞故殷浩為中軍將軍北征委以軍鋒焉魏志張遼字文遠雁門馬邑人武力過人數有戰功纍轉前將軍舊注云江東小兒啼怖之曰遼來遼來無不止者陳平多轍李廣成蹊前漢陳平陽武戶牖人平家貧好讀書治黃老術為人長大美色及長可取婦富人莫與者貧者平亦愧之久之富人張負有女孫五嫁夫輒死人莫敢取平欲得之負偉平隨至其家乃負郭窮巷以席為門然門外多長者車轍負歸謂其子仲曰吾欲以女孫豫陳平仲曰平貧不事事一縣中盡笑其所為奈何豫之女負曰固有美如陳平長貧者乎卒與女里中社平為宰分肉甚均父老善之平曰使平得宰天下亦如此肉矣從高祖為護軍中尉盡護諸將出黃金四萬斤豫平恣所為不問出入平多以金縱反間於楚軍自初從至天下定凡六出奇計定封曲逆侯惠帝時為左丞相呂后時為右丞相又相文帝乃薨前漢李廣隴西成紀人世世受射法武帝時拜右北平太守胸奴號曰漢飛將軍避之數歲不入界廣出獵見草中石以為虎而射之中石沒矢視之石也他日射終不能入廣歷七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之寬緩不苛士樂為用元狩中為前將軍從大將軍衛青擊胸奴惑失道青欲上書報天子失軍曲折長史責廣之幕府上簿廣謂其麾下曰廣結髮與胸奴大小七十餘戰今又迷失道豈非天哉且廣年六十餘不能復對刀筆吏矣遂引刀自剄百姓聞之知與不知老壯皆為垂泣贊曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大陳遵投轄山簡倒載前漢陳遵字孟公杜陵人為京兆史放縱不拘後為校尉擊賊有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門遵嗜酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去晉山簡字季倫司徒濤之子溫雅有父風永嘉中為征南將軍鎮襄陽四方寇亂天下分崩朝野危懼簡優遊卒歲唯酒是耽諸習氏荊土豪族有佳園池簡每出多之池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接㒿舉鞭向葛強何如并州兒強家在并州簡愛將也淵客泣珠交甫解佩舊注引博物志云鮫人從水中出向人家寄住積日賣鮹臨去從主人索器泣而出珠滿盤以與主人今本無載左思吳都賦云泉室潛織而卷梢淵客慷慨而泣珠淵客蓋鮫人也述異記曰南海中有鮫人室水居如魚不廢機織其眼能泣則出珠列仙傳江妃二女皆麗服華裝佩兩明珠大如雞卵遊於江漢之湄逢鄭交甫交甫説之不知其神也遂下與言曰願請子之佩二女解佩以與交甫受而懷之趨去數十步視其懷空無佩顧二女忽然不見龔勝不屈孫寶自劾前漢龔勝字君賓舍字君倩楚人二人相友並著名節世謂楚兩龔哀帝時勝為光祿大夫王莽秉政乞骸骨莽後遣使即拜諸學祭酒稱疾不應復遣使者奉璽書太子師友祭酒印綬安車駟馬與郡太守縣長吏官屬諸生千人以上入里致詔勝稱病篤東首加朝服拖紳勝曰吾受漢家恩厚亡以報今老旦暮入地誼豈以一身事二姓下見故主哉語畢不開口飲食積十四日死舍通五經拜太山太守數日乞骸骨哀帝使使者拜光祿大夫數賜告終不起舍勝歸鄉二千石長吏初到官皆至其家如師弟子之禮前漢孫寶字子嚴潁川鄢陵人以明經為郡吏御史大夫張忠辟為屬欲令授子經寶自劾去後署主簿寶徙入舍忠怪使所親問曰前大夫為君設除大舍子自劾去者欲為高節也今兩府高士俗不為主簿子既為之徙舍甚説何前後不相副也寶曰高士不為主簿而大夫君以寶為可一府莫言非士安得獨自高前日君男欲學文移寶自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為況主簿乎忠聞之慚上書薦寶平帝時為大司農呂安題鳳子猷尋戴世説嵇康與呂安善每一相思千里命駕安後來值康不在嵇喜出戶延之不入題門作鳳字而去喜不覺猶以為欣欣言凡鳥也晉王徽之字子猷右軍羲之之子性卓犖不羈為大司馬桓溫參軍蓬首散帶不綜府事嘗寄居空宅中便令種竹或問其故徽之但嘯詠指竹曰何可一日無此君邪嘗居山陰夜雪初霽月色清朗四望皓然獨酌醉詠左思招隱詩忽憶戴逵時逵在剡便夜乘小船詣之經宿方至造門不前而反人問其故曰本乘興而行興盡而反何必見安道邪官至黃門侍郎董宣強項翟璜直言後漢董宣字少平陳留圉人光武時為洛陽令時湖陽公主蒼頭白日殺人匿主家吏不能得及主出以奴驂乘宣候之駐車叩馬大言數主之失叱奴下車因格殺之主訴帝帝怒召宣欲殺之宣曰陛下縱奴殺良人何以理天下臣請自殺即以頭擊楹流血被面帝使宣謝主宣不從強使頓之兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕強項令出賜錢三十萬宣悉以班諸吏由是搏擊豪強京師號為臥虎歌之曰枹鼓不鳴董少平文叔光武字也新序魏文侯與士大夫坐問曰寡人何如君也群臣皆曰君仁君也次至翟璜曰君非仁君也君伐中山不以封君之弟而以封君之長子臣以此知之文侯怒逐璜璜起而出次至任座文侯問之對曰君仁君也臣聞其君仁者其臣直向翟璜之言直是以知也文侯曰善召翟璜入拜為上卿舊本翟璜誤作任座紀昌貫虱養由號猿列子甘蠅古之善射者彀弓而獸伏鳥下飛衛學射於甘蠅而巧過其師紀昌學射於飛衛衛曰爾先學不瞬而後可言射昌歸偃臥其妻之機下以目承牽挺二年之後雖錐末倒眥而不瞬以告衛衛曰未也學視而後可視小如大視微如著而後告我昌以氂懸虱於牖而望之旬日之間寖大也三年之後如車輪焉以覩餘物皆邱山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶舊本紀昌誤作甘蠅淮南子楚王有白猿自射之則摶矢而嬉使養由基射之始調弓矯矢未發而猿擁柱號矣馮衍歸里張昭塞門後漢馮衍字敬通京兆杜陵人幼有奇才博通群書王莽時不肯仕常好俶儻之策時莫能聽用其謀衛尉陰興等以外戚貴顯深重衍遂與交結由是為諸王所聘請尋為司隸從事光武懲西京外戚賓客故皆以法繩之由此得罪罷歸故郡閉門自保不敢與親故通顯宗即位又多短衍以文過其實遂廢於家坎壈於時然有大志居常慷慨歎曰衍少事名賢經歷顯位懷金垂紫揭節奉使不求茍得常有凌雲之志三公之貴千金之富不慨於懷貧而不衰賤而不恨猶庶幾名賢之風修道德於幽冥之路以終身名為後世法吳志張昭字子布彭城人博覽衆書孫權拜輔吳將軍昭每朝見辭氣壯厲義形於色權以公孫淵稱藩遣張彌許晏至遼東拜淵為燕王昭見不用稱疾不朝權恨之土塞其門昭又於內以土封之淵果殺彌晏權數慰謝昭昭固不起權因出過其門呼昭辭疾篤權燒其門欲以恐之昭更閉門權使人滅火住門良久昭諸子共扶昭起權載以還宮深自克責昭不辱己然後朝會昭容貌矜嚴有威風權常曰孤與張公言不敢妄也舉朝憚之蘇韶鬼靈盧充幽婚三十國春秋中牟令蘇韶卒後從弟節見韶乘馬晝日而行著黑介幘黃綵單衣節因問幽冥之事韶曰死者為鬼俱行天地之中在人間而不與生者接顏回卜商今見為修文郎死之與生略無有異死虛生實此有異爾言終而不見舊注引孔氏志怪曰漢盧充范陽人家西四十里有崔少府女墓充因獵逐忽見朱門官舍有人迎充見崔云近得公尊府君書為君娶吾小女故相邀耳將書示充乃父手札崔乃命女粧飾於東廂引充相見成禮留三日臨別謂充曰君婦有娠矣生男則當留之贈充衣衾令車送之充至家經三年三月三日臨水戲忽見水上二犢車乍沉乍浮既達于岸充視車中見崔氏與三歲小兒共載其別車即崔少府也抱兒還充及詩一首金碗一枚俄而不見及兒長成後歷任數郡震畏四知秉去三惑後漢楊震舉茂才四遷荊州刺史東萊太守當之郡道經昌邑故所舉荊州茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出公性廉不受私謁子孫蔬食步行故舊或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎震安帝時為太尉為中常侍樊豐所譖而卒後漢秉字叔節震中子也桓帝時為太尉每朝廷有得失輒盡忠規諫多見納用秉性不飲酒又早喪夫人遂不復娶所在以淳白稱嘗言曰我有三不惑酒色財也柳下直道叔敖陰德論語柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦賈誼新書孫叔敖為嬰兒出遊而還憂而不食其母問其故泣而對曰今日吾見兩頭蛇恐去死無日矣母曰今蛇安在曰吾聞見兩頭蛇者死吾恐他人又見已埋之矣母曰無憂汝不死吾聞之有陰德者天報以福人聞之皆喻其為仁也及為令尹未治而國人信之列女傳曰有陰德者陽報之德勝不祥仁除百禍天之處高而聽卑爾必興於楚及長為令尹老終張湯巧詆杜周深刻前漢張湯杜陵人為廷尉舞文巧詆其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士每朝奏事語國家事日旰天子忘食丞相取充位天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以罪自公卿以下至庶人咸指湯後為御史大夫坐事自殺初湯父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治傳爰書訊鞫論報并取鼠與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄前漢杜周南陽杜衍人少言重遲而內深刺骨為廷尉其治效張湯上所欲擠者因而陷之上所欲釋久繫待問而微見其冤狀客謂周曰君為天下決平不循三尺法專以人主意指為獄周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎後為執金吾逐捕桑宏羊衛皇后昆弟子刻深上以為盡力無私遷御史大夫兩子夾河為郡守家訾纍巨萬治皆酷暴唯少子延年行寬厚云三王尹京二鮑糾慝前漢王駿諫大夫吉之子以孝廉為郎成帝欲大用之出為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章及駿皆有能名故京師稱曰前有趙張後有三王駿終御史大夫章字仲卿泰山巨平人遷諫大夫在朝廷常敢直言成帝選為京兆尹時帝舅王鳳輔政專權會日食草奏封事召見言鳳不可任用宜選忠賢上不忍退鳳章遂為鳳所陷初章為諸生學長安疾病無被臥牛衣中與妻決涕泣妻怒之曰京師尊貴在朝廷誰踰仲卿者今不自激卬乃反涕泣何鄙也後欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章曰非女子所知也書上果下獄死死非其罪衆庶冤之廣漢敞尊互見於後後漢鮑永字君長上黨屯留人少有志操事後母至孝妻嘗於母前叱狗永即去之建武中為司隸校尉乃辟扶風鮑恢為都官從事恢亦抗直不避強禦帝嘗曰貴戚且斂手避二鮑其見憚如此父宣哀帝時為司隸校尉為王莽所害子昱中元初亦拜司隸校尉章帝時官至太尉孫康映雪車允聚螢孫氏世録康家貧無油常映雪讀書少小清介交遊不雜後至御史大夫晉車允字武子南平人恭勤不倦博覽多通家貧不常得油夏月則練囊盛數十螢火以照書以夜繼日焉桓溫在荊州辟為從事以辨識義理深重之稍遷征西長史遂顯於朝廷時武子與吳隱之以寒素博學知名于世又善于賞會當時有盛坐而武子不在皆云無車公不樂終吏部尚書李充四部井春五經晉書李充字宏度江夏人善楷書妙參鍾索世咸重之褚裒引為參軍充以家貧苦求出外裒將許之為縣試問之充曰窮猿投林豈暇擇木乃除剡縣令後為著作郎時典籍混亂充刪除煩重以類相從分作四部祕閣以為永制纍遷中書侍郎漢井丹字大春扶風郿人少受業太學通五經善談論京師為之語曰五經紛綸井大春性清高未嘗修刺候人建武末沛王輔等五王居北宮皆好賓客更請丹不能致信陽侯陰就光烈皇后第也以外戚貴盛乃詭説五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯蔥葉之食丹推去之曰以君侯能共甘旨故來相過何其薄乎更置盛饌乃食及就左右進輦丹笑曰吾聞桀駕人車豈此邪坐中皆失色就不得已令去輦自是隱閉人事谷永筆札顧愷丹青前漢谷永字子雲長安人與樓護俱為五侯上客長安號曰谷子雲筆札樓君卿唇舌言其見信用也永於經書泛為疏達與杜欽杜鄴略等不能洽浹如劉向父子及揚雄也其於天官京氏易最密故善言災異終大司農護字君卿少隨父為醫出入貴戚家是時王氏方盛賓客滿門五侯爭名其客各有所厚不得左右唯護盡入其門咸得其歡心為人精辨論議常依名節聽者皆竦仕至廣漢太守王莽專政召為前輝光西京雜記曰五侯競致奇膳護乃合以為鯖世稱五侯鯖以為奇味焉晉顧愷之字長康晉陵無錫人博學有才氣好諧謔人多愛狎之每食甘蔗嘗自尾至本人或怪之云漸入佳境尤善丹青圖寫特妙嘗以一廚畫糊題其前寄桓元皆其所珍惜者元發其廚後竊其畫而緘閉如舊還之給云未開愷之見封題如初直云妙畫通靈變化而去亦猶人之登仙了無怪色其矜伐過實少年因相稱譽以為戲弄初在桓溫府嘗云愷之體中癡黠各半合而論之正得平耳故俗傳愷之有三絶才絶畫絶癡絶終散騎常侍戴逵破琴謝敷應星晉書戴逵字安道譙國人少博學善屬文能鼓琴工書畫其餘巧藝靡不畢綜武陵王晞聞其善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晞怒乃引其兄述述欣然擁琴而往後纍召不起晉謝敷字慶緒會稽人性澄靖寡欲入太平山十餘年召皆不就初月犯少微少微一名處士星占者以隱士當之戴逵有美才人或憂之俄而敷死故會稽人士以嘲吳人云吳中高士求死不得死阮宣杖頭畢卓甕下晉書阮修字宣子咸從弟也好易老善清言性簡任不修人事常步行以百錢挂杖頭至酒店便獨醉暢雖當世富貴而不肯顧家無儋石之儲晏如也與兄弟同志常自得於林阜間王衍與修談易言寡旨暢衍歎服焉修居貧年四十餘未有室王敦等斂錢為婚皆名士也時之者求入錢而不得後為太子洗馬避亂為賊所害晉畢卓字茂世新蔡鮦陽人少希放達為吏部郎常飲酒廢職比舍郎釀熟卓因醉夜至其甕間盜飲為掌酒者所縛明旦視之乃畢吏部也遽釋其縛卓遂引主人宴於甕側致醉而去常謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣過江為溫嶠長史文伯羞鱉孟宗寄鮓魯語公父文伯飲南宮敬叔酒以露睹父為客羞鱉焉小睹父怒相延食鱉辭曰將使鱉長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸饗養上賓鱉於何有而使夫人怒也遂逐之五日魯夫人辭而復之吳録孟仁字恭武本名宗江夏人少從李肅學其母為作厚蓐大被曰小兒無德致客學者多貧故為廣被庶可得與氣類接也其讀書夙夜不懈肅奇之曰卿宰相器也除監池司馬自能給網手以捕魚作鮓寄母母以還之曰汝為魚官而以鮓寄我非避嫌也遷吳令時皆不得將家之官每得時物未以寄母常不先食楚國先賢傳曰宗母嗜筍冬節將至時筍未生宗入竹林哀泣而筍為之出得以供母以為至孝所感仕孫皓至司空史丹青蒲張湛白馬前漢史丹字君仲魯國人元帝即位為侍中時定陶其王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵上寢疾皇后太子皆憂丹以親密臣得侍疾候上間獨寢時直入臥內伏青蒲上涕泣言曰皇太子以適長立十餘年名號繫於百姓天下莫不歸心臣子見定陶王愛幸道路流言以為大子有動搖之意審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣天子素仁見丹涕泣言又切至大感曰皇后謹慎先帝又愛太子吾豈可違指太子由是為嗣成帝立纍遷左將軍後漢張湛字子孝扶風平陵人矜嚴好禮動止有則居幽室必修整遇妻子若嚴君在鄉黨詳言正色三輔以為儀表人或謂湛為偽詐湛曰人皆詐惡我獨詐善建武初拜光祿勳光武臨朝或有惰容輒陳諫常乘白馬上每見輒言白馬生且復諫矣及郭后廢稱疾不朝拜太中大夫帝強起之為大司徒湛自陳疾篤遂罷隱之感鄰王修輟社晉書吳隱之字處默濮陽鄄城人博涉文史以儒雅標名弱冠而介立有清操年十餘丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毀過禮與太常韓康伯鄰居康伯母賢明婦人每聞其哭輟餐投筯為之悲泣謂韓康伯曰汝若居銓衡當舉如此輩人及康伯為吏部尚書隱之遂階清級廣州珍異所出前後刺史多黷貨朝廷欲革其弊以隱之為刺史州有水曰貪泉飲者懷無厭之欲隱之至泉所酌而飲之因賦詩曰古人云此水一歃懷千金試使夷齊飲終當不易心及在州清操愈厲後致仕授光祿大夫散騎常侍魏志王修字叔治北海營陵人年七歲喪母母以社日亡來歲鄰里社修感念母哀甚鄰里為之罷社後太祖破南皮閲修家穀不滿十斛有書數百卷太祖歎曰士不妄有名乃辟為司空掾遷魏郡太守為治抑強扶弱百姓稱之阮放八雋江泉四凶晉書羊曼字祖延少知名歷晉陵太守任達頽縱好飲酒溫嶠庾亮阮放桓彝同志友善並為中興名士時州里稱阮放為宏伯郗鑒為方伯胡母輔之為達伯卞壺為裁伯蔡謨為朗伯阮孚為誕伯劉綏為委伯而曼為濌伯凡八人號兗州八伯蓋擬古之八雋也曼弟聃字彭祖少不經學時論皆鄙其凡庸先是兗州有八伯之號其後更有四伯大鴻臚江泉以能食為穀伯豫章太守史疇以大肥為笨伯散騎郎張嶷以狡妄為猾伯而聃以狠戾為瑣伯蓋擬古之四凶也華歆忤旨陳群蹙容華嶠譜敘文帝受禪朝臣並受爵位歆以形色忤時徙為司徒而不進爵帝久不懌以問尚書令陳群曰我應天受禪百辟群后莫不悅喜形于聲色而相國及公獨有不怡者何也群曰臣與相國曾事漢朝心雖悅喜義形其色帝大悅歆字子魚平原高唐人明帝時進拜太尉世説文帝受禪陳群有蹙容陳群字長文潁川許昌人進司空録尚書事初群為兒時祖父實常奇異之謂宗人父老曰此兒必興吾宗博物志曰太邱長陳實實子鴻臚卿紀紀子司空群群子泰四世於漢魏並有重名而其德漸漸小減時人為之語曰公慚卿卿慚長蹙或作戚王濬懸刀丁固生松晉書王濬字士治宏農湖人博涉墳典疏通亮達恢廓有大志嘗起宅開門前路廣數十步欲使容長戟幡旗衆咸笑之辟河東從事守令有不廉潔者皆望風引去除巴郡太守郡邊吳境兵士苦役生男多不養濬乃嚴其科條寬其徭課其産育者皆與休復所全活數千人轉廣漢太守垂惠布政百姓賴之夜夢懸三刀於臥屋梁上須臾又益一刀濬意甚惡之主簿李毅拜賀曰三刀為州字又益一者明府其臨益州乎果遷益州刺史後再刺益州武帝謀伐吳詔濬修舟艦乃作大船連舫以木為城起樓櫓畫鷁首怪獸於船首以懼江神舟楫之盛自古未有拜龍驤將軍監軍統兵先在巴郡之所全育者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也濬自發蜀兵不血刃順流鼓棹徑造三山孫皓降濬解縛受璧焚櫬送于京師以功封襄陽縣侯纍轉撫軍大將軍卒諡武吳志丁固仕孫皓為司徒吳録曰初周為尚書夢松生其腹上謂人曰松字十八公也後十八歲吾其為公乎卒如夢焉薑維膽斗盧植音鐘蜀志薑維字伯約天水冀人與費禕共録尚書事加督中外軍事遷大將軍整勒戎馬出戰屢為魏將鄧艾所破及後主降維投戈放甲詣鎮西將軍鍾會會厚待之步則同輿坐則同席謂長史杜預曰以伯約比中土名士公休太初不能勝也會既搆鄧艾因謂維等詣成都自稱益州牧欲授維兵五萬人使為前驅魏將士憤發殺會及維世語曰維死時見剖膽如斗大後漢盧植字子幹涿郡涿人音聲如鐘少與鄭元俱事馬融能通古今學好研精不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之學終辭闔門教授性剛毅有大節常懷濟世志不好辭賦能飲酒一石靈帝時為尚書桓溫奇骨鄧艾大志晉書桓溫字元子譙國龍亢人生未期溫嶠見之曰此兒有奇骨可試使啼及聞其聲曰真英物也父彝以嶠所賞故名之曰溫嶠笑曰果爾後將易吾姓也溫豪爽有風慨姿貌甚衛面有七星少與劉琰善琰嘗曰溫眼如紫石稜鬢作蝟毛磔孫仲謀晉宣王之流亞也尚南康長公主拜駙馬都尉終大司馬南郡公魏志鄧艾字士載義陽棘陽人少家貧每見高山大澤輒規度指畫軍營處所時人多笑焉後為尚書郎時欲廣田畜穀為滅賊資使艾行陳項以東至壽春艾以為田良水少不足以盡地利宜開河渠可以引水澆溉大積軍糧又通運漕之道乃著濟河論以喻其指後開廣漕渠每東南有事大軍興衆泛舟而下達于江淮資食有儲而無水害艾所建也纍遷征西將軍征蜀大破之劉禪降以勳進太尉鍾會忌其威名構成其事遂見害楊修捷對羅友默記後漢楊修字德祖太尉震元孫好學有俊才為丞相曹操主簿操平漢中欲因討劉備而不得進欲守之又難為功操出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得棄之則如何可惜公歸計決矣操於此回師修之幾決多有此類又嘗出行籌操有問外事乃逆為答記敕守舍兒若有令出依此通之既而果然操怪其速廉之知狀忌修後因事殺之語林曰修至江南讀曹娥碑碑背有八字曰黃絹幼婦外孫齏臼操不解問修曰卿知否修曰知之操曰且勿言待朕思之行三十里乃得之令修解修曰黃絹色絲色絲絶字幼婦少女少女妙字外孫女子女子好字齏臼受辛受辛辭字操曰一如朕意俗云有智無智校三十里世説羅友少時多謂之癡常伺入祠欲乞食了無怍容為人強記從桓宣武伐蜀按行蜀城道陌果木皆默記之後宣武集蜀道事亦有遺忘皆名列之坐者歎伏杜康造酒蒼頡制字魏武帝樂府短歌行曰慨當以慷憂思難忘何以解憂惟有杜康注謂杜康古之造酒者呂氏春秋曰儀狄造酒淮南子昔蒼頡作書而天雨粟鬼夜哭許慎曰蒼頡始視島迹之文造書契則詐偽萌生去本趍末棄耕作之業務錐刀之利天知其將餓故為雨粟鬼恐為文書所劾故夜哭也舊云龍潛藏未詳所出樗里智囊邊韶經笥史記樗里子名疾秦惠王之弟疾室在昭王廟西渭南陰鄉樗里故俗謂之樗里子滑稽多智秦人號曰智囊秦武王立以樗里子甘茂為左右丞相疾卒葬渭南章臺東曰後百歲是當有天子之宮夾我墓至漢興長樂宮在其東未央宮在其西武庫正直其墓秦人諺曰力則任鄙智則樗里後漢邊韶字孝先陳留浚儀人以文學知名教授數百人韶口辨曾書日假臥弟子私嘲之曰邊孝先腹便便懶讀書但欲眠韶潛聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公同夢靜與孔子同意師而可嘲出何典記嘲者大慚韶之才捷皆此類桓帝時拜太中大夫著作東觀滕公佳城王果石崖西京雜記滕公駕至東都門馬鳴局不肯前以足跑地久之滕公使士卒掘馬所跑地入三尺所得石槨滕公以燭照之有銘焉乃以水洗寫其文文字皆古異左右莫能知以問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日吁嗟滕公居此室滕公曰嗟乎天也吾死其即安此乎死遂葬焉滕公即前漢夏侯嬰官至太僕初為滕公奉車故號滕公神怪志將軍王果為益州太守路經三峽船中望見江崖石壁千丈有物懸在半崖似棺槨問舊行人皆云已久果令人懸崖就視乃一棺也骸骨存焉有石志云三百年後水漂我欲及長江垂欲墮欲墮不墮遇王果見銘愴然曰數百年前知我名如何舍去因留為營斂瘞埋設祭而去買妻恥樵澤室犯齋前漢朱買臣字翁子吳人家貧好讀書不治家産常艾新樵賣以給食擔束薪行且誦書其妻亦負戴相隨羞之求去買臣曰我年五十當富貴今已四十餘矣女苦日久待我富貴報女功妻恚怒曰如公等終餓死溝中矣何能富貴買臣即聽去後數歲隨上計吏為卒將軍車至長安詣闕上書待詔公車會邑子嚴助貴幸薦買臣召見説春秋言楚詞武帝説之拜中大夫與嚴助俱侍中久之拜會稽太守上謂曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首謝入吳界見其故妻後夫治道買臣呼命後車載其夫妻到太守舍置園中給食之妻自經死買臣乞其夫錢令葬悉召見故人與飲食諸嘗有恩者皆報復焉後漢周澤字稚都北海安邱人顯宗時為司徒性簡忽威儀頗失宰相之望後為太常清潔循行盡敬宗廟嘗臥疾齋宮其妻哀澤老病窺問所苦澤大怒以妻干犯齋禁收送詔獄謝罪當時疑其詭激時人為語曰生世不諧作太常妻一歲三百六十日三百五十九日齋後數為三老五更漢官儀於齋下云一日不齋醉如泥馬后大練孟光荊叉後漢明德馬皇后伏波將軍援小女年十歲幹理家事成人嘗久疾太夫人令筮筮者曰此女雖久疾後當大貴兆不可言後又呼相者使占諸女見后大驚曰我必為此女稱臣後選入宮顯宗即位以為貴人時賈氏生肅宗帝命令養之謂女人未必當自生子但患愛子不至耳后盡心撫育過於所生肅宗亦孝性淳篤恩情天至母子慈愛無纖介之間有司奏立長秋宮帝未有所言皇太后曰馬貴人德冠後宮即其人也遂立為皇后既正位宮闈愈自謙肅能誦易經好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣後漢梁鴻字伯鸞扶風平陵人同縣孟氏有女狀肥醜而黑力舉石臼擇對至年三十父母問其故曰得賢如梁伯鸞者鴻聞而聘之及嫁始以裝飾入門七日而鴻不答曰吾欲裘褐之人可與俱隱深山者今乃衣綺縞傅粉墨豈所願哉妻曰妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰真梁鴻妻也字之曰德曜孟光乃共入霸陵山中顏叔秉燭宋宏不諧毛公詩傳昔者顏叔字獨處于室鄰人嫠婦又獨處于室夜暴風雨至而室壞婦人趨而至叔子納之而使執燭及平旦而燭盡縮屋而繼之自以為辟嫌之不審矣居其審者宜若魯人然魯有男子獨處于室鄰人嫠婦又獨處于室夜暴風雨至而室壞婦人趍而託之男子閉戶而不納曰吾聞之男女不六十不同居今子幼吾亦幼不可以納子婦人曰子何不若柳下惠然遇不逮門之女國人不稱亂男子曰柳下惠固可吾固不可吾將以吾不可學柳下惠之可孔子曰欲學柳下惠者未有似於是也後漢宋宏字仲子京兆長安人光武即位為大司空時帝姊胡陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器群臣莫及帝曰方且圖之後引見帝令主坐屏風後因謂宏曰諺言貴易交富易妻人情乎宏曰臣聞貧賤之交不可忘糟粳之妻不下堂帝顧謂主曰事不諧矣宏所得租奉分瞻九族家無資産以清行致稱所推進賢士桓梁三十餘人或相及為公卿者鄧通銅山郭況金穴前漢鄧通蜀郡南安人以雇船為黃頭郎文帝嘗夢欲上天不能有一黃頭郎推上天顧見其衣尻帶後穿覺而之漸臺以夢中陰自求目推者郎見通衣後穿夢中所見也召見問其名姓帝悅尊幸之賞賜巨萬以十數官至上大夫然無他技能不能有所薦達獨謹身媚上而已上使相者相通曰當貧餓死上曰能富通在我於是賜蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此上嘗病癰通為上嗽吮之上問曰天下誰最愛我者通曰宜莫若太子及太子入問疾上使齰癰太子色難之已而聞通嘗為上齰之太子慚是時心恨通景帝立通免家居人告通盜出徼外鑄錢下吏驗問盡沒入之竟寄死人家後漢郭況真定橐人光武郭皇后弟帝善況小心謹慎年始十六拜黃門侍郎以后弟貴重賓客輻湊況謙恭下士頗得聲譽遷大鴻臚帝數幸其第會諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號況家為金穴顯宗即位數受賞賜恩禮俱渥終特進秦彭攀轅侯霸臥轍後漢秦彭字伯平扶風茂陵人自漢興之後世位相承六世祖襲為潁川太守與群從同時為二千石者五人故三輔號曰萬石秦氏彭為潁川太守仍有鳳凰麒麟嘉禾甘露之瑞集其郡境蕭宗幸潁川輒賞賜錢穀恩寵甚異東觀漢記曰彭去後老幼攀轅號泣後漢侯霸字君房河南密人矜嚴有威容家纍千金不事産業篤志好學王莽末為淮平大尹政理有能名及莽敗霸保固自守卒全一郡更始遣使徵霸百姓老弱相攜號哭遮使者車或當道而臥皆曰願乞侯君復留期年光武時為大司徒淳于炙輠彥國吐屑史記淳于髡齊人博聞強記學無所主其諫説慕晏嬰之為人然而承意觀色為務見梁惠王一語連三日三夜無倦惠王欲以卿相位待之髡因謝去遂以安車駕駟束帛加璧黃金百鎰終身不仕齊人頌曰談天衍雕龍奭炙轂過髡劉向別録過字作輠輠者車之盛膏器也炙之雖盡猶有餘流者言髡智不盡如炙輠也衍奭謂二騶晉胡母輔之字彥國泰山奉高人少有知人之鑒性嗜酒任縱不拘小節與王澄王敦庾敳俱為太尉王衍所昵號曰四友澄嘗與人書曰彥國吐佳言如鋸木屑霏霏不絶誠為後進領袖也元帝時為湘州刺史太真玉一武子金埒晉書溫嶠字太真太原祁人性聰敏有識量博學能屬文少以孝悌稱於邦族成帝時為驃騎將軍始安郡公世説曰嶠喪婦從姑劉氏家經亂離散唯有一女甚有姿惠姑屬公覓婚公自有婚意答曰佳壻難得但如嶠如何姑云喪敗之餘乞粗存活便是慰吾餘年何敢希汝比也後少日公報姑云已得婚處門地壻身盡不減嶠因下玉鏡臺一枚姑大喜既交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜玉鏡臺是公為劉越石長史北征劉聰所得也晉王濟字武子太原晉陽人少有逸才風姿英爽氣蓋一時好弓馬勇力絶人善易及莊老文詞俊茂伎藝過人和嶠裴楷齊名尚常山公主起家拜中書郎遷侍中坐免官乃移第北邙山下性豪侈麗服玉食時洛京地甚貴濟買地為馬射編錢滿之時人謂為金溝巫馬戴星宓賤彈琴呂氏春秋宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期間其故宓子曰我之謂任人子之謂任力任力者故勞任人者故逸郝廉留錢雷義送金風俗通郝子廉飢不得食寒不得衣一介不取諸人曾過姊飯留錢席下而去每行飲水常投一錢井中後漢雷義字仲公豫章鄱陽人初為郡功曹擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝不受金主伺義不在默投金於承塵上後葺理屋宇乃得之金主已死無得復還乃以付縣曹後拜侍御史除南頓令逢萌挂冠胡昭投簪後漢逢萌字子康北海都昌人之長安學通春秋經時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門將家屬浮海客於遼東萌素明陰陽知莽將敗乃首戴瓦盆哭於市曰新乎新乎因遂潛藏後光武徵不起魏志胡昭字孔明潁川人養志不仕始避地冀州辭袁紹之命遁還鄉里太祖為相頻加禮辟昭往應命自陳一介野生無軍國之用歸誠求去太祖曰人各有志出處異趣勉卒雅尚義不相屈昭乃轉居陸渾山中躬耕樂道以經籍自娛閭里敬愛之建安末民孫狼等叛亂自相約言胡居士賢者一不得犯其部落一川賴昭咸無怵惕公車特徵會卒摯虞作昭贊曰投簪卷帶韜聲匿迹王喬雙鳧華他五禽後漢王喬河東人為葉令喬有神術每月朔望常自詣臺朝顯宗怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧自南飛來於是候鳧至舉羅張之但得一隻舄焉後天下玉棺於堂前喬曰天帝獨召我邪乃沐浴服飾寢其中蓋便立覆葬於城東百姓為立廟號葉君祠後漢華他字元化沛國譙人兼通數經曉養性之術年且百歲猶有壯容時人以為仙精於方藥處劑不過數種針灸不過數處若疾發結於內針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截湔洗除去疾穢既而縫合傅以神膏四五日瘡愈一月間平復為人性惡且恥以醫見業曹操纍書呼之數期不反竟殺之廣陵吳普從他學他語普曰人體欲得勞動但不當使極耳動搖則穀氣得銷血脈流通病不得生譬猶戶樞終不朽也古之仙者為導引之事熊經鴟顧引挽要體動關節以求難老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰鳥亦除疾兼利蹄足以當導引體有不快起作一禽之戲怡而汗出因以著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙堅程邈隸書史籀大篆前漢藝文志曰史籀篇者周時史官教學童書也與孔氏壁中古文異體又曰秦時始造隸書起於官獄多事茍趣省易施之於徒隸也晉衛恆善草隸書為字勢曰昔周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書或曰秦時下士人程邈為衙獄吏得罪幽繫雲陽十年從獄中作大篆少者增益多者損減方者使員員者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書恆字巨山為黃門郎與父瓘同遇害王承魚盜丙吉牛喘晉書王承字安期汝南內史湛之子為東海太守政尚清靜不為細察小吏有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚何足惜邪有犯夜者為吏所拘承問其故答曰從師受晝不覺日暮承曰鞭韃寧越以立威名非政化之本使吏送令歸家其從容寬恕若此渡江為元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物衆咸親愛名臣王導衛玠周顗庾亮之徒皆出其下為中興第一前漢丙吉字少卿魯國人宣帝時為丞相嘗出逢清道群鬭者死傷橫道吉過之不問吉前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可太熱恐牛近行因暑故喘此時氣失節恐有所傷害三公典調和陰陽職當憂是以問之掾史乃服以吉知大體初吉為廷尉監治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉哀其無辜擇謹厚女徒令保養之武帝疾望氣者言獄中有天子氣遣使殺獄繫者內謁者令到獄吉閉門拒之乃劾奏吉上寤因赦天下郡邸獄賴吉得生恩及四海曾孫病吉視遇甚有恩惠為人深厚不伐善自曾孫遭遇絶口不道前恩後上問知吉有舊恩不言大賢之制詔封博陽侯賈琮褰帷郭賀露冕後漢賈琮字孟堅東郡聊城人靈帝時為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當遠視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風竦震其餘臧過者望風解印綬去初交址屯兵反有司舉琮為刺史琮到部訊其反狀咸言賦斂過重民不聊生故相聚為盜賊琮即告示使各安其資業招撫荒散蠲復徭役百姓以安歌曰賈父來晚使我先反今見清平吏不敢飯在事三年為十三州最後漢郭賀字喬卿雒陽人建武中為尚書令曉習故事多所匡益拜荊州刺史到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之拜河南尹以清靜稱馮媛當熊班女辭輦前漢元帝馮昭儀左將軍奉世女平帝祖母也拜倢妤內寵與傅昭儀等上幸虎圈鬭獸後宮皆坐熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走倢妤直前當熊而立上問人情驚懼何故前當熊對曰猛獸得人而止妾恐熊至御坐故以身當之上嗟歎倍敬重焉前漢成帝班倢妤越騎校尉況之女帝遊後庭嘗欲同輦載辭曰觀古圖畫賢聖之君皆有名臣在側三代末主遒有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢妤後趙飛燕譖告許皇后與倢妤挾媚道祝詛後宮詈及主上考問倢妤對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為也上善其對憐閔之贈黃金百斤王充閲市董生下帷後漢王充字仲任會稽上虞人家貧無書常遊洛陽市肆閲所賣書一見輒能誦憶遂博通衆流百家之言仕郡為功曹充好論説始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絶慶弔之禮戶牖牆壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑刺史辟為從事轉治中自免還家肅宗詔公車徵不行前漢董仲舒廣川人少治春秋孝景帝時為博士下帷講誦弟子傳以久次相授業或莫見其面蓋三年不窺園其精如此進退容止非禮不行學士皆師尊之武帝時舉賢良對策為江都相事易王王帝兄素驕好勇仲舒以禮誼正王敬重焉治國以春秋災異之變推陰陽所以錯行求雨閉諸陽縱諸陰其止雨反是行之得所欲公孫宏治春秋不如仲舒希世用事位至公卿仲舒以宏為從諛宏嫉之乃言之於上使相膠西王王亦帝兄尤縱恣聞仲舒大儒善待之凡相兩國驕主正身以率下數上疏諫爭教令國中所居而治及去位不問家産業以修學著書為事朝廷有大議使使者就問之其對皆有明法自魏其武安侯為相而隆儒及仲舒對册推明孔氏抑黜百家立學校之官州郡舉茂才孝廉皆其發之以壽終家徙茂陵子及孫皆至大官平叔傅粉宏治凝脂魏志何晏字平叔南陽宛人尚金鄉公主為吏部尚書駙馬都尉世説曰平叔美姿面至白文帝疑其傅粉夏月令食湯餅汗出以巾拭之轉皎白也晉杜乂字宏治成恭皇后父也性純和美姿容有盛名於江右王羲之目之曰膚若凝脂眼如點漆此神仙人也桓彝亦曰衛玠神清杜乂形清仕為丹陽丞楊寶黃雀毛寶白龜續齊諧記楊寶年九歲時至華陰山北見一黃雀為鴟梟所搏墜於樹下為螻蟻所困寶取之以歸置巾箱中唯食黃花百餘日毛羽成乃飛去其夜有黃衣童子向寶再拜曰我西王母使者君仁愛救拯實感成濟以白環四枚與寶令君子孫潔白位登三事當如此環矣寶哀平世隱居教授王莽徵之遂逃遁光武高其節公車特徵不到子震安帝時為太尉震子秉桓帝時為太尉秉子賜靈帝時為太尉賜子彪獻帝時為太尉魏文帝時復為太尉震至彪四世太尉德業相繼晉毛寶字碩真榮陽陽武人進征虜將軍豫州刺史與西陽太守樊峻以萬人守邾城石虎遣二萬騎攻之城陷寶等率左右突圍出赴江死者六千人寶亦溺死初寶在武昌軍人有於市買得一白龜養之漸大放諸江中邾城之敗養龜人被鎧持刀自投於水中如覺墮一石上視之乃先所養白龜長五六尺送至江岸遂得免焉宿瘤採桑漆室憂葵古列女傳齊閔王之后項生大瘤號曰宿瘤初閔王出遊至東郭百姓盡觀宿瘤採桑如故王怪問曰寡人出遊百姓無少長皆來觀汝不一視何也對曰妾受父母教採桑不受教觀大王王曰此奇女曰婢妾之職屬之不二豫之不忘中心謂何宿瘤何傷王大悅曰此賢女也命後乘載之女曰父母在內使妾不受教而隨王是奔女也王安用之王大慚遣歸使使者奉禮加金百鎰往聘迎之父母驚惶欲洗浴加衣裳女曰如是見主變容更服不見識也於是如故隨使者至閔王以為后出令卑宮室填池澤損膳減樂後宮不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚宿瘤有力焉及死後燕遂屠齊閔王逃亡而弒於外古列女傳魯漆室邑之女過時未適人當穆公時君老太子幼女倚柱而嘯鄰婦曰何嘯之悲子欲嫁耶女曰吾豈為不嫁而悲哉吾憂魯君老而太子幼也鄰婦笑曰此魯大夫之憂婦人何與焉女曰不然昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使吾終歲不食葵鄰女奔隨人亡其家倩吾兄行追之逢霖水出溺死令吾終身無兄吾聞河潤九里漸洳三百步夫魯國有患君臣父子皆被其辱禍及衆庶婦人獨安所逃乎居三年魯果內亂齊楚攻之連有寇男子戰鬭婦人轉輸不得息韋賢滿籯夏侯拾芥前漢韋賢字長孺魯國鄒人為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒宣帝時為丞相以老病乞骸骨賜黃金百斤第一區丞相致仕自賢始少子元成字少翁好學修父業尤謙遜下士復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經元成相元帝十年守正持重不及父而文采過之前漢夏侯勝字長公東平人少好學為人質朴守正簡易亡威儀宣帝時遷太子少傅受詔撰尚書論語説賜黃金百斤年九十卒官初勝授太后尚書故賜錢二百萬素服五日以報師傅之恩儒者以為榮始勝每講授常謂諸生曰士病不明經術經茍明其取青紫如俯拾地芥耳學經不明不如歸耕阮簡曠達袁耽俊邁舊注引竹林七賢論曰阮簡咸之從子亦以曠達因居父喪行遇大雪寒凍遂詣俊儀令令為他賓設黍簡食之以致清議廢頓幾二十年晉袁耽字彥道陳郡陽夏人少有才氣倜儻不羈為士類所稱桓溫少時遊于博徒資産俱盡尚有負進思自振之方莫知所出欲求濟於耽而耽在艱誠以告焉耽略無難色遂變服懷布帽隨溫與償主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬絶叫操布帽擲地曰竟識袁彥道不其通脫如此仕為從事中郎蘇武持節鄭衆不拜前漢蘇武字子卿杜陵人武帝時以中郎將持節使胸奴單于欲降之遒幽武置大窖中絶不飲食天雨雪武臥齧雪與旃毛并吞之數日不死胸奴以為神乃徙武北海上使牧羝羝乳乃得歸武杖漢節牧羊臥起操持節旄盡落昭帝立胸奴與漢和親漢求武等胸奴詭言武死常惠教漢使者言天子射上林中得鴈足有係帛書言在某澤中由是得還拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區武留胸奴十九歲始以強壯出及還鬚髮盡白至宣帝時以武著節老臣令朝朔望號稱祭酒年八十餘卒後圖畫於麒麟閣法其形貌署其官爵姓名後漢鄭衆字仲師河南開封人精力於學知名於世永平初以明經給事中八年遣衆持節使胸奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆拔刀自誓單于恐而止後復遣衆衆言臣前奉使不為胸奴拜單于恚恨遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜帝不聽衆既行在路連上書固爭詔追還繫廷尉會赦歸家後帝見胸奴來者問衆與單于爭禮之狀皆言衆意氣壯勇雖蘇武不過復召為軍司馬終大司農郭巨將坑董永自賣舊注引孝子傳云後漢郭巨家貧養老母妻生一子三歲母常減食與之巨謂妻曰貧乏不能供給共汝埋子子可再有母不可再得妻不敢違巨遂掘坑二尺餘忽見黃金一釜釜上云天賜孝子郭巨官不得奪人不得取舊注漢董永少失母養父家貧傭力至農月以小車推父置田頭陰下樹而營農作父死就主人貸錢一萬約賣身為奴遂得錢葬父還於路忽遇婦人姿容端美求為永妻永與俱詣主人令永妻織縑三百匹放汝夫妻乃織一月而畢主人怪其速遂放之相隨至舊相遇處辭永曰我天之織女也緣君至孝天帝令助君償債言訖凌空而去仲連蹈海范蠡泛湖史記魯仲連齊人好奇偉俶儻之畫策不肯仕官遊於趙會秦圍邯鄲而魏將新垣衍欲令趙尊秦昭王為帝仲連乃見平原君曰梁客新垣衍安在吾請為君責而歸之平原君請為紹介見衍衍曰吾視居此圍城之中者皆有求於平原君今觀先生之玉貌非有求者曷為久不去仲連曰世以鮑焦為無從頌而死者皆非也衆人不知則為一身彼秦棄禮義上首功之國也權使其士虜使其民彼即為帝則連蹈東海而死耳不忍為之民也於是衍不敢復言帝秦平原君欲封之遂辭去終身不復見史記范蠡事越王勾踐苦身戮力與勾踐深謀二十餘年竟滅吳報會稽之恥以為大名之下難以久居且勾踐可與共患難與處安乃裝其輕寶珠玉與其私徒屬乘舟浮海以行終不反適齊變姓名自謂鴟夷子皮耕於海畔父子致産數千萬齊人聞其賢以為相蠡歎曰居家致千金居官至卿相此布衣之極也乃歸相印盡散其才以分與知友鄉黨懷其重寶間行以去止于陶以為此天下之中交易有無之利通可以致富自謂陶朱公居無何致資纍巨萬天下稱陶朱公故范蠡三徙成名於天下老死于陶文寶緝柳溫舒截蒲楚國先賢傳孫文寶到洛陽在太學左右得一小屋安止母然後入學編楊柳為簡以寫經前漢路溫舒字長君巨鹿東里人父為里監門使牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝廉為山邑丞宣帝時遷臨淮太守治有異迹伯道無兒嵇紹不孤晉書鄧攸字伯道平陽襄陵人為河東太守沒于石勒乃斫壞車以牛馬負妻子而逃又遇賊掠其牛馬步走擔其兒及其弟子綏度不能兩全乃請妻曰吾弟早亡惟有子息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而從之乃棄之朝棄而暮及明日繫之於樹而去至江東仕為尚書右僕射攸棄子之後妻不復孕過江納妾甚寵之訊其家屬説是北人遭亂憶父母姓名乃攸之甥攸素有德行聞之感恨遂不復畜妾卒以無嗣時人義而哀之曰天道無知使鄧伯道無兒晉嵇紹字延祖父康與山濤善臨誅謂紹曰巨源在汝不孤矣後濤薦為祕書丞始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞群裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才纍遷侍中及惠帝蒙塵馳詣行在所王師敗績百官及侍衛散遺惟紹儼然端冕以身捍衛兵交御輦飛箭雨集遂被害於帝側血濺御服帝深哀歎之及事定左右欲浣衣帝曰此稽侍中血勿去元帝表贈太尉諡曰忠穆祠太牢緑珠墜樓文君當盧晉書石崇字季倫渤海南皮人拜衛尉有妓曰緑珠美而豔善吹笛中書令孫秀使人求之崇時在金谷列館方登涼臺臨清流婦人侍側使者以告崇盡出其婢妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰受命指索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也秀怒乃勸趙王倫誅崇遂矯詔收之崇正宴樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死於君前因自投于樓卜而死宗詣東市歎曰奴輩利吾家財收者曰知財致害何不早散之崇不能答遂被害前漢卓文君蜀郡臨卬富人卓王孫女新寡好音司馬相如與客至其家酒酣鼓琴而以琴心挑之相如從車騎雍容間雅甚都文君切從戶窺之心悅而好之恐不得當也夜亡奔相如相如與馳歸成都家徒四壁立王孫大怒文君久之不樂謂長卿曰第俱如臨卬從昆弟假貸猶足以為生乃之臨卭盡賣車騎買酒舍令文君當盧相如自著犢鼻褌與庸保雜作滌器於市中王孫恥之杜門不出昆弟諸公更謂王孫曰有一男兩女所不足者非財也今文君既失身於長卿長卿故倦遊雖貧其人材足依也王孫分與文君僮百人錢百萬歸成都買田宅為富人久之蜀人楊得意為狗監侍武帝帝讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚召問以為郎伊尹負鼎寧戚扣角史記伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味説湯致於王道或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九王之事湯舉任以國政齊略記齊桓公夜出迎客寧戚夜擊其牛角高歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦桓公召與語説之以為大夫趙一坎壈顏駟蹇剝後漢趙一字元叔漢陽西縣人體貌魁梧望之甚偉恃才倨傲為鄉黨所擯乃作解擯屢抵罪幾至死友人救得免乃貽書謝恩為窮鳥賦後舉郡上計到京師時司徒袁逢受計計吏數百人皆拜伏庭中一獨長揖逢異之令左右讓之對曰昔酈食其長揖漢王今揖三公何遽怪哉逢下堂執手延置上坐河南尹羊陟與逢共稱薦之名動京師士大夫想望其風采後州郡爭致禮命十辟公府並不就初逢使善相者相一云仕不過郡吏竟如其言漢武故事上至郎署舍見一老郎鬚眉皓白問何時為郎對曰臣姓顏名駟文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三棄不遇也上感其言擢為會稽都尉一本作景帝好美臣貌醜龔遂勸農文翁興學前漢龔遂字少卿山陽南平陽人以明經為官宣帝時渤海左右郡歲飢盜賊並起二千石不能制上選能治者以遂為渤海太守年七十餘遂至界移書敕屬縣悉罷逐捕盜賊吏諸持鋤錡田器者皆為良民吏毋得問持兵者乃為盜賊盜賊悉平民安土樂業遂乃開倉廩賑貧民選用良吏慰安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸專務農桑民有帶刀劍者使賣劍買牛賣刀買犢吏民皆富貴獄訟止息後徵為議曹王生素嗜酒亡節度從至京師會遂引入官王生曰天子即問君何以治渤海宜曰皆聖主之德非小臣之力遂受其言以對上説笑曰君安得長者之言而稱之對曰臣非知此乃議曹教戒臣也上以遂老不任公卿拜水衡都尉王生為丞以褒顯遂云前漢文翁盧江舒人好學通春秋景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風欲誘進之乃選郡縣小吏開敏有材親自飭勵遣詣京師受業博士數歲蜀生皆成就還歸為右職官有至郡守刺史者又修起學宮於成都市中招下縣子弟為學官弟子為除更繇高者以補郡縣吏次為孝悌力田每行縣益爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉武帝乃令天下郡國皆立學校自文翁始文翁終於蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也晏御揚揚五鹿嶽嶽史記晏平仲名嬰為齊相出其御之妻從門間而窺其夫其夫為相御擁大蓋策駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯妾觀其出志念深矣常有以自下者今子長八尺乃為人僕子之意自以為足妾是以求去其後夫自抑損晏子怪問之御以實對晏子薦以為大夫前漢五鹿充宗字君孟時為少府貴辛為梁邱易自宣帝時善梁邱氏説元帝好之欲考其異同令充宗與諸易家論充宗乘貴辨口諸儒莫能與抗皆稱疾不敢會有薦朱雲者召入攝齊登堂抗首而請音動左右既論難連折五鹿君諸儒為之語曰五鹿嶽嶽朱雲折其角遂為博士
